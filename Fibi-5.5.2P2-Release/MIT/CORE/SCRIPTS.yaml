  - changeSet:
      id: FIBI-9157-1
      author: Nabeel Ahamed M
      labels: 'DDL'
      comment: ALTER SR_INT_STAGE_ELASTIC_INDEX table
      changes:
        - sql:
            sql: |
              -- ANTICIPATED_TOTAL_AMOUNT
              SET @sql := IF(
                  (SELECT COUNT(*) FROM information_schema.COLUMNS WHERE TABLE_SCHEMA = DATABASE() AND TABLE_NAME = 'SR_INT_STAGE_ELASTIC_INDEX' AND COLUMN_NAME = 'ANTICIPATED_TOTAL_AMOUNT') = 0,
                  'ALTER TABLE SR_INT_STAGE_ELASTIC_INDEX ADD COLUMN ANTICIPATED_TOTAL_AMOUNT DECIMAL(15,2);',
                  'DO 1'
              );
              PREPARE stmt FROM @sql;
              EXECUTE stmt;
              DEALLOCATE PREPARE stmt;
      rollback:
        - sql:
            sql: |
              ALTER TABLE SR_INT_STAGE_ELASTIC_INDEX DROP COLUMN ANTICIPATED_TOTAL_AMOUNT;

