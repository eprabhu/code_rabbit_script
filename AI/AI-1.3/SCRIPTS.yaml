                    AND TABLE_NAME = 'AI_ACTIVITY_LOG'
                    AND COLUMN_NAME = 'MODULE_CODE' 
                ) = 0,
                'ALTER TABLE AI_ACTIVITY_LOG ADD COLUMN MODULE_CODE INT;',
                'DO 1'
              );
              PREPARE stmt FROM @sql;
              EXECUTE stmt;
              DEALLOCATE PREPARE stmt;
      rollback:
        - sql:
            sql: |
              ALTER TABLE AI_ACTIVITY_LOG DROP COLUMN IF EXISTS MODULE_CODE;

