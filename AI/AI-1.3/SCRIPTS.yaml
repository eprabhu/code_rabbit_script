  - changeSet:
      id: AI-254-1
      author: Sanidh.IV
      labels: 'DDL'
      comment: Create AI_PROMPT_CATEGORY table.
      changes:
        - sql:
            sql: |
              CREATE TABLE IF NOT EXISTS AI_PROMPT_CATEGORY (
                AI_PROMPT_CATEGORY_ID INT NOT NULL AUTO_INCREMENT,
                AI_FEATURE_CODE VARCHAR(10),
                MODULE_CODE INT,
                AI_PROMPT_CATEGORY_NAME VARCHAR(100) NOT NULL,
                IS_SYSTEM_CATEGORY TINYINT(1),
                IS_ACTIVE TINYINT(1),
                CREATE_USER VARCHAR(100) NOT NULL,
                CREATE_TIMESTAMP TIMESTAMP DEFAULT CURRENT_TIMESTAMP,
                UPDATE_USER VARCHAR(100) NOT NULL,
                UPDATE_TIMESTAMP TIMESTAMP DEFAULT CURRENT_TIMESTAMP ON UPDATE CURRENT_TIMESTAMP,
                PRIMARY KEY (AI_PROMPT_CATEGORY_ID),
                CONSTRAINT AI_PROMPT_CATEGORY_FK1 FOREIGN KEY (AI_FEATURE_CODE) REFERENCES AI_CONFIG(AI_MODULE_CODE)
              );
      rollback:
        - sql:
            sql: |
              DROP TABLE IF EXISTS AI_PROMPT_CATEGORY;

