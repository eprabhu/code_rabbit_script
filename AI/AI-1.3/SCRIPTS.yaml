  - changeSet:
      id: AI-178-2
      author: Sanidh.IV
      labels: 'DDL'
      comment: Change the data type of AI_CB_HISTORY table's AI_RESPONSE column from VARCHAR(3000) to TEXT.
      changes:
        - sql:
            sql: |
              SET @sql := IF(
                (
                  SELECT COUNT(*)
                  FROM INFORMATION_SCHEMA.COLUMNS
                  WHERE TABLE_SCHEMA = DATABASE()
                    AND TABLE_NAME = 'AI_CB_HISTORY'
                    AND COLUMN_NAME = 'AI_RESPONSE'
                    AND COLUMN_TYPE = 'varchar(3000)'
                ),
                'ALTER TABLE AI_CB_HISTORY MODIFY COLUMN AI_RESPONSE TEXT',
                'SELECT 1'
              );
              PREPARE stmt FROM @sql;
              EXECUTE stmt;
              DEALLOCATE PREPARE stmt;
      rollback:
        - sql:
            sql: |
              ALTER TABLE AI_CB_HISTORY MODIFY COLUMN AI_RESPONSE VARCHAR(3000);
