  - changeSet:
      id: AI-265-1
      author: Subin Abraham
      labels: 'DDL'
      comment: Create AI_ACTIVITY_LOG table.
      changes:
        - sql:
            sql: |
              CREATE TABLE AI_ACTIVITY_LOG ( 
                AI_ACTIVITY_LOG_ID BIGINT AUTO_INCREMENT, 
                PERSON_ID VARCHAR(40), 
                SESSION_ID VARCHAR(100), 
                FEATURE_ID VARCHAR(10), 
                ACTION_TYPE VARCHAR(100), 
                START_TIMESTAMP TIMESTAMP NULL, 
                END_TIMESTAMP TIMESTAMP NULL, 
                PROCESSING_TIME BIGINT, 
                STATUS VARCHAR(50), 
                ERROR_CODE VARCHAR(50), 
                ERROR_MESSAGE TEXT,
                TOKENS_USED INT, 
                TOKEN_COST DECIMAL(10,5), 
                MODEL_USED VARCHAR(200),
                INPUT_FILE_TYPE VARCHAR(50), 
                INPUT_FILE_SIZE BIGINT, 
                INPUT_CHAR_COUNT INT, 
                OUTPUT_CHAR_COUNT INT, 
                CREATED_BY VARCHAR(60), 
                CREATED_ON TIMESTAMP DEFAULT CURRENT_TIMESTAMP, 
                FEATURE_HASH INT UNSIGNED GENERATED ALWAYS AS (CRC32(FEATURE_ID)) STORED, 
                PRIMARY KEY (AI_ACTIVITY_LOG_ID, FEATURE_HASH), 
                INDEX IDX_STATUS (STATUS), 
                INDEX IDX_ACTION_TYPE (ACTION_TYPE), 
                INDEX IDX_FEATURE_ACTION_STATUS (ACTION_TYPE, STATUS), 
                INDEX IDX_FEATURE_ID_ACTION_STATUS (FEATURE_ID, ACTION_TYPE, STATUS) 
              )  
              PARTITION BY HASH(FEATURE_HASH)  
              PARTITIONS 8; 
      rollback:
        - sql:
            sql: |
              DROP TABLE IF EXISTS AI_ACTIVITY_LOG;

  - changeSet:
      id: AI-265-2
      author: Subin Abraham
      labels: 'DDL'
      comment: Add new column to AI_ACTIVITY_LOG table.
      changes:
