  - changeSet:
      id: AI-301-1
      author: Sanidh.IV
      labels: 'DDL'
      comment: Change MODULE_ITEM_CODE data type from VARCHAR(10) to INT in the AI Summary table as per orginal DB CR.
      changes:
        - sql:
            sql: |
              ANALYZE TABLE AI_SUMMARY;
              SET @sql := IF(
                (
                  SELECT COUNT(*)
                  FROM INFORMATION_SCHEMA.COLUMNS
                  WHERE TABLE_SCHEMA = DATABASE()
                    AND TABLE_NAME = 'AI_SUMMARY'
                    AND COLUMN_NAME = 'MODULE_ITEM_CODE'
                    AND (DATA_TYPE <> 'int' OR IS_NULLABLE <> 'NO')
                ) > 0,
                'ALTER TABLE AI_SUMMARY MODIFY COLUMN MODULE_ITEM_CODE INT NOT NULL;',
                'DO 1'
              );
              PREPARE stmt FROM @sql;
              EXECUTE stmt;
              DEALLOCATE PREPARE stmt;
      rollback:
        - sql:
            sql: |
              ALTER TABLE AI_SUMMARY MODIFY COLUMN MODULE_ITEM_CODE VARCHAR(10) NOT NULL;

