              UPDATE `code_table_configuration` SET `CONTENT` = '{\n    \"group\": \"Agreements\",\n    \"codeTableName\": \"Agreement Action Type\",\n    \"description\": \"List of all agreement action types\",\n    \"databaseTableName\": \"AGREEMENT_ACTION_TYPE\",\n    \"fields\": [\n        {\n            \"columnName\": \"ACTION_TYPE_CODE\",\n            \"displayName\": \"Action Type Code\",\n            \"dataType\": \"String\",\n            \"isEditable\": true,\n            \"length\": 3,\n            \"canEmpty\": false,\n            \"visible\": true,\n            \"valueChanged\": null,\n            \"index\": null,\n            \"filterType\": null,\n            \"valueField\": null,\n            \"isTransient\": null,\n            \"values\": null,\n            \"refColumnName\": null,\n            \"defaultValue\": null\n        },\n        {\n            \"columnName\": \"DESCRIPTION\",\n            \"displayName\": \"Description\",\n            \"dataType\": \"String\",\n            \"isEditable\": true,\n            \"length\": 200,\n            \"canEmpty\": false,\n            \"visible\": true,\n            \"valueChanged\": null,\n            \"index\": null,\n            \"filterType\": null,\n            \"valueField\": null,\n            \"isTransient\": null,\n            \"values\": null,\n            \"refColumnName\": null,\n            \"defaultValue\": null\n        },\n		{\n            \"columnName\": \"MESSAGE\",\n            \"displayName\": \"Message\",\n            \"dataType\": \"String\",\n            \"isEditable\": true,\n            \"length\": 200,\n            \"canEmpty\": false,\n            \"visible\": true,\n            \"valueChanged\": null,\n            \"index\": null,\n            \"filterType\": null,\n            \"valueField\": null,\n            \"isTransient\": null,\n            \"values\": null,\n            \"refColumnName\": null,\n            \"defaultValue\": null\n        },\n        {\n            \"columnName\": \"UPDATE_TIMESTAMP\",\n            \"displayName\": \"update timestamp\",\n            \"dataType\": \"Date\",\n            \"isEditable\": false,\n            \"length\": null,\n            \"canEmpty\": false,\n            \"visible\": true,\n            \"valueChanged\": null,\n            \"index\": null,\n            \"filterType\": null,\n            \"valueField\": null,\n            \"isTransient\": null,\n            \"values\": null,\n            \"refColumnName\": null,\n            \"defaultValue\": null\n        },\n        {\n            \"columnName\": \"UPDATE_USER\",\n            \"displayName\": \"Update User\",\n            \"dataType\": \"String\",\n            \"isEditable\": false,\n            \"length\": 60,\n            \"canEmpty\": false,\n            \"visible\": true,\n            \"valueChanged\": null,\n            \"index\": null,\n            \"filterType\": null,\n            \"valueField\": null,\n            \"isTransient\": null,\n            \"values\": null,\n            \"refColumnName\": \"PERSON#USER_NAME\",\n            \"defaultValue\": null\n        },\n        {\n            \"columnName\": \"IS_ACTIVE\",\n            \"displayName\": \"Is Active\",\n            \"dataType\": \"String\",\n            \"isEditable\": true,\n            \"length\": 1,\n            \"canEmpty\": false,\n            \"visible\": true,\n            \"valueChanged\": null,\n            \"index\": null,\n            \"filterType\": \"switch\",\n            \"valueField\": null,\n            \"isTransient\": null,\n            \"values\": null,\n            \"refColumnName\": null,\n            \"defaultValue\": null\n        }\n    ],\n    \"primaryKey\": [\n        \"ACTION_TYPE_CODE\"\n    ],\n    \"dependency\": [\n        {\n            \"displayName\": \"Agreement Action Log\",\n            \"table_name\": \"agreement_action_log\",\n            \"columnName\": \"ACTION_TYPE_CODE\"\n        }\n    ],\n    \"actions\": null\n}' WHERE (`TABLE_NAME` = 'AGREEMENT_ACTION_TYPE');
              SET SQL_SAFE_UPDATES = 1;
      rollback: empty
