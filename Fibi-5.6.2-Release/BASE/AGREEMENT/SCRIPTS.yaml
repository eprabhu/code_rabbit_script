databaseChangeLog:

  - changeSet:
        id: FIBI-10379-1
        author: Sasikumar Chandran
        labels: 'DML'
        comment: Insert parameter to control Agreement Lead Unit auto-fill behavior
        changes:
          - sql:
              sql: |
                INSERT IGNORE INTO `PARAMETER` (`PARAMETER_NAME`, `VALUE`, `DESCRIPTION`, `UPDATE_TIMESTAMP`, `UPDATE_USER`) VALUES ('AGREEMENT_LEAD_UNIT_AUTOFILL', 'N', 'Determines if the Lead Unit field on an Agreement is auto-filled based on system rules (Y/N)', UTC_TIMESTAMP(), 'admin');
        rollback:
          - sql:
              sql: |
                DELETE FROM `PARAMETER` WHERE `PARAMETER_NAME` = 'AGREEMENT_LEAD_UNIT_AUTOFILL';

  - changeSet:
      id: FIBI-10544-1
      author: Nabeel Ahamed M  
      labels: 'DML'
      comment: Inserting Notification Type for Agreement related Support creation and support reply.
      changes:
        - sql:
            sql: |
              INSERT IGNORE INTO `notification_type` (`NOTIFICATION_TYPE_ID`, `MODULE_CODE`, `SUB_MODULE_CODE`, `DESCRIPTION`, `SUBJECT`, `MESSAGE`, `PROMPT_USER`, `IS_ACTIVE`, `CREATE_USER`,`CREATE_TIMESTAMP`, `UPDATE_USER`,`UPDATE_TIMESTAMP`, `IS_SYSTEM_SPECIFIC`, `SHOW_TEMPLATE_IN_MODULE`, `SENT_TO_INITIATOR`) 
              VALUES 
              ('8091', '13', '0', 'Support Request Replied', 
              'Notification: Response to support ticket for {AGREEMENT_ID} {AGREEMENT_TITLE} ', 
              '<p style=\"margin-left:0px;\">Dear {REQUESTOR_FULLNAME},</p><p style=\"margin-left:0px;\">The support ticket you have raised for {AGREEMENT_ID} {AGREEMENT_TITLE} has a response.</p><p style=\"margin-left:0px;\">Please follow {APPLICATION_URL} to view the task details.</p><p style=\"margin-left:0px;\">Thank you.</p>',
              'N', 'Y', 'admin', utc_timestamp(), 'admin', utc_timestamp(), 'Y', 'N', 'Y') ;
      rollback:
        - sql:
            sql: |
              DELETE FROM notification_type WHERE NOTIFICATION_TYPE_ID = 8091;                 

  - changeSet:
      id: FIBI-10546-1
      author: Reshma Antony
      labels: 'DML'
      comment: Update Script to the DASHBOARD_CRITERIA_LOOKUP table for the Key Persons Filter
      changes:
        - sql:
            sql: |
              UPDATE DASHBOARD_CRITERIA_LOOKUP
                SET CRITERIA_CONF_ID = '16',
                    UPDATE_USER = 'admin',
                    UPDATE_TIMESTAMP = UTC_TIMESTAMP()
                WHERE CRITERIA_KEY = 'CRT_AG_KEY_PERSON';
      rollback: empty

  - changeSet:
      id: FIBI-10541-1
      author: Nabeel Ahamed M
      labels: 'DML'
      comment: Update Script for code_table_configuration table
