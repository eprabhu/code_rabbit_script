databaseChangeLog:

  - changeSet:
      id: FIBI-10048-1
      author: Shyla M
      labels: 'DML'
      comment: Insert integration sync configuration entries
      changes:
        - sql:
            sql: |
              INSERT IGNORE INTO integration_sync_config 
              (CONFIG_KEY, CONFIG_CATEGORY, DISPLAY_NAME, IS_ACTIVE, SORT_ORDER, UPDATE_TIMESTAMP, UPDATE_USER)
              VALUES 
              ('sync_awards', 'integration_sync', 'Sync Awards', 'N',
              (SELECT * FROM (SELECT IFNULL(MAX(SORT_ORDER),0) + 1 FROM integration_sync_config) AS t),
              UTC_TIMESTAMP(), 'admin');
               
              INSERT IGNORE INTO integration_sync_config 
              (CONFIG_KEY, CONFIG_CATEGORY, DISPLAY_NAME, IS_ACTIVE, SORT_ORDER, UPDATE_TIMESTAMP, UPDATE_USER)
              VALUES 
              ('sync_ips', 'integration_sync', 'Sync Institute Proposals', 'N',
              (SELECT * FROM (SELECT IFNULL(MAX(SORT_ORDER),0) + 1 FROM integration_sync_config) AS t),
              UTC_TIMESTAMP(), 'admin');
               
              INSERT IGNORE INTO integration_sync_config 
              (CONFIG_KEY, CONFIG_CATEGORY, DISPLAY_NAME, IS_ACTIVE, SORT_ORDER, UPDATE_TIMESTAMP, UPDATE_USER)
              VALUES 
              ('sync_agreements', 'integration_sync', 'Sync Agreements', 'N',
              (SELECT * FROM (SELECT IFNULL(MAX(SORT_ORDER),0) + 1 FROM integration_sync_config) AS t),
              UTC_TIMESTAMP(), 'admin');
               
              INSERT IGNORE INTO integration_sync_config 
              (CONFIG_KEY, CONFIG_CATEGORY, DISPLAY_NAME, IS_ACTIVE, SORT_ORDER, UPDATE_TIMESTAMP, UPDATE_USER)
              VALUES 
              ('sync_service_requests', 'integration_sync', 'Sync Service Requests', 'N',
              (SELECT * FROM (SELECT IFNULL(MAX(SORT_ORDER),0) + 1 FROM integration_sync_config) AS t),
              UTC_TIMESTAMP(), 'admin');
               
              INSERT IGNORE INTO integration_sync_config 
              (CONFIG_KEY, CONFIG_CATEGORY, DISPLAY_NAME, IS_ACTIVE, SORT_ORDER, UPDATE_TIMESTAMP, UPDATE_USER)
              VALUES 
              ('sync_persons', 'integration_sync', 'Sync Persons', 'N',
              (SELECT * FROM (SELECT IFNULL(MAX(SORT_ORDER),0) + 1 FROM integration_sync_config) AS t),
              UTC_TIMESTAMP(), 'admin');
               
              INSERT IGNORE INTO integration_sync_config 
              (CONFIG_KEY, CONFIG_CATEGORY, DISPLAY_NAME, IS_ACTIVE, SORT_ORDER, UPDATE_TIMESTAMP, UPDATE_USER)
              VALUES 
              ('sync_units', 'integration_sync', 'Sync Units', 'N',
              (SELECT * FROM (SELECT IFNULL(MAX(SORT_ORDER),0) + 1 FROM integration_sync_config) AS t),
              UTC_TIMESTAMP(), 'admin');
