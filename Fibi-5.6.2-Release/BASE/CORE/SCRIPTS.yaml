              UPDATE dashboard_column_lookup SET WIDTH = '25' WHERE (COLUMN_KEY = 'COL_SR_STATUS');
              UPDATE dashboard_column_lookup SET WIDTH = '25' WHERE (COLUMN_KEY = 'COL_DEV_IP_STATUS');
      rollback: empty     

  - changeSet:
      id: FIBI-10454
      author: Prabhu.E
      labels: 'DML'
      comment:  Disable SR2012 section in dyn_section_config to avoid API error "getAplicableForms" since form builder is not being used for any forms currently. This will be re-enabled when form builder is used for any form in future.
      changes:
        - sql:
            sql: |
              SET SQL_SAFE_UPDATES = 0;

              UPDATE DYN_SECTION_CONFIG 
              SET IS_ACTIVE = 'N', 
              UPDATE_TIMESTAMP = UTC_TIMESTAMP(), 
              UPDATE_USER = 'admin' 
              WHERE SECTION_CODE = 'SR2012'; 
              
              SET SQL_SAFE_UPDATES = 1;

      rollback: 
        - sql:
            sql: |
              UPDATE DYN_SECTION_CONFIG 
              SET IS_ACTIVE = 'Y', 
              UPDATE_TIMESTAMP = UTC_TIMESTAMP(), 
              UPDATE_USER = 'admin' 
              WHERE SECTION_CODE = 'SR2012';

