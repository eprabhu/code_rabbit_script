  - changeSet:
      id: FIBI-9411-8
      author: Adarsh
      labels: 'DML'
      comment: Insert Resend Review action type
      changes:
        - sql:
            sql: |
              INSERT INTO EXT_REVIEW_ACTION_TYPE
                (EXT_REVIEW_ACTION_TYPE_CODE, DESCRIPTION, UPDATE_TIMESTAMP, UPDATE_USER, MESSAGE)
              SELECT '25', 'Resend Review', UTC_TIMESTAMP(), 'admin',
                     'External Review against <b>{REVIEWER NAME}</b> has been resent for review by <b>{ACTION OWNER}</b>\n'
              WHERE NOT EXISTS (
                SELECT 1
                FROM EXT_REVIEW_ACTION_TYPE
                WHERE EXT_REVIEW_ACTION_TYPE_CODE = '25'
              );
      rollback:
        - sql:
            sql: |
              DELETE FROM EXT_REVIEW_ACTION_TYPE
              WHERE EXT_REVIEW_ACTION_TYPE_CODE = '25';

  - changeSet:
      id: FIBI-9411-9
      author: Adarsh
      labels: 'DML'
      comment: Update notification message placeholders for action types 15 and 16
      changes:
        - sql:
            sql: |
              UPDATE EXT_REVIEW_ACTION_TYPE
              SET MESSAGE = '{COMMENTS}',
                  UPDATE_TIMESTAMP = UTC_TIMESTAMP(),
                  UPDATE_USER = 'admin'
              WHERE EXT_REVIEW_ACTION_TYPE_CODE = '15';

              UPDATE EXT_REVIEW_ACTION_TYPE
              SET MESSAGE = '{CHANGED DEADLINE DATE}',
                  UPDATE_TIMESTAMP = UTC_TIMESTAMP(),
                  UPDATE_USER = 'admin'
              WHERE EXT_REVIEW_ACTION_TYPE_CODE = '16';
      rollback: empty

  - changeSet:
      id: FIBI-9411-10
      author: Adarsh
      labels: 'DML'
      comment: Insert Review Reassigned notification template
      changes:
        - sql:
            sql: |
              INSERT INTO NOTIFICATION_TYPE
                (NOTIFICATION_TYPE_ID, MODULE_CODE, SUB_MODULE_CODE, DESCRIPTION, SUBJECT, MESSAGE,
                 PROMPT_USER, IS_ACTIVE, CREATE_USER, CREATE_TIMESTAMP, UPDATE_USER, UPDATE_TIMESTAMP,
                 IS_SYSTEM_SPECIFIC, SHOW_TEMPLATE_IN_MODULE, SENT_TO_INITIATOR)
              SELECT
                '2220', '22', '0', 'Review Reassigned ', 'Review Reassigned - Action Required',
                '    <p>Dear {REVIEWER_NAME},</p>\n    <p>\n        A review that you previously completed has been reassigned to you for further review.\n    </p>\n    <p>\n        <strong>Proposal Type:</strong> {REVIEW_TYPE}<br>\n        <strong>Proposal ID:</strong> {PROPOSAL_ID}<br>\n        <strong>Proposal Title:</strong> {PROPOSAL_TITLE}<br>\n        <strong>Assigned By:</strong> {UPDATE_USER}<br>\n        <strong>Reviewer Deadline:</strong> {REVIEWER_DEADLINE_DATE}\n    </p>\n    <p>\n        <strong>Comments from Administrator:</strong><br>\n        {COMMENTS}\n    </p>\n    <p>\n        Please note that this is a new review request and will appear as a separate entry in your review dashboard. \n        The earlier review has been archived for reference.\n    </p>\n    <p>\n        Kindly log in to ERM and complete the review before the due date.\n    </p>',
                'N', 'Y', 'admin', UTC_TIMESTAMP(), 'admin', UTC_TIMESTAMP(), 'N', 'N', 'Y'
              WHERE NOT EXISTS (
                SELECT 1
                FROM NOTIFICATION_TYPE
                WHERE NOTIFICATION_TYPE_ID = '2220'
              );
      rollback:
        - sql:
            sql: |
              DELETE FROM NOTIFICATION_TYPE
              WHERE NOTIFICATION_TYPE_ID = '2220';

  - changeSet:
      id: FIBI-9410-1
      author: Shiva krishnan R
      labels: 'DML'
      comment: Insert notification type for external reviewer deadline update
      changes:
        - sql:
            sql: |
              INSERT IGNORE INTO notification_type (
                NOTIFICATION_TYPE_ID,
                MODULE_CODE,
                SUB_MODULE_CODE,
                DESCRIPTION,
                SUBJECT,
                MESSAGE,
                PROMPT_USER,
                IS_ACTIVE,
                CREATE_USER,
                CREATE_TIMESTAMP,
                UPDATE_USER,
                UPDATE_TIMESTAMP,
                IS_SYSTEM_SPECIFIC,
                SHOW_TEMPLATE_IN_MODULE,
                SENT_TO_INITIATOR
              )
              VALUES (
                '2000',
                '22',
                '0',
                'Reviewer Deadline Date Updation',
                'Reviewer Deadline Updated for External Review',
                '<p>Dear {REVIEWER_NAME},</p>

                <p>The deadline for completing your external review for the proposal #{PROPOSAL_ID} has been updated.</p>

                <p>Previous Deadline: {REVIEWER_PREVIOUS_DEADLINE_DATE}</p>
                <p>New Deadline: {REVIEWER_DEADLINE_DATE}</p>

                <p>Please ensure that your review is completed by the revised deadline.</p>

                <p>If you have any questions, please contact the review administrator.</p>

                <p>Thank you.</p>

                <p>
                <span style="background-color:rgb(255,255,255);color:rgb(0,0,0);">
                Note: This is a system-generated email. Please do not reply to this email.
                </span>
                </p>

                <p> </p>',
                'N',
                'Y',
                'quickstart',
                UTC_TIMESTAMP(),
                'quickstart',
                UTC_TIMESTAMP(),
                'N',
                'N',
                'Y'
              );

      rollback:
        - sql:
            sql: |
              DELETE FROM notification_type
              WHERE NOTIFICATION_TYPE_ID = '2000';

