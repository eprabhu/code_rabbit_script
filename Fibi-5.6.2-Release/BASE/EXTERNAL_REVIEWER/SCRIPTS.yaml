        changes:
          - sql:
              sql: |
                SET SQL_SAFE_UPDATES=0;
                UPDATE EXT_REVIEW_ATTACHMENT_FILE ERAF
                JOIN EXT_REVIEW_ATTACHMENTS ERA
                  ON ERAF.FILE_DATA_ID = ERA.FILE_DATA_ID
                SET
                  ERAF.MODULE_CODE = '22',
                  ERAF.UPDATE_TIMESTAMP = UTC_TIMESTAMP(),
                  ERAF.UPDATE_USER = 'admin',
                  ERAF.ORIGINAL_FILE_NAME = ERA.FILE_NAME;
                SET SQL_SAFE_UPDATES=1;
