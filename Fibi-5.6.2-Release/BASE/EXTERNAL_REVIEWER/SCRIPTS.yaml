                'ALTER TABLE EXT_REV_COMMENT_ATTACHMENT DROP FOREIGN KEY EXT_REV_COMMENT_ATTACHMENT_FK3;',
                'SELECT 1'
              );
              PREPARE stmt FROM @sql;
              EXECUTE stmt;
              DEALLOCATE PREPARE stmt;

              SET @sql := IF(
                (SELECT COUNT(*) FROM information_schema.COLUMNS
