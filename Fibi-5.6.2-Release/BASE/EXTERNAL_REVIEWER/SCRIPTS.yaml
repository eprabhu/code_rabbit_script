  - changeSet:
      id: FIBI-9688-17
      author: Adarsh
      labels: 'DDL'
      comment: Create EXT_REVIEW_ACTION_LOG
      changes:
        - sql:
            sql: |
              CREATE TABLE IF NOT EXISTS EXT_REVIEW_ACTION_LOG (
                ACTION_LOG_ID INT NOT NULL AUTO_INCREMENT,
                EXT_REVIEW_ID INT NOT NULL,
                REVIEW_REVIEWER_ID INT DEFAULT NULL,
                EXT_REVIEW_ACTION_TYPE_CODE INT NOT NULL,
                COMMENT VARCHAR(4000) DEFAULT NULL,
                UPDATE_USER VARCHAR(60) NOT NULL,
                UPDATE_TIMESTAMP TIMESTAMP NOT NULL DEFAULT CURRENT_TIMESTAMP ON UPDATE CURRENT_TIMESTAMP,
                PRIMARY KEY (ACTION_LOG_ID),
                KEY EXT_REVIEW_ACTION_LOG_FK1 (EXT_REVIEW_ID),
                KEY EXT_REVIEW_ACTION_LOG_FK2 (EXT_REVIEW_ACTION_TYPE_CODE),
                KEY EXT_REVIEW_ACTION_LOG_FK3 (REVIEW_REVIEWER_ID),
                CONSTRAINT EXT_REVIEW_ACTION_LOG_FK1 FOREIGN KEY (EXT_REVIEW_ID) REFERENCES EXT_REVIEW (EXT_REVIEW_ID),
                CONSTRAINT EXT_REVIEW_ACTION_LOG_FK2 FOREIGN KEY (EXT_REVIEW_ACTION_TYPE_CODE) REFERENCES EXT_REVIEW_ACTION_TYPE (EXT_REVIEW_ACTION_TYPE_CODE),
                CONSTRAINT EXT_REVIEW_ACTION_LOG_FK3 FOREIGN KEY (REVIEW_REVIEWER_ID) REFERENCES EXT_REVIEW_REVIEWERS (REVIEW_REVIEWER_ID)
              );
      rollback:
        - sql:
            sql: |
              DROP TABLE IF EXISTS EXT_REVIEW_ACTION_LOG;

