  - changeSet:
        id: FIBI-10113-3
        author: Adarsh
        labels: 'DML'
        comment: Migration EXT_REVIEW_ATTACHMENT_FILE from EXT_REV_COMMENT_ATTACHMENT 
        changes:
          - sql:
              sql: |
                UPDATE EXT_REVIEW_ATTACHMENT_FILE ERAF
                JOIN EXT_REV_COMMENT_ATTACHMENT ERCA
                  ON ERAF.FILE_DATA_ID = ERCA.FILE_DATA_ID
                SET
                  ERAF.MODULE_CODE = '22',
                  ERAF.UPDATE_TIMESTAMP = UTC_TIMESTAMP(),
                  ERAF.UPDATE_USER = 'admin',
                  ERAF.ORIGINAL_FILE_NAME = ERCA.FILE_NAME;
        rollback: empty

