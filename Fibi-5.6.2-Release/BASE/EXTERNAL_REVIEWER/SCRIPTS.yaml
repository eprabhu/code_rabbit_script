databaseChangeLog:

  - changeSet:
      id: FIBI-9411-1
      author: Adarsh
      labels: 'DDL'
      comment: Add VERSION column to EXT_REVIEW_REVIEWERS 
      changes:
        - sql:
            sql: |
              SET @sql := IF(
                (SELECT COUNT(*) FROM information_schema.COLUMNS
                 WHERE TABLE_SCHEMA = DATABASE()
                   AND TABLE_NAME = 'EXT_REVIEW_REVIEWERS'
                   AND COLUMN_NAME = 'VERSION') = 0,
                'ALTER TABLE EXT_REVIEW_REVIEWERS ADD COLUMN VERSION INT;',
                'SELECT 1'
              );
              PREPARE stmt FROM @sql;
              EXECUTE stmt;
              DEALLOCATE PREPARE stmt;
      rollback:
        - sql:
            sql: |
              SET @sql := IF(
                (SELECT COUNT(*) FROM information_schema.COLUMNS
                 WHERE TABLE_SCHEMA = DATABASE()
                   AND TABLE_NAME = 'EXT_REVIEW_REVIEWERS'
                   AND COLUMN_NAME = 'VERSION') > 0,
                'ALTER TABLE EXT_REVIEW_REVIEWERS DROP COLUMN VERSION;',
                'SELECT 1'
              );
              PREPARE stmt FROM @sql;
              EXECUTE stmt;
              DEALLOCATE PREPARE stmt;

  - changeSet:
      id: FIBI-9411-2
      author: Adarsh
      labels: 'DML'
      comment: Initialize VERSION for existing EXT_REVIEW_REVIEWERS rows
      changes:
        - sql:
            sql: |
              SET SQL_SAFE_UPDATES=0;
              UPDATE EXT_REVIEW_REVIEWERS
              SET VERSION = 1,
                  UPDATE_TIMESTAMP = UTC_TIMESTAMP(),
                  UPDATE_USER = 'admin';
              SET SQL_SAFE_UPDATES=1;
      rollback:
        - sql:
            sql: |
              UPDATE EXT_REVIEW_REVIEWERS
              SET VERSION = NULL,
                  UPDATE_TIMESTAMP = UTC_TIMESTAMP(),
                  UPDATE_USER = 'admin';

  - changeSet:
      id: FIBI-9411-3
      author: Adarsh
      labels: 'DML'
      comment: Remap QUEST_ANSWER_HEADER MODULE_SUB_ITEM_KEY to REVIEW_REVIEWER_ID
      changes:
        - sql:
            sql: |
              SET SQL_SAFE_UPDATES=0;
              UPDATE QUEST_ANSWER_HEADER QAH
              JOIN EXT_REVIEW_REVIEWERS ERR ON QAH.MODULE_SUB_ITEM_KEY = ERR.EXTERNAL_REVIEWER_ID
              SET QAH.MODULE_SUB_ITEM_KEY = ERR.REVIEW_REVIEWER_ID,
                  QAH.UPDATE_TIMESTAMP = UTC_TIMESTAMP(),
                  QAH.UPDATE_USER = 'admin';
              SET SQL_SAFE_UPDATES=1;
      rollback:
        - sql:
            sql: |
              UPDATE QUEST_ANSWER_HEADER QAH
              JOIN EXT_REVIEW_REVIEWERS ERR ON QAH.MODULE_SUB_ITEM_KEY = ERR.REVIEW_REVIEWER_ID
              SET QAH.MODULE_SUB_ITEM_KEY = ERR.EXTERNAL_REVIEWER_ID,
                  QAH.UPDATE_TIMESTAMP = UTC_TIMESTAMP(),
                  QAH.UPDATE_USER = 'admin';

