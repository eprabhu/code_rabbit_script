databaseChangeLog:

  - changeSet:
      id: FIBI-9803-1
      author: Adarsh 
      labels: 'DDL'
      comment: Create New table 
      changes:
        - sql:
            sql: |
              CREATE TABLE IF NOT EXISTS FIBI_APPS (
                APP_ID INT NOT NULL AUTO_INCREMENT,
                APP_NAME VARCHAR(50) NOT NULL,
                DESCRIPTION VARCHAR(100) DEFAULT NULL,
                DISPLAY_IN_LOOKUP VARCHAR(1) DEFAULT NULL,
                CONTEXT_PATH VARCHAR(50) DEFAULT NULL,
                UPDATE_TIMESTAMP DATETIME DEFAULT NULL,
                UPDATE_USER VARCHAR(60) DEFAULT NULL,
                PRIMARY KEY (APP_ID)
              );
      rollback:
        - sql:
            sql: |
                DROP TABLE IF EXISTS FIBI_APPS;

  - changeSet:
      id: FIBI-9803-2
      author: Adarsh 
      labels: 'DML'
      comment: Insert into Fibi Apps
      changes:
        - sql:
            sql: |
              INSERT IGNORE INTO FIBI_APPS (APP_ID,APP_NAME,DESCRIPTION,DISPLAY_IN_LOOKUP,UPDATE_TIMESTAMP,UPDATE_USER) VALUES (1,'fibi-base','Base','Y',UTC_TIMESTAMP(),'admin');
              INSERT IGNORE INTO FIBI_APPS (APP_ID,APP_NAME,DESCRIPTION,DISPLAY_IN_LOOKUP,UPDATE_TIMESTAMP,UPDATE_USER) VALUES (2,'fibi-landing','Landing','Y',UTC_TIMESTAMP(),'admin');
              INSERT IGNORE INTO FIBI_APPS (APP_ID,APP_NAME,DESCRIPTION,DISPLAY_IN_LOOKUP,UPDATE_TIMESTAMP,UPDATE_USER) VALUES (3,'fibi-coi','COI ','Y',UTC_TIMESTAMP(),'admin');
      rollback:
        - sql:
            sql: |
                DELETE FROM FIBI_APPS WHERE APP_ID IN (1,2,3);

  - changeSet:
      id: FIBI-9803-3
      author: Adarsh 
      labels: 'DML'
      comment: Alter table LANDING_QUICK_LINKS
      changes:
        - sql:
            sql: |
              SET @SQL := IF(
                EXISTS (
                  SELECT 1
                  FROM INFORMATION_SCHEMA.COLUMNS
                  WHERE TABLE_SCHEMA = DATABASE()
                    AND TABLE_NAME = 'LANDING_QUICK_LINKS'
                    AND COLUMN_NAME = 'ADDITIONAL_INFO'
                ),
                'DO 1',
                'ALTER TABLE LANDING_QUICK_LINKS ADD COLUMN ADDITIONAL_INFO JSON DEFAULT NULL COMMENT ''JSON object for additional information'''
              );
              PREPARE STMT FROM @SQL;
              EXECUTE STMT;
              DEALLOCATE PREPARE STMT;

              SET @SQL := IF(
                EXISTS (
                  SELECT 1
                  FROM INFORMATION_SCHEMA.COLUMNS
                  WHERE TABLE_SCHEMA = DATABASE()
                    AND TABLE_NAME = 'LANDING_QUICK_LINKS'
                    AND COLUMN_NAME = 'APP_ID'
                ),
                'DO 1',
                'ALTER TABLE LANDING_QUICK_LINKS ADD COLUMN APP_ID INT NULL'
              );
              PREPARE STMT FROM @SQL;
              EXECUTE STMT;
              DEALLOCATE PREPARE STMT;

              SET @SQL := IF(
                EXISTS (
                  SELECT 1
                  FROM INFORMATION_SCHEMA.COLUMNS
                  WHERE TABLE_SCHEMA = DATABASE()
                    AND TABLE_NAME = 'LANDING_QUICK_LINKS'
                    AND COLUMN_NAME = 'IS_ACTIVE'
                ),
                'DO 1',
                'ALTER TABLE LANDING_QUICK_LINKS ADD COLUMN IS_ACTIVE VARCHAR(1) DEFAULT ''Y'' NULL'
              );
              PREPARE STMT FROM @SQL;
              EXECUTE STMT;
              DEALLOCATE PREPARE STMT;

              SET @SQL := IF(
                EXISTS (
                  SELECT 1
                  FROM INFORMATION_SCHEMA.TABLE_CONSTRAINTS
                  WHERE TABLE_SCHEMA = DATABASE()
                    AND TABLE_NAME = 'LANDING_QUICK_LINKS'
                    AND CONSTRAINT_NAME = 'LANDING_QUICK_LINKS_FK1'
                    AND CONSTRAINT_TYPE = 'FOREIGN KEY'
                ),
                'DO 1',
                'ALTER TABLE LANDING_QUICK_LINKS ADD CONSTRAINT LANDING_QUICK_LINKS_FK1 FOREIGN KEY (APP_ID) REFERENCES FIBI_APPS(APP_ID)'
              );
              PREPARE STMT FROM @SQL;
              EXECUTE STMT;
              DEALLOCATE PREPARE STMT;
      rollback:
        - sql:
            sql: |
                ALTER TABLE LANDING_QUICK_LINKS
                DROP FOREIGN KEY LANDING_QUICK_LINKS_FK1;

                ALTER TABLE LANDING_QUICK_LINKS
                DROP COLUMN ADDITIONAL_INFO,
                DROP COLUMN APP_ID,
                DROP COLUMN IS_ACTIVE;


