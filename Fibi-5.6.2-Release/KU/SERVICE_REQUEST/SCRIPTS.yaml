databaseChangeLog:

  - changeSet:
      id: FIBI-10350-1
      author: vishnu
      labels: 'DML'
      comment: Activate elastic_sync for Service Request (servicerequest)
      changes:
        - sql:
            sql: |
              UPDATE `integration_sync_config`
              SET `IS_ACTIVE` = 'Y',
                  `UPDATE_TIMESTAMP` = UTC_TIMESTAMP(),
                  `UPDATE_USER` = 'admin'
              WHERE `CONFIG_KEY` = 'servicerequest'
                AND `CONFIG_CATEGORY` = 'elastic_sync';
      rollback:
        - sql:
            sql: |
              UPDATE `integration_sync_config`
              SET `IS_ACTIVE` = 'N',
                  `UPDATE_TIMESTAMP` = UTC_TIMESTAMP(),
                  `UPDATE_USER` = 'admin'
              WHERE `CONFIG_KEY` = 'servicerequest'
                AND `CONFIG_CATEGORY` = 'elastic_sync';

