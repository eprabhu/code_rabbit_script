			\"queryType\": \"LIKE\",\n			\"summable\": \"N\",\n			\"width\": 4600\n		},\n		{\n			\"columnName\": \"TEAM.FULL_NAME\",\n			\"displayName\": \"Project Team Person\",\n			\"filterType\": \"elasticComposite\",\n			\"valueField\": \"full_name\",\n			\"index\": \"fibiperson\",\n			\"queryType\": \"IN\",\n			\"summable\": \"N\",\n			\"width\": 4600\n		},\n		{\n			\"columnName\": \"TEAM.PROJECT_ROLE\",\n			\"displayName\": \"Project Team Role\",\n			\"filterType\": \"freetext\",\n			\"valueField\": \"null\",\n			\"index\": \"null\",\n			\"queryType\": \"LIKE\",\n			\"summable\": \"N\",\n			\"width\": 4600\n		},\n		{\n			\"columnName\": \"TEAM.START_DATE\",\n			\"displayName\": \"Project Team Start Date\",\n			\"filterType\": \"date\",\n			\"valueField\": \"null\",\n			\"index\": \"null\",\n			\"queryType\": \"BETWEEN\",\n			\"summable\": \"N\",\n			\"width\": 4600\n		},\n		{\n			\"columnName\": \"TEAM.END_DATE\",\n			\"displayName\": \"Project Team End Date\",\n			\"filterType\": \"date\",\n			\"valueField\": \"null\",\n			\"index\": \"null\",\n			\"queryType\": \"BETWEEN\",\n			\"summable\": \"N\",\n			\"width\": 4600\n		},\n		{\n			\"columnName\": \"TEAM.PERCENTAGE_CHARGED\",\n			\"displayName\": \"Project Team Effort\",\n			\"filterType\": \"null\",\n			\"valueField\": \"null\",\n			\"index\": \"null\",\n			\"queryType\": \"LIKE\",\n			\"summable\": \"N\",\n			\"width\": 4600\n		}\n	],\n	\"extraCondition\" : \"(MASTER_DATA.LEAD_UNIT_NUMBER  IN(SELECT DISTINCT UNIT_NUMBER FROM ACCESS_TMP))\",\n	\"extraSelection\" : \"\",\n	\"selectDistinct\" : \"Y\",\n	\"tempTable\":\"WITH ACCESS_TMP AS (SELECT UNIT_NUMBER FROM PERSON_ROLES T1 INNER JOIN ROLE_RIGHTS T2 ON T1.ROLE_ID = T2.ROLE_ID INNER JOIN RIGHTS T3 ON T2.RIGHT_ID = T3.RIGHT_ID  WHERE T1.DESCEND_FLAG = \'N\' AND T1.PERSON_ID = <<PERSON_ID>> AND RIGHT_NAME IN (\'VIEW_PROPOSAL\') UNION SELECT CHILD_UNIT_NUMBER FROM UNIT_WITH_CHILDREN  WHERE UNIT_NUMBER IN (SELECT UNIT_NUMBER FROM PERSON_ROLES T1 INNER JOIN ROLE_RIGHTS