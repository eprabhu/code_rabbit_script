eld":"title","index":"null","queryType":"LIKE","width":18000},{"columnName":"BUDGET_STATUS","displayName":"Budget Status","filterType":"lookUp","valueField":"BUDGET_STATUS#BUDGET_STATUS_CODE#false#true","index":"null","queryType":"IN","width":7000},{"columnName":"PI_NAME","displayName":"Principal Investigator","filterType":"elasticComposite","valueField":"full_name","index":"IS_PI_EMPLOYEE","queryType":"IN","width":11000},{"columnName":"TOTAL_COST","displayName":"Total Cost (AED)","filterType":"null","valueField":"null","index":"null","queryType":"IN","isCurrency":"true","width":5800},{"columnName":"TOTAL_DIRECT_COST","displayName":"Total Direct Cost (AED)","filterType":"null","valueField":"null","index":"null","queryType":"IN","isCurrency":"true","width":5800},{"columnName":"TOTAL_INDIRECT_COST","displayName":"Total Indirect Cost (AED)","filterType":"null","valueField":"null","index":"null","queryType":"IN","isCurrency":"true","width":5800},{"columnName":"TOTAL_SUBCONTRACT_COST","displayName":"Total Subcontract Cost (AED)","filterType":"null","valueField":"null","index":"null","queryType":"IN","isCurrency":"true","width":5800},{"columnName":"UNDERRECOVERY_AMOUNT","displayName":"Under Recovery Amount (AED)","filterType":"null","valueField":"null","index":"null","queryType":"IN","isCurrency":"true","width":5800},{"columnName":"SPONSOR_NAME","displayName":"Sponsor","filterType":"endpoint","valueField":"sponsorName","index":"sponsorName","queryType":"IN","width":7000},{"columnName":"LEAD_UNIT_NAME","displayName":"Lead Unit","filterType":"endpoint","valueField":"unitName","index":"unitName","queryType":"IN","width":7000},{"columnName":"ACTIVITY_TYPE","displayName":"Activity Type","filterType":"lookUp","valueField":"ACTIVITY_TYPE#ACTIVITY_TYPE_CODE#true#true","index":"null","queryType":"IN","width":7000},{"columnName":"SPECIAL_REVIEW","displayName":"Special Review Type","filterType":"lookUp","valueField":"SPECIAL_REVIEW#SPECIAL_REVIEW_CODE#true#true","index":"null","queryType":"IN","width":7000},{"columnName":"FUNDING_SCHEME","displayName":"Funding Scheme","filterType":"lookUp","valueField":"FUNDING_SCHEME#FUNDING_SCHEME_CODE#true#true","index":"null","queryType":"IN","width":7000},{"columnName":"TYPE_OF_FUNDING_AGENCY","displayName":"Funding Agency Type","filterType":"lookUp","valueField":"SPONSOR_TYPE#SPONSOR_TYPE_CODE#true#true","index":"null","queryType":"IN","width":7000},{"columnName":"DISCIPLINE_CLUSTER","displayName":"Discipline Cluster","filterType":"lookUp","valueField":"EPS_PROP_DISCIPLINE_CLUSTER#CLUSTER_CODE#true#true","index":"null","queryType":"IN","width":7000},{"columnName":"ORGANIZATION","displayName":"Organization","filterType":"freetext","valueField":"null","index":"null","queryType":"LIKE","width":7000},{"columnName":"PERSON_NAME","displayName":"Person Name","filterType":"elastic","valueField":"full_name","index":"fibiperson","queryType":"IN","width":11000},{"columnName":"PERSON_ID","displayName":"Person ID","filterType":"null","valueField":"null","index":"null","queryType":"IN","width":4600},{"columnName":"PERSON_ROLE","displayName":"Person Role","filterType":"lookUp","valueField":"EPS_PROP_PERSON_ROLE#PROP_PERSON_ROLE_ID#true#true","index":"null","queryType":"IN","width":7000},{"columnName":"PERCENTAGE_OF_EFFORT","displayName":"% of Effort","filterType":"null","valueField":"null","index":"null","queryType":"IN","width":4600},{"columnName":"SUBMIT_USER","displayName":"Proposal Submit User","filterType":"elastic","valueField":"full_name","index":"fibiperson","queryType":"IN","width":11000},{"columnName":"RESEARCH_CENTER","displayName":"Research Center","filterType":"lookUp","valueField":"RESEARCH_CENTER#CENTER_ID#true#true","index":"null","queryType":"IN","width":7000},{"columnName":"HORIZONTAL_AREA","displayName":"Horizontal Area","filterType":"freetext","valueField":"null","index":"null","queryType":"LIKE","summable":"N","width":18000},{"columnName":"VERTICAL_AREA","displayName":"Vertical Area","filterType":"freetext","valueField":"null","index":"null","queryType":"LIKE","summable":"N","width":18000}],"extraCondition":"(PROPOSAL_ID IN (SELECT PROPOSAL_ID FROM EPS_PROPOSAL_TEMP) OR LEAD_UNIT_NUMBER IN(SELECT DISTINCT UNIT_NUMBER FROM ACCESS_TMP))","extraSelection":",PROPOSAL_ID AS ID, LEAD_UNIT_NUMBER AS UNIT_NUMBER","selectDistinct":"Y","tempTable":"WITH ACCESS_TMP AS (SELECT UNIT_NUMBER FROM PERSON_ROLES T1 INNER JOIN ROLE_RIGHTS T2 ON T1.ROLE_ID = T2.ROLE_ID INNER JOIN RIGHTS T3 ON T2.RIGHT_ID = T3.RIGHT_ID  WHERE T1.DESCEND_FLAG = 'N' AND T1.PERSON_ID = <<PERSON_ID>> AND RIGHT_NAME IN ('VIEW_PROPOSAL' 'CREATE_PROPOSAL', 'MODIFY_PROPOSAL') UNION SELECT CHILD_UNIT_NUMBER FROM UNIT_WITH_CHILDREN  WHERE UNIT_NUMBER IN (SELECT UNIT_NUMBER FROM PERSON_ROLES T1 INNER JOIN ROLE_RIGHTS T2 ON T1.ROLE_ID = T2.ROLE_ID INNER JOIN RIGHTS T3 ON T2.RIGHT_ID = T3.RIGHT_ID  WHERE T1.DESCEND_FLAG = 'Y' AND T1.PERSON_ID = <<PERSON_ID>> AND RIGHT_NAME IN ('VIEW_PROPOSAL' 'CREATE_PROPOSAL', 'MODIFY_PROPOSAL'))),EPS_PROPOSAL_TEMP AS (SELECT PROPOSAL_ID FROM EPS_PROPOSAL_PERSON_ROLES WHERE PERSON_ID = <<PERSON_ID>>)"}' WHERE (TYPE_CODE = '1');
      rollback: empty

