  - changeSet:
      id: FIBI-9250-1
      author: Prabhu E
      labels: 'DML'
      comment: 2 new fields added in the report
      changes:
        - sql:
            sql: |
              UPDATE `report_type_join` 
              SET `JOIN_QUERY` = ' LEFT JOIN (\r SELECT DISTINCT\r     BH.BUDGET_HEADER_ID,\r     BH.TOTAL_DIRECT_COST \r       - COALESCE(SUM(BD.SPONSOR_REQUESTED_AMOUNT), 0) AS MODIFIED_DIRECT_COST\r FROM BUDGET_HEADER BH\r LEFT JOIN BUDGET_DETAIL BD \r     ON BD.BUDGET_HEADER_ID = BH.BUDGET_HEADER_ID\r LEFT JOIN BUDGET_CATEGORY BC \r     ON BC.BUDGET_CATEGORY_CODE = BD.BUDGET_CATEGORY_CODE\r    AND BC.BUDGET_CATEGORY_TYPE_CODE IN (\'E\',\'S\')\r GROUP BY \r     BH.BUDGET_HEADER_ID,\r     BH.TOTAL_DIRECT_COST\r ) CHILD ON CHILD.BUDGET_HEADER_ID = MASTER.BUDGET_HEADER_ID\r LEFT JOIN EPS_PROPOSAL_PERSONNEL_V VIEWS ON VIEWS.BUDGET_HEADER_ID = MASTER.BUDGET_HEADER_ID \r INNER JOIN (SELECT \r EPS.PROPOSAL_ID,\r BC.DESCRIPTION AS BUDGET_CATEGORY,\r BD.BUDGET_CATEGORY_CODE,\r \r SUM(CASE \r       WHEN BP.budget_period = \'1\' \r       THEN IFNULL(BD.SPONSOR_REQUESTED_AMOUNT,0)  \r       ELSE 0 \r     END) AS PERIOD_1,\r \r SUM(CASE WHEN BP.budget_period = \'2\' THEN IFNULL(BD.SPONSOR_REQUESTED_AMOUNT,0) ELSE 0 END) AS PERIOD_2,\r SUM(CASE WHEN BP.budget_period = \'3\' THEN IFNULL(BD.SPONSOR_REQUESTED_AMOUNT,0) ELSE 0 END) AS PERIOD_3,\r SUM(CASE WHEN BP.budget_period = \'4\' THEN IFNULL(BD.SPONSOR_REQUESTED_AMOUNT,0) ELSE 0 END) AS PERIOD_4,\r SUM(CASE WHEN BP.budget_period = \'5\' THEN IFNULL(BD.SPONSOR_REQUESTED_AMOUNT,0) ELSE 0 END) AS PERIOD_5,\r SUM(CASE WHEN BP.budget_period = \'6\' THEN IFNULL(BD.SPONSOR_REQUESTED_AMOUNT,0) ELSE 0 END) AS PERIOD_6,\r SUM(CASE WHEN BP.budget_period = \'7\' THEN IFNULL(BD.SPONSOR_REQUESTED_AMOUNT,0) ELSE 0 END) AS PERIOD_7,\r SUM(CASE WHEN BP.budget_period = \'8\' THEN IFNULL(BD.SPONSOR_REQUESTED_AMOUNT,0) ELSE 0 END) AS PERIOD_8,\r SUM(CASE WHEN BP.budget_period = \'9\' THEN IFNULL(BD.SPONSOR_REQUESTED_AMOUNT,0) ELSE 0 END) AS PERIOD_9,\r SUM(CASE WHEN BP.budget_period = \'10\' THEN IFNULL(BD.SPONSOR_REQUESTED_AMOUNT,0) ELSE 0 END) AS PERIOD_10,\r \r SUM(\r     CASE \r       WHEN BP.budget_period = \'1\' \r       THEN IFNULL(BD.SPONSOR_REQUESTED_AMOUNT,0)  \r       ELSE IFNULL(BD.SPONSOR_REQUESTED_AMOUNT,0)\r     END\r ) AS TOTAL,\r SUM(IFNULL(BD.COST_SHARING_AMOUNT, 0)+ IFNULL(bd.UNDERRECOVERY_AMOUNT,0)) AS TOTAL_IN_KIND_COST, \r SUM(IFNULL(BD.LINE_ITEM_COST, 0)) AS TOTAL_COST\r FROM EPS_PROPOSAL EPS \r INNER JOIN BUDGET_HEADER BH ON BH.PROPOSAL_ID = EPS.PROPOSAL_ID\r INNER JOIN BUDGET_PERIOD BP ON BP.BUDGET_HEADER_ID = BH.BUDGET_HEADER_ID\r LEFT JOIN BUDGET_DETAIL BD \r        ON  BD.BUDGET_PERIOD_ID = BP.BUDGET_PERIOD_ID\r INNER JOIN BUDGET_CATEGORY BC \r        ON BC.BUDGET_CATEGORY_CODE = BD.BUDGET_CATEGORY_CODE\r \r WHERE  (\r     BH.IS_FINAL_BUDGET = \'Y\'\r     OR (\r         BH.IS_LATEST_VERSION = \'Y\' \r         AND NOT EXISTS (\r             SELECT 1 \r             FROM BUDGET_HEADER \r             WHERE PROPOSAL_ID = BH.PROPOSAL_ID \r             AND IS_FINAL_BUDGET = \'Y\'\r         )\r     )\r )\r \r GROUP BY EPS.PROPOSAL_ID, BC.DESCRIPTION, BD.BUDGET_CATEGORY_CODE) SUB_CHILD ON SUB_CHILD.PROPOSAL_ID = MASTER.PROPOSAL_ID\r  LEFT JOIN(\r  SELECT PROPOSAL_ID,ACCOUNT_NUMBER FROM AWARD_FUNDING_PROPOSALS AFP\r  LEFT JOIN AWARD A ON A.AWARD_ID = AFP.AWARD_ID) AWD ON MASTER.IP_PROPOSAL_ID = AWD.PROPOSAL_ID ' 
              , UPDATE_TIMESTAMP = utc_timestamp()
              , UPDATE_USER = 'admin'
              WHERE (`TYPE_CODE` = '156');
      rollback: empty

