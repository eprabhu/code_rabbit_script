"valueField\": \"null\",\n            \"displayName\": \"Grant Call ID\"\n        },\n        {\n            \"index\": \"null\",\n            \"width\": 18000,\n            \"summable\": \"N\",\n            \"queryType\": \"LIKE\",\n            \"columnName\": \"MASTER.GRANT_CALL_TITLE\",\n            \"filterType\": \"freetext\",\n            \"valueField\": \"\",\n            \"displayName\": \"Grant Call Title\"\n        },\n        {\n            \"index\": \"sponsorName\",\n            \"width\": 11000,\n            \"summable\": \"N\",\n            \"queryType\": \"IN\",\n            \"columnName\": \"MASTER.SPONSOR_NAME\",\n            \"filterType\": \"endpoint\",\n            \"valueField\": \"sponsorName\",\n            \"displayName\": \"Sponsor\"\n        },\n        {\n            \"index\": \"sponsorName\",\n            \"width\": 11000,\n            \"summable\": \"N\",\n            \"queryType\": \"IN\",\n            \"columnName\": \"MASTER.PRIME_SPONSOR_NAME\",\n            \"filterType\": \"endpoint\",\n            \"valueField\": \"sponsorName\",\n            \"displayName\": \"Prime Sponsor\"\n        },\n        {\n            \"index\": \"null\",\n            \"width\": 7000,\n            \"queryType\": \"IN\",\n            \"columnName\": \"MASTER.RESEARCH_CENTER\",\n            \"filterType\": \"lookUp\",\n            \"valueField\": \"RESEARCH_CENTER#CENTER_ID#true#true\",\n            \"displayName\": \"Research Center\"\n        },\n        {\n            \"index\": \"null\",\n            \"width\": 18000,\n            \"summable\": \"N\",\n            \"queryType\": \"LIKE\",\n            \"columnName\": \"MASTER.HORIZONTAL_AREA\",\n            \"filterType\": \"null\",\n            \"valueField\": \"null\",\n            \"displayName\": \"Horizontal Area\"\n        },\n        {\n            \"index\": \"null\",\n            \"width\": 18000,\n            \"summable\": \"N\",\n            \"queryType\": \"LIKE\",\n            \"columnName\": \"MASTER.VERTICAL_AREA\",\n            \"filterType\": \"null\",\n            \"valueField\": \"null\",\n            \"displayName\": \"Vertical Area\"\n        },\n        {\n            \"index\": \"null\",\n            \"width\": 4600,\n            \"summable\": \"N\",\n            \"queryType\": \"IN\",\n            \"columnName\": \"MASTER.BUDGET_VERSION_NUMBER\",\n            \"filterType\": \"null\",\n            \"valueField\": \"null\",\n            \"displayName\": \"Budget Version Number\"\n        },\n        {\n            \"index\": \"null\",\n            \"width\": 7000,\n            \"queryType\": \"IN\",\n            \"columnName\": \"MASTER.BUDGET_STATUS\",\n            \"filterType\": \"lookUp\",\n            \"valueField\": \"BUDGET_STATUS#BUDGET_STATUS_CODE#true#true\",\n            \"displayName\": \"Budget Status\"\n        },\n        {\n            \"index\": \"null\",\n            \"width\": 7000,\n            \"queryType\": \"IN\",\n            \"columnName\": \"MASTER.OVERHEAD_RATE_TYPE\",\n            \"filterType\": \"lookUp\",\n            \"valueField\": \"RATE_TYPE#RATE_CLASS_CODE#true#true\",\n            \"displayName\": \"Overhead Rate Type\"\n        },\n        {\n            \"index\": \"null\",\n            \"width\": 5800,\n            \"summable\": \"Y\",\n            \"queryType\": \"null\",\n            \"columnName\": \"MASTER.TOTAL_DIRECT_COST\",\n            \"filterType\": \"null\",\n            \"isCurrency\": \"true\",\n            \"valueField\": \"null\",\n            \"displayName\": \"Direct Cost(AED)\"\n        },\n        {\n            \"index\": \"null\",\n            \"width\": 5800,\n            \"summable\": \"Y\",\n            \"queryType\": \"null\",\n            \"columnName\": \"CHILD.MODIFIED_DIRECT_COST\",\n            \"filterType\": \"null\",\n            \"isCurrency\": \"true\",\n            \"valueField\": \"null\",\n            \"displayName\": \"Modified Direct Cost(AED)\"\n        },\n        {\n            \"index\": \"null\",\n            \"width\": 5800,\n            \"summable\": \"Y\",\n            \"queryType\": \"null\",\n            \"columnName\": \"MASTER.TOTAL_INDIRECT_COST\",\n            \"filterType\": \"null\",\n            \"isCurrency\": \"true\",\n            \"valueField\": \"null\",\n            \"displayName\": \"Indirect Cost(AED)\"\n        },\n        {\n            \"index\": \"null\",\n            \"width\": 5800,\n            \"summable\": \"Y\",\n            \"queryType\": \"null\",\n            \"columnName\": \"MASTER.TOTAL_REQUESTED_COST\",\n            \"filterType\": \"null\",\n            \"isCurrency\": \"true\",\n            \"valueField\": \"null\",\n            \"displayName\": \"Total Requested Cost(AED)\"\n        },\n        {\n            \"index\": \"null\",\n            \"width\": 5800,\n            \"summable\": \"Y\",\n            \"queryType\": \"null\",\n            \"columnName\": \"MASTER.IN_KIND_CONTRIBUTION\",\n            \"filterType\": \"null\",\n            \"isCurrency\": \"true\",\n            \"valueField\": \"null\",\n            \"displayName\": \"Total In-Kind(AED)\"\n        },\n        {\n            \"index\": \"null\",\n            \"width\": 5800,\n            \"summable\": \"Y\",\n            \"queryType\": \"null\",\n            \"columnName\": \"MASTER.TOTAL_COST\",\n            \"filterType\": \"null\",\n            \"isCurrency\": \"true\",\n            \"valueField\": \"null\",\n            \"displayName\": \"Total Cost(AED)\"\n        },\n        {\n            \"index\": \"IS_PI_EMPLOYEE\",\n            \"width\": 11000,\n            \"queryType\": \"IN\",\n            \"columnName\": \"MASTER.PI_NAME\",\n            \"filterType\": \"elasticComposite\",\n            \"valueField\": \"full_name\",\n            \"displayName\": \"PI (Principal Investigator)\"\n        },\n        {\n            \"index\": \"null\",\n            \"width\": 11000,\n            \"queryType\": \"null\",\n            \"columnName\": \"VIEWS.BUDGET_PERSONNEL_NAME\",\n            \"filterType\": \"null\",\n            \"valueField\": \"null\",\n            \"displayName\": \"Budget Personnel Name\"\n        },\n        {\n            \"index\": \"null\",\n            \"width\": 11000,\n            \"summable\": \"N\",\n            \"queryType\": \"null\",\n            \"columnName\": \"VIEWS.BUDGET_PERSONNEL_JOB_TYPE\",\n            \"filterType\": \"null\",\n            \"valueField\": \"null\",\n            \"displayName\": \"Budget Personnel Job Type\"\n        },\n        {\n            \"index\": \"null\",\n            \"width\": 11000,\n            \"summable\": \"N\",\n            \"queryType\": \"IN\",\n            \"columnName\": \"VIEWS.BUDGET_PERSONNEL_APPOINTMENT_TYPE\",\n            \"filterType\": \"null\",\n            \"valueField\": \"null\",\n            \"displayName\": \"Budget Personnel Appointment Type\"\n        },\n        {\n            \"index\": \"null\",\n            \"summable\": \"N\",\n            \"innerJoin\": \"N\",\n            \"queryType\": \"LIKE\",\n            \"columnName\": \"SUB_CHILD.BUDGET_CATEGORY\",\n            \"filterType\": \"null\",\n            \"valueField\": \"null\",\n            \"displayName\": \"Budget Category\"\n        },\n        {\n            \"index\": \"null\",\n            \"width\": 5800,\n            \"summable\": \"Y\",\n            \"queryType\": \"null\",\n            \"columnName\": \"SUB_CHILD.PERIOD_1\",\n            \"filterType\": \"null\",\n            \"isCurrency\": \"true\",\n            \"valueField\": \"null\",\n            \"displayName\": \"Period 1\"\n        },\n        {\n            \"index\": \"null\",\n            \"width\": 5800,\n            \"summable\": \"Y\",\n            \"queryType\": \"null\",\n            \"columnName\": \"SUB_CHILD.PERIOD_2\",\n            \"filterType\": \"null\",\n            \"isCurrency\": \"true\",\n            \"valueField\": \"null\",\n            \"displayName\": \"Period 2\"\n        },\n        {\n            \"index\": \"null\",\n            \"width\": 5800,\n            \"summable\": \"Y\",\n            \"queryType\": \"null\",\n            \"columnName\": \"SUB_CHILD.PERIOD_3\",\n            \"filterType\": \"null\",\n            \"isCurrency\": \"true\",\n            \"valueField\": \"null\",\n            \"displayName\": \"Period 3\"\n        },\n        {\n            \"index\": \"null\",\n            \"width\": 5800,\n            \"summable\": \"Y\",\n            \"queryType\": \"null\",\n            \"columnName\": \"SUB_CHILD.PERIOD_4\",\n            \"filterType\": \"null\",\n            \"isCurrency\": \"true\",\n            \"valueField\": \"null\",\n            \"displayName\": \"Period 4\"\n        },\n        {\n            \"index\": \"null\",\n            \"width\": 5800,\n            \"summable\": \"Y\",\n            \"queryType\": \"null\",\n            \"columnName\": \"SUB_CHILD.PERIOD_5\",\n            \"filterType\": \"null\",\n            \"isCurrency\": \"true\",\n            \"valueField\": \"null\",\n            \"displayName\": \"Period 5\"\n        },\n        {\n            \"index\": \"null\",\n            \"width\": 5800,\n            \"summable\": \"Y\",\n            \"queryType\": \"null\",\n            \"columnName\": \"SUB_CHILD.TOTAL\",\n            \"filterType\": \"null\",\n            \"isCurrency\": \"true\",\n            \"valueField\": \"null\",\n            \"displayName\": \"Total Requested Budget Category cost(AED)\"\n        },\n        {\n            \"index\": \"null\",\n            \"width\": 5800,\n            \"summable\": \"Y\",\n            \"queryType\": \"null\",\n            \"columnName\": \"SUB_CHILD.TOTAL_IN_KIND_COST\",\n            \"filterType\": \"null\",\n            \"isCurrency\": \"true\",\n            \"valueField\": \"null\",\n            \"displayName\": \"Total Budget Category In-Kind(AED)\"\n        },\n        {\n            \"index\": \"null\",\n            \"width\": 5800,\n            \"summable\": \"Y\",\n            \"queryType\": \"null\",\n            \"columnName\": \"SUB_CHILD.BUDGET_CATEGORY_TOTAL_COST\",\n            \"filterType\": \"null\",\n            \"isCurrency\": \"true\",\n            \"valueField\": \"null\",\n            \"displayName\": \"Total Budget Category Cost(AED)\"\n        },\n        {\n            \"index\": \"null\",\n            \"summable\": \"N\",\n            \"innerJoin\": \"N\",\n            \"queryType\": \"LIKE\",\n            \"columnName\": \"MASTER.PROPOSAL_STATUS\",\n            \"filterType\": \"null\",\n            \"valueField\": \"null\",\n            \"displayName\": \"Proposal Status\"\n        },\n        {\n            \"index\": \"null\",\n            \"summable\": \"N\",\n            \"innerJoin\": \"N\",\n            \"queryType\": \"LIKE\",\n            \"columnName\": \"AWD.ACCOUNT_NUMBER\",\n            \"filterType\": \"null\",\n            \"valueField\": \"null\",\n            \"displayName\": \"Project Code\"\n        },\n        {\n            \"index\": \"null\",\n            \"summable\": \"N\",\n            \"queryType\": \"LIKE\",\n            \"columnName\": \"AWD.AWARD_ID\",\n            \"filterType\": \"null\",\n            \"valueField\": \"null\",\n            \"displayName\": \"Award ID\"\n        },\n        {\n            \"index\": \"null\",\n            \"summable\": \"N\",\n            \"queryType\": \"LIKE\",\n            \"columnName\": \"AWD.AWARD_TITLE\",\n            \"filterType\": \"null\",\n            \"valueField\": \"title\",\n            \"displayName\": \"Award Title\"\n        },\n        {\n            \"index\": \"null\",\n            \"summable\": \"N\",\n            \"queryType\": \"IN\",\n            \"columnName\": \"AWD.AWARD_STATUS\",\n            \"filterType\": \"null\",\n            \"valueField\": \"AWARD_STATUS#STATUS_CODE#true#true\",\n            \"displayName\": \"Award Status\"\n        },\n        {\n            \"index\": \"null\",\n            \"summable\": \"N\",\n            \"queryType\": \"IN\",\n            \"columnName\": \"AWD.AWARD_ACCOUNT_TYPE\",\n            \"filterType\": \"null\",\n            \"valueField\": \"ACCOUNT_TYPE#ACCOUNT_TYPE_CODE#true#true\",\n            \"displayName\": \"Account Type\"\n        },\n        {\n            \"index\": \"null\",\n            \"summable\": \"N\",\n            \"queryType\": \"BETWEEN\",\n            \"columnName\": \"AWD.AWARD_EFFECTIVE_DATE\",\n            \"filterType\": \"null\",\n            \"valueField\": \"null\",\n            \"displayName\": \"Award Effective Date\"\n        },\n        {\n            \"index\": \"null\",\n            \"summable\": \"N\",\n            \"queryType\": \"BETWEEN\",\n            \"columnName\": \"AWD.FINAL_EXPIRATION_DATE\",\n            \"filterType\": \"null\",\n            \"valueField\": \"null\",\n            \"displayName\": \"Final Expiration Date\"\n        }\n    ],\n    \"tempTable\": \"WITH ACCESS_TMP AS (SELECT UNIT_NUMBER FROM PERSON_ROLES T1 INNER JOIN ROLE_RIGHTS T2 ON T1.ROLE_ID = T2.ROLE_ID INNER JOIN RIGHTS T3 ON T2.RIGHT_ID = T3.RIGHT_ID WHERE T1.DESCEND_FLAG = \'N\' AND T1.PERSON_ID = <<PERSON_ID>> AND RIGHT_NAME IN (\'VIEW_PROPOSAL\',\'CREATE_PROPOSAL\',\'MODIFY_PROPOSAL\') UNION SELECT CHILD_UNIT_NUMBER FROM UNIT_WITH_CHILDREN WHERE UNIT_NUMBER IN (SELECT UNIT_NUMBER FROM PERSON_ROLES T1 INNER JOIN ROLE_RIGHTS T2 ON T1.ROLE_ID = T2.ROLE_ID INNER JOIN RIGHTS T3 ON T2.RIGHT_ID = T3.RIGHT_ID WHERE T1.DESCEND_FLAG = \'Y\' AND T1.PERSON_ID = <<PERSON_ID>> AND RIGHT_NAME IN (\'VIEW_PROPOSAL\',\'CREATE_PROPOSAL\',\'MODIFY_PROPOSAL\')))\",\n    \"extraCondition\": \"(MASTER.LEAD_UNIT_NUMBER IN (SELECT DISTINCT UNIT_NUMBER FROM ACCESS_TMP)) AND MASTER.FINAL_VERSION_FLAG = \'Y\'\",\n    \"extraSelection\": \"\",\n    \"selectDistinct\": \"Y\"\n} ',
