                    UPDATE_TIMESTAMP = UTC_TIMESTAMP(),
                    UPDATE_USER = 'admin'
                    WHERE (`TYPE_CODE` = '156');
                    
  - changeSet:
      id: FIBI-10323-1
      author: Shyla
      labels: 'DML'
      comment: Development proposal module — insert Default dashboard filter criterion CRT_DEV_IP_STATUS.
      changes:
        - sql:
            sql: |
              INSERT INTO DASHBOARD_FILTER_CRITERIA
                (FILTER_ID, CRITERIA_ID, VALUE, SORT_ORDER, UPDATE_TIMESTAMP, UPDATE_USER)
              SELECT
                DFP.FILTER_ID,
                DCL.CRITERIA_ID,
                NULL AS VALUE,
                (SELECT COALESCE(MAX(DFC2.SORT_ORDER), 0) + 1
                   FROM DASHBOARD_FILTER_CRITERIA DFC2
                  WHERE DFC2.FILTER_ID = DFP.FILTER_ID) AS SORT_ORDER,
                UTC_TIMESTAMP() AS UPDATE_TIMESTAMP,
                'admin' AS UPDATE_USER
              FROM DASHBOARD_CRITERIA_LOOKUP DCL
              JOIN DASHBOARD_FILTER_PREFERENCE DFP
                ON DFP.FILTER_NAME = 'Default'
              JOIN DASHBOARD_TAB_TYPE DTT
                ON DTT.TAB_TYPE_ID = DFP.TAB_TYPE_ID
              WHERE DCL.MODULE_CODE = 3
                AND DCL.CRITERIA_KEY = 'CRT_DEV_IP_STATUS'
                AND DTT.MODULE_CODE = 3
                AND DFP.MODULE_CODE = 3
                AND NOT EXISTS (
                  SELECT 1
                  FROM DASHBOARD_FILTER_CRITERIA DFC
                  WHERE DFC.FILTER_ID = DFP.FILTER_ID
                    AND DFC.CRITERIA_ID = DCL.CRITERIA_ID
                );
      rollback: empty

  - changeSet:
      id: FIBI-10323-2
      author: Shyla
      labels: 'DML'
      comment: Development proposal module — delete Default dashboard filter criterion CRT_DEV_PROP_FUNDING_SCHEME.
      changes:
        - sql:
            sql: |
              DELETE DFC
              FROM DASHBOARD_FILTER_CRITERIA DFC
              JOIN DASHBOARD_CRITERIA_LOOKUP DCL
                ON DCL.CRITERIA_ID = DFC.CRITERIA_ID
              JOIN DASHBOARD_FILTER_PREFERENCE DFP
                ON DFP.FILTER_ID = DFC.FILTER_ID
              JOIN DASHBOARD_TAB_TYPE DTT
                ON DTT.TAB_TYPE_ID = DFP.TAB_TYPE_ID
              WHERE DCL.MODULE_CODE = 3
                AND DCL.CRITERIA_KEY = 'CRT_DEV_PROP_FUNDING_SCHEME'
                AND DFP.FILTER_NAME = 'Default'
                AND DTT.MODULE_CODE = 3;
      rollback: empty

  - changeSet:
      id: FIBI-10323-3
      author: Shyla
      labels: 'DML'
      comment: Development proposal module — insert Default dashboard filter column COL_DEV_IP_STATUS.
      changes:
        - sql:
            sql: |
              INSERT INTO DASHBOARD_FILTER_COLUMN
                (FILTER_ID, COLUMN_ID, IS_ACTIVE, SORT_ORDER, UPDATE_TIMESTAMP, UPDATE_USER)
              SELECT
                DFP.FILTER_ID,
                DCL.COLUMN_ID,
                'Y',
                (SELECT COALESCE(MAX(DFC2.SORT_ORDER), 0) + 1
                   FROM DASHBOARD_FILTER_COLUMN DFC2
                  WHERE DFC2.FILTER_ID = DFP.FILTER_ID) AS SORT_ORDER,
                UTC_TIMESTAMP() AS UPDATE_TIMESTAMP,
                'admin' AS UPDATE_USER
              FROM DASHBOARD_COLUMN_LOOKUP DCL
              JOIN DASHBOARD_FILTER_PREFERENCE DFP
                ON DFP.FILTER_NAME = 'Default'
              JOIN DASHBOARD_TAB_TYPE DTT
                ON DTT.TAB_TYPE_ID = DFP.TAB_TYPE_ID
              WHERE DCL.MODULE_CODE = 3
                AND DCL.COLUMN_KEY = 'COL_DEV_IP_STATUS'
                AND DTT.MODULE_CODE = 3
                AND DFP.MODULE_CODE = 3
                AND NOT EXISTS (
                  SELECT 1
                  FROM DASHBOARD_FILTER_COLUMN DFC
                  WHERE DFC.FILTER_ID = DFP.FILTER_ID
                    AND DFC.COLUMN_ID = DCL.COLUMN_ID
                );
      rollback: empty

  - changeSet:
      id: FIBI-10323-4
      author: Shyla
      labels: 'DML'
      comment: Development proposal module — delete Default dashboard filter column COL_DEV_PROP_FUNDING_SCHEME.
      changes:
        - sql:
            sql: |
              DELETE DFC
              FROM DASHBOARD_FILTER_COLUMN DFC
              JOIN DASHBOARD_COLUMN_LOOKUP DCL
                ON DCL.COLUMN_ID = DFC.COLUMN_ID
              JOIN DASHBOARD_FILTER_PREFERENCE DFP
                ON DFP.FILTER_ID = DFC.FILTER_ID
              JOIN DASHBOARD_TAB_TYPE DTT
                ON DTT.TAB_TYPE_ID = DFP.TAB_TYPE_ID
              WHERE DCL.MODULE_CODE = 3
                AND DCL.COLUMN_KEY = 'COL_DEV_PROP_FUNDING_SCHEME'
                AND DFP.FILTER_NAME = 'Default'
                AND DTT.MODULE_CODE = 3;
      rollback: empty

