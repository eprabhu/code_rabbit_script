databaseChangeLog:

  - changeSet:
      id: FIBI-9678-1
      author: Sasikumar Chandran
      labels: 'DML'
      comment: Deactivate location status where LOCATION_STATUS_CODE = 4
      changes:
        - sql:
            sql: |
                UPDATE `NEGOTIATION_LOCATION_STATUS` SET `IS_ACTIVE` = 'N' WHERE (`LOCATION_STATUS_CODE` = '4');
      rollback: 
                UPDATE `NEGOTIATION_LOCATION_STATUS` SET `IS_ACTIVE` = 'Y' WHERE (`LOCATION_STATUS_CODE` = '4');

