filterType\": \"elastic\",\n            \"valueField\": \"full_name\",\n            \"index\": \"fibiperson\",\n            \"queryType\": \"IN\",\n             \"width\":11000\n        },\n        {\n            \"columnName\": \"MASTER.REVIEW_STATUS\",\n            \"displayName\": \"Review Status\",\n            \"filterType\": \"lookUp\",\n            \"valueField\": \"AGREEMENT_REVIEW_STATUS#REVIEW_STATUS_CODE#true#true\",\n            \"index\": \"null\",\n            \"queryType\": \"LIKE\",\n             \"width\":7000\n        },\n        {\n            \"columnName\": \"MASTER.DESCRIPTION\",\n            \"displayName\": \"Description\",\n            \"filterType\": \"null\",\n            \"valueField\": \"null\",\n            \"index\": \"null\",\n            \"queryType\": \"null\",\n             \"width\":18000\n        },\n        {\n            \"columnName\": \"MASTER.IO_FUNDING\",\n            \"displayName\": \"Incoming or Outgoing Funding\",\n            \"filterType\": \"null\",\n            \"valueField\": \"null\",\n            \"index\": \"null\",\n            \"queryType\": \"null\",\n            \"width\":5800\n        },\n        {\n            \"columnName\": \"MASTER.COMMENT\",\n            \"displayName\": \"Status Comments\",\n            \"filterType\": \"null\",\n            \"valueField\": \"null\",\n            \"index\": \"null\",\n            \"queryType\": \"null\",\n             \"width\":18000\n        },\n        {\n            \"columnName\": \"MASTER.LOCATION\",\n            \"displayName\": \"Last Accountable Party\",\n            \"filterType\": \"null\",\n            \"valueField\": \"null\",\n            \"index\": \"null\",\n            \"queryType\": \"null\",\n             \"width\":7000\n        },\n        {\n            \"columnName\": \"MASTER.DAYS_IN_LOCATION\",\n            \"displayName\": \"Days with Last Party\",\n            \"filterType\": \"null\",\n            \"valueField\": \"null\",\n            \"index\": \"null\",\n            \"queryType\": \"null\",\n            \"width\":4600\n        },\n        {\n            \"columnName\": \"MASTER.TOTAL_DAYS\",\n            \"displayName\": \"Total Days Aging\",\n            \"filterType\": \"null\",\n            \"valueField\": \"null\",\n            \"index\": \"null\",\n            \"queryType\": \"null\",\n             \"width\":4600\n        },\n        {\n            \"columnName\": \"MASTER.PROPOSAL_STATUS\",\n            \"displayName\": \"Proposal Status\",\n            \"filterType\": \"null\",\n            \"valueField\": \"null\",\n            \"index\": \"null\",\n            \"queryType\": \"null\",\n            \"width\":7000\n        },\n        {\n            \"columnName\": \"MASTER.RECOMMENDATION\",\n            \"displayName\": \"Recommendation\",\n            \"filterType\": \"null\",\n            \"valueField\": \"null\",\n            \"index\": \"null\",\n            \"queryType\": \"null\",\n            \"width\":11000\n        },\n        {\n            \"columnName\": \"MASTER.CURRENCY_CODE\",\n            \"displayName\": \"Currency Code\",\n            \"filterType\": \"null\",\n            \"valueField\": \"null\",\n            \"index\": \"null\",\n            \"queryType\": \"null\",\n            \"width\":4600\n        },\n        {\n          \"columnName\": \"CHILD.CUST_ELEMENTS_ID_500\",\n          \"displayName\": \"Action Type\",\n          \"filterType\": \"lookUp\",\n          \"valueField\": \"ARG_VALUE_LOOKUP#ACTION_TYPE_AGREEMENT#true#true\",\n          \"index\": \"null\",\n          \"queryType\": \"IN\",\n          \"summable\" : \"N\"\n        },\n        {\n          \"columnName\": \"CHILD.CUST_ELEMENTS_ID_501\",\n          \"displayName\": \"Modification Type\",\n          \"filterType\": \"lookUp\",\n          \"valueField\": \"ARG_VALUE_LOOKUP#MODIFICATION_TYPE_AGREEMENT#true#true\",\n          \"index\": \"null\",\n          \"queryType\": \"IN\",\n          \"summable\" : \"N\"\n        }\n	],\n	\"extraCondition\" : \"(UNIT_NUMBER IN(SELECT UNIT_NUMBER FROM ACCESS_TMP) OR UNIT_NUMBER is null) AND AGREEMENT_SEQUENCE_STATUS <> \'TEMPLATE\'\",\n	\"extraSelection\" : \",MASTER.AGREEMENT_REQUEST_ID AS ID, MASTER.UNIT_NUMBER\",\n	\"selectDistinct\" : \"Y\",\n	\"tempTable\":\"WITH ACCESS_TMP  AS (SELECT UNIT_NUMBER FROM PERSON_ROLES T1 INNER JOIN ROLE_RIGHTS T2 ON T1.ROLE_ID = T2.ROLE_ID INNER JOIN RIGHTS T3 ON T2.RIGHT_ID = T3.RIGHT_ID  WHERE T1.DESCEND_FLAG = \'N\' AND T1.PERSON_ID = <<PERSON_ID>> AND RIGHT_NAME IN (\'AGREEMENT_ADMINISTRATOR\') UNION SELECT CHILD_UNIT_NUMBER FROM UNIT_WITH_CHILDREN  WHERE UNIT_NUMBER IN ( SELECT UNIT_NUMBER FROM PERSON_ROLES T1 INNER JOIN ROLE_RIGHTS T2 ON T1.ROLE_ID = T2.ROLE_ID INNER JOIN RIGHTS T3 ON T2.RIGHT_ID = T3.RIGHT_ID  WHERE T1.DESCEND_FLAG = \'Y\' AND T1.PERSON_ID = <<PERSON_ID>> AND RIGHT_NAME IN (\'AGREEMENT_ADMINISTRATOR\')))\"\n}\n', UPDATE_TIMESTAMP = UTC_TIMESTAMP(), UPDATE_USER = 'admin' WHERE (`TYPE_CODE` = '150');
