olumnName\": \"MASTER.LOCATION_ASSIGNED_DATE\",\n            \"displayName\": \"Date Provided to Last Accountable Party\",\n            \"filterType\": \"date\",\n            \"valueField\": \"null\",\n            \"index\": \"null\",\n            \"queryType\": \"BETWEEN\",\n            \"width\":5800\n        },\n        {\n            \"columnName\": \"MASTER.AGREEMENT_TYPE\",\n            \"displayName\": \"Type\",\n            \"filterType\": \"lookUp\",\n            \"valueField\": \"AGREEMENT_TYPE#AGREEMENT_TYPE_CODE#true#true\",\n            \"index\": \"null\",\n            \"queryType\": \"IN\",\n            \"width\":7000\n        },\n        {\n            \"columnName\": \"MASTER.CATEGORY\",\n            \"displayName\": \"Category\",\n            \"filterType\": \"lookUp\",\n            \"valueField\": \"AGREEMENT_CATEGORY#CATEGORY_CODE#true#true\",\n            \"index\": \"null\",\n            \"queryType\": \"IN\",\n            \"width\":7000\n        },      \n        {\n            \"columnName\": \"MASTER.CONTRACT_VALUE\",\n            \"displayName\": \"Total Amount\",\n            \"filterType\": \"null\",\n            \"valueField\": \"null\",\n            \"index\": \"null\",\n            \"queryType\": \"null\" ,\n            \"width\":5800\n        },\n        {\n            \"columnName\": \"MASTER.AMOUNT_IN_WORDS\",\n            \"displayName\": \"Amount in Words\",\n            \"filterType\": \"null\",\n            \"valueField\": \"null\",\n            \"index\": \"null\",\n            \"queryType\": \"null\",\n            \"width\":7000\n        },\n        {\n            \"columnName\": \"MASTER.TRANSACTION_TYPE\",\n            \"displayName\": \"Transaction Type\",\n            \"filterType\": \"null\",\n            \"valueField\": \"null\",\n            \"index\": \"null\",\n            \"queryType\": \"null\",\n            \"width\":7000\n        },\n        {\n            \"columnName\": \"MASTER.AGREEMENT_SPONSOR_TYPE\",\n      