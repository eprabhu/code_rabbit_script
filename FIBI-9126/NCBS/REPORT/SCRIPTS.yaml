,\n			\"valueField\": \"null\",\n			\"index\": \"null\",\n			\"queryType\": \"null\",\n			\"summable\": \"N\",\n			\"isCurrency\": \"true\"\n		},\n		{\n			\"columnName\": \"UNCOMMITTED_AMOUNT\",\n			\"displayName\": \"L2 Uncommitted Amount\",\n			\"filterType\": \"null\",\n			\"valueField\": \"null\",\n			\"index\": \"null\",\n			\"queryType\": \"null\",\n			\"summable\": \"N\",\n			\"isCurrency\": \"true\"\n		},\n		{\n			\"columnName\": \"EXPENSE_AMOUNT\",\n			\"displayName\": \"L2 Expense Amount\",\n			\"filterType\": \"null\",\n			\"valueField\": \"null\",\n			\"index\": \"null\",\n			\"queryType\": \"null\",\n			\"summable\": \"N\",\n			\"isCurrency\": \"true\"\n		},\n		{\n			\"columnName\": \"COMMITTED_AMOUNT\",\n			\"displayName\": \"L2 Committed Amount\",\n			\"filterType\": \"null\",\n			\"valueField\": \"null\",\n			\"index\": \"null\",\n			\"queryType\": \"null\",\n			\"summable\": \"N\",\n			\"isCurrency\": \"true\"\n		},\n		{\n			\"columnName\": \"INITIAL_COMMITTED_AMOUNT\",\n			\"displayName\": \"Proposed Committed Cost\",\n			\"filterType\": \"null\",\n			\"valueField\": \"null\",\n			\"index\": \"null\",\n			\"queryType\": \"null\",\n			\"summable\": \"N\",\n			\"isCurrency\": \"true\"\n		},\n		{\n			\"columnName\": \"PROPOSED_COST_ALLOCATION\",\n			\"displayName\": \"Proposed Cost Allocation %\",\n			\"filterType\": \"null\",\n			\"valueField\": \"null\",\n			\"index\": \"null\",\n			\"queryType\": \"null\",\n			\"summable\": \"N\"\n		},\n		{\n			\"columnName\": \"LINE_ITEM_DESCRIPTION\",\n			\"displayName\": \"Description (Budget)\",\n			\"filterType\": \"null\",\n			\"valueField\": \"null\",\n			\"index\": \"null\",\n			\"queryType\": \"null\",\n			\"summable\": \"N\"\n		}\n	],\n	\"extraCondition\": \"MANPOWER_TYPE_CODE = \'1\' AND (LEAD_UNIT_NUMBER IN(SELECT DISTINCT UNIT_NUMBER FROM ACCESS_TMP) OR (AWARD_ID IN (SELECT AWARD_ID FROM AWARD_TEMP)))\",\n	\"extraSelection\": \"\",\n	\"selectDistinct\": \"Y\",\n	\"tempTable\":\"WITH ACCESS_TMP AS (SELECT UNIT_NUMBER FROM PERSON_ROLES T1 INNER JOIN ROLE_RIGHTS T2 ON T1.ROLE_ID = T2.ROLE_ID INNER JOIN RIGHTS T3 ON T2.RIGHT_ID = T3.RIGHT_ID  WHERE T1.DESCEND_FLAG = \'N\' AND T1.PERSON_ID = <<PERSON_ID>> AND RIGHT_NAME IN (\'MANPOWER_VIEW_STAFF_PLAN\') UNION SELECT CHILD_UNIT_NUMBER FROM UNIT_WITH_CHILDREN  WHERE UNIT_NUMBER IN (SELECT UNIT_NUMBER FROM PERSON_ROLES T1 INNER JOIN ROLE_RIGHTS T2 ON T1.ROLE_ID = T2.ROLE_ID INNER JOIN RIGHTS T3 ON T2.RIGHT_ID = T3.RIGHT_ID  WHERE T1.DESCEND_FLAG = \'Y\' AND T1.PERSON_ID = <<PERSON_ID>> AND RIGHT_NAME IN (\'MANPOWER_VIEW_STAFF_PLAN\'))), AWARD_TEMP AS (SELECT T1.AWARD_ID FROM AWARD_PERSON_ROLES T1 INNER JOIN ROLE_RIGHTS T2 ON T1.ROLE_ID = T2.ROLE_ID INNER JOIN RIGHTS T3 ON T2.RIGHT_ID = T3.RIGHT_ID WHERE T1.PERSON_ID =<<PERSON_ID>> AND (T3.RIGHT_NAME IN (\'MANPOWER_VIEW_STAFF_PLAN\')))\"\n}\n',
