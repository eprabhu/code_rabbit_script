h\": 7000\n		},\n		{\n			\"columnName\": \"TYPE_OF_FUNDING_AGENCY\",\n			\"displayName\": \"Funding Agency Type\",\n			\"filterType\": \"lookUp\",\n			\"valueField\": \"SPONSOR_TYPE#SPONSOR_TYPE_CODE#true#true\",\n			\"index\": \"null\",\n			\"queryType\": \"IN\",\n			\"width\": 7000\n		},\n		{\n			\"columnName\": \"DISCIPLINE_CLUSTER\",\n			\"displayName\": \"Discipline Cluster\",\n			\"filterType\": \"lookUp\",\n			\"valueField\": \"EPS_PROP_DISCIPLINE_CLUSTER#CLUSTER_CODE#true#true\",\n			\"index\": \"null\",\n			\"queryType\": \"IN\",\n			\"width\": 7000\n		},\n		{\n			\"columnName\": \"ORGANIZATION\",\n			\"displayName\": \"Organization\",\n			\"filterType\": \"freetext\",\n			\"valueField\": \"null\",\n			\"index\": \"null\",\n			\"queryType\": \"LIKE\",\n			\"width\": 7000\n		},\n		{\n			\"columnName\": \"PERSON_NAME\",\n			\"displayName\": \"Person Name\",\n			\"filterType\": \"elastic\",\n			\"valueField\": \"full_name\",\n			\"index\": \"fibiperson\",\n			\"queryType\": \"IN\",\n			\"width\": 11000\n		},\n		{\n			\"columnName\": \"PERSON_ID\",\n			\"displayName\": \"Person ID\",\n			\"filterType\": \"null\",\n			\"valueField\": \"null\",\n			\"index\": \"null\",\n			\"queryType\": \"IN\",\n			\"width\" : 4600\n		},\n		{\n			\"columnName\": \"PERSON_ROLE\",\n			\"displayName\": \"Person Role\",\n			\"filterType\": \"lookUp\",\n			\"valueField\": \"EPS_PROP_PERSON_ROLE#PROP_PERSON_ROLE_ID#true#true\",\n			\"index\": \"null\",\n			\"queryType\": \"IN\",\n			\"width\": 7000\n		},\n		{\n			\"columnName\": \"PERCENTAGE_OF_EFFORT\",\n			\"displayName\": \"% of Effort\",\n			\"filterType\": \"null\",\n			\"valueField\": \"null\",\n			\"index\": \"null\",\n			\"queryType\": \"IN\",\n			\"width\" : 4600\n		}\n	],\n	\"extraCondition\" : \"(PROPOSAL_ID IN (SELECT PROPOSAL_ID FROM EPS_PROPOSAL_TEMP) OR LEAD_UNIT_NUMBER IN(SELECT DISTINCT UNIT_NUMBER FROM ACCESS_TMP))\",\n	\"extraSelection\" : \",PROPOSAL_ID AS ID, LEAD_UNIT_NUMBER AS UNIT_NUMBER\",\n	\"selectDistinct\" :\"Y\",\n	\"tempTable\":\"WITH ACCESS_TMP AS (SELECT UNIT_NUMBER FROM PERSON_ROLES T1 INNER JOIN ROLE_RIGHTS T2 ON T1.ROLE_ID = T2.ROLE_ID INNER JOIN RIGHTS T3 ON T2.RIGHT_ID = T3.RIGHT_ID  WHERE T1.DESCEND_FLAG = \'N\' AND T1.PERSON_ID = <<PERSON_ID>> AND RIGHT_NAME IN (\'VIEW_PROPOSAL\' \'CREATE_PROPOSAL\', \'MODIFY_PROPOSAL\') UNION SELECT CHILD_UNIT_NUMBER FROM UNIT_WITH_CHILDREN  WHERE UNIT_NUMBER IN (SELECT UNIT_NUMBER FROM PERSON_ROLES T1 INNER JOIN ROLE_RIGHTS T2 ON T1.ROLE_ID = T2.ROLE_ID INNER JOIN RIGHTS T3 ON T2.RIGHT_ID = T3.RIGHT_ID  WHERE T1.DESCEND_FLAG = \'Y\' AND T1.PERSON_ID = <<PERSON_ID>> AND RIGHT_NAME IN (\'VIEW_PROPOSAL\' \'CREATE_PROPOSAL\', \'MODIFY_PROPOSAL\'))),EPS_PROPOSAL_TEMP AS (SELECT PROPOSAL_ID FROM EPS_PROPOSAL_PERSON_ROLES WHERE PERSON_ID = <<PERSON_ID>>)\"\n}\n', 
              UPDATE_TIMESTAMP = utc_timestamp(), UPDATE_USER = 'admin' WHERE (TYPE_CODE = '1');
      rollback: empty

