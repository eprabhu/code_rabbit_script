mnName\": \"FINAL_EXPIRATION_DATE\",\n			\"displayName\": \"End Date\",\n			\"filterType\": \"date\",\n			\"valueField\": \"null\",\n			\"index\": \"null\",\n			\"queryType\": \"BETWEEN\"\n		},\n		{\n			\"columnName\": \"SOURCE_AWARD_NUMBER\",\n			\"displayName\": \"Source Project\",\n			\"filterType\": \"freetext\",\n			\"valueField\": \"null\",\n			\"index\": \"null\",\n			\"queryType\": \"LIKE\"\n		},\n		{\n			\"columnName\": \"DESTINATION_AWARD_NUMBER\",\n			\"displayName\": \"Destination Project\",\n			\"filterType\": \"freetext\",\n			\"valueField\": \"null\",\n			\"index\": \"null\",\n			\"queryType\": \"LIKE\"\n		},\n		{\n			\"columnName\": \"AMOUNT_OBLIGATED_TO_DATE\",\n			\"displayName\": \"Obligated Total ($)\",\n			\"filterType\": \"null\",\n			\"valueField\": \"null\",\n			\"index\": \"null\",\n			\"queryType\": \"IN\",\n			\"isCurrency\": \"true\"\n		},\n		{\n			\"columnName\": \"ANTICIPATED_TOTAL_AMOUNT\",\n			\"displayName\": \"Anticipated Total ($)\",\n			\"filterType\": \"null\",\n			\"valueField\": \"null\",\n			\"index\": \"null\",\n			\"queryType\": \"IN\",\n			\"isCurrency\": \"true\"\n		},\n		{\n			\"columnName\": \"TOTAL_PROJECT_COST\",\n			\"displayName\": \"Total Project Cost ($)\",\n			\"filterType\": \"null\",\n			\"valueField\": \"null\",\n			\"index\": \"null\",\n			\"queryType\": \"IN\",\n			\"isCurrency\": \"true\"\n		},\n		{\n			\"columnName\": \"TRANSACTION_TYPE\",\n			\"displayName\": \"Transaction Type\",\n			\"filterType\": \"lookUp\",\n			\"valueField\": \"AWARD_TRANSACTION_TYPE#AWARD_TRANSACTION_TYPE_CODE#true#true\",\n			\"index\": \"null\",\n			\"queryType\": \"IN\"\n		},\n		{\n			\"columnName\": \"OBLIGATION_START_DATE\",\n			\"displayName\": \"Obligation Start Date\",\n			\"filterType\": \"date\",\n			\"valueField\": \"null\",\n			\"index\": \"null\",\n			\"queryType\": \"BETWEEN\"\n		},\n		{\n			\"columnName\": \"OBLIGATION_END_DATE\",\n			\"displayName\": \"Obligation End Date\",\n			\"filterType\": \"date\",\n			\"valueField\": \"null\",\n			\"index\": \"null\",\n			\"queryType\": \"BETWEEN\"\n		},\n		{\n			\"columnName\": \"NOTICE_DATE\",\n			\"displayName\": \"Notice Date\",\n			\"filterType\": \"date\",\n			\"valueField\": \"null\",\n			\"index\": \"null\",\n			\"queryType\": \"BETWEEN\"\n		},\n		{\n			\"columnName\": \"TRANSACTION_COMMENT\",\n			\"displayName\": \"Transaction Description\",\n			\"filterType\": \"null\",\n			\"valueField\": \"null\",\n			\"index\": \"null\",\n			\"queryType\": \"IN\"\n		},\n		{\n			\"columnName\": \"ANTICIPATED_CHANGE\",\n			\"displayName\": \"Anticipated Change ($)\",\n			\"filterType\": \"null\",\n			\"valueField\": \"null\",\n			\"index\": \"null\",\n			\"queryType\": \"IN\",\n			\"isCurrency\": \"true\"\n		},\n		{\n			\"columnName\": \"OBLIGATED_CHANGE\",\n			\"displayName\": \"Obligated Change ($)\",\n			\"filterType\": \"null\",\n			\"valueField\": \"null\",\n			\"index\": \"null\",\n			\"queryType\": \"IN\",\n			\"isCurrency\": \"true\"\n		},\n		{\n			\"columnName\": \"FUND_CENTRE\",\n			\"displayName\": \"Fund Centre\",\n			\"filterType\": \"freetext\",\n			\"valueField\": \"null\",\n			\"index\": \"null\",\n			\"queryType\": \"LIKE\"\n		},\n		{\n			\"columnName\": \"GRANT_TYPE\",\n			\"displayName\": \"Type of Grant\",\n			\"filterType\": \"lookUp\",\n			\"valueField\": \"GRANT_CALL_TYPE#GRANT_TYPE_CODE#true#true\",\n			\"index\": \"null\",\n			\"queryType\": \"IN\",\n			\"summable\" : \"N\"\n		}\n	],\n	\"extraCondition\" : \"(LEAD_UNIT_NUMBER IN(SELECT DISTINCT UNIT_NUMBER FROM ACCESS_TMP) OR AWARD_ID IN (SELECT AWARD_ID FROM AWARD_TEMP)) ORDER BY AWARD_NUMBER\",\n	\"extraSelection\" : \"\",\n	\"selectDistinct\" :\"Y\",\n	\"tempTable\":\"WITH ACCESS_TMP  AS (SELECT UNIT_NUMBER FROM PERSON_ROLES T1 INNER JOIN ROLE_RIGHTS T2 ON T1.ROLE_ID = T2.ROLE_ID INNER JOIN RIGHTS T3 ON T2.RIGHT_ID = T3.RIGHT_ID  WHERE T1.DESCEND_FLAG = \'N\' AND T1.PERSON_ID = <<PERSON_ID>> AND RIGHT_NAME IN (\'VIEW_AWARD\') UNION SELECT CHILD_UNIT_NUMBER FROM UNIT_WITH_CHILDREN  WHERE UNIT_NUMBER IN (SELECT UNIT_NUMBER FROM PERSON_ROLES T1 INNER JOIN ROLE_RIGHTS T2 ON T1.ROLE_ID = T2.ROLE_ID INNER JOIN RIGHTS T3 ON T2.RIGHT_ID = T3.RIGHT_ID  WHERE T1.DESCEND_FLAG = \'Y\' AND T1.PERSON_ID = <<PERSON_ID>> AND RIGHT_NAME IN (\'VIEW_AWARD\'))), AWARD_TEMP AS (SELECT T1.AWARD_ID FROM AWARD_PERSON_ROLES T1 INNER JOIN ROLE_RIGHTS T2 ON T1.ROLE_ID = T2.ROLE_ID INNER JOIN RIGHTS T3 ON T2.RIGHT_ID = T3.RIGHT_ID WHERE T1.PERSON_ID =<<PERSON_ID>> AND T3.RIGHT_NAME IN (\'VIEW_AWARD\'))\"\n}\n',
              UPDATE_TIMESTAMP = utc_timestamp(), UPDATE_USER = 'admin' WHERE (TYPE_CODE = '30');
      rollback: empty

