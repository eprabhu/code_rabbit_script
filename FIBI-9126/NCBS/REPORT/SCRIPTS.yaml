p\",\n			\"valueField\": \"ACTIVITY_TYPE#ACTIVITY_TYPE_CODE#true#true\",\n			\"index\": \"null\",\n			\"queryType\": \"IN\",\n			\"summable\" : \"N\"\n		},\n		{\n			\"columnName\": \"GRANT_CALL_TITLE\",\n			\"displayName\": \"Grant Call Title\",\n			\"filterType\": \"endpoint\",\n			\"valueField\": \"grantCallName\",\n			\"index\": \"grantCallName\",\n			\"queryType\": \"IN\",\n			\"summable\" : \"N\"\n		},\n		{\n			\"columnName\": \"FUNDING_SCHEME\",\n			\"displayName\": \"Grant scheme\",\n			\"filterType\": \"lookUp\",\n			\"valueField\": \"FUNDING_SCHEME#FUNDING_SCHEME_CODE#true#true\",\n			\"index\": \"null\",\n			\"queryType\": \"IN\",\n			\"summable\" : \"N\"\n		},\n		{\n			\"columnName\": \"TITLE\",\n			\"displayName\": \"Award Title\",\n			\"filterType\": \"freetext\",\n			\"valueField\": \"title\",\n			\"index\": \"null\",\n			\"queryType\": \"LIKE\",\n			\"summable\" : \"N\"\n		},\n		{\n			\"columnName\": \"AWARD_EFFECTIVE_DATE\",\n			\"displayName\": \"Award Notice Date\",\n			\"filterType\": \"date\",\n			\"valueField\": \"null\",\n			\"index\": \"null\",\n			\"queryType\": \"BETWEEN\",\n			\"summable\" : \"N\"\n		},\n		{\n			\"columnName\": \"BEGIN_DATE\",\n			\"displayName\": \"Start Date\",\n			\"filterType\": \"date\",\n			\"valueField\": \"null\",\n			\"index\": \"null\",\n			\"queryType\": \"BETWEEN\",\n			\"summable\" : \"N\"\n		},\n		{\n			\"columnName\": \"FINAL_EXPIRATION_DATE\",\n			\"displayName\": \"End Date\",\n			\"filterType\": \"date\",\n			\"valueField\": \"null\",\n			\"index\": \"null\",\n			\"queryType\": \"BETWEEN\",\n			\"summable\" : \"N\"\n		},\n		{\n			\"columnName\": \"AWARD_CREATE_TIMESTAMP\",\n			\"displayName\": \"Award Create Date\",\n			\"filterType\": \"datetime\",\n			\"valueField\": \"null\",\n			\"index\": \"null\",\n			\"queryType\": \"BETWEEN\",\n			\"summable\" : \"N\"\n		},\n		{\n			\"columnName\": \"DURATION\",\n			\"displayName\": \"Project Duration\",\n			\"filterType\": \"null\",\n			\"valueField\": \"null\",\n