R JOIN ROLE_RIGHTS T2 ON T1.ROLE_ID = T2.ROLE_ID INNER JOIN RIGHTS T3 ON T2.RIGHT_ID = T3.RIGHT_ID  WHERE T1.DESCEND_FLAG = \'Y\' AND T1.PERSON_ID = <<PERSON_ID>> AND RIGHT_NAME IN (\'VIEW_AWARD\'))), AWARD_TEMP AS ((SELECT AWARD_ID FROM AWARD A1 INNER JOIN grant_call_header A2 ON A2.GRANT_HEADER_ID = A1.GRANT_HEADER_ID INNER JOIN PERSON_ROLE_RT PR ON A2.HOME_UNIT_NUMBER = PR.UNIT_NUMBER WHERE PR.RIGHT_NAME IN (\'VIEW_AWARD\') AND PR.PERSON_ID = <<PERSON_ID>> AND PR.ROLE_ID = 100))\"\n}\n', 
