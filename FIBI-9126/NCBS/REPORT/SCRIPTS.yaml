": \"UNIT_NAME\",\n            \"displayName\": \"Lead Unit\",\n            \"filterType\": \"endpoint\",\n            \"valueField\": \"unitName\",\n            \"index\": \"unitName\",\n            \"queryType\": \"IN\",\n            \"width\":7000\n        },\n        {\n            \"columnName\": \"COUNTRY_NAME\",\n            \"displayName\": \"Country of Organization\",\n            \"filterType\": \"freetext\",\n           \"valueField\": \"Country of Organization\",\n            \"index\": \"null\",\n            \"queryType\": \"IN\",\n            \"width\":7000\n        },\n        {\n            \"columnName\": \"TLO_PERSON_FULL_NAME\",\n            \"displayName\": \"Technology Licensing Officer\",\n            \"filterType\": \"elastic\",\n            \"valueField\": \"full_name\",\n            \"index\": \"fibiperson\",\n            \"queryType\": \"IN\",\n            \"width\":11000\n        },\n        {\n            \"columnName\": \"SPONSOR_NAME\",\n            \"displayName\": \"Organization\",\n            \"filterType\": \"freetext\",\n            \"valueField\": \"Organization\",\n            \"index\": \"null\",\n            \"queryType\": \"LIKE\",\n            \"width\":7000\n        },\n        {\n            \"columnName\": \"REQUESTOR_FULL_NAME\",\n            \"displayName\": \"Requestor\",\n            \"filterType\": \"freetext\",\n            \"valueField\": \"Requestor\",\n            \"index\": \"null\",\n            \"queryType\": \"LIKE\",\n            \"width\":11000\n        },\n        {\n            \"columnName\": \"SPONSOR_TYPE_NAME\",\n            \"displayName\": \"Organization Type\",\n            \"filterType\": \"lookUp\",\n            \"valueField\": \"SPONSOR_TYPE#SPONSOR_TYPE_CODE#true#true\",\n            \"index\": \"null\",\n            \"queryType\": \"IN\",\n            \"width\":11000\n        },\n        {\n            \"columnName\": \"SPONSOR_LOCATION\",\n            \"displayName\": \"Review Location\",\n            \"filterType\": \"freetext\",\n            \"valueField\": \"Location\",\n            \"index\": \"null\",\n            \"queryType\": \"LIKE\",\n            \"width\":7000\n        },\n        {\n            \"columnName\": \"AGREEMENT_STATUS\",\n            \"displayName\": \"Agreement Status\",\n            \"filterType\": \"lookUp\",\n            \"valueField\": \"AGREEMENT_STATUS#AGREEMENT_STATUS_CODE#true#true\",\n            \"index\": \"null\",\n            \"queryType\": \"IN\",\n            \"width\":7000\n        },\n        {\n            \"columnName\": \"PI_PERSON_FULL_NAME\",\n            \"displayName\": \"Principal Investigator\",\n            \"filterType\": \"elastic\",\n            \"valueField\": \"full_name\",\n            \"index\": \"fibiperson\",\n            \"queryType\": \"IN\",\n            \"width\":11000\n        },\n        {\n            \"columnName\": \"REVIEW_STATUS\",\n            \"displayName\": \"Review Status\",\n            \"filterType\": \"lookUp\",\n            \"valueField\": \"AGREEMENT_WORKFLOW_STATUS#WORKFLOW_STATUS_CODE#true#true\",\n            \"index\": \"null\",\n            \"queryType\": \"LIKE\",\n            \"width\":7000\n        },\n        {\n            \"columnName\": \"AA_PERSON_FULL_NAME\",\n            \"displayName\": \"Administrator\",\n            \"filterType\": \"lookUp\",\n            \"valueField\": \"TEMP#TEMP_ADMIN_NAME#true#true\",\n            \"index\": \"null\",\n            \"queryType\": \"IN\",\n            \"width\":11000\n        }\n    ],\n    \"extraCondition\" : \" (UNIT_NUMBER IN(SELECT DISTINCT UNIT_NUMBER FROM ACCESS_TMP) OR UNIT_NUMBER is null) AND AGREEMENT_SEQUENCE_STATUS <> \'TEMPLATE\'\",\n	\"extraSelection\" : \",AGREEMENT_REQUEST_ID AS ID, UNIT_NUMBER\",\n	\"selectDistinct\" : \"Y\",\n	\"tempTable\":\"WITH ACCESS_TMP  AS (SELECT UNIT_NUMBER FROM PERSON_ROLES T1 INNER JOIN ROLE_RIGHTS T2 ON T1.ROLE_ID = T2.ROLE_ID INNER JOIN RIGHTS T3 ON T2.RIGHT_ID = T3.RIGHT_ID  WHERE T1.DESCEND_FLAG = \'N\' AND T1.PERSON_ID = <<PERSON_ID>> AND RIGHT_NAME IN (\'AGREEMENT_ADMINISTRATOR\') UNION SELECT CHILD_UNIT_NUMBER FROM UNIT_WITH_CHILDREN  WHERE UNIT_NUMBER IN ( SELECT UNIT_NUMBER FROM PERSON_ROLES T1 INNER JOIN ROLE_RIGHTS T2 ON T1.ROLE_ID = T2.ROLE_ID INNER JOIN RIGHTS T3 ON T2.RIGHT_ID = T3.RIGHT_ID  WHERE T1.DESCEND_FLAG = \'Y\' AND T1.PERSON_ID = <<PERSON_ID>> AND RIGHT_NAME IN (\'AGREEMENT_ADMINISTRATOR\')))\"\n}\n',
              UPDATE_TIMESTAMP = utc_timestamp(), UPDATE_USER = 'admin' WHERE (TYPE_CODE = '36');
