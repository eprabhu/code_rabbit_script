 = \'MANPOWER_VIEW_STUDENT_PLAN\' AND MANPOWER_TYPE_CODE = \'2\') OR (PU.RIGHT_NAME = \'MANPOWER_VIEW_OTHERS_PLAN\' AND MANPOWER_TYPE_CODE = \'3\') ) AND ( (PU.UNIT_NUMBER = MASTER_DATA.LEAD_UNIT_NUMBER AND PU.DESCEND_FLAG = \'N\') OR (PU.UNIT_NUMBER IN ( SELECT UNIT_NUMBER FROM UNIT_WITH_CHILDREN WHERE CHILD_UNIT_NUMBER = MASTER_DATA.LEAD_UNIT_NUMBER AND PU.DESCEND_FLAG = \'Y\')) ) ) ) OR ( AWARD_ID IN ( SELECT DISTINCT AWARD_ID FROM AWARD_TEMP AWT WHERE EXISTS ( SELECT 1 FROM ROLE_RIGHTS RR, RIGHTS RT WHERE RR.RIGHT_ID = RT.RIGHT_ID AND RT.RIGHT_NAME IN ( \'MANPOWER_GENERATE_REPORT\' ) AND RR.ROLE_ID IN ( SELECT ROLE_ID FROM AWARD_TEMP AWT1 WHERE AWT1.AWARD_ID = AWT.AWARD_ID ) ) AND EXISTS ( SELECT 1 FROM ROLE_RIGHTS RR, RIGHTS RT WHERE RR.RIGHT_ID = RT.RIGHT_ID AND ( ( RT.RIGHT_NAME = \'MANPOWER_VIEW_STAFF_PLAN\' AND MANPOWER_TYPE_CODE = \'1\' ) OR ( RT.RIGHT_NAME = \'MANPOWER_VIEW_STUDENT_PLAN\' AND MANPOWER_TYPE_CODE = \'2\' ) OR ( RT.RIGHT_NAME = \'MANPOWER_VIEW_OTHERS_PLAN\' AND MANPOWER_TYPE_CODE = \'3\' ) ) AND RR.ROLE_ID IN ( SELECT ROLE_ID FROM AWARD_TEMP AWT1 WHERE AWT1.AWARD_ID = AWT.AWARD_ID ) ) ) ) )\",\n	\"extraSelection\": \"\",\n	\"selectDistinct\": \"Y\",\n	\"tempTable\":\"WITH PERSON_UNITS AS ( SELECT DISTINCT PR.UNIT_NUMBER, PR.DESCEND_FLAG , RT.RIGHT_NAME FROM PERSON_ROLES PR, ROLE_RIGHTS RR, RIGHTS RT WHERE PR.PERSON_ID = <<PERSON_ID>> AND RR.ROLE_ID = PR.ROLE_ID AND RT.RIGHT_ID = RR.RIGHT_ID AND RT.RIGHT_NAME IN ( \'MANPOWER_GENERATE_REPORT\',\'MANPOWER_VIEW_STAFF_PLAN\', \'MANPOWER_VIEW_STUDENT_PLAN\',\'MANPOWER_VIEW_OTHERS_PLAN\') ), AWARD_TEMP AS ( SELECT T1.AWARD_ID, T1.ROLE_ID FROM AWARD_PERSON_ROLES T1 INNER JOIN ROLE_RIGHTS T2 ON T1.ROLE_ID = T2.ROLE_ID INNER JOIN RIGHTS T3 ON T2.RIGHT_ID = T3.RIGHT_ID WHERE T1.PERSON_ID = <<PERSON_ID>> AND T3.RIGHT_NAME IN ( \'MANPOWER_VIEW_STAFF_PLAN\', \'MANPOWER_VIEW_STUDENT_PLAN\', \'MANPOWER_VIEW_OTHERS_PLAN\', \'MANPOWER_GENERATE_REPORT\' ) ) \"\n}\n', UPDATE_TIMESTAMP = UTC_TIMESTAMP(), UPDATE_USER = 'admin' WHERE (`TYPE_CODE` = '18');
