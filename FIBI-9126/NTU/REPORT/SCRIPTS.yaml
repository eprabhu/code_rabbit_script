\",\n			\"summable\" : \"N\",\n			\"isCurrency\": \"true\"\n		},\n		{\n			\"columnName\": \"CHARGE_START_DATE\",\n			\"displayName\": \"Charge Start Date\",\n			\"filterType\": \"date\",\n			\"valueField\": \"null\",\n			\"index\": \"null\",\n			\"queryType\": \"BETWEEN\",\n			\"summable\" : \"N\"\n		},\n		{\n			\"columnName\": \"CHARGE_END_DATE\",\n			\"displayName\": \"Charge End Date\",\n			\"filterType\": \"date\",\n			\"valueField\": \"null\",\n			\"index\": \"null\",\n			\"queryType\": \"BETWEEN\",\n			\"summable\" : \"N\"\n		},\n		{\n			\"columnName\": \"CHARGE_DURATION\",\n			\"displayName\": \"Charge Duration\",\n			\"filterType\": \"null\",\n			\"valueField\": \"null\",\n			\"index\": \"null\",\n			\"queryType\": \"null\",\n			\"summable\" : \"N\"\n		},\n		{\n			\"columnName\": \"COST_ALLOCATION\",\n			\"displayName\": \"Cost Allocation %\",\n			\"filterType\": \"null\",\n			\"valueField\": \"null\",\n			\"index\": \"null\",\n			\"queryType\": \"null\",\n			\"summable\" : \"N\"\n		},\n		{\n			\"columnName\": \"NATIONALITY\",\n			\"displayName\": \"Nationality\",\n			\"filterType\": \"null\",\n	     	\"valueField\": \"null\",\n	      	\"index\": \"null\",\n	      	\"queryType\": \"null\",\n	      	\"summable\" : \"N\",\n			\"isEncrypted\" : \"true\"\n		},\n		{\n			\"columnName\": \"CITIZENSHIP\",\n			\"displayName\": \"Citizenship\",\n			\"filterType\": \"null\",\n			\"valueField\": \"null\",\n			\"index\": \"null\",\n			\"queryType\": \"null\",\n			\"summable\" : \"N\",\n			\"isEncrypted\" : \"true\"\n		},\n		{\n			\"columnName\": \"HIRE_DATE\",\n			\"displayName\": \"Hire Date\",\n			\"filterType\": \"null\",\n			\"valueField\": \"null\",\n			\"index\": \"null\",\n			\"queryType\": \"null\",\n			\"summable\" : \"N\"\n		},\n		{\n			\"columnName\": \"CONTRACT_END_DATE\",\n			\"displayName\": \"Contract End Date\",\n			\"filterType\": \"null\",\n			\"valueField\": \"null\",\n			\"index\": \"null\",\n			\"queryType\": \"null\",\n			\"summable\" : \"N\"\n		},\n		{\n			\"columnName\": \"CANDIDATURE_START_DATE\",\n			\"displayName\": \"Candidature Start Date\",\n			\"filterType\": \"null\",\n			\"valueField\": \"null\",\n			\"index\": \"null\",\n			\"queryType\": \"null\",\n			\"summable\" : \"N\"\n		},\n		{\n			\"columnName\": \"CANDIDATURE_END_DATE\",\n			\"displayName\": \"Candidature End Date\",\n			\"filterType\": \"null\",\n			\"valueField\": \"null\",\n			\"index\": \"null\",\n			\"queryType\": \"null\",\n			\"summable\" : \"N\"\n		},\n		{\n			\"columnName\": \"GL_ACCOUNT_CODE\",\n			\"displayName\": \"GL Account Number\",\n			\"filterType\": \"freetext\",\n			\"valueField\": \"null\",\n			\"index\": \"null\",\n			\"queryType\": \"LIKE\",\n			\"summable\" : \"N\"\n		},\n		{\n			\"columnName\": \"COST_SHARING\",\n			\"displayName\": \"Cost Sharing\",\n			\"filterType\": \"freetext\",\n			\"valueField\": \"null\",\n			\"index\": \"null\",\n			\"queryType\": \"null\",\n			\"summable\" : \"N\"\n		},\n		{\n			\"columnName\": \"PAY_ELEMENT_CODE\",\n			\"displayName\": \"Pay Element Code\",\n			\"filterType\": \"freetext\",\n			\"valueField\": \"null\",\n			\"index\": \"null\",\n			\"queryType\": \"IN\",\n			\"summable\" : \"N\"\n		},\n		{\n			\"columnName\": \"PAY_ELEMENT\",\n			\"displayName\": \"Pay Element\",\n			\"filterType\": \"freetext\",\n			\"valueField\": \"null\",\n			\"index\": \"null\",\n			\"queryType\": \"IN\",\n			\"summable\" : \"N\"\n		},\n		{\n			\"columnName\": \"PAYROLL_PERIOD\",\n			\"displayName\": \"Payroll Period\",\n			\"filterType\": \"date\",\n			\"valueField\": \"null\",\n			\"index\": \"null\",\n			\"queryType\": \"BETWEEN\",\n			\"summable\" : \"N\"\n		},\n		{\n			\"columnName\": \"REMARKS\",\n			\"displayName\": \"Remarks\",\n			\"filterType\": \"freetext\",\n			\"valueField\": \"null\",\n			\"index\": \"null\",\n			\"queryType\": \"null\",\n			\"summable\" : \"N\"\n		},\n		{\n			\"columnName\": \"AMOUNT\",\n			\"displayName\": \"Payroll Amount\",\n			\"filterType\": \"null\",\n			\"valueField\": \"null\",\n			\"index\": \"null\",\n			\"queryType\": \"null\",\n			\"summable\" : \"N\",\n			\"isCurrency\": \"true\",\n			\"isEncrypted\" : \"true\"\n		},\n		{\n			\"columnName\": \"PERSON_EMAIL\",\n			\"displayName\": \"Person Email\",\n			\"filterType\": \"freetext\",\n			\"valueField\": \"null\",\n			\"index\": \"null\",\n			\"queryType\": \"IN\",\n			\"summable\": \"N\"\n		},\n		{\n			\"columnName\": \"HOME_DEPARTMENT\",\n			\"displayName\": \"Home Department\",\n			\"filterType\": \"endpoint\",\n			\"valueField\": \"unitName\",\n			\"index\": \"unitName\",\n			\"queryType\": \"IN\",\n			\"summable\": \"N\"\n		},\n		{\n			\"columnName\": \"MANPOWER_CATEGORY_TYPE\",\n			\"displayName\": \"Manpower Category Type\",\n			\"filterType\": \"lookUp\",\n			\"valueField\": \"MANPOWER_TYPE#MANPOWER_TYPE_CODE#true#true\",\n			\"index\": \"null\",\n			\"queryType\": \"IN\",\n			\"summable\": \"N\"\n		}\n		\n	],\n	\"extraCondition\" : \"((LEAD_UNIT_NUMBER IN(SELECT DISTINCT UNIT_NUMBER FROM ACCESS_TMP) AND LEAD_UNIT_NUMBER IN(SELECT DISTINCT UNIT_NUMBER FROM ACCESS_TMP_TWO)) OR (AWARD_ID IN (SELECT AWARD_ID FROM AWARD_TEMP) AND AWARD_ID IN (SELECT AWARD_ID FROM AWARD_TEMP_TWO)))\",\n	\"extraSelection\" : \"\",\n	\"selectDistinct\" :\"Y\",\n	\"tempTable\":\"WITH ACCESS_TMP AS (SELECT UNIT_NUMBER FROM PERSON_ROLES T1 INNER JOIN ROLE_RIGHTS T2 ON T1.ROLE_ID = T2.ROLE_ID INNER JOIN RIGHTS T3 ON T2.RIGHT_ID = T3.RIGHT_ID  WHERE T1.DESCEND_FLAG = \'N\' AND T1.PERSON_ID = <<PERSON_ID>> AND RIGHT_NAME IN (\'MANPOWER_GENERATE_REPORT\') UNION SELECT CHILD_UNIT_NUMBER FROM UNIT_WITH_CHILDREN  WHERE UNIT_NUMBER IN ( SELECT UNIT_NUMBER FROM PERSON_ROLES T1 INNER JOIN ROLE_RIGHTS T2 ON T1.ROLE_ID = T2.ROLE_ID INNER JOIN RIGHTS T3 ON T2.RIGHT_ID = T3.RIGHT_ID  WHERE T1.DESCEND_FLAG = \'Y\' AND T1.PERSON_ID = <<PERSON_ID>> AND RIGHT_NAME IN (\'MANPOWER_GENERATE_REPORT\'))), ACCESS_TMP_TWO AS (SELECT UNIT_NUMBER FROM PERSON_ROLES T1 INNER JOIN ROLE_RIGHTS T2 ON T1.ROLE_ID = T2.ROLE_ID INNER JOIN RIGHTS T3 ON T2.RIGHT_ID = T3.RIGHT_ID  WHERE T1.DESCEND_FLAG = \'N\' AND T1.PERSON_ID = <<PERSON_ID>> AND RIGHT_NAME IN (\'MANPOWER_VIEW_STAFF_PAYROLL\') UNION SELECT CHILD_UNIT_NUMBER FROM UNIT_WITH_CHILDREN  WHERE UNIT_NUMBER IN ( SELECT UNIT_NUMBER FROM PERSON_ROLES T1 INNER JOIN ROLE_RIGHTS T2 ON T1.ROLE_ID = T2.ROLE_ID INNER JOIN RIGHTS T3 ON T2.RIGHT_ID = T3.RIGHT_ID  WHERE T1.DESCEND_FLAG = \'Y\' AND T1.PERSON_ID = <<PERSON_ID>> AND RIGHT_NAME IN (\'MANPOWER_VIEW_STAFF_PAYROLL\'))), AWARD_TEMP_TWO AS (SELECT T1.AWARD_ID FROM AWARD_PERSON_ROLES T1 INNER JOIN ROLE_RIGHTS T2 ON T1.ROLE_ID = T2.ROLE_ID INNER JOIN RIGHTS T3 ON T2.RIGHT_ID = T3.RIGHT_ID WHERE T1.PERSON_ID =<<PERSON_ID>> AND T3.RIGHT_NAME IN (\'MANPOWER_GENERATE_REPORT\')), AWARD_TEMP AS (SELECT T1.AWARD_ID FROM AWARD_PERSON_ROLES T1 INNER JOIN ROLE_RIGHTS T2 ON T1.ROLE_ID = T2.ROLE_ID INNER JOIN RIGHTS T3 ON T2.RIGHT_ID = T3.RIGHT_ID WHERE T1.PERSON_ID =<<PERSON_ID>> AND T3.RIGHT_NAME IN (\'MANPOWER_VIEW_STAFF_PAYROLL\'))\"\n}\n' , UPDATE_TIMESTAMP = UTC_TIMESTAMP(), UPDATE_USER = 'admin' WHERE (`TYPE_CODE` = '37');
