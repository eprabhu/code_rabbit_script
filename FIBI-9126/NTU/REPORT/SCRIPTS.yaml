ame\": \"SPONSOR_AWARD_NUMBER\",\n			\"displayName\": \"Sponsor Award Number\",\n			\"filterType\": \"freetext\",\n			\"valueField\": \"null\",\n			\"index\": \"null\",\n			\"queryType\": \"LIKE\",\n			\"summable\" : \"N\"\n		},\n		{\n			\"columnName\": \"AWARD_STATUS\",\n			\"displayName\": \"Award Status\",\n			\"filterType\": \"lookUp\",\n			\"valueField\": \"AWARD_STATUS#STATUS_CODE#true#true\",\n			\"index\": \"null\",\n			\"queryType\": \"IN\",\n			\"summable\" : \"N\"\n		},\n		{\n			\"columnName\": \"AWARD_TYPE\",\n			\"displayName\": \"Award Type\",\n			\"filterType\": \"lookUp\",\n			\"valueField\": \"AWARD_TYPE#AWARD_TYPE_CODE#true#true\",\n			\"index\": \"null\",\n			\"queryType\": \"IN\",\n			\"summable\" : \"N\"\n		},\n		{\n			\"columnName\": \"ACCOUNT_TYPE\",\n			\"displayName\": \"Account Type\",\n			\"filterType\": \"lookUp\",\n			\"valueField\": \"ACCOUNT_TYPE#ACCOUNT_TYPE_CODE#true#true\",\n			\"index\": \"null\",\n			\"queryType\": \"IN\",\n			\"summable\" : \"N\"\n		},\n		{\n			\"columnName\": \"ACTIVITY_TYPE\",\n			\"displayName\": \"Activity Type\",\n			\"filterType\": \"lookUp\",\n			\"valueField\": \"ACTIVITY_TYPE#ACTIVITY_TYPE_CODE#true#true\",\n			\"index\": \"null\",\n			\"queryType\": \"IN\",\n			\"summable\" : \"N\"\n		},\n		{\n			\"columnName\": \"GRANT_CALL_TITLE\",\n			\"displayName\": \"Grant Call Title\",\n			\"filterType\": \"endpoint\",\n			\"valueField\": \"grantCallName\",\n			\"index\": \"grantCallName\",\n			\"queryType\": \"IN\",\n			\"summable\" : \"N\"\n		},\n		{\n			\"columnName\": \"TITLE\",\n			\"displayName\": \"Award Title\",\n			\"filterType\": \"freetext\",\n			\"valueField\": \"title\",\n			\"index\": \"null\",\n			\"queryType\": \"LIKE\",\n			\"summable\" : \"N\"\n		},\n		{\n			\"columnName\": \"AWARD_EFFECTIVE_DATE\",\n			\"displayName\": \"Notification Date\",\n			\"filterType\": \"date\",\n			\"valueField\": \"null\",\n			\"index\": \"null\",\n			\"queryType\": \"BETWEEN\",\n			\"summable\" : \"N\"\n		},\n		{\n	