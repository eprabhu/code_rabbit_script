		\"index\": \"grantCallName\",\n			\"queryType\": \"IN\",\n			\"summable\" : \"N\"\n		},\n		{\n			\"columnName\": \"FUNDING_SCHEME\",\n			\"displayName\": \"Grant Scheme\",\n			\"filterType\": \"lookUp\",\n			\"valueField\": \"FUNDING_SCHEME#FUNDING_SCHEME_CODE#true#true\",\n			\"index\": \"null\",\n			\"queryType\": \"IN\",\n			\"summable\" : \"N\"\n		},\n		{\n			\"columnName\": \"TITLE\",\n			\"displayName\": \"Award Title\",\n			\"filterType\": \"freetext\",\n			\"valueField\": \"title\",\n			\"index\": \"null\",\n			\"queryType\": \"LIKE\",\n			\"summable\" : \"N\"\n		},\n		{\n			\"columnName\": \"BEGIN_DATE\",\n			\"displayName\": \"Start Date\",\n			\"filterType\": \"date\",\n			\"valueField\": \"null\",\n			\"index\": \"null\",\n			\"queryType\": \"BETWEEN\",\n			\"summable\" : \"N\"\n		},\n		{\n			\"columnName\": \"FINAL_EXPIRATION_DATE\",\n			\"displayName\": \"End Date\",\n			\"filterType\": \"date\",\n			\"valueField\": \"null\",\n			\"index\": \"null\",\n			\"queryType\": \"BETWEEN\",\n			\"summable\" : \"N\"\n		},\n		{\n			\"columnName\": \"DURATION\",\n			\"displayName\": \"Project Duration\",\n			\"filterType\": \"null\",\n			\"valueField\": \"null\",\n			\"index\": \"null\",\n			\"queryType\": \"null\",\n			\"summable\" : \"N\"\n		},\n		{\n			\"columnName\": \"SPONSOR_NAME\",\n			\"displayName\": \"Sponsor\",\n			\"filterType\": \"endpoint\",\n			\"valueField\": \"sponsorName\",\n			\"index\": \"sponsorName\",\n			\"queryType\": \"IN\",\n			\"summable\" : \"N\"\n		},\n		{\n			\"columnName\": \"SPONSOR_TYPE\",\n			\"displayName\": \"Sponsor Type\",\n			\"filterType\": \"lookUp\",\n			\"valueField\": \"SPONSOR_TYPE#SPONSOR_TYPE_CODE#true#true\",\n			\"index\": \"null\",\n			\"queryType\": \"IN\",\n			\"summable\" : \"N\"\n		},\n		{\n			\"columnName\": \"UNIT_NAME\",\n			\"displayName\": \"Lead Unit\",\n			\"filterType\": \"endpoint\",\n			\"valueField\": \"unitName\",\n			\"index\": \"unitName\",\n			\"queryType\": \"IN\",\n			\"summable\" : \"N\"\n		},\n		{\n			\"columnName\": \"SUB_LEAD_UNIT\",\n			\"displayName\": \"Sub-Lead Unit\",\n			\"filterType\": \"endpoint\",\n			\"valueField\": \"unitName\",\n			\"index\": \"unitName\",\n			\"queryType\": \"IN\",\n			\"summable\" : \"N\"\n		},\n		{\n			\"columnName\": \"PI_NAME\",\n			\"displayName\": \"Lead Principal Investigator\",\n			\"filterType\": \"elastic\",\n			\"valueField\": \"full_name\",\n			\"index\": \"fibiperson\",\n			\"queryType\": \"IN\",\n			\"summable\" : \"N\"\n		},\n		{\n			\"columnName\": \"AWARD_REPORT_TERMS_DUE_DATE\",\n			\"displayName\": \"Award Report Terms Due Date\",\n			\"filterType\": \"date\",\n			\"valueField\": \"null\",\n			\"index\": \"null\",\n			\"queryType\": \"BETWEEN\",\n			\"summable\" : \"N\"\n		},\n		{\n			\"columnName\": \"AWARD_REPORT_TERMS_BASE_DATE\",\n			\"displayName\": \"Base Date\",\n			\"filterType\": \"date\",\n			\"valueField\": \"null\",\n			\"index\": \"null\",\n			\"queryType\": \"BETWEEN\",\n			\"summable\" : \"N\"\n		},\n		{\n			\"columnName\": \"REPORT_CLASS\",\n			\"displayName\": \"Report Class\",\n			\"filterType\": \"lookUp\",\n			\"valueField\": \"REPORT_CLASS#REPORT_CLASS_CODE#true#true\",\n			\"index\": \"null\",\n			\"queryType\": \"IN\",\n			\"summable\" : \"N\"\n		},\n		{\n			\"columnName\": \"FREQUENCY\",\n			\"displayName\": \"Frequency\",\n			\"filterType\": \"lookUp\",\n			\"valueField\": \"FREQUENCY#FREQUENCY_CODE#true#true\",\n			\"index\": \"null\",\n			\"queryType\": \"IN\",\n			\"summable\" : \"N\"\n		},\n		{\n			\"columnName\": \"FREQUENCY_BASE\",\n			\"displayName\": \"Frequency Base\",\n			\"filterType\": \"lookUp\",\n			\"valueField\": \"FREQUENCY_BASE#FREQUENCY_BASE_CODE#true#true\",\n			\"index\": \"null\",\n			\"queryType\": \"IN\",\n			\"summable\" : \"N\"\n		},\n		{\n			\"columnName\": \"DISTRIBUTION\",\n			\"displayName\": \"Description\",\n			\"filterType\": \"lookUp\",\n			\"valueField\": \"DISTRIBUTION#OSP_DISTRIBUTION_CODE#true#true\",\n			\"index\": \"null\",\n			\"queryType\": \"IN\",\n			\"summable\" : \"N\"\n		},\n		{\n			\"columnName\": \"REPORT_STATUS\",\n			\"displayName\": \"Report Status\",\n			\"filterType\": \"lookUp\",\n			\"valueField\": \"REPORT_STATUS#REPORT_STATUS_CODE#true#true\",\n			\"index\": \"null\",\n			\"queryType\": \"IN\",\n			\"summable\" : \"N\"\n		},\n		{\n			\"columnName\": \"RECIPIENT_NAME\",\n			\"displayName\": \"Recipient Name\",\n			\"filterType\": \"elastic\",\n			\"valueField\": \"full_name\",\n			\"index\": \"fibiperson\",\n			\"queryType\": \"IN\",\n			\"summable\" : \"N\"\n		},\n		{\n			\"columnName\": \"ACTIVITY_DATE\",\n			\"displayName\": \"Activity Date\",\n			\"filterType\": \"date\",\n			\"valueField\": \"null\",\n			\"index\": \"null\",\n			\"queryType\": \"BETWEEN\",\n			\"summable\" : \"N\"\n		},\n		{\n			\"columnName\": \"COMMENTS\",\n			\"displayName\": \"Report Comments\",\n			\"filterType\": \"null\",\n			\"valueField\": \"null\",\n			\"index\": \"null\",\n			\"queryType\": \"null\",\n			\"summable\" : \"N\"\n		},\n		{\n			\"columnName\": \"AWARD_REPORT_TRACKING_DUE_DATE\",\n			\"displayName\": \"Due Date\",\n			\"filterType\": \"date\",\n			\"valueField\": \"null\",\n			\"index\": \"null\",\n			\"queryType\": \"BETWEEN\",\n			\"summable\" : \"N\"\n		},\n		{\n			\"columnName\": \"NOTE\",\n			\"displayName\": \"Note\",\n			\"filterType\": \"null\",\n			\"valueField\": \"null\",\n			\"index\": \"null\",\n			\"queryType\": \"null\",\n			\"summable\" : \"N\"\n		}\n	],\n	\"extraCondition\" : \"(LEAD_UNIT_NUMBER IN(SELECT DISTINCT UNIT_NUMBER FROM ACCESS_TMP) OR AWARD_ID IN (SELECT DISTINCT AWARD_ID FROM AWARD_TEMP) OR AWARD_ID IN (SELECT AWARD_ID FROM AWARD A1 INNER JOIN GRANT_CALL_HEADER A2 ON A2.GRANT_HEADER_ID = A1.GRANT_HEADER_ID INNER JOIN GRANTCALL_TEMP PR ON A2.HOME_UNIT_NUMBER = PR.UNIT_NUMBER)) ORDER BY AWARD_NUMBER\",\n	\"extraSelection\" : \"\",\n	\"selectDistinct\" :\"Y\",\n	\"tempTable\":\"WITH ACCESS_TMP  AS (SELECT UNIT_NUMBER FROM PERSON_ROLES T1 INNER JOIN ROLE_RIGHTS T2 ON T1.ROLE_ID = T2.ROLE_ID INNER JOIN RIGHTS T3 ON T2.RIGHT_ID = T3.RIGHT_ID  WHERE T1.DESCEND_FLAG = \'N\' AND T1.PERSON_ID = <<PERSON_ID>> AND RIGHT_NAME IN (\'VIEW_AWARD\') UNION SELECT CHILD_UNIT_NUMBER FROM UNIT_WITH_CHILDREN  WHERE UNIT_NUMBER IN (SELECT UNIT_NUMBER FROM PERSON_ROLES T1 INNER JOIN ROLE_RIGHTS T2 ON T1.ROLE_ID = T2.ROLE_ID INNER JOIN RIGHTS T3 ON T2.RIGHT_ID = T3.RIGHT_ID  WHERE T1.DESCEND_FLAG = \'Y\' AND T1.PERSON_ID = <<PERSON_ID>> AND RIGHT_NAME IN (\'VIEW_AWARD\'))), AWARD_TEMP AS (SELECT T1.AWARD_ID FROM AWARD_PERSON_ROLES T1 INNER JOIN ROLE_RIGHTS T2 ON T1.ROLE_ID = T2.ROLE_ID INNER JOIN RIGHTS T3 ON T2.RIGHT_ID = T3.RIGHT_ID WHERE T1.PERSON_ID =<<PERSON_ID>> AND T3.RIGHT_NAME IN (\'VIEW_AWARD\')), GRANTCALL_TEMP AS (SELECT UNIT_NUMBER FROM PERSON_ROLES T1 INNER JOIN ROLE_RIGHTS T2 ON T1.ROLE_ID = T2.ROLE_ID INNER JOIN RIGHTS T3 ON T2.RIGHT_ID = T3.RIGHT_ID WHERE T1.DESCEND_FLAG = \'N\' AND T1.PERSON_ID = <<PERSON_ID>> AND RIGHT_NAME IN (\'VIEW_AWARD\') AND T1.ROLE_ID=\'100\' UNION SELECT CHILD_UNIT_NUMBER FROM UNIT_WITH_CHILDREN WHERE UNIT_NUMBER IN (SELECT UNIT_NUMBER FROM PERSON_ROLES T1 INNER JOIN ROLE_RIGHTS T2 ON T1.ROLE_ID = T2.ROLE_ID INNER JOIN RIGHTS T3 ON T2.RIGHT_ID = T3.RIGHT_ID WHERE T1.DESCEND_FLAG = \'Y\' AND T1.PERSON_ID = <<PERSON_ID>> AND RIGHT_NAME IN (\'VIEW_AWARD\') AND T1.ROLE_ID=\'100\'))\"\n}\n', UPDATE_TIMESTAMP = UTC_TIMESTAMP(), UPDATE_USER = 'admin' WHERE (`TYPE_CODE` = '39');
