\"N\"\n		},\n		{\n			\"columnName\": \"CHILD.VENDOR_NAME\",\n			\"displayName\": \"Vendor Name/BP Name\",\n			\"filterType\": \"freetext\",\n			\"valueField\": \"null\",\n			\"index\": \"null\",\n			\"queryType\": \"LIKE\",\n			\"summable\" : \"N\"\n		},\n		{\n			\"columnName\": \"CHILD.FISCAL_YEAR\",\n			\"displayName\": \"Fiscal Year\",\n			\"filterType\": \"null\",\n			\"valueField\": \"null\",\n			\"index\": \"null\",\n			\"queryType\": \"IN\",\n			\"summable\" : \"N\",\n			\"innerJoin\" : \"N\"\n		},\n		{\n			\"columnName\": \"CHILD.BANK_CLEARING_DATE\",\n			\"displayName\": \"Bank Clearing Date\",\n			\"filterType\": \"null\",\n			\"valueField\": \"null\",\n			\"index\": \"null\",\n			\"queryType\": \"BETWEEN\",\n			\"summable\" : \"N\",\n			\"innerJoin\" : \"N\"\n		},\n		{\n			\"columnName\": \"CHILD.FI_POSTING_DATE\",\n			\"displayName\": \"FI Posting Date\",\n			\"filterType\": \"date\",\n			\"valueField\": \"null\",\n			\"index\": \"null\",\n			\"queryType\": \"BETWEEN\",\n			\"summable\" : \"N\",\n			\"innerJoin\" : \"N\"\n		},\n		{\n			\"columnName\": \"CHILD.VENDOR_CODE\",\n			\"displayName\": \"Vendor Code/BP Code\",\n			\"filterType\": \"null\",\n			\"valueField\": \"null\",\n			\"index\": \"null\",\n			\"queryType\": \"IN\",\n			\"summable\" : \"N\",\n			\"innerJoin\" : \"N\"\n		},\n		{\n			\"columnName\": \"CHILD.FI_GL_ACCOUNT\",\n			\"displayName\": \"GL Account\",\n			\"filterType\": \"null\",\n			\"valueField\": \"null\",\n			\"index\": \"null\",\n			\"queryType\": \"IN\",\n			\"summable\" : \"N\",\n			\"innerJoin\" : \"N\"\n		},\n		{\n			\"columnName\": \"CHILD.FI_GL_DESCRIPTION\",\n			\"displayName\": \"GL Description\",\n			\"filterType\": \"null\",\n			\"valueField\": \"null\",\n			\"index\": \"null\",\n			\"queryType\": \"IN\",\n			\"summable\" : \"N\",\n			\"innerJoin\" : \"N\"\n		},\n		{\n			\"columnName\": \"CHILD.REQUESTOR_NAME\",\n			\"displayName\": \"Requestor Name\",\n			\"filterType\": \"null\",\n			\"valueField\": \"null\",\n			\"index\": \"null\",\n			\"queryType\": \"IN\",\n			\"summable\" : \"N\",\n			\"innerJoin\" : \"N\"\n		},\n		{\n			\"columnName\": \"CHILD.TRANSACTION_REFERENCE_NUMBER\",\n			\"displayName\": \"Source Doc Ref\",\n			\"filterType\": \"freetext\",\n			\"valueField\": \"null\",\n			\"index\": \"null\",\n			\"queryType\": \"LIKE\",\n			\"summable\" : \"N\",\n			\"innerJoin\" : \"N\"\n		},\n		{\n			\"columnName\": \"CHILD.ITEM_NUMBER\",\n			\"displayName\": \"Item Number\",\n			\"filterType\": \"null\",\n			\"valueField\": \"null\",\n			\"index\": \"null\",\n			\"queryType\": \"IN\",\n			\"summable\" : \"N\",\n			\"innerJoin\" : \"N\"\n		},\n		{\n			\"columnName\": \"CHILD.REFERENCE_DOC_CATEGORY\",\n			\"displayName\": \"Reference Document Category\",\n			\"filterType\": \"null\",\n			\"valueField\": \"null\",\n			\"index\": \"null\",\n			\"queryType\": \"IN\",\n			\"summable\" : \"N\",\n			\"innerJoin\" : \"N\"\n		},\n		{\n			\"columnName\": \"CHILD.REFERENCE_ORG_UNIT\",\n			\"displayName\": \"Reference Org. Unit\",\n			\"filterType\": \"null\",\n			\"valueField\": \"null\",\n			\"index\": \"null\",\n			\"queryType\": \"IN\",\n			\"summable\" : \"N\",\n			\"innerJoin\" : \"N\"\n		},\n		{\n			\"columnName\": \"CHILD.ACCT_ASSIGNMENT_NUMBER\",\n			\"displayName\": \"Acct Assgnmnt Number\",\n			\"filterType\": \"null\",\n			\"valueField\": \"null\",\n			\"index\": \"null\",\n			\"queryType\": \"IN\",\n			\"summable\" : \"N\",\n			\"innerJoin\" : \"N\"\n		},\n		{\n			\"columnName\": \"CHILD.SCHEDULE_LINE_NUMBER\",\n			\"displayName\": \"Schedule Line Number\",\n			\"filterType\": \"null\",\n			\"valueField\": \"null\",\n			\"index\": \"null\",\n			\"queryType\": \"IN\",\n			\"summable\" : \"N\",\n			\"innerJoin\" : \"N\"\n		},\n		{\n			\"columnName\": \"CHILD.CONDITION_COUNTER\",\n			\"displayName\": \"Condition Counter\",\n			\"filterType\": \"null\",\n			\"valueField\": \"null\",\n			\"index\": \"null\",\n			\"queryType\": \"IN\",\n			\"summable\" : \"N\",\n			\"innerJoin\" : \"N\"\n		},\n		{\n			\"columnName\": \"CHILD.REFERENCE_PROCEDURE\",\n			\"displayName\": \"Reference Procedure\",\n			\"filterType\": \"null\",\n			\"valueField\": \"null\",\n			\"index\": \"null\",\n			\"queryType\": \"IN\",\n			\"summable\" : \"N\",\n			\"innerJoin\" : \"N\"\n		},\n		{\n			\"columnName\": \"CHILD.DOCUMENT_NUMBER_FM_LINE_ITEM\",\n			\"displayName\": \"Document Number of FM Line Item\",\n			\"filterType\": \"null\",\n			\"valueField\": \"null\",\n			\"index\": \"null\",\n			\"queryType\": \"IN\",\n			\"summable\" : \"N\",\n			\"innerJoin\" : \"N\"\n		},\n		{\n			\"columnName\": \"CHILD.NUMBER_OF_POST_FM_LINE_ITEM\",\n			\"displayName\": \"Number of a posting line in a TR-FM line item\",\n			\"filterType\": \"null\",\n			\"valueField\": \"null\",\n			\"index\": \"null\",\n			\"queryType\": \"IN\",\n			\"summable\" : \"N\",\n			\"innerJoin\" : \"N\"\n		},\n		{\n			\"columnName\": \"CHILD.VALUE_TYPE\",\n			\"displayName\": \"Value Type\",\n			\"filterType\": \"null\",\n			\"valueField\": \"null\",\n			\"index\": \"null\",\n			\"queryType\": \"IN\",\n			\"summable\" : \"N\",\n			\"innerJoin\" : \"N\"\n		},\n		{\n			\"columnName\": \"CHILD.AMOUNT_TYPE\",\n			\"displayName\": \"Amount Type\",\n			\"filterType\": \"null\",\n			\"valueField\": \"null\",\n			\"index\": \"null\",\n			\"queryType\": \"IN\",\n			\"summable\" : \"N\",\n			\"innerJoin\" : \"N\"\n		},\n		{\n			\"columnName\": \"CHILD.TRANSACTION_NUMBER\",\n			\"displayName\": \"Transaction Number\",\n			\"filterType\": \"null\",\n			\"valueField\": \"null\",\n			\"index\": \"null\",\n			\"queryType\": \"null\",\n			\"summable\" : \"N\",\n			\"innerJoin\" : \"Y\"\n		},\n		{\n			\"columnName\": \"CHILD.REMARKS\",\n			\"displayName\": \"Description\",\n			\"filterType\": \"null\",\n			\"valueField\": \"null\",\n			\"index\": \"null\",\n			\"queryType\": \"null\",\n			\"summable\" : \"N\",\n			\"innerJoin\" : \"Y\"\n		},\n		{\n			\"columnName\": \"CHILD.REVENUE_AMOUNT\",\n			\"displayName\": \"Actual Revenue ($)\",\n			\"filterType\": \"null\",\n			\"valueField\": \"null\",\n			\"index\": \"null\",\n			\"queryType\": \"null\",\n			\"summable\" : \"Y\",\n			\"innerJoin\" : \"Y\",\n			\"isCurrency\": \"true\"\n		}\n	],\n	\"extraCondition\" : \"(MASTER_DATA.LEAD_UNIT_NUMBER IN(SELECT DISTINCT UNIT_NUMBER FROM ACCESS_TMP) OR MASTER_DATA.AWARD_ID IN (SELECT AWARD_ID FROM AWARD_TEMP) OR MASTER_DATA.AWARD_ID IN (SELECT AWARD_ID FROM AWARD A1 INNER JOIN GRANT_CALL_HEADER A2 ON A2.GRANT_HEADER_ID = A1.GRANT_HEADER_ID INNER JOIN GRANTCALL_TEMP PR ON A2.HOME_UNIT_NUMBER = PR.UNIT_NUMBER)) ORDER BY CHILD.FM_POSTING_DATE DESC\",\n	\"extraSelection\" : \"\",\n	\"innerJoinPlaceHolder\" : \"<FILTER_CONDITION>\",\n	\"tempTable\":\"WITH ACCESS_TMP AS (SELECT UNIT_NUMBER FROM PERSON_ROLES T1 INNER JOIN ROLE_RIGHTS T2 ON T1.ROLE_ID = T2.ROLE_ID INNER JOIN RIGHTS T3 ON T2.RIGHT_ID = T3.RIGHT_ID  WHERE T1.DESCEND_FLAG = \'N\' AND T1.PERSON_ID = <<PERSON_ID>> AND RIGHT_NAME IN (\'VIEW_EXPENSE_TRANSACTION\') UNION SELECT CHILD_UNIT_NUMBER FROM UNIT_WITH_CHILDREN  WHERE UNIT_NUMBER IN (SELECT UNIT_NUMBER FROM PERSON_ROLES T1 INNER JOIN ROLE_RIGHTS T2 ON T1.ROLE_ID = T2.ROLE_ID INNER JOIN RIGHTS T3 ON T2.RIGHT_ID = T3.RIGHT_ID  WHERE T1.DESCEND_FLAG = \'Y\' AND T1.PERSON_ID = <<PERSON_ID>> AND RIGHT_NAME IN (\'VIEW_EXPENSE_TRANSACTION\'))), AWARD_TEMP AS (SELECT T1.AWARD_ID FROM AWARD_PERSON_ROLES T1 INNER JOIN ROLE_RIGHTS T2 ON T1.ROLE_ID = T2.ROLE_ID INNER JOIN RIGHTS T3 ON T2.RIGHT_ID = T3.RIGHT_ID WHERE T1.PERSON_ID =<<PERSON_ID>> AND T3.RIGHT_NAME IN (\'VIEW_EXPENSE_TRANSACTION\')), GRANTCALL_TEMP AS (SELECT UNIT_NUMBER FROM PERSON_ROLES T1 INNER JOIN ROLE_RIGHTS T2 ON T1.ROLE_ID = T2.ROLE_ID INNER JOIN RIGHTS T3 ON T2.RIGHT_ID = T3.RIGHT_ID WHERE T1.DESCEND_FLAG = \'N\' AND T1.PERSON_ID = <<PERSON_ID>> AND RIGHT_NAME IN (\'VIEW_AWARD\') AND T1.ROLE_ID=\'100\' UNION SELECT CHILD_UNIT_NUMBER FROM UNIT_WITH_CHILDREN WHERE UNIT_NUMBER IN (SELECT UNIT_NUMBER FROM PERSON_ROLES T1 INNER JOIN ROLE_RIGHTS T2 ON T1.ROLE_ID = T2.ROLE_ID INNER JOIN RIGHTS T3 ON T2.RIGHT_ID = T3.RIGHT_ID WHERE T1.DESCEND_FLAG = \'Y\' AND T1.PERSON_ID = <<PERSON_ID>> AND RIGHT_NAME IN (\'VIEW_AWARD\') AND T1.ROLE_ID=\'100\'))\"\n}\n', UPDATE_TIMESTAMP = UTC_TIMESTAMP(), UPDATE_USER = 'admin' WHERE (`TYPE_CODE` = '31');
