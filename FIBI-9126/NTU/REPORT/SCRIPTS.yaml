,\n			\"queryType\": \"IN\"\n		},\n		{\n			\"columnName\": \"master_data.AWARD_STATUS\",\n			\"displayName\": \"Award Status\",\n			\"filterType\": \"lookUp\",\n			\"valueField\": \"AWARD_STATUS#STATUS_CODE#true#true\",\n			\"index\": \"null\",\n			\"queryType\": \"IN\"\n		},\n		{\n			\"columnName\": \"master_data.AWARD_TYPE\",\n			\"displayName\": \"Award Type\",\n			\"filterType\": \"lookUp\",\n			\"valueField\": \"AWARD_TYPE#AWARD_TYPE_CODE#true#true\",\n			\"index\": \"null\",\n			\"queryType\": \"IN\"\n		},\n		{\n			\"columnName\": \"master_data.TITLE\",\n			\"displayName\": \"Title\",\n			\"filterType\": \"freetext\",\n			\"valueField\": \"title\",\n			\"index\": \"null\",\n			\"queryType\": \"LIKE\",\n			\"summable\" : \"N\"\n		},\n		{\n			\"columnName\": \"master_data.ACCOUNT_TYPE\",\n			\"displayName\": \"Account Type\",\n			\"filterType\": \"lookUp\",\n			\"valueField\": \"ACCOUNT_TYPE#ACCOUNT_TYPE_CODE#true#true\",\n			\"index\": \"null\",\n			\"queryType\": \"IN\",\n			\"summable\" : \"N\"\n		},\n		{\n			\"columnName\": \"master_data.ACTIVITY_TYPE\",\n			\"displayName\": \"Activity Type\",\n			\"filterType\": \"lookUp\",\n			\"valueField\": \"ACTIVITY_TYPE#ACTIVITY_TYPE_CODE#true#true\",\n			\"index\": \"null\",\n			\"queryType\": \"IN\",\n			\"summable\" : \"N\"\n		},\n		{\n			\"columnName\": \"master_data.GRANT_CALL_TITLE\",\n			\"displayName\": \"Grant Call Title\",\n			\"filterType\": \"endpoint\",\n			\"valueField\": \"grantCallName\",\n			\"index\": \"grantCallName\",\n			\"queryType\": \"IN\",\n			\"summable\" : \"N\"\n		},\n		{\n			\"columnName\": \"master_data.FUNDING_SCHEME\",\n			\"displayName\": \"Funding Scheme\",\n			\"filterType\": \"lookUp\",\n			\"valueField\": \"FUNDING_SCHEME#FUNDING_SCHEME_CODE#true#true\",\n			\"index\": \"null\",\n			\"queryType\": \"IN\",\n			\"summable\" : \"N\"\n		},\n		{\n			\"columnName\": \"master_data.DURATION\",\n			\"displayName\": \"Duration\",\n			\"filterType\": \"null\",\n			\"valueField\": \"null\",\n			\"index\": \"null\",\n			\"queryType\": \"null\",\n			\"summable\" : \"N\"\n		},\n		{\n			\"columnName\": \"master_data.AWARD_CREATE_TIMESTAMP\",\n			\"displayName\": \"Award Create Date\",\n			\"filterType\": \"null\",\n			\"valueField\": \"null\",\n			\"index\": \"null\",\n			\"queryType\": \"BETWEEN\",\n			\"summable\" : \"N\"\n		},\n		{\n			\"columnName\": \"master_data.ANTICIPATED_TOTAL_AMOUNT\",\n			\"displayName\": \"Anticipated Total Amount ($)\",\n			\"filterType\": \"null\",\n			\"valueField\": \"null\",\n			\"index\": \"null\",\n			\"queryType\": \"null\",\n			\"summable\" : \"N\",\n			\"isCurrency\": \"true\"\n		},\n		{\n			\"columnName\": \"master_data.AMOUNT_OBLIGATED_TO_DATE\",\n			\"displayName\": \"Amount Obligated To Date ($)\",\n			\"filterType\": \"null\",\n			\"valueField\": \"null\",\n			\"index\": \"null\",\n			\"queryType\": \"null\",\n			\"summable\" : \"N\",\n			\"isCurrency\": \"true\"\n		},\n		{\n			\"columnName\": \"master_data.GRANT_PER_MONTH\",\n			\"displayName\": \"Annualized Amount Per Month ($)\",\n			\"filterType\": \"null\",\n			\"valueField\": \"null\",\n			\"index\": \"null\",\n			\"queryType\": \"null\",\n			\"isCurrency\": \"true\"\n		},\n		{\n		    \"columnName\": \"master_data.ORIGINAL_APPROVED_BUDGET\",\n			\"displayName\": \"Original Approved Budget ($)\",\n			\"filterType\": \"null\",\n			\"valueField\": \"null\",\n			\"index\": \"null\",\n			\"queryType\": \"null\",\n			\"isCurrency\": \"true\"\n		},\n		{\n		    \"columnName\": \"master_data.LATEST_APPROVED_BUDGET\",\n			\"displayName\": \"Latest Approved Budget ($)\",\n			\"filterType\": \"null\",\n			\"valueField\": \"null\",\n			\"index\": \"null\",\n			\"queryType\": \"null\",\n			\"isCurrency\": \"true\"\n		},\n		{\n		    \"columnName\": \"master_data.CUMULATIVE_ACTUAL_EXPENSE\",\n			\"displayName\": \"Cumulative Actual Expense ($)\",\n			\"filterType\": \"null\",\n			\"valueField\": \"null\",\n			\"index\": \"null\",\n			\"queryType\": \"null\",\n			\"isCurrency\": \"true\"\n		},\n		{\n		    \"columnName\": \"master_data.CUMULATIVE_COMMITTED_EXPENSE\",\n			\"displayName\": \"Cumulative Committed Expense ($)\",\n			\"filterType\": \"null\",\n			\"valueField\": \"null\",\n			\"index\": \"null\",\n			\"queryType\": \"null\",\n			\"isCurrency\": \"true\"\n		},\n		{\n		    \"columnName\": \"CHILD.ANNUALIZED_EXPENSE_AMT\",\n			\"displayName\": \"Actual Expense Amt ($)\",\n			\"filterType\": \"null\",\n			\"valueField\": \"null\",\n			\"index\": \"null\",\n			\"queryType\": \"null\",\n			\"isCurrency\": \"true\"\n		},\n		{\n		    \"columnName\": \"CHILD.ANNUALIZED_EXPENSE_AMT_WO_IRC\",\n			\"displayName\": \"Actual Expense Amt Wo IRC ($)\",\n			\"filterType\": \"null\",\n			\"valueField\": \"null\",\n			\"index\": \"null\",\n			\"queryType\": \"null\",\n			\"isCurrency\": \"true\"\n		},\n		{\n		    \"columnName\": \"master_data.SPONSOR_CODE\",\n			\"displayName\": \"Sponsor Code\",\n			\"filterType\": \"null\",\n			\"valueField\": \"null\",\n			\"index\": \"null\",\n			\"queryType\": \"null\"\n		},\n		{\n		    \"columnName\": \"master_data.SPONSOR_NAME\",\n			\"displayName\": \"Sponsor Name\",\n			\"filterType\": \"endpoint\",\n			\"valueField\": \"sponsorName\",\n			\"index\": \"sponsorName\",\n			\"queryType\": \"IN\",\n			\"summable\" : \"N\"\n		},\n		{\n		    \"columnName\": \"master_data.AWARD_SEQUENCE_STATUS\",\n			\"displayName\": \"Award Sequence Status\",\n			\"filterType\": \"null\",\n			\"valueField\": \"null\",\n			\"index\": \"null\",\n			\"queryType\": \"null\"\n		},\n		{\n		    \"columnName\": \"master_data.KEY_PERSON_EMAIL\",\n			\"displayName\": \"PI Email\",\n			\"filterType\": \"null\",\n			\"valueField\": \"null\",\n			\"index\": \"null\",\n			\"queryType\": \"null\"\n		},\n		{\n		    \"columnName\": \"master_data.NUM_OF_MONTHS\",\n			\"displayName\": \"Number Of Months\",\n			\"filterType\": \"null\",\n			\"valueField\": \"null\",\n			\"index\": \"null\",\n			\"queryType\": \"null\"\n		}\n	],\n	\"extraCondition\" : \"(master_data.LEAD_UNIT_NUMBER IN(SELECT DISTINCT UNIT_NUMBER FROM ACCESS_TMP) OR AWARD_ID IN (SELECT AWARD_ID FROM AWARD A1 INNER JOIN GRANT_CALL_HEADER A2 ON A2.GRANT_HEADER_ID = A1.GRANT_HEADER_ID INNER JOIN GRANTCALL_TEMP PR ON A2.HOME_UNIT_NUMBER = PR.UNIT_NUMBER)) and master_data.PERSON_ROLE_ID = 3\",\n	\"extraSelection\" : \"\",\n	\"innerJoinPlaceHolder\" : \"<FILTER_CONDITION>\",\n	\"selectDistinct\" :\"Y\",\n	\"tempTable\":\"WITH ACCESS_TMP  AS (SELECT UNIT_NUMBER FROM PERSON_ROLES T1 INNER JOIN ROLE_RIGHTS T2 ON T1.ROLE_ID = T2.ROLE_ID INNER JOIN RIGHTS T3 ON T2.RIGHT_ID = T3.RIGHT_ID  WHERE T1.DESCEND_FLAG = \'N\' AND T1.PERSON_ID = <<PERSON_ID>> AND RIGHT_NAME IN (\'VIEW_AWARD\', \'CREATE _AWARD\', \'MODIFY_AWARD\') UNION SELECT CHILD_UNIT_NUMBER FROM UNIT_WITH_CHILDREN  WHERE UNIT_NUMBER IN ( SELECT UNIT_NUMBER FROM PERSON_ROLES T1 INNER JOIN ROLE_RIGHTS T2 ON T1.ROLE_ID = T2.ROLE_ID INNER JOIN RIGHTS T3 ON T2.RIGHT_ID = T3.RIGHT_ID  WHERE T1.DESCEND_FLAG = \'Y\' AND T1.PERSON_ID = <<PERSON_ID>> AND RIGHT_NAME IN (\'VIEW_AWARD\', \'CREATE _AWARD\', \'MODIFY_AWARD\'))), GRANTCALL_TEMP AS (SELECT UNIT_NUMBER FROM PERSON_ROLES T1 INNER JOIN ROLE_RIGHTS T2 ON T1.ROLE_ID = T2.ROLE_ID INNER JOIN RIGHTS T3 ON T2.RIGHT_ID = T3.RIGHT_ID WHERE T1.DESCEND_FLAG = \'N\' AND T1.PERSON_ID = <<PERSON_ID>> AND RIGHT_NAME IN (\'VIEW_AWARD\') AND T1.ROLE_ID=\'100\' UNION SELECT CHILD_UNIT_NUMBER FROM UNIT_WITH_CHILDREN WHERE UNIT_NUMBER IN (SELECT UNIT_NUMBER FROM PERSON_ROLES T1 INNER JOIN ROLE_RIGHTS T2 ON T1.ROLE_ID = T2.ROLE_ID INNER JOIN RIGHTS T3 ON T2.RIGHT_ID = T3.RIGHT_ID WHERE T1.DESCEND_FLAG = \'Y\' AND T1.PERSON_ID = <<PERSON_ID>> AND RIGHT_NAME IN (\'VIEW_AWARD\') AND T1.ROLE_ID=\'100\'))\"\n}\n' ,UPDATE_TIMESTAMP = UTC_TIMESTAMP(), UPDATE_USER = 'admin'  WHERE (`TYPE_CODE` = '91');
