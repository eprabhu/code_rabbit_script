"\n		},\n		{\n			\"columnName\": \"MASTER_DATA.PRIME_SPONSOR_NAME\",\n			\"displayName\": \"Prime Sponsor\",\n			\"filterType\": \"endpoint\",\n			\"valueField\": \"sponsorName\",\n			\"index\": \"sponsorName\",\n			\"queryType\": \"IN\",\n			\"summable\" : \"N\",\n			\"innerJoin\" : \"N\"\n		},\n		{\n			\"columnName\": \"MASTER_DATA.UNIT_NAME\",\n			\"displayName\": \"Lead Unit\",\n			\"filterType\": \"endpoint\",\n			\"valueField\": \"unitName\",\n			\"index\": \"unitName\",\n			\"queryType\": \"IN\",\n			\"summable\" : \"N\",\n			\"innerJoin\" : \"N\"\n		},\n		{\n			\"columnName\": \"MASTER_DATA.SUB_LEAD_UNIT\",\n			\"displayName\": \"Sub Lead Unit\",\n			\"filterType\": \"endpoint\",\n			\"valueField\": \"unitName\",\n			\"index\": \"unitName\",\n			\"queryType\": \"IN\",\n			\"summable\" : \"N\",\n			\"innerJoin\" : \"N\"\n		},\n		{\n			\"columnName\": \"MASTER_DATA.PI_NAME\",\n			\"displayName\": \"Lead Principal Investigator\",\n			\"filterType\": \"elastic\",\n			\"valueField\": \"full_name\",\n			\"index\": \"fibiperson\",\n			\"queryType\": \"IN\",\n			\"summable\" : \"N\",\n			\"innerJoin\" : \"N\"\n		},\n		{\n			\"columnName\": \"MASTER_DATA.ANTICIPATED_TOTAL_AMOUNT\",\n			\"displayName\": \"Award/Anticipated Total ($)\",\n			\"filterType\": \"null\",\n			\"valueField\": \"null\",\n			\"index\": \"null\",\n			\"queryType\": \"null\",\n			\"summable\" : \"N\",\n			\"innerJoin\" : \"N\",\n			\"isCurrency\": \"true\"\n		},\n		{\n			\"columnName\": \"MASTER_DATA.AMOUNT_OBLIGATED_TO_DATE\",\n			\"displayName\": \"Disbursed/Obligated Total ($)\",\n			\"filterType\": \"null\",\n			\"valueField\": \"null\",\n			\"index\": \"null\",\n			\"queryType\": \"null\",\n			\"summable\" : \"N\",\n			\"innerJoin\" : \"N\",\n			\"isCurrency\": \"true\"\n		},\n		{\n			\"columnName\": \"MASTER_DATA.TOTAL_COST_IN_CURRENCY\",\n			\"displayName\": \"Total Project Cost(In Foreign Currency)\",\n			\"filterType\": \"null\",\n			\"valueField\": \"null\",\n			\"index\": \"null\",\n		