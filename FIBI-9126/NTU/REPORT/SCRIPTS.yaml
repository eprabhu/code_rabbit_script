"PO Date\",\n			\"filterType\": \"date\",\n			\"valueField\": \"null\",\n			\"index\": \"null\",\n			\"queryType\": \"BETWEEN\",\n			\"summable\" : \"N\",\n			\"innerJoin\" : \"N\"\n		},\n		{\n			\"columnName\": \"MASTER_DATA.F_AND_A_RATE_TYPE\",\n            \"displayName\": \"Indirect cost(%)\",\n            \"index\": \"null\",\n            \"filterType\": \"lookUp\",\n            \"valueField\": \"RATE_TYPE#RATE_CLASS_CODE#true#true\",\n            \"summable\": \"N\",\n            \"queryType\": \"IN\"\n         },\n         {\n			\"columnName\": \"MASTER_DATA.AWARD_STATUS\",\n			\"displayName\": \"Award Status\",\n			\"filterType\": \"lookUp\",\n			\"valueField\": \"AWARD_STATUS#STATUS_CODE#true#true\",\n			\"index\": \"null\",\n			\"queryType\": \"IN\",\n			\"summable\" : \"N\"\n		}\n	],\n	\"extraCondition\" : \"(MASTER_DATA.LEAD_UNIT_NUMBER IN(SELECT DISTINCT UNIT_NUMBER FROM ACCESS_TMP) OR MASTER_DATA.AWARD_ID IN (SELECT AWARD_ID FROM AWARD_TEMP) OR (MASTER_DATA.AWARD_ID IN (SELECT AWARD_ID FROM AWARD A1 INNER JOIN GRANT_CALL_HEADER A2 ON A2.GRANT_HEADER_ID = A1.GRANT_HEADER_ID INNER JOIN GRANTCALL_TEMP PR ON A2.HOME_UNIT_NUMBER = PR.UNIT_NUMBER))) ORDER BY MASTER_DATA.AWARD_NUMBER,CHILD.IO_CODE,CHILD.FM_POSTING_DATE ASC,CHILD.DOCUMENT_NUMBER ASC\",\n	\"extraSelection\" : \"\",\n	\"innerJoinPlaceHolder\" : \"<FILTER_CONDITION>\",\n	\"tempTable\":\"WITH ACCESS_TMP AS (SELECT UNIT_NUMBER FROM PERSON_ROLES T1 INNER JOIN ROLE_RIGHTS T2 ON T1.ROLE_ID = T2.ROLE_ID INNER JOIN RIGHTS T3 ON T2.RIGHT_ID = T3.RIGHT_ID  WHERE T1.DESCEND_FLAG = \'N\' AND T1.PERSON_ID = <<PERSON_ID>> AND RIGHT_NAME IN (\'VIEW_EXPENSE_TRANSACTION\') UNION SELECT CHILD_UNIT_NUMBER FROM UNIT_WITH_CHILDREN  WHERE UNIT_NUMBER IN (SELECT UNIT_NUMBER FROM PERSON_ROLES T1 INNER JOIN ROLE_RIGHTS T2 ON T1.ROLE_ID = T2.ROLE_ID INNER JOIN RIGHTS T3 ON T2.RIGHT_ID = T3.RIGHT_ID  WHERE T1.DESCEND_FLAG = \'Y\' AND T1.PERSON_ID = <<PERSON_ID>> AND RIGHT_NAME IN (\'VIEW_EXPENSE_TRANSACTION\'))), AWARD_TEMP AS (SELECT T1.AWARD_ID FROM AWARD_PERSON_ROLES T1 INNER JOIN ROLE_RIGHTS T2 ON T1.ROLE_ID = T2.ROLE_ID INNER JOIN RIGHTS T3 ON T2.RIGHT_ID = T3.RIGHT_ID WHERE T1.PERSON_ID =<<PERSON_ID>> AND T3.RIGHT_NAME IN (\'VIEW_EXPENSE_TRANSACTION\')), GRANTCALL_TEMP AS (SELECT UNIT_NUMBER FROM PERSON_ROLES T1 INNER JOIN ROLE_RIGHTS T2 ON T1.ROLE_ID = T2.ROLE_ID INNER JOIN RIGHTS T3 ON T2.RIGHT_ID = T3.RIGHT_ID WHERE T1.DESCEND_FLAG = \'N\' AND T1.PERSON_ID = <<PERSON_ID>> AND RIGHT_NAME IN (\'VIEW_AWARD\') AND T1.ROLE_ID=\'100\' UNION SELECT CHILD_UNIT_NUMBER FROM UNIT_WITH_CHILDREN WHERE UNIT_NUMBER IN (SELECT UNIT_NUMBER FROM PERSON_ROLES T1 INNER JOIN ROLE_RIGHTS T2 ON T1.ROLE_ID = T2.ROLE_ID INNER JOIN RIGHTS T3 ON T2.RIGHT_ID = T3.RIGHT_ID WHERE T1.DESCEND_FLAG = \'Y\' AND T1.PERSON_ID = <<PERSON_ID>> AND RIGHT_NAME IN (\'VIEW_AWARD\') AND T1.ROLE_ID=\'100\'))\"\n}\n', UPDATE_TIMESTAMP = UTC_TIMESTAMP(), UPDATE_USER = 'admin' WHERE (`TYPE_CODE` = '8');
