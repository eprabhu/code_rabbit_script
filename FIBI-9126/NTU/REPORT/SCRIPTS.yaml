           \"displayName\": \"Date Provided to Last Accountable Party\",\n            \"filterType\": \"date\",\n            \"valueField\": \"null\",\n            \"index\": \"null\",\n            \"queryType\": \"BETWEEN\",\n            \"width\":5800\n        },\n        {\n            \"columnName\": \"AGREEMENT_TYPE\",\n            \"displayName\": \"Type of Agreement\",\n            \"filterType\": \"lookUp\",\n            \"valueField\": \"AGREEMENT_TYPE#AGREEMENT_TYPE_CODE#true#true\",\n            \"index\": \"null\",\n            \"queryType\": \"IN\",\n            \"width\":7000\n        },\n        {\n            \"columnName\": \"CATEGORY\",\n            \"displayName\": \"Agreement Category\",\n            \"filterType\": \"lookUp\",\n            \"valueField\": \"AGREEMENT_CATEGORY#CATEGORY_CODE#true#true\",\n            \"index\": \"null\",\n            \"queryType\": \"IN\",\n            \"width\":7000\n        },      \n        {\n            \"columnName\": \"CONTRACT_VALUE\",\n            \"displayName\": \"Total Amount\",\n            \"filterType\": \"null\",\n            \"valueField\": \"null\",\n            \"index\": \"null\",\n            \"queryType\": \"null\" ,\n            \"width\":5800\n        },\n        {\n            \"columnName\": \"AMOUNT_IN_WORDS\",\n            \"displayName\": \"Amount in Words\",\n            \"filterType\": \"null\",\n            \"valueField\": \"null\",\n            \"index\": \"null\",\n            \"queryType\": \"null\",\n            \"width\":7000\n        },\n        {\n            \"columnName\": \"TRANSACTION_TYPE\",\n            \"displayName\": \"Transaction Type\",\n            \"filterType\": \"null\",\n            \"valueField\": \"null\",\n            \"index\": \"null\",\n            \"queryType\": \"null\",\n            \"width\":7000\n        },\n        {\n            \"columnName\": \"AGREEMENT_SPONSOR_TYPE\",\n            \"displayName\": \"Sponsor Type\",\n            \"filterType\": \"null\",\n            \"valueField\": \"null\",\n            \"index\": \"null\",\n            \"queryType\": \"null\",\n            \"width\":7000\n        },\n        {\n            \"columnName\": \"UNIT_NAME\",\n            \"displayName\": \"Lead Unit\",\n            \"filterType\": \"endpoint\",\n            \"valueField\": \"unitName\",\n            \"index\": \"unitName\",\n            \"queryType\": \"IN\",\n            \"width\":11000\n        },\n        {\n            \"columnName\": \"SPONSOR_NAME\",\n            \"displayName\": \"Sponsor / Partner Name\",\n            \"filterType\": \"freetext\",\n            \"valueField\": \"Organization\",\n            \"index\": \"null\",\n            \"queryType\": \"LIKE\",\n             \"width\":11000\n        },\n        {\n            \"columnName\": \"SPONSOR_ROLE_TYPE\",\n            \"displayName\": \"Sponsor Role\",\n            \"filterType\": \"null\",\n            \"valueField\": \"null\",\n            \"index\": \"null\",\n            \"queryType\": \"null\",\n             \"width\":7000\n        },\n        {\n            \"columnName\": \"AGREEMENT_STATUS\",\n            \"displayName\": \"Agreement Status\",\n            \"filterType\": \"lookUp\",\n            \"valueField\": \"AGREEMENT_STATUS#AGREEMENT_STATUS_CODE#true#true\",\n            \"index\": \"null\",\n            \"queryType\": \"IN\",\n             \"width\":7000\n        },\n        {\n            \"columnName\": \"PI_PERSON_FULL_NAME\",\n            \"displayName\": \"Lead\",\n            \"filterType\": \"elastic\",\n            \"valueField\": \"full_name\",\n            \"index\": \"fibiperson\",\n            \"queryType\": \"IN\",\n            \"width\":11000\n        },\n        {\n            \"columnName\": \"REQUESTOR_NAME\",\n            \"displayName\": \"Requestor\",\n            \"filterType\": \"elastic\",\n            \"valueField\": \"full_name\",\n            \"index\": \"fibiperson\",\n            \"queryType\": \"IN\",\n             \"width\":11000\n        },\n        {\n            \"columnName\": \"REVIEW_STATUS\",\n            \"displayName\": \"Review Status\",\n            \"filterType\": \"lookUp\",\n            \"valueField\": \"AGREEMENT_WORKFLOW_STATUS#WORKFLOW_STATUS_CODE#true#true\",\n            \"index\": \"null\",\n            \"queryType\": \"LIKE\",\n             \"width\":7000\n        },\n        {\n            \"columnName\": \"DESCRIPTION\",\n            \"displayName\": \"Description\",\n            \"filterType\": \"null\",\n            \"valueField\": \"null\",\n            \"index\": \"null\",\n            \"queryType\": \"null\",\n             \"width\":18000\n        },\n        {\n            \"columnName\": \"IO_FUNDING\",\n            \"displayName\": \"Incoming or Outgoing Funding\",\n            \"filterType\": \"null\",\n            \"valueField\": \"null\",\n            \"index\": \"null\",\n            \"queryType\": \"null\",\n            \"width\":5800\n        },\n        {\n            \"columnName\": \"COMMENT\",\n            \"displayName\": \"Status Comments\",\n            \"filterType\": \"null\",\n            \"valueField\": \"null\",\n            \"index\": \"null\",\n            \"queryType\": \"null\",\n             \"width\":18000\n        },\n        {\n            \"columnName\": \"LOCATION\",\n            \"displayName\": \"Last Accountable Party\",\n            \"filterType\": \"null\",\n            \"valueField\": \"null\",\n            \"index\": \"null\",\n            \"queryType\": \"null\",\n             \"width\":7000\n        },\n        {\n            \"columnName\": \"DAYS_IN_LOCATION\",\n            \"displayName\": \"Days with Last Party\",\n            \"filterType\": \"null\",\n            \"valueField\": \"null\",\n            \"index\": \"null\",\n            \"queryType\": \"null\",\n            \"width\":4600\n        },\n        {\n            \"columnName\": \"TOTAL_DAYS\",\n            \"displayName\": \"Total Days Aging\",\n            \"filterType\": \"null\",\n            \"valueField\": \"null\",\n            \"index\": \"null\",\n            \"queryType\": \"null\",\n             \"width\":4600\n        },\n        {\n            \"columnName\": \"PROPOSAL_STATUS\",\n            \"displayName\": \"Proposal Status\",\n            \"filterType\": \"null\",\n            \"valueField\": \"null\",\n            \"index\": \"null\",\n            \"queryType\": \"null\",\n            \"width\":7000\n        },\n        {\n            \"columnName\": \"RECOMMENDATION\",\n            \"displayName\": \"Recommendation\",\n            \"filterType\": \"null\",\n            \"valueField\": \"null\",\n            \"index\": \"null\",\n            \"queryType\": \"null\",\n            \"width\":11000\n        },\n        {\n            \"columnName\": \"CURRENCY_CODE\",\n            \"displayName\": \"Currency Code\",\n            \"filterType\": \"null\",\n            \"valueField\": \"null\",\n            \"index\": \"null\",\n            \"queryType\": \"null\",\n            \"width\":4600\n        }     \n	],\n	\"extraCondition\" : \"(UNIT_NUMBER IN(SELECT UNIT_NUMBER FROM ACCESS_TMP) OR UNIT_NUMBER is null) AND AGREEMENT_SEQUENCE_STATUS <> \'TEMPLATE\'\",\n	\"extraSelection\" : \",AGREEMENT_REQUEST_ID AS ID, UNIT_NUMBER\",\n	\"selectDistinct\" : \"Y\",\n	\"tempTable\":\"WITH ACCESS_TMP  AS (SELECT UNIT_NUMBER FROM PERSON_ROLES T1 INNER JOIN ROLE_RIGHTS T2 ON T1.ROLE_ID = T2.ROLE_ID INNER JOIN RIGHTS T3 ON T2.RIGHT_ID = T3.RIGHT_ID  WHERE T1.DESCEND_FLAG = \'N\' AND T1.PERSON_ID = <<PERSON_ID>> AND RIGHT_NAME IN (\'AGREEMENT_ADMINISTRATOR\') UNION SELECT CHILD_UNIT_NUMBER FROM UNIT_WITH_CHILDREN  WHERE UNIT_NUMBER IN ( SELECT UNIT_NUMBER FROM PERSON_ROLES T1 INNER JOIN ROLE_RIGHTS T2 ON T1.ROLE_ID = T2.ROLE_ID INNER JOIN RIGHTS T3 ON T2.RIGHT_ID = T3.RIGHT_ID  WHERE T1.DESCEND_FLAG = \'Y\' AND T1.PERSON_ID = <<PERSON_ID>> AND RIGHT_NAME IN (\'AGREEMENT_ADMINISTRATOR\')))\"\n}\n', UPDATE_TIMESTAMP = UTC_TIMESTAMP(), UPDATE_USER = 'admin' WHERE (`TYPE_CODE` = '150');
