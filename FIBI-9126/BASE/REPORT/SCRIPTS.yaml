                    sql: |
                         UPDATE `REPORT_TYPE` SET `CONFIG_METADATA` = '{\n	\"reports\": [\n		{\n			\"columnName\": \"TASK_DATA.TASK_ASIGNEE_PERSON\",\n			\"displayName\": \"Assignee\",\n			\"filterType\": \"elastic\",\n			\"valueField\": \"full_name\",\n			\"index\": \"fibiperson\",\n			\"queryType\": \"IN\",\n			\"summable\": \"N\"\n		},\n		{\n			\"columnName\": \"AWARD_MASTER_DATA.UNIT_NAME\",\n			\"displayName\": \"Award Lead Unit\",\n			\"filterType\": \"endpoint\",\n			\"valueField\": \"unitName\",\n			\"index\": \"unitName\",\n			\"queryType\": \"IN\",\n			\"summable\": \"N\"\n		},\n		{\n			\"columnName\": \"AWARD_MASTER_DATA.PI_NAME\",\n			\"displayName\": \"Principal Investigator\",\n			\"filterType\": \"elastic\",\n			\"valueField\": \"full_name\",\n			\"index\": \"fibiperson\",\n			\"queryType\": \"IN\",\n			\"summable\": \"N\"\n		},\n		{\n			\"columnName\": \"AWARD_MASTER_DATA.AWARD_NUMBER\",\n			\"displayName\": \"Award Number\",\n			\"filterType\": \"elastic\",\n			\"valueField\": \"award_number\",\n			\"index\": \"awardfibi\",\n			\"queryType\": \"IN\",\n			\"summable\": \"N\"\n		},\n		{\n			\"columnName\": \"AWARD_MASTER_DATA.BEGIN_DATE\",\n			\"displayName\": \"Award Start Date\",\n			\"filterType\": \"date\",\n			\"valueField\": \"null\",\n			\"index\": \"null\",\n			\"queryType\": \"BETWEEN\",\n			\"summable\": \"N\"\n		},\n		{\n			\"columnName\": \"AWARD_MASTER_DATA.FINAL_EXPIRATION_DATE\",\n			\"displayName\": \"Award End Date\",\n			\"filterType\": \"date\",\n			\"valueField\": \"null\",\n			\"index\": \"null\",\n			\"queryType\": \"BETWEEN\",\n			\"summable\": \"N\"\n		},\n		{\n			\"columnName\": \"AWARD_MASTER_DATA.AWARD_EFFECTIVE_DATE\",\n			\"displayName\": \"Award Effective Date\",\n			\"filterType\": \"date\",\n			\"valueField\": \"null\",\n			\"index\": \"null\",\n			\"queryType\": \"BETWEEN\",\n			\"summable\": \"N\"\n		},\n		{\n			\"columnName\": \"TASK_DATA.DUE_DAYS_PASSED_DIFF\",\n			\"displayName\": \"# of Days Outstanding\",\n			\"filterType\": \"freetext\",\n			\"valueField\": \"null\",\n			\"index\": \"null\",\n			\"queryType\": \"IN\",\n			\"summable\" : \"N\"\n		},\n		{\n			\"columnName\": \"TASK_DATA.TASK_STATUS\",\n			\"displayName\": \"Task Status\",\n			\"filterType\": \"lookUp\",\n			\"valueField\": \"TASK_STATUS#TASK_STATUS_CODE#true#true\",\n			\"index\": \"null\",\n			\"queryType\": \"IN\",\n			\"summable\": \"N\"\n		},\n		{\n			\"columnName\": \"TASK_DATA.TASK_TYPE\",\n			\"displayName\": \"Task Type\",\n			\"filterType\": \"lookUp\",\n			\"valueField\": \"Task_TYPE#TASK_TYPE_CODE#true#true\",\n			\"index\": \"null\",\n			\"queryType\": \"IN\",\n			\"summable\": \"N\"\n		},\n		{\n			\"columnName\": \"AWARD_MASTER_DATA.SPONSOR_NAME\",\n			\"displayName\": \"Sponsor\",\n			\"filterType\": \"endpoint\",\n			\"valueField\": \"sponsorName\",\n			\"index\": \"sponsorName\",\n			\"queryType\": \"IN\",\n			\"summable\": \"N\"\n		},\n		{\n			\"columnName\": \"AWARD_MASTER_DATA.AWARD_STATUS\",\n			\"displayName\": \"Award Status\",\n			\"filterType\": \"lookUp\",\n			\"valueField\": \"AWARD_STATUS#STATUS_CODE#true#true\",\n			\"index\": \"null\",\n			\"queryType\": \"IN\",\n			\"summable\": \"N\"\n		},\n		{\n			\"columnName\": \"AWARD_MASTER_DATA.TITLE\",\n			\"displayName\": \"Award Title\",\n			\"filterType\": \"freetext\",\n			\"valueField\": \"title\",\n			\"index\": \"null\",\n			\"queryType\": \"LIKE\",\n			\"summable\": \"N\",\n			\"width\": 18000\n		},\n		{\n			\"columnName\": \"TASK_DATA.TASK_ASSIGNED_DATE\",\n			\"displayName\": \"Date Assigned\",\n			\"filterType\": \"date\",\n			\"valueField\": \"null\",\n			\"index\": \"null\",\n			\"queryType\": \"BETWEEN\",\n			\"summable\": \"N\"\n		},\n		{\n			\"columnName\": \"TASK_DATA.DAYS_LEFT_FOR_DUE_DATE\",\n			\"displayName\": \"# of Days to due date\",\n			\"filterType\": \"freetext\",\n			\"valueField\": \"null\",\n			\"index\": \"null\",\n			\"queryType\": \"IN\",\n			\"summable\": \"N\"\n		},\n		{\n			\"columnName\": \"TASK_DATA.TASK_DUE_DATE\",\n			\"displayName\": \"# Task Due Date\",\n			\"filterType\": \"date\",\n			\"valueField\": \"null\",\n			\"index\": \"null\",\n			\"queryType\": \"BETWEEN\",\n			\"summable\": \"N\"\n		}\n	],\n	\"extraCondition\": \"(AWARD_MASTER_DATA.AWARD_ID IN (SELECT AWARD_ID FROM AWARD_TEMP) OR LEAD_UNIT_NUMBER IN(SELECT DISTINCT UNIT_NUMBER FROM ACCESS_TMP))\",\n	\"extraSelection\": \"\",\n	\"tempTable\": \"WITH ACCESS_TMP AS (SELECT UNIT_NUMBER FROM PERSON_ROLES T1 INNER JOIN ROLE_RIGHTS T2 ON T1.ROLE_ID = T2.ROLE_ID INNER JOIN RIGHTS T3 ON T2.RIGHT_ID = T3.RIGHT_ID  WHERE T1.DESCEND_FLAG = \'N\' AND T1.PERSON_ID = <<PERSON_ID>> AND RIGHT_NAME IN (\'VIEW_AWARD\', \'CREATE _AWARD\', \'MODIFY_AWARD\') UNION SELECT CHILD_UNIT_NUMBER FROM UNIT_WITH_CHILDREN  WHERE UNIT_NUMBER IN ( SELECT UNIT_NUMBER FROM PERSON_ROLES T1 INNER JOIN ROLE_RIGHTS T2 ON T1.ROLE_ID = T2.ROLE_ID INNER JOIN RIGHTS T3 ON T2.RIGHT_ID = T3.RIGHT_ID  WHERE T1.DESCEND_FLAG = \'Y\' AND T1.PERSON_ID = <<PERSON_ID>> AND RIGHT_NAME IN (\'VIEW_AWARD\', \'CREATE _AWARD\', \'MODIFY_AWARD\'))), AWARD_TEMP AS (SELECT AWARD_ID FROM AWARD_PERSON_ROLES WHERE PERSON_ID=<<PERSON_ID>>)\"\n}\n', UPDATE_TIMESTAMP = UTC_TIMESTAMP(), UPDATE_USER = 'admin' WHERE (`TYPE_CODE` = '142');
          rollback: empty

