},\n		{\n			\"columnName\": \"SPONSOR\",\n			\"displayName\": \"Sponsor/Funding Agency\",\n			\"filterType\": \"endpoint\",\n			\"valueField\": \"sponsorName\",\n			\"index\": \"sponsorName\",\n			\"queryType\": \"IN\",\n			\"summable\" : \"N\"\n		},\n		{\n			\"columnName\": \"SPONSOR_TYPE\",\n			\"displayName\": \"Type of Sponsor/Funding Agency\",\n			\"filterType\": \"lookUp\",\n			\"valueField\": \"SPONSOR_TYPE#SPONSOR_TYPE_CODE#true#true\",\n			\"index\": \"null\",\n			\"queryType\": \"IN\",\n			\"summable\" : \"N\"\n		},\n		{\n			\"columnName\": \"FUNDING_SCHEME\",\n			\"displayName\": \"Funding Scheme\",\n			\"filterType\": \"lookUp\",\n			\"valueField\": \"FUNDING_SCHEME#FUNDING_SCHEME_CODE#true#true\",\n			\"index\": \"null\",\n			\"queryType\": \"IN\",\n			\"summable\" : \"N\"\n		},\n		{\n			\"columnName\": \"RELEVANT_FIELD\",\n			\"displayName\": \"Relevant Field\",\n			\"filterType\": \"lookUp\",\n			\"valueField\": \"RELEVANT_FIELD#RELEVANT_FIELD_CODE#true#true\",\n			\"index\": \"null\",\n			\"queryType\": \"IN\",\n			\"summable\" : \"N\"\n		}\n	],\n	\"extraCondition\" : \"1=1\",\n	\"extraSelection\" : \"\",\n	\"selectDistinct\" :\"Y\"\n}\n', UPDATE_TIMESTAMP = UTC_TIMESTAMP(), UPDATE_USER = 'admin' WHERE (`TYPE_CODE` = '17');
