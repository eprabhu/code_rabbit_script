mnName\": \"MASTER.AWARD_TYPE\",\n			\"displayName\": \"Award Type\",\n			\"filterType\": \"lookUp\",\n			\"valueField\": \"AWARD_TYPE#AWARD_TYPE_CODE#true#true\",\n			\"index\": \"null\",\n			\"queryType\": \"IN\",\n			\"summable\" : \"N\"\n		},\n		{\n			\"columnName\": \"MASTER.ACCOUNT_TYPE\",\n			\"displayName\": \"Account Type\",\n			\"filterType\": \"lookUp\",\n			\"valueField\": \"ACCOUNT_TYPE#ACCOUNT_TYPE_CODE#true#true\",\n			\"index\": \"null\",\n			\"queryType\": \"IN\",\n			\"summable\" : \"N\"\n		},\n		{\n			\"columnName\": \"MASTER.ACTIVITY_TYPE\",\n			\"displayName\": \"Activity Type\",\n			\"filterType\": \"lookUp\",\n			\"valueField\": \"ACTIVITY_TYPE#ACTIVITY_TYPE_CODE#true#true\",\n			\"index\": \"null\",\n			\"queryType\": \"IN\",\n			\"summable\" : \"N\"\n		},\n		{\n			\"columnName\": \"MASTER.GRANT_CALL_TITLE\",\n			\"displayName\": \"Grant Call Title\",\n			\"filterType\": \"endpoint\",\n			\"valueField\": \"grantCallName\",\n			\"index\": \"grantCallName\",\n			\"queryType\": \"IN\",\n			\"summable\" : \"N\"\n		},\n		{\n			\"columnName\": \"MASTER.FUNDING_SCHEME\",\n			\"displayName\": \"Grant Scheme\",\n			\"filterType\": \"lookUp\",\n			\"valueField\": \"FUNDING_SCHEME#FUNDING_SCHEME_CODE#true#true\",\n			\"index\": \"null\",\n			\"queryType\": \"IN\",\n			\"summable\" : \"N\"\n		},\n		{\n			\"columnName\": \"MASTER.TITLE\",\n			\"displayName\": \"Award Title\",\n			\"filterType\": \"freetext\",\n			\"valueField\": \"title\",\n			\"index\": \"null\",\n			\"queryType\": \"LIKE\",\n			\"summable\" : \"N\"\n		},\n		{\n			\"columnName\": \"MASTER.BEGIN_DATE\",\n			\"displayName\": \"Start Date\",\n			\"filterType\": \"date\",\n			\"valueField\": \"null\",\n			\"index\": \"null\",\n			\"queryType\": \"BETWEEN\",\n			\"summable\" : \"N\"\n		},\n		{\n			\"columnName\": \"MASTER.FINAL_EXPIRATION_DATE\",\n			\"displayName\": \"End Date\",\n			\"filterType\": \"date\",\n			\"valueField\": \"null\",\n			\"index\": \"null\",\n			\"queryType\": \"BETWEEN\",\n			\"summable\" : \"N\"\n		},\n		{\n			\"columnName\": \"MASTER.DURATION\",\n			\"displayName\": \"Project Duration\",\n			\"filterType\": \"null\",\n			\"valueField\": \"null\",\n			\"index\": \"null\",\n			\"queryType\": \"null\",\n			\"summable\" : \"N\"\n		},\n		{\n			\"columnName\": \"MASTER.SPONSOR_NAME\",\n			\"displayName\": \"Sponsor\",\n			\"filterType\": \"endpoint\",\n			\"valueField\": \"sponsorName\",\n			\"index\": \"sponsorName\",\n			\"queryType\": \"IN\",\n			\"summable\" : \"N\"\n		},\n		{\n			\"columnName\": \"MASTER.SPONSOR_TYPE\",\n			\"displayName\": \"Sponsor Type\",\n			\"filterType\": \"lookUp\",\n			\"valueField\": \"SPONSOR_TYPE#SPONSOR_TYPE_CODE#true#true\",\n			\"index\": \"null\",\n			\"queryType\": \"IN\",\n			\"summable\" : \"N\"\n		},\n		{\n			\"columnName\": \"MASTER.PRIME_SPONSOR_NAME\",\n			\"displayName\": \"Prime Sponsor\",\n			\"filterType\": \"endpoint\",\n			\"valueField\": \"sponsorName\",\n			\"index\": \"sponsorName\",\n			\"queryType\": \"IN\",\n			\"summable\" : \"N\"\n		},\n		{\n			\"columnName\": \"MASTER.LEAD_UNIT\",\n			\"displayName\": \"Lead Unit\",\n			\"filterType\": \"endpoint\",\n			\"valueField\": \"unitName\",\n			\"index\": \"unitName\",\n			\"queryType\": \"IN\",\n			\"summable\" : \"N\"\n		},\n		{\n			\"columnName\": \"MASTER.PI_NAME\",\n			\"displayName\": \"Lead Principal Investigator\",\n			\"filterType\": \"elasticComposite\",\n			\"valueField\": \"full_name\",\n			\"index\": \"IS_PI_EMPLOYEE\",\n			\"queryType\": \"IN\",\n			\"summable\" : \"N\"\n		},\n		{\n			\"columnName\": \"MASTER.PERSON_ROLE\",\n			\"displayName\": \"Role\",\n			\"filterType\": \"lookUp\",\n			\"valueField\": \"EPS_PROP_PERSON_ROLE#PROP_PERSON_ROLE_ID#true#true\",\n			\"index\": \"null\",\n			\"queryType\": \"IN\",\n			\"summable\" : \"N\"\n		},\n		{\n			\"columnName\": \"MASTER.KEY_PERSON_NAME\",\n			\"displayName\": \"Key Person Name\",\n			\"filterType\": \"elastic\",\n			\"valueField\": \"full_name\",\n			\"index\": \"fibiperson\",\n			\"queryType\": \"IN\",\n			\"summable\" : \"N\"\n		},\n		{\n			\"columnName\": \"MASTER.KEY_PERSON_ORGANIZATION\",\n			\"displayName\": \"Key Person Organization\",\n			\"filterType\": \"endpoint\",\n			\"valueField\": \"organizationName\",\n			\"index\": \"organizationName\",\n			\"queryType\": \"IN\",\n			\"summable\" : \"N\"\n		},\n		{\n			\"columnName\": \"MASTER.KEY_PERSON_COUNTRY\",\n			\"displayName\": \"Key Person Country\",\n			\"filterType\": \"endpoint\",\n			\"valueField\": \"countryName\",\n			\"index\": \"countryName\",\n			\"queryType\": \"IN\",\n			\"summable\" : \"N\"\n		},\n		{\n			\"columnName\": \"MASTER.KEY_PERSON_EMAIL\",\n			\"displayName\": \"Key Person Email\",\n			\"filterType\": \"freetext\",\n			\"valueField\": \"null\",\n			\"index\": \"null\",\n			\"queryType\": \"LIKE\",\n			\"summable\" : \"N\"\n		},\n		{\n			\"columnName\": \"MASTER.PERCENTAGE_OF_EFFORT\",\n			\"displayName\": \"Effort within own work commitments (%)\",\n			\"filterType\": \"null\",\n			\"valueField\": \"null\",\n			\"index\": \"null\",\n			\"queryType\": \"null\",\n			\"summable\" : \"N\"\n		},\n		{\n			\"columnName\": \"MASTER.FUNDER_APPROVAL_DATE\",\n			\"displayName\": \"Funder Approval Date\",\n			\"filterType\": \"date\",\n			\"valueField\": \"null\",\n			\"index\": \"null\",\n			\"queryType\": \"BETWEEN\",\n			\"summable\" : \"N\"\n		},\n		{\n			\"columnName\": \"MASTER.KEY_PERSON_ID\",\n			\"displayName\": \"Key Person Id\",\n			\"filterType\": \"freetext\",\n			\"valueField\": \"null\",\n			\"index\": \"null\",\n			\"queryType\": \"IN\",\n			\"summable\" : \"N\"\n		},\n		{\n			\"columnName\": \"MASTER.VARIATION_CREATE_TIMESTAMP\",\n			\"displayName\": \"Variation Creation Time\",\n			\"filterType\": \"date\",\n			\"valueField\": \"null\",\n			\"index\": \"null\",\n			\"queryType\": \"BETWEEN\",\n			\"summable\" : \"N\"\n		},\n		{\n			\"columnName\": \"MASTER.SR_TYPE\",\n			\"displayName\": \"Variation Request Type\",\n			\"filterType\": \"lookUp\",\n			\"valueField\": \"SR_TYPE#TYPE_CODE#true#true\",\n			\"index\": \"null\",\n			\"queryType\": \"IN\",\n			\"summable\" : \"N\"\n		},\n		{\n			\"columnName\": \"MASTER.SUBMISSION_DATE\",\n			\"displayName\": \"Variation Submitted Date\",\n			\"filterType\": \"date\",\n			\"valueField\": \"null\",\n			\"index\": \"null\",\n			\"queryType\": \"BETWEEN\",\n			\"summable\" : \"N\"\n		},\n		{\n			\"columnName\": \"MASTER.SUBMIT_USER\",\n			\"displayName\": \"Variation Submitted User\",\n			\"filterType\": \"elastic\",\n			\"valueField\": \"full_name\",\n			\"index\": \"fibiperson\",\n			\"queryType\": \"IN\",\n			\"summable\" : \"N\"\n		},\n		{\n			\"columnName\": \"MASTER.VARIATION_CREATE_USER\",\n			\"displayName\": \"Variation Created User\",\n			\"filterType\": \"elastic\",\n			\"valueField\": \"full_name\",\n			\"index\": \"fibiperson\",\n			\"queryType\": \"IN\",\n			\"summable\" : \"N\"\n		},\n		{\n			\"columnName\": \"MASTER.AWARD_SEQUENCE_STATUS\",\n			\"displayName\": \"Variation Request Status\",\n			\"filterType\": \"lookUp\",\n			\"valueField\": \"AWARD_DOCUMENT_STATUS#STATUS_CODE#true#true\",\n			\"index\": \"null\",\n			\"queryType\": \"IN\",\n			\"summable\" : \"N\"\n		},\n		{\n			\"columnName\": \"MASTER.WORKFLOW_END_DATE\",\n			\"displayName\": \"Variation Approval Date\",\n			\"filterType\": \"null\",\n			\"valueField\": \"null\",\n			\"index\": \"null\",\n			\"queryType\": \"BETWEEN\",\n			\"summable\" : \"N\"\n		},\n		{\n			\"columnName\": \"MASTER.WORKFLOW_END_PERSON\",\n			\"displayName\": \"Variation Approved By\",\n			\"filterType\": \"null\",\n			\"valueField\": \"null\",\n			\"index\": \"null\",\n			\"queryType\": \"null\",\n			\"summable\" : \"N\"\n		},\n		{\n			\"columnName\": \"MASTER.GRANT_TYPE\",\n			\"displayName\": \"Type of Grant\",\n			\"filterType\": \"lookUp\",\n			\"valueField\": \"GRANT_CALL_TYPE#GRANT_TYPE_CODE#true#true\",\n			\"index\": \"null\",\n			\"queryType\": \"IN\",\n			\"summable\" : \"N\"\n		}\n	],\n	\"extraCondition\" : \"(MASTER.LEAD_UNIT_NUMBER IN(SELECT DISTINCT UNIT_NUMBER FROM ACCESS_TMP) OR MASTER.AWARD_ID IN (SELECT AWARD_ID FROM AWARD_TEMP) OR (MASTER.AWARD_ID IN (SELECT AWARD_ID FROM AWARD A1 INNER JOIN GRANT_CALL_HEADER A2 ON A2.GRANT_HEADER_ID = A1.GRANT_HEADER_ID INNER JOIN GRANTCALL_TEMP PR ON A2.HOME_UNIT_NUMBER = PR.UNIT_NUMBER))) ORDER BY MASTER.AWARD_NUMBER\",\n	\"extraSelection\" : \"\",\n	\"selectDistinct\" :\"Y\",\n	\"tempTable\":\"WITH ACCESS_TMP  AS (SELECT UNIT_NUMBER FROM PERSON_ROLES T1 INNER JOIN ROLE_RIGHTS T2 ON T1.ROLE_ID = T2.ROLE_ID INNER JOIN RIGHTS T3 ON T2.RIGHT_ID = T3.RIGHT_ID  WHERE T1.DESCEND_FLAG = \'N\' AND T1.PERSON_ID = <<PERSON_ID>> AND RIGHT_NAME IN (\'VIEW_AWARD\') UNION SELECT CHILD_UNIT_NUMBER FROM UNIT_WITH_CHILDREN  WHERE UNIT_NUMBER IN (SELECT UNIT_NUMBER FROM PERSON_ROLES T1 INNER JOIN ROLE_RIGHTS T2 ON T1.ROLE_ID = T2.ROLE_ID INNER JOIN RIGHTS T3 ON T2.RIGHT_ID = T3.RIGHT_ID  WHERE T1.DESCEND_FLAG = \'Y\' AND T1.PERSON_ID = <<PERSON_ID>> AND RIGHT_NAME IN (\'VIEW_AWARD\'))), AWARD_TEMP AS (SELECT T1.AWARD_ID FROM AWARD_PERSON_ROLES T1 INNER JOIN ROLE_RIGHTS T2 ON T1.ROLE_ID = T2.ROLE_ID INNER JOIN RIGHTS T3 ON T2.RIGHT_ID = T3.RIGHT_ID WHERE T1.PERSON_ID =<<PERSON_ID>> AND T3.RIGHT_NAME IN (\'VIEW_AWARD\')), GRANTCALL_TEMP AS (SELECT UNIT_NUMBER FROM PERSON_ROLES T1 INNER JOIN ROLE_RIGHTS T2 ON T1.ROLE_ID = T2.ROLE_ID INNER JOIN RIGHTS T3 ON T2.RIGHT_ID = T3.RIGHT_ID WHERE T1.DESCEND_FLAG = \'N\' AND T1.PERSON_ID = <<PERSON_ID>> AND RIGHT_NAME IN (\'VIEW_AWARD\') AND T1.ROLE_ID=\'100\' UNION SELECT CHILD_UNIT_NUMBER FROM UNIT_WITH_CHILDREN WHERE UNIT_NUMBER IN (SELECT UNIT_NUMBER FROM PERSON_ROLES T1 INNER JOIN ROLE_RIGHTS T2 ON T1.ROLE_ID = T2.ROLE_ID INNER JOIN RIGHTS T3 ON T2.RIGHT_ID = T3.RIGHT_ID WHERE T1.DESCEND_FLAG = \'Y\' AND T1.PERSON_ID = <<PERSON_ID>> AND RIGHT_NAME IN (\'VIEW_AWARD\') AND T1.ROLE_ID=\'100\'))\"\n}\n', UPDATE_TIMESTAMP = UTC_TIMESTAMP(), UPDATE_USER = 'admin' WHERE (`TYPE_CODE` = '38');
