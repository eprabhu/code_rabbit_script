			\"displayName\": \"Award Person Role\",\n			\"filterType\": \"lookUp\",\n			\"valueField\": \"EPS_PROP_PERSON_ROLE#PROP_PERSON_ROLE_ID#true#true\",\n			\"index\": \"null\",\n			\"queryType\": \"IN\"\n		},\n		{\n			\"columnName\": \"PROPOSAL_KEY_PERSON_NAME\",\n			\"displayName\": \"Proposal Person Name\",\n			\"filterType\": \"elastic\",\n			\"valueField\": \"full_name\",\n			\"index\": \"fibiperson\",\n			\"queryType\": \"IN\",\n			\"summable\" : \"N\"\n		},\n		{\n			\"columnName\": \"AWARD_KEY_PERSON_NAME\",\n			\"displayName\": \"Award Person Name\",\n			\"filterType\": \"elastic\",\n			\"valueField\": \"full_name\",\n			\"index\": \"fibiperson\",\n			\"queryType\": \"IN\",\n			\"summable\" : \"N\"\n		},\n		{\n			\"columnName\": \"PROPOSAL_PERCENTAGE_OF_EFFORT\",\n			\"displayName\": \"Proposal Percentage of Effort\",\n			\"filterType\": \"freetext\",\n			\"valueField\": \"\",\n			\"index\": \"null\",\n			\"queryType\": \"LIKE\"\n		},\n		{\n			\"columnName\": \"AWARD_PERCENTAGE_OF_EFFORT\",\n			\"displayName\": \"Award Percentage of Effort\",\n			\"filterType\": \"freetext\",\n			\"valueField\": \"\",\n			\"index\": \"null\",\n			\"queryType\": \"LIKE\"\n		},\n		{\n			\"columnName\": \"ANTICIPATED_TOTAL_AMOUNT\",\n			\"displayName\": \"Anticipated Total\",\n			\"filterType\": \"null\",\n			\"valueField\": \"null\",\n			\"index\": \"null\",\n			\"queryType\": \"null\",\n			\"summable\" : \"N\",\n			\"isCurrency\": \"true\"\n		},\n		{\n			\"columnName\": \"TOTAL_COST\",\n			\"displayName\": \"Total Cost\",\n			\"filterType\": \"null\",\n			\"valueField\": \"null\",\n			\"index\": \"null\",\n			\"queryType\": \"null\",\n			\"isCurrency\": \"true\"\n		},\n		{\n			\"columnName\": \"PERSON_ID\",\n			\"displayName\": \"Person Id\",\n			\"filterType\": \"freetext\",\n			\"valueField\": \"null\",\n			\"index\": \"null\",\n			\"queryType\": \"IN\",\n			\"summable\" : \"N\"\n		},\n		{\n			\"columnName\": \"PERSON_EMAIL\",\n			\"displayName\": \"Person Email\",\n			\"filterType\": \"freetext\",\n			\"valueField\": \"null\",\n			\"index\": \"null\",\n			\"queryType\": \"IN\",\n			\"summable\" : \"N\"\n		}\n	],\n	 \"extraCondition\" : \"(PROPOSAL_ID IN (SELECT PROPOSAL_ID FROM EPS_PROPOSAL_TEMP) OR LEAD_UNIT_NUMBER IN(SELECT DISTINCT UNIT_NUMBER FROM ACCESS_TMP))\",\n      \"extraSelection\" : \"\",\n      \"selectDistinct\" :\"Y\",\n      \"tempTable\":\"WITH ACCESS_TMP AS (SELECT UNIT_NUMBER FROM PERSON_ROLES T1 INNER JOIN ROLE_RIGHTS T2 ON T1.ROLE_ID = T2.ROLE_ID INNER JOIN RIGHTS T3 ON T2.RIGHT_ID = T3.RIGHT_ID  WHERE T1.DESCEND_FLAG = \'N\' AND T1.PERSON_ID = <<PERSON_ID>> AND RIGHT_NAME IN (\'VIEW_PROPOSAL\', \'CREATE_PROPOSAL\', \'MODIFY_PROPOSAL\') UNION SELECT CHILD_UNIT_NUMBER FROM UNIT_WITH_CHILDREN  WHERE UNIT_NUMBER IN (SELECT UNIT_NUMBER FROM PERSON_ROLES T1 INNER JOIN ROLE_RIGHTS T2 ON T1.ROLE_ID = T2.ROLE_ID INNER JOIN RIGHTS T3 ON T2.RIGHT_ID = T3.RIGHT_ID  WHERE T1.DESCEND_FLAG = \'Y\' AND T1.PERSON_ID = <<PERSON_ID>> AND RIGHT_NAME IN (\'VIEW_PROPOSAL\', \'CREATE_PROPOSAL\', \'MODIFY_PROPOSAL\'))), EPS_PROPOSAL_TEMP AS (SELECT PROPOSAL_ID FROM EPS_PROPOSAL_PERSON_ROLES WHERE PERSON_ID = <<PERSON_ID>>)\"\n}\n', UPDATE_TIMESTAMP = UTC_TIMESTAMP(), UPDATE_USER = 'admin' WHERE (`TYPE_CODE` = '35');
