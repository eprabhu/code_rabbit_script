e\": \"Direct Cost ($)\",\n			\"filterType\": \"null\",\n			\"valueField\": \"null\",\n			\"index\": \"null\",\n			\"queryType\": \"null\",\n			\"summable\": \"N\",\n			\"isCurrency\": \"true\",\n			\"width\": 5800\n		},\n		{\n			\"columnName\": \"TOTAL_INDIRECT_COST\",\n			\"displayName\": \"Indirect Cost ($)\",\n			\"filterType\": \"null\",\n			\"valueField\": \"null\",\n			\"index\": \"null\",\n			\"queryType\": \"null\",\n			\"summable\": \"N\",\n			\"isCurrency\": \"true\",\n			\"width\": 5800\n		},\n		{\n			\"columnName\": \"TOTAL_COST\",\n			\"displayName\": \"Total Cost ($)\",\n			\"filterType\": \"null\",\n			\"valueField\": \"null\",\n			\"index\": \"null\",\n			\"queryType\": \"null\",\n			\"summable\": \"N\",\n			\"isCurrency\": \"true\",\n			\"width\": 5800\n		},\n		{\n			\"columnName\": \"ORIGINAL_APPROVED_BUDGET\",\n			\"displayName\": \"Original budget (S$)\",\n			\"filterType\": \"null\",\n			\"valueField\": \"null\",\n			\"index\": \"null\",\n			\"queryType\": \"null\",\n			\"summable\": \"N\",\n			\"isCurrency\": \"true\",\n			\"width\": 5800\n		},\n		{\n			\"columnName\": \"LATEST_APPROVED_BUDGET\",\n			\"displayName\": \"Revised Budget ($)\",\n			\"filterType\": \"null\",\n			\"valueField\": \"null\",\n			\"index\": \"null\",\n			\"queryType\": \"null\",\n			\"summable\": \"N\",\n			\"isCurrency\": \"true\",\n			\"width\": 5800\n		},\n		{\n			\"columnName\": \"CUMULATIVE_ACTUAL_EXPENSE\",\n			\"displayName\": \"Actual Expense ($)\",\n			\"filterType\": \"null\",\n			\"valueField\": \"null\",\n			\"index\": \"null\",\n			\"queryType\": \"null\",\n			\"summable\": \"N\",\n			\"isCurrency\": \"true\",\n			\"width\": 5800\n		},\n		{\n			\"columnName\": \"BALANCE_FUND\",\n			\"displayName\": \"Budget Balance ($)\",\n			\"filterType\": \"null\",\n			\"valueField\": \"null\",\n			\"index\": \"null\",\n			\"queryType\": \"null\",\n			\"summable\": \"N\",\n			\"isCurrency\": \"true\",\n			\"width\": 5800\n		},\n		{\n			\"columnName\": \"CUMULATIVE_COMMIT