databaseChangeLog:

    - changeSet:
        id: FIBI-9126-1
        author: Reshma Antony
        labels: 'DML'
        comment: Added the CONFIG_METADATA column to the REPORT_TYPE table for storing report template metadata.
        changes:
          - sql:
              sql: |
                SET @sql := IF(
                    (SELECT COUNT(*)
                    FROM information_schema.COLUMNS
                    WHERE TABLE_SCHEMA = DATABASE()
                      AND TABLE_NAME = 'REPORT_TYPE'
                      AND COLUMN_NAME = 'CONFIG_METADATA') = 0,
                      'ALTER TABLE REPORT_TYPE ADD COLUMN CONFIG_METADATA JSON;',
                      'DO 1'
                 );
                 PREPARE stmt FROM @sql;
                 EXECUTE stmt;
                 DEALLOCATE PREPARE stmt;
        rollback:
         - sql:
            sql: |
              ALTER TABLE REPORT_TYPE DROP COLUMN CONFIG_METADATA;

