index\": \"unitName\",\n			\"queryType\": \"IN\",\n			\"innerJoin\" : \"N\",\n			\"summable\" : \"N\"\n		},\n		{\n			\"columnName\": \"AWARD_MASTER_DATA.PI_NAME\",\n			\"displayName\": \"Lead Principal Investigator\",\n			\"filterType\": \"elasticComposite\",\n			\"valueField\": \"full_name\",\n			\"index\": \"IS_PI_EMPLOYEE\",\n			\"queryType\": \"IN\",\n			\"innerJoin\" : \"N\",\n			\"summable\" : \"N\"\n		},\n		{\n			\"columnName\": \"AWARD_MASTER_DATA.ANTICIPATED_TOTAL_AMOUNT\",\n			\"displayName\": \"Anticipated Total ($)\",\n			\"filterType\": \"null\",\n			\"valueField\": \"null\",\n			\"index\": \"null\",\n			\"queryType\": \"BETWEEN_NUMBER\",\n			\"innerJoin\" : \"N\",\n			\"summable\" : \"Y\",\n			\"isCurrency\": \"true\"\n		},\n		{\n			\"columnName\": \"AWARD_MASTER_DATA.AMOUNT_OBLIGATED_TO_DATE\",\n			\"displayName\": \"Obligated Total ($)\",\n			\"filterType\": \"null\",\n			\"valueField\": \"null\",\n			\"index\": \"null\",\n			\"queryType\": \"IN\",\n			\"innerJoin\" : \"N\",\n			\"summable\" : \"Y\",\n			\"isCurrency\": \"true\"\n		},\n		{\n			\"columnName\": \"AWARD_MASTER_DATA.TOTAL_PROJECT_COST\",\n			\"displayName\": \"Total Project Cost ($)\",\n			\"filterType\": \"null\",\n			\"valueField\": \"null\",\n			\"index\": \"null\",\n			\"queryType\": \"IN\",\n			\"innerJoin\" : \"N\",\n			\"summable\" : \"Y\",\n			\"isCurrency\": \"true\"\n		},\n		{\n			\"columnName\": \"AWARD_MASTER_DATA.BASIS_OF_PAYMENT_DESC\",\n			\"displayName\": \"Basis Of Payment\",\n			\"filterType\": \"lookUp\",\n			\"valueField\": \"AWARD_BASIS_OF_PAYMENT#BASIS_OF_PAYMENT_CODE#true#true\",\n			\"index\": \"null\",\n			\"queryType\": \"IN\",\n			\"innerJoin\" : \"N\",\n			\"summable\" : \"N\"\n		},\n		{\n			\"columnName\": \"AWARD_MASTER_DATA.METHOD_OF_PAYMENT_DESC\",\n			\"displayName\": \"Method Of Payment\",\n			\"filterType\": \"lookUp\",\n			\"valueField\": \"AWARD_METHOD_OF_PAYMENT#METHOD_OF_PAYMENT_CODE#true#true\",\n			\"index\": \"null\",\n			\"queryType\": \"IN\",\n			\"innerJoin\" : \"N\",\n			\"summable\" : \"N\"\n		},\n		{\n			\"columnName\": \"CLAIM_DATA.ACTUAL_REVENUE\",\n			\"displayName\": \"Actual Revenue ($)\",\n			\"filterType\": \"null\",\n			\"valueField\": \"null\",\n			\"index\": \"null\",\n			\"queryType\": \"null\",\n			\"summable\" : \"N\",\n			\"innerJoin\" : \"N\",\n			\"isCurrency\": \"true\"\n		},\n		{\n			\"columnName\": \"CLAIM_DATA.ACTUAL_EXPENSE\",\n			\"displayName\": \"Actual Expenses ($)\",\n			\"filterType\": \"null\",\n			\"valueField\": \"null\",\n			\"index\": \"null\",\n			\"queryType\": \"null\",\n			\"summable\" : \"N\",\n			\"innerJoin\" : \"N\",\n			\"isCurrency\": \"true\"\n		},\n		{\n			\"columnName\": \"CLAIM_DATA.CUM_CLAIM_AMOUNT_TO_DATE\",\n			\"displayName\": \"Cumulative Claim Amount to date ($)\",\n			\"filterType\": \"null\",\n			\"valueField\": \"null\",\n			\"index\": \"null\",\n			\"queryType\": \"null\",\n			\"innerJoin\" : \"N\",\n			\"summable\" : \"N\",\n			\"isCurrency\": \"true\"\n		},\n		{\n			\"columnName\": \"CLAIM_DATA.FM_POSTING_DATE\",\n			\"displayName\": \"Posting Date\",\n			\"filterType\": \"date\",\n			\"valueField\": \"null\",\n			\"index\": \"null\",\n			\"summable\" : \"N\",\n			\"innerJoin\" : \"N\",\n			\"queryType\": \"BETWEEN\"\n		},\n		{\n			\"columnName\": \"CLAIM_DATA.REFERENCE_DOC_NUMBER\",\n			\"displayName\": \"System Doc Reference\",\n			\"filterType\": \"freetext\",\n			\"valueField\": \"referenceDocNumber\",\n			\"index\": \"null\",\n			\"innerJoin\" : \"N\",\n			\"summable\" : \"N\",\n			\"queryType\": \"LIKE\"\n		},\n		{\n			\"columnName\": \"CLAIM_DATA.ORIGINAL_APPROVED_BUDGET\",\n			\"displayName\": \"Original Budget ($)\",\n			\"filterType\": \"null\",\n			\"valueField\": \"null\",\n			\"index\": \"null\",\n			\"queryType\": \"IN\",\n			\"innerJoin\" : \"N\",\n			\"summable\" : \"Y\",\n			\"isCurrency\": \"true\"\n		},\n		{\n			\"columnName\": \"CLAIM_DATA.LATEST_APPROVED_BUDGET\",\n			\"displayName\": \"Revised Budget ($)\",\n			\"filterType\": \"null\",\n			\"valueField\": \"null\",\n			\"index\": \"null\",\n			\"queryType\": \"IN\",\n			\"innerJoin\" : \"N\",\n			\"summable\" : \"Y\",\n			\"isCurrency\": \"true\"\n		},\n		{\n			\"columnName\": \"CLAIM_DATA.L2_WBS_NUMBER\",\n			\"displayName\": \"Level 2 WBS\",\n			\"filterType\": \"freetext\",\n			\"valueField\": \"null\",\n			\"index\": \"null\",\n			\"queryType\": \"LIKE\",\n			\"innerJoin\" : \"N\",\n			\"summable\" : \"N\"\n		},\n		{\n			\"columnName\": \"CLAIM_DATA.BUDGET_CATEGORY\",\n			\"displayName\": \"Budget Category\",\n			\"filterType\": \"lookUp\",\n			\"valueField\": \"BUDGET_CATEGORY#BUDGET_CATEGORY_CODE#true#true\",\n			\"index\": \"null\",\n			\"innerJoin\" : \"N\",\n			\"summable\" : \"N\",\n			\"queryType\": \"IN\"\n		}\n	],\n	\"extraCondition\" : \"AWARD_MASTER_DATA.LEAD_UNIT_NUMBER IN(SELECT DISTINCT UNIT_NUMBER FROM ACCESS_TMP)\",\n	\"extraSelection\" : \"\",\n	\"selectDistinct\" :\"Y\",\n	\"tempTable\":\"WITH ACCESS_TMP AS (SELECT UNIT_NUMBER FROM PERSON_ROLES T1 INNER JOIN ROLE_RIGHTS T2 ON T1.ROLE_ID = T2.ROLE_ID INNER JOIN RIGHTS T3 ON T2.RIGHT_ID = T3.RIGHT_ID  WHERE T1.DESCEND_FLAG = \'N\' AND T1.PERSON_ID = <<PERSON_ID>> AND RIGHT_NAME IN (\'VIEW_CLAIMS\') UNION SELECT CHILD_UNIT_NUMBER FROM UNIT_WITH_CHILDREN  WHERE UNIT_NUMBER IN (SELECT UNIT_NUMBER FROM PERSON_ROLES T1 INNER JOIN ROLE_RIGHTS T2 ON T1.ROLE_ID = T2.ROLE_ID INNER JOIN RIGHTS T3 ON T2.RIGHT_ID = T3.RIGHT_ID  WHERE T1.DESCEND_FLAG = \'Y\' AND T1.PERSON_ID = <<PERSON_ID>> AND RIGHT_NAME IN (\'VIEW_CLAIMS\')))\"\n}\n', UPDATE_TIMESTAMP = UTC_TIMESTAMP(), UPDATE_USER = 'admin' WHERE (`TYPE_CODE` = '40');
