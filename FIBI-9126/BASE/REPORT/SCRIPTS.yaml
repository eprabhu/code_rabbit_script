 JOIN GRANT_CALL_HEADER A2 ON A2.GRANT_HEADER_ID = A1.GRANT_HEADER_ID INNER JOIN GRANTCALL_TEMP PR ON A2.HOME_UNIT_NUMBER = PR.UNIT_NUMBER)) ORDER BY MASTER_DATA.AWARD_NUMBER,CHILD.BUDGET_CATEGORY\",\n	\"extraSelection\" : \"\",\n	\"innerJoinPlaceHolder\" : \"<FILTER_CONDITION>\",\n	\"selectDistinct\" :\"Y\",\n	\"tempTable\":\"WITH ACCESS_TMP AS (SELECT UNIT_NUMBER FROM PERSON_ROLES T1 INNER JOIN ROLE_RIGHTS T2 ON T1.ROLE_ID = T2.ROLE_ID INNER JOIN RIGHTS T3 ON T2.RIGHT_ID = T3.RIGHT_ID  WHERE T1.DESCEND_FLAG = \'N\' AND T1.PERSON_ID = <<PERSON_ID>> AND RIGHT_NAME IN (\'VIEW_EOM_EXPENDITURE_TO_DATE\',\'VIEW_AWARD_PURCHASE_DETAILS\',\'VIEW_EXPENSE_TRANSACTION\') UNION SELECT CHILD_UNIT_NUMBER FROM UNIT_WITH_CHILDREN  WHERE UNIT_NUMBER IN (SELECT UNIT_NUMBER FROM PERSON_ROLES T1 INNER JOIN ROLE_RIGHTS T2 ON T1.ROLE_ID = T2.ROLE_ID INNER JOIN RIGHTS T3 ON T2.RIGHT_ID = T3.RIGHT_ID  WHERE T1.DESCEND_FLAG = \'Y\' AND T1.PERSON_ID = <<PERSON_ID>> AND RIGHT_NAME IN (\'VIEW_EOM_EXPENDITURE_TO_DATE\',\'VIEW_AWARD_PURCHASE_DETAILS\',\'VIEW_EXPENSE_TRANSACTION\'))), AWARD_TEMP AS (SELECT T1.AWARD_ID FROM AWARD_PERSON_ROLES T1 INNER JOIN ROLE_RIGHTS T2 ON T1.ROLE_ID = T2.ROLE_ID INNER JOIN RIGHTS T3 ON T2.RIGHT_ID = T3.RIGHT_ID WHERE T1.PERSON_ID =<<PERSON_ID>> AND T3.RIGHT_NAME IN (\'VIEW_EOM_EXPENDITURE_TO_DATE\',\'VIEW_AWARD_PURCHASE_DETAILS\',\'VIEW_EXPENSE_TRANSACTION\')), GRANTCALL_TEMP AS (SELECT UNIT_NUMBER FROM PERSON_ROLES T1 INNER JOIN ROLE_RIGHTS T2 ON T1.ROLE_ID = T2.ROLE_ID INNER JOIN RIGHTS T3 ON T2.RIGHT_ID = T3.RIGHT_ID WHERE T1.DESCEND_FLAG = \'N\' AND T1.PERSON_ID = <<PERSON_ID>> AND RIGHT_NAME IN (\'VIEW_AWARD\') AND T1.ROLE_ID=\'100\' UNION SELECT CHILD_UNIT_NUMBER FROM UNIT_WITH_CHILDREN WHERE UNIT_NUMBER IN (SELECT UNIT_NUMBER FROM PERSON_ROLES T1 INNER JOIN ROLE_RIGHTS T2 ON T1.ROLE_ID = T2.ROLE_ID INNER JOIN RIGHTS T3 ON T2.RIGHT_ID = T3.RIGHT_ID WHERE T1.DESCEND_FLAG = \'Y\' AND T1.PERSON_ID = <<PERSON_ID>> AND RIGHT_NAME IN (\'VIEW_AWARD\') AND T1.ROLE_ID=\'100\'))\"\n}\n', UPDATE_TIMESTAMP = UTC_TIMESTAMP(), UPDATE_USER = 'admin' WHERE (`TYPE_CODE` = '7');
