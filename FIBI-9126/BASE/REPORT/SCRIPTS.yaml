\",\n			\"valueField\": \"ACCOUNT_TYPE#ACCOUNT_TYPE_CODE#true#true\",\n			\"index\": \"null\",\n			\"queryType\": \"IN\",\n			\"summable\" : \"N\",\n			\"innerJoin\" : \"N\"\n		},\n		{\n			\"columnName\": \"MASTER_DATA.GRANT_CALL_TITLE\",\n			\"displayName\": \"Grant Call Title\",\n			\"filterType\": \"endpoint\",\n			\"valueField\": \"grantCallName\",\n			\"index\": \"grantCallName\",\n			\"queryType\": \"IN\",\n			\"summable\" : \"N\"\n		},\n		{\n			\"columnName\": \"MASTER_DATA.FUNDING_SCHEME\",\n			\"displayName\": \"Grant Scheme\",\n			\"filterType\": \"lookUp\",\n			\"valueField\": \"FUNDING_SCHEME#FUNDING_SCHEME_CODE#true#true\",\n			\"index\": \"null\",\n			\"queryType\": \"IN\",\n			\"summable\" : \"N\"\n		},\n		{\n			\"columnName\": \"MASTER_DATA.TITLE\",\n			\"displayName\": \"Award Title\",\n			\"filterType\": \"freetext\",\n			\"valueField\": \"title\",\n			\"index\": \"null\",\n			\"queryType\": \"LIKE\",\n			\"summable\" : \"N\",\n			\"innerJoin\" : \"N\"\n		},\n		{\n			\"columnName\": \"MASTER_DATA.AWARD_EFFECTIVE_DATE\",\n			\"displayName\": \"Award Notice Date\",\n			\"filterType\": \"date\",\n			\"valueField\": \"null\",\n			\"index\": \"null\",\n			\"queryType\": \"BETWEEN\",\n			\"summable\" : \"N\",\n			\"innerJoin\" : \"N\"\n		},\n		{\n			\"columnName\": \"MASTER_DATA.BEGIN_DATE\",\n			\"displayName\": \"Start Date\",\n			\"filterType\": \"date\",\n			\"valueField\": \"null\",\n			\"index\": \"null\",\n			\"queryType\": \"BETWEEN\",\n			\"summable\" : \"N\",\n			\"innerJoin\" : \"N\"\n		},\n		{\n			\"columnName\": \"MASTER_DATA.FINAL_EXPIRATION_DATE\",\n			\"displayName\": \"End Date\",\n			\"filterType\": \"date\",\n			\"valueField\": \"null\",\n			\"index\": \"null\",\n			\"queryType\": \"BETWEEN\",\n			\"summable\" : \"N\",\n			\"innerJoin\" : \"N\"\n		},\n		{\n			\"columnName\": \"MASTER_DATA.SPONSOR_NAME\",\n			\"displayName\": \"Sponsor\",\n			\"filterType\": \"endpoint\",\n			\"valueField\": \"sponsorName\",\n			\"index\": \"sponsorName\",\n			\"queryType\": \"IN\",\n			\"summable\" : \"N\"\n		},\n		{\n			\"columnName\": \"MASTER_DATA.PRIME_SPONSOR_NAME\",\n			\"displayName\": \"Prime Sponsor\",\n			\"filterType\": \"endpoint\",\n			\"valueField\": \"sponsorName\",\n			\"index\": \"sponsorName\",\n			\"queryType\": \"IN\",\n			\"summable\" : \"N\",\n			\"innerJoin\" : \"N\"\n		},\n		{\n			\"columnName\": \"MASTER_DATA.UNIT_NAME\",\n			\"displayName\": \"Lead Unit\",\n			\"filterType\": \"endpoint\",\n			\"valueField\": \"unitName\",\n			\"index\": \"unitName\",\n			\"queryType\": \"IN\",\n			\"summable\" : \"N\",\n			\"innerJoin\" : \"N\"\n		},\n		{\n			\"columnName\": \"MASTER_DATA.SUB_LEAD_UNIT\",\n			\"displayName\": \"Sub Lead Unit\",\n			\"filterType\": \"endpoint\",\n			\"valueField\": \"unitName\",\n			\"index\": \"unitName\",\n			\"queryType\": \"IN\",\n			\"summable\" : \"N\",\n			\"innerJoin\" : \"N\"\n		},\n		{\n			\"columnName\": \"MASTER_DATA.PI_NAME\",\n			\"displayName\": \"Lead Principal Investigator\",\n			\"filterType\": \"elasticComposite\",\n			\"valueField\": \"full_name\",\n			\"index\": \"IS_PI_EMPLOYEE\",\n			\"queryType\": \"IN\",\n			\"summable\" : \"N\",\n			\"innerJoin\" : \"N\"\n		},\n		{\n			\"columnName\": \"MASTER_DATA.ANTICIPATED_TOTAL_AMOUNT\",\n			\"displayName\": \"Award/Anticipated Total ($)\",\n			\"filterType\": \"null\",\n			\"valueField\": \"null\",\n			\"index\": \"null\",\n			\"queryType\": \"null\",\n			\"summable\" : \"N\",\n			\"innerJoin\" : \"N\",\n			\"isCurrency\": \"true\"\n		},\n		{\n			\"columnName\": \"MASTER_DATA.AMOUNT_OBLIGATED_TO_DATE\",\n			\"displayName\": \"Distributed/Obligated Total ($)\",\n			\"filterType\": \"null\",\n			\"valueField\": \"null\",\n			\"index\": \"null\",\n			\"queryType\": \"null\",\n			\"summable\" : \"N\",\n			\"innerJoin\" : \"N\",\n			\"isCurrency\": \"true\"\n		},\n		{\n			\"columnName\": \"MASTER_DATA.TOTAL_COST_IN_CURRENCY\",\n			\"displayName\": \"Total Project Cost(In Foreign Currency)\",\n			\"filterType\": \"null\",\n			\"valueField\": \"null\",\n			\"index\": \"null\",\n			\"queryType\": \"null\",\n			\"summable\" : \"N\",\n			\"innerJoin\" : \"N\",\n			\"isCurrency\": \"true\"\n		},\n		{\n			\"columnName\": \"MASTER_DATA.ORIGINAL_APPROVED_BUDGET\",\n			\"displayName\": \"Original Budget ($)\",\n			\"filterType\": \"null\",\n			\"valueField\": \"null\",\n			\"index\": \"null\",\n			\"queryType\": \"IN\",\n			\"summable\" : \"Y\",\n			\"innerJoin\" : \"N\",\n			\"isCurrency\": \"true\"\n		},\n		{\n			\"columnName\": \"CHILD.REVISED_AMOUNT\",\n			\"displayName\": \"Revised Budget ($)\",\n			\"filterType\": \"null\",\n			\"valueField\": \"null\",\n			\"index\": \"null\",\n			\"queryType\": \"IN\",\n			\"summable\" : \"Y\",\n			\"innerJoin\" : \"N\",\n			\"isCurrency\": \"true\"\n		},\n		{\n			\"columnName\": \"CHILD.EXPENDITURE_TO_DATE\",\n			\"displayName\": \"Actual Expense($)\",\n			\"filterType\": \"null\",\n			\"valueField\": \"null\",\n			\"index\": \"null\",\n			\"queryType\": \"IN\",\n			\"summable\" : \"Y\",\n			\"innerJoin\" : \"N\",\n			\"isCurrency\": \"true\"\n		},\n		{\n			\"columnName\": \"CHILD.BALANCE\",\n			\"displayName\": \"Budget Balance ($)\",\n			\"filterType\": \"null\",\n			\"valueField\": \"null\",\n			\"index\": \"null\",\n			\"queryType\": \"IN\",\n			\"summable\" : \"Y\",\n			\"innerJoin\" : \"N\",\n			\"isCurrency\": \"true\"\n		},\n		{\n			\"columnName\": \"CHILD.UTILIZATION_RATE\",\n			\"displayName\": \"Utilization(%)\",\n			\"filterType\": \"null\",\n			\"valueField\": \"null\",\n			\"index\": \"null\",\n			\"queryType\": \"IN\",\n			\"summable\" : \"N\",\n			\"innerJoin\" : \"N\"\n		},\n		{\n			\"columnName\": \"CHILD.COMMITTED_AMOUNT\",\n			\"displayName\": \"Committed Expense ($)\",\n			\"filterType\": \"null\",\n			\"valueField\": \"null\",\n			\"index\": \"null\",\n			\"queryType\": \"IN\",\n			\"summable\" : \"Y\",\n			\"innerJoin\" : \"N\",\n			\"isCurrency\": \"true\"\n		},\n		{\n			\"columnName\": \"CHILD.BALANCELESS_COMMITTED_AMOUNT\",\n			\"displayName\": \"Balance Less Committed ($)\",\n			\"filterType\": \"null\",\n			\"valueField\": \"null\",\n			\"index\": \"null\",\n			\"queryType\": \"IN\",\n			\"summable\" : \"Y\",\n			\"innerJoin\" : \"N\",\n			\"isCurrency\": \"true\"\n		},\n		{\n			\"columnName\": \"CHILD.FM_POSTING_DATE\",\n			\"displayName\": \"Posting Date\",\n			\"filterType\": \"date\",\n			\"valueField\": \"null\",\n			\"index\": \"null\",\n			\"queryType\": \"BETWEEN\",\n			\"summable\" : \"N\",\n			\"innerJoin\" : \"Y\",\n			\"excludeDisplay\" : \"Y\"\n		},\n		{\n			\"columnName\": \"CHILD.TOTAL_REVENUE_AMOUNT\",\n			\"displayName\": \"Actual Revenue ($)\",\n			\"filterType\": \"null\",\n			\"valueField\": \"null\",\n			\"index\": \"null\",\n			\"queryType\": \"null\",\n			\"summable\" : \"Y\",\n			\"innerJoin\" : \"Y\",\n			\"isCurrency\": \"true\"\n		},\n		{\n	            \"columnName\": \"MASTER_DATA.CLAIM_PREPARER\",\n	            \"displayName\": \"Claim Preparer\",\n	            \"filterType\": \"elastic\",\n	            \"valueField\": \"full_name\",\n	            \"index\": \"fibiperson\",\n	            \"queryType\": \"IN\",\n	            \"summable\" : \"N\"\n	        }\n	],\n	\"extraCondition\" : \"MASTER_DATA.PERSON_ROLE_ID = 3 AND (MASTER_DATA.LEAD_UNIT_NUMBER IN(SELECT DISTINCT UNIT_NUMBER FROM ACCESS_TMP) OR MASTER_DATA.AWARD_ID IN (SELECT AWARD_ID FROM AWARD_TEMP) OR MASTER_DATA.AWARD_ID IN (SELECT AWARD_ID FROM AWARD A1 INNER JOIN GRANT_CALL_HEADER A2 ON A2.GRANT_HEADER_ID = A1.GRANT_HEADER_ID INNER JOIN GRANTCALL_TEMP PR ON A2.HOME_UNIT_NUMBER = PR.UNIT_NUMBER)) ORDER BY MASTER_DATA.AWARD_NUMBER\",\n	\"extraSelection\" : \"\",\n	\"innerJoinPlaceHolder\" : \"<FILTER_CONDITION>\",\n	\"selectDistinct\" : \"Y\",\n	\"tempTable\":\"WITH ACCESS_TMP AS (SELECT UNIT_NUMBER FROM PERSON_ROLES T1 INNER JOIN ROLE_RIGHTS T2 ON T1.ROLE_ID = T2.ROLE_ID INNER JOIN RIGHTS T3 ON T2.RIGHT_ID = T3.RIGHT_ID  WHERE T1.DESCEND_FLAG = \'N\' AND T1.PERSON_ID = <<PERSON_ID>> AND RIGHT_NAME IN (\'VIEW_EOM_EXPENDITURE_TO_DATE\',\'VIEW_AWARD_PURCHASE_DETAILS\',\'VIEW_EXPENSE_TRANSACTION\') UNION SELECT CHILD_UNIT_NUMBER FROM UNIT_WITH_CHILDREN  WHERE UNIT_NUMBER IN (SELECT UNIT_NUMBER FROM PERSON_ROLES T1 INNER JOIN ROLE_RIGHTS T2 ON T1.ROLE_ID = T2.ROLE_ID INNER JOIN RIGHTS T3 ON T2.RIGHT_ID = T3.RIGHT_ID  WHERE T1.DESCEND_FLAG = \'Y\' AND T1.PERSON_ID = <<PERSON_ID>> AND RIGHT_NAME IN (\'VIEW_EOM_EXPENDITURE_TO_DATE\',\'VIEW_AWARD_PURCHASE_DETAILS\',\'VIEW_EXPENSE_TRANSACTION\'))), AWARD_TEMP AS (SELECT T1.AWARD_ID FROM AWARD_PERSON_ROLES T1 INNER JOIN ROLE_RIGHTS T2 ON T1.ROLE_ID = T2.ROLE_ID INNER JOIN RIGHTS T3 ON T2.RIGHT_ID = T3.RIGHT_ID WHERE T1.PERSON_ID =<<PERSON_ID>> AND T3.RIGHT_NAME IN (\'VIEW_EOM_EXPENDITURE_TO_DATE\',\'VIEW_AWARD_PURCHASE_DETAILS\',\'VIEW_EXPENSE_TRANSACTION\')), GRANTCALL_TEMP AS (SELECT UNIT_NUMBER FROM PERSON_ROLES T1 INNER JOIN ROLE_RIGHTS T2 ON T1.ROLE_ID = T2.ROLE_ID INNER JOIN RIGHTS T3 ON T2.RIGHT_ID = T3.RIGHT_ID WHERE T1.DESCEND_FLAG = \'N\' AND T1.PERSON_ID = <<PERSON_ID>> AND RIGHT_NAME IN (\'VIEW_AWARD\') AND T1.ROLE_ID=\'100\' UNION SELECT CHILD_UNIT_NUMBER FROM UNIT_WITH_CHILDREN WHERE UNIT_NUMBER IN (SELECT UNIT_NUMBER FROM PERSON_ROLES T1 INNER JOIN ROLE_RIGHTS T2 ON T1.ROLE_ID = T2.ROLE_ID INNER JOIN RIGHTS T3 ON T2.RIGHT_ID = T3.RIGHT_ID WHERE T1.DESCEND_FLAG = \'Y\' AND T1.PERSON_ID = <<PERSON_ID>> AND RIGHT_NAME IN (\'VIEW_AWARD\') AND T1.ROLE_ID=\'100\'))\"\n}\n', UPDATE_TIMESTAMP = UTC_TIMESTAMP(), UPDATE_USER = 'admin' WHERE (`TYPE_CODE` = '152');
          rollback: empty

