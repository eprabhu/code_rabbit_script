                        UPDATE `REPORT_TYPE` SET `CONFIG_METADATA` = '{\n	\"reports\": [\n		{\n			\"columnName\": \"AWARD_NUMBER\",\n			\"displayName\": \"Project ID\",\n			\"filterType\": \"elastic\",\n			\"valueField\": \"award_number\",\n			\"index\": \"awardfibi\",\n			\"queryType\": \"IN\"\n		},\n		{\n			\"columnName\": \"FUND_CODE\",\n			\"displayName\": \"Fund Code\",\n			\"filterType\": \"freetext\",\n			\"valueField\": \"null\",\n			\"index\": \"null\",\n			\"queryType\": \"LIKE\"\n		},\n		{\n			\"columnName\": \"TITLE\",\n			\"displayName\": \"Title\",\n			\"filterType\": \"freetext\",\n			\"valueField\": \"title\",\n			\"index\": \"null\",\n			\"queryType\": \"LIKE\"\n		},\n		{\n			\"columnName\": \"UNIT_NAME\",\n			\"displayName\": \"Lead Unit\",\n			\"filterType\": \"endpoint\",\n			\"valueField\": \"unitName\",\n			\"index\": \"unitName\",\n			\"queryType\": \"IN\"\n		},\n		{\n			\"columnName\": \"SPONSOR_NAME\",\n			\"displayName\": \"Funding Agency\",\n			\"filterType\": \"endpoint\",\n			\"valueField\": \"sponsorName\",\n			\"index\": \"sponsorName\",\n			\"queryType\": \"IN\"\n		},\n		{\n			\"columnName\": \"AWARD_STATUS\",\n			\"displayName\": \"Project Status\",\n			\"filterType\": \"lookUp\",\n			\"valueField\": \"AWARD_STATUS#STATUS_CODE#true#true\",\n			\"index\": \"null\",\n			\"queryType\": \"IN\"\n		},\n		{\n			\"columnName\": \"AWARD_TYPE\",\n			\"displayName\": \"Project Type\",\n			\"filterType\": \"lookUp\",\n			\"valueField\": \"AWARD_TYPE#AWARD_TYPE_CODE#true#true\",\n			\"index\": \"null\",\n			\"queryType\": \"IN\"\n		},\n		{\n			\"columnName\": \"PI_NAME\",\n			\"displayName\": \"Principal Investigator\",\n			\"filterType\": \"elasticComposite\",\n			\"valueField\": \"full_name\",\n			\"index\": \"IS_PI_EMPLOYEE\",\n			\"queryType\": \"IN\"\n		},\n		{\n			\"columnName\": \"BEGIN_DATE\",\n			\"displayName\": \"Start Date\",\n			\"filterType\": \"date\",\n			\"valueField\": \"null\",\n			\"index\": \"null\",\n			\"queryType\": \"BETW