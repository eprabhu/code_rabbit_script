              UPDATE `report_type` SET UPDATE_TIMESTAMP = utc_timestamp(), UPDATE_USER = 'admin', `CONFIG_METADATA` = '{\n	\"reports\": [\n		{\n			\"columnName\": \"ALL_PROPOSAL\",\n			\"displayName\": \"All Proposal\",\n			\"filterType\": \"null\",\n			\"valueField\": \"null\",\n			\"index\": \"null\",\n			\"queryType\": \"IN\"\n		},\n		{\n			\"columnName\": \"FULL_NAME\",\n			\"displayName\": \"Principal Investigator(Recent name from person records)\",\n			\"filterType\": \"elastic\",\n			\"valueField\": \"full_name\",\n			\"index\": \"fibiperson\",\n			\"queryType\": \"IN\",\n			\"width\": 11000\n		},\n		{\n			\"columnName\": \"UNIT_NAME\",\n			\"displayName\": \"Lead Unit\",\n			\"filterType\": \"endpoint\",\n			\"valueField\": \"unitName\",\n			\"index\": \"unitName\",\n			\"queryType\": \"IN\",\n			\"width\": 11000\n		},\n		{\n			\"columnName\": \"HOME_UNIT_NUMBER\",\n			\"displayName\": \"Lead Unit Number\",\n			\"filterType\": \"null\",\n			\"valueField\": \"null\",\n			\"index\": \"null\",\n			\"queryType\": \"IN\",\n			\"width\": 4600\n		},\n		{\n			\"columnName\": \"PERSON_ID\",\n			\"displayName\": \"Person Id\",\n			\"filterType\": \"null\",\n			\"valueField\": \"null\",\n			\"index\": \"null\",\n			\"queryType\": \"IN\",\n			\"width\": 4600\n		},\n		{\n			\"columnName\": \"FUNDED_PROPOSAL\",\n			\"displayName\": \"Funded Proposal\",\n			\"filterType\": \"null\",\n			\"valueField\": \"null\",\n			\"index\": \"null\",\n			\"queryType\": \"IN\"\n		},\n		{\n			\"columnName\": \"SUCCESS_RATE\",\n			\"displayName\": \"Success Rate\",\n			\"filterType\": \"null\",\n			\"valueField\": \"null\",\n			\"index\": \"null\",\n			\"queryType\": \"IN\"\n		}\n	],\n	\"extraCondition\" : \"HOME_UNIT_NUMBER IN(SELECT DISTINCT UNIT_NUMBER FROM ACCESS_TMP)\",\n	\"extraSelection\" : \",HOME_UNIT_NUMBER AS UNIT_NUMBER\",\n	\"tempTable\":\"WITH ACCESS_TMP AS (SELECT UNIT_NUMBER FROM PERSON_ROLES T1 INNER JOIN ROLE_RIGHTS T2 ON T1.ROLE_ID = T2.ROLE_ID INNER JOIN RIGHTS T3 ON T2.RIGHT_ID = T3.RIGHT_ID  WHERE T1.DESCEND_FLAG = \'N\' AND T1.PERSON_ID = <<PERSON_ID>> AND RIGHT_NAME IN (\'VIEW_PROPOSAL\', \'VIEW_ANY_PROPOSAL\', \'CREATE_PROPOSAL\', \'MODIFY_PROPOSAL\') UNION SELECT CHILD_UNIT_NUMBER FROM UNIT_WITH_CHILDREN  WHERE UNIT_NUMBER IN (SELECT UNIT_NUMBER FROM PERSON_ROLES T1 INNER JOIN ROLE_RIGHTS T2 ON T1.ROLE_ID = T2.ROLE_ID INNER JOIN RIGHTS T3 ON T2.RIGHT_ID = T3.RIGHT_ID  WHERE T1.DESCEND_FLAG = \'Y\' AND T1.PERSON_ID = <<PERSON_ID>> AND RIGHT_NAME IN (\'VIEW_PROPOSAL\', \'VIEW_ANY_PROPOSAL\', \'CREATE_PROPOSAL\', \'MODIFY_PROPOSAL\')))\"\n}\n' WHERE (`TYPE_CODE` = '3');
      rollback: empty

