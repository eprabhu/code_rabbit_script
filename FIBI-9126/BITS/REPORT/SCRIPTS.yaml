", \"displayName\": \"Funder Approval Date\"}, {\"index\": \"null\", \"summable\": \"N\", \"queryType\": \"IN\", \"columnName\": \"KEY_PERSON_ID\", \"filterType\": \"freetext\", \"valueField\": \"null\", \"displayName\": \"Key Person Id\"}, {\"index\": \"null\", \"summable\": \"N\", \"queryType\": \"null\", \"columnName\": \"MULTIPLIER\", \"filterType\": \"null\", \"valueField\": \"null\", \"displayName\": \"Multiplier %\"}, {\"index\": \"fibiperson\", \"summable\": \"N\", \"queryType\": \"IN\", \"columnName\": \"CLAIM_PREPARER\", \"filterType\": \"elastic\", \"valueField\": \"full_name\", \"displayName\": \"Claim Preparer\"}, {\"index\": \"unitName\", \"width\": 4600, \"summable\": \"N\", \"queryType\": \"IN\", \"columnName\": \"KEY_PERSON_DEPARTMENT\", \"filterType\": \"endpoint\", \"valueField\": \"unitName\", \"displayName\": \"Home Unit\"}], \"tempTable\": \"WITH ACCESS_TMP  AS (SELECT UNIT_NUMBER FROM PERSON_ROLES T1 INNER JOIN ROLE_RIGHTS T2 ON T1.ROLE_ID = T2.ROLE_ID INNER JOIN RIGHTS T3 ON T2.RIGHT_ID = T3.RIGHT_ID  WHERE T1.DESCEND_FLAG = \'N\' AND T1.PERSON_ID = <<PERSON_ID>> AND RIGHT_NAME IN (\'VIEW_AWARD\') UNION SELECT CHILD_UNIT_NUMBER FROM UNIT_WITH_CHILDREN  WHERE UNIT_NUMBER IN (SELECT UNIT_NUMBER FROM PERSON_ROLES T1 INNER JOIN ROLE_RIGHTS T2 ON T1.ROLE_ID = T2.ROLE_ID INNER JOIN RIGHTS T3 ON T2.RIGHT_ID = T3.RIGHT_ID  WHERE T1.DESCEND_FLAG = \'Y\' AND T1.PERSON_ID = <<PERSON_ID>> AND RIGHT_NAME IN (\'VIEW_AWARD\'))), AWARD_TEMP AS (SELECT T1.AWARD_ID FROM AWARD_PERSON_ROLES T1 INNER JOIN ROLE_RIGHTS T2 ON T1.ROLE_ID = T2.ROLE_ID INNER JOIN RIGHTS T3 ON T2.RIGHT_ID = T3.RIGHT_ID WHERE T1.PERSON_ID =<<PERSON_ID>> AND T3.RIGHT_NAME IN (\'VIEW_AWARD\')),GRANTCALL_TEMP AS (SELECT UNIT_NUMBER FROM PERSON_ROLES T1 INNER JOIN ROLE_RIGHTS T2 ON T1.ROLE_ID = T2.ROLE_ID INNER JOIN RIGHTS T3 ON T2.RIGHT_ID = T3.RIGHT_ID WHERE T1.DESCEND_FLAG = \'N\' AND T1.PERSON_ID = <<PERSON_ID>> AND RIGHT_NAME IN (\'VIEW_AWARD\') AND T1.ROLE_ID=\'100\' UNION SELECT CHILD