NUMBER IN(SELECT DISTINCT UNIT_NUMBER FROM ACCESS_TMP))\", \"extraSelection\": \",PROPOSAL_ID AS ID, LEAD_UNIT_NUMBER AS UNIT_NUMBER\", \"selectDistinct\": \"Y\"}' WHERE (`TYPE_CODE` = '1');
