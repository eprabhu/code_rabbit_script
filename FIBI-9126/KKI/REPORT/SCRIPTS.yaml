me\":\"MASTER.GRANT_PER_MONTH\",\"displayName\":\"Grant per Month\",\"filterType\":\"null\",\"valueField\":\"null\",\"index\":\"null\",\"queryType\":\"null\",\"summable\":\"N\"},{\"columnName\":\"MASTER.FEED_STATUS\",\"displayName\":\"Feed Status\",\"filterType\":\"lookUp\",\"valueField\":\"SAP_FEED_STATUS#FEED_STATUS_CODE#true#true\",\"index\":\"null\",\"queryType\":\"IN\",\"summable\":\"N\"},{\"columnName\":\"MASTER.NTU_PRIORITY\",\"displayName\":\"NTU Priority\",\"filterType\":\"null\",\"valueField\":\"null\",\"index\":\"null\",\"queryType\":\"null\",\"summable\":\"N\"},{\"columnName\":\"MASTER.FUNDER_APPROVAL_DATE\",\"displayName\":\"Funder Approval Date\",\"filterType\":\"date\",\"valueField\":\"null\",\"index\":\"null\",\"queryType\":\"BETWEEN\",\"summable\":\"N\",\"width\":5800},{\"columnName\":\"MASTER.KEY_PERSON_ID\",\"displayName\":\"Key Person Id\",\"filterType\":\"freetext\",\"valueField\":\"null\",\"index\":\"null\",\"queryType\":\"IN\",\"summable\":\"N\"},{\"columnName\":\"MASTER.MULTIPLIER\",\"displayName\":\"Multiplier %\",\"filterType\":\"null\",\"valueField\":\"null\",\"index\":\"null\",\"queryType\":\"null\",\"summable\":\"N\"},{\"columnName\":\"MASTER.CLAIM_PREPARER\",\"displayName\":\"Claim Preparer\",\"filterType\":\"elastic\",\"valueField\":\"full_name\",\"index\":\"fibiperson\",\"queryType\":\"IN\",\"summable\":\"N\"},{\"columnName\":\"MASTER.AREA_OF_RESEARCH\",\"displayName\":\"Area Of Research\",\"filterType\":\"null\",\"valueField\":\"null\",\"index\":\"null\",\"queryType\":\"null\",\"summable\":\"N\"},{\"columnName\":\"MASTER.KEY_PERSON_DEPARTMENT\",\"displayName\":\"Home Unit\",\"filterType\":\"endpoint\",\"valueField\":\"unitName\",\"index\":\"unitName\",\"queryType\":\"IN\",\"summable\":\"N\",\"width\":4600}],\"extraCondition\":\"(MASTER.LEAD_UNIT_NUMBER IN(SELECT DISTINCT UNIT_NUMBER FROM ACCESS_TMP) OR MASTER.AWARD_ID IN (SELECT AWARD_ID FROM AWARD_TEMP) OR (MASTER.AWARD_ID IN (SELECT AWARD_ID FROM AWARD A1 INNER JOIN GRANT_CALL_HEADER A2 ON A2.GRANT_HEADER_ID = A1.GRANT_HEADER_ID INNER JOIN GRANTCALL_TEMP PR ON A2.HOME_UNIT_NUMBER = PR.UNIT_NUMBER))) ORDER BY MASTER.AWARD_NUMBER\",\"extraSelection\":\"\",\"selectDistinct\":\"Y\",\"tempTable\":\"WITH ACCESS_TMP  AS (SELECT UNIT_NUMBER FROM PERSON_ROLES T1 INNER JOIN ROLE_RIGHTS T2 ON T1.ROLE_ID = T2.ROLE_ID INNER JOIN RIGHTS T3 ON T2.RIGHT_ID = T3.RIGHT_ID  WHERE T1.DESCEND_FLAG = \'N\' AND T1.PERSON_ID = <<PERSON_ID>> AND RIGHT_NAME IN (\'VIEW_AWARD\') UNION SELECT CHILD_UNIT_NUMBER FROM UNIT_WITH_CHILDREN  WHERE UNIT_NUMBER IN (SELECT UNIT_NUMBER FROM PERSON_ROLES T1 INNER JOIN ROLE_RIGHTS T2 ON T1.ROLE_ID = T2.ROLE_ID INNER JOIN RIGHTS T3 ON T2.RIGHT_ID = T3.RIGHT_ID  WHERE T1.DESCEND_FLAG = \'Y\' AND T1.PERSON_ID = <<PERSON_ID>> AND RIGHT_NAME IN (\'VIEW_AWARD\'))), AWARD_TEMP AS (SELECT T1.AWARD_ID FROM AWARD_PERSON_ROLES T1 INNER JOIN ROLE_RIGHTS T2 ON T1.ROLE_ID = T2.ROLE_ID INNER JOIN RIGHTS T3 ON T2.RIGHT_ID = T3.RIGHT_ID WHERE T1.PERSON_ID =<<PERSON_ID>> AND T3.RIGHT_NAME IN (\'VIEW_AWARD\')), GRANTCALL_TEMP AS (SELECT UNIT_NUMBER FROM PERSON_ROLES T1 INNER JOIN ROLE_RIGHTS T2 ON T1.ROLE_ID = T2.ROLE_ID INNER JOIN RIGHTS T3 ON T2.RIGHT_ID = T3.RIGHT_ID WHERE T1.DESCEND_FLAG = \'N\' AND T1.PERSON_ID = <<PERSON_ID>> AND RIGHT_NAME IN (\'VIEW_AWARD\') AND T1.ROLE_ID=\'100\' UNION SELECT CHILD_UNIT_NUMBER FROM UNIT_WITH_CHILDREN WHERE UNIT_NUMBER IN (SELECT UNIT_NUMBER FROM PERSON_ROLES T1 INNER JOIN ROLE_RIGHTS T2 ON T1.ROLE_ID = T2.ROLE_ID INNER JOIN RIGHTS T3 ON T2.RIGHT_ID = T3.RIGHT_ID WHERE T1.DESCEND_FLAG = \'Y\' AND T1.PERSON_ID = <<PERSON_ID>> AND RIGHT_NAME IN (\'VIEW_AWARD\') AND T1.ROLE_ID=\'100\'))\"}', update_user = 'admin', update_timestamp = UTC_TIMESTAMP() WHERE (`TYPE_CODE` = '9');
      rollback: empty

