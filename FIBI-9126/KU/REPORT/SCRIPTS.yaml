"Question 9.A3\",\n			\"filterType\": \"null\",\n			\"valueField\": \"null\",\n			\"index\": \"null\",\n			\"queryType\": \"null\",\n			\"summable\" : \"N\"\n		},\n		{\n			\"columnName\": \"QUESTION_9_A4\",\n			\"displayName\": \"Question 9.A4\",\n			\"filterType\": \"null\",\n			\"valueField\": \"null\",\n			\"index\": \"null\",\n			\"queryType\": \"null\",\n			\"summable\" : \"N\"\n		},\n		{\n			\"columnName\": \"QUESTION_9_A5\",\n			\"displayName\": \"Question 9.A5\",\n			\"filterType\": \"null\",\n			\"valueField\": \"null\",\n			\"index\": \"null\",\n			\"queryType\": \"null\",\n			\"summable\" : \"N\"\n		}\n	],\n	\"extraCondition\" : \"(LEAD_UNIT_NUMBER IN(SELECT DISTINCT UNIT_NUMBER FROM ACCESS_TMP) OR AWARD_ID IN (SELECT DISTINCT AWARD_ID FROM AWARD_TEMP)) ORDER BY AWARD_NUMBER\",\n	\"extraSelection\" : \"\",\n	\"selectDistinct\" :\"Y\",\n	\"tempTable\":\"WITH ACCESS_TMP  AS (SELECT UNIT_NUMBER FROM PERSON_ROLES T1 INNER JOIN ROLE_RIGHTS T2 ON T1.ROLE_ID = T2.ROLE_ID INNER JOIN RIGHTS T3 ON T2.RIGHT_ID = T3.RIGHT_ID  WHERE T1.DESCEND_FLAG = \'N\' AND T1.PERSON_ID = <<PERSON_ID>> AND RIGHT_NAME IN (\'VIEW_AWARD\',\'CAN_GENERATE_DMP_REPORT\') UNION SELECT CHILD_UNIT_NUMBER FROM UNIT_WITH_CHILDREN  WHERE UNIT_NUMBER IN ( SELECT UNIT_NUMBER FROM PERSON_ROLES T1 INNER JOIN ROLE_RIGHTS T2 ON T1.ROLE_ID = T2.ROLE_ID INNER JOIN RIGHTS T3 ON T2.RIGHT_ID = T3.RIGHT_ID  WHERE T1.DESCEND_FLAG = \'Y\' AND T1.PERSON_ID = <<PERSON_ID>> AND RIGHT_NAME IN (\'VIEW_AWARD\',\'CAN_GENERATE_DMP_REPORT\'))), AWARD_TEMP AS (SELECT T1.AWARD_ID FROM AWARD_PERSON_ROLES T1 INNER JOIN ROLE_RIGHTS T2 ON T1.ROLE_ID = T2.ROLE_ID INNER JOIN RIGHTS T3 ON T2.RIGHT_ID = T3.RIGHT_ID WHERE T1.PERSON_ID =<<PERSON_ID>> AND T3.RIGHT_NAME IN (\'VIEW_AWARD\',\'CAN_GENERATE_DMP_REPORT\')  OR (AWARD_ID IN (SELECT AWARD_ID FROM AWARD A1 INNER JOIN grant_call_header A2 ON A2.GRANT_HEADER_ID = A1.GRANT_HEADER_ID INNER JOIN PERSON_ROLE_RT PR ON A2.HOME_UNIT_NUMBER = PR.UNIT_NUMBER WHERE PR.RIGHT_NAME IN (\'VIEW_AWARD\') AND PR.PERSON_ID = <<PERSON_ID>> AND PR.ROLE_ID = 100)))\"\n}\n' WHERE (TYPE_CODE = '6');
