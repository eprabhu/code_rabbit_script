\": \"null\",\n			\"queryType\": \"null\",\n			\"summable\" : \"N\",\n			\"isCurrency\": \"true\"\n		},		\n		{\n			\"columnName\": \"TOTAL_COST_IN_CURRENCY\",\n			\"displayName\": \"Total Project Cost(In Foreign Currency)\",\n			\"filterType\": \"null\",\n			\"valueField\": \"null\",\n			\"index\": \"null\",\n			\"queryType\": \"null\",\n			\"summable\" : \"N\",\n			\"isCurrency\": \"true\"\n		},\n		{\n			\"columnName\": \"KEY_PERSON_ID\",\n			\"displayName\": \"Key Person Id\",\n			\"filterType\": \"freetext\",\n			\"valueField\": \"null\",\n			\"index\": \"null\",\n			\"queryType\": \"IN\",\n			\"summable\" : \"N\"\n		},\n		{\n			\"columnName\": \"KEY_PERSON_EMAIL\",\n			\"displayName\": \"Key Person Email\",\n			\"filterType\": \"freetext\",\n			\"valueField\": \"null\",\n			\"index\": \"null\",\n			\"queryType\": \"IN\",\n			\"summable\" : \"N\"\n		},\n		{\n			\"columnName\": \"PI_HOME_UNIT\",\n			\"displayName\": \"Home Unit\",\n			\"filterType\": \"endpoint\",\n			\"valueField\": \"unitName\",\n			\"index\": \"unitName\",\n			\"queryType\": \"IN\",\n			\"summable\" : \"N\"\n		}\n	],\n	\"extraCondition\" : \"(HOME_UNIT IN(SELECT DISTINCT UNIT_NUMBER FROM ACCESS_TMP)) OR AWARD_ID IN (SELECT DISTINCT AWARD_ID FROM AWARD_TEMP) ORDER BY AWARD_NUMBER\",\n	\"extraSelection\" : \"\",\n	\"selectDistinct\" :\"Y\",\n	\"tempTable\":\"WITH ACCESS_TMP  AS (SELECT UNIT_NUMBER FROM PERSON_ROLES T1 INNER JOIN ROLE_RIGHTS T2 ON T1.ROLE_ID = T2.ROLE_ID INNER JOIN RIGHTS T3 ON T2.RIGHT_ID = T3.RIGHT_ID  WHERE T1.DESCEND_FLAG = \'N\' AND T1.PERSON_ID = <<PERSON_ID>> AND RIGHT_NAME IN (\'VIEW_AWARD\') UNION SELECT CHILD_UNIT_NUMBER FROM UNIT_WITH_CHILDREN  WHERE UNIT_NUMBER IN (SELECT UNIT_NUMBER FROM PERSON_ROLES T1 INNER JOIN ROLE_RIGHTS T2 ON T1.ROLE_ID = T2.ROLE_ID INNER JOIN RIGHTS T3 ON T2.RIGHT_ID = T3.RIGHT_ID  WHERE T1.DESCEND_FLAG = \'Y\' AND T1.PERSON_ID = <<PERSON_ID>> AND RIGHT_NAME IN (\'VIEW_AWARD\'))), AWARD_TEMP AS ((SELECT AWARD_ID FROM AWARD A1 INNER JOIN grant_call_header A2 ON A2.GRANT_HEADER_ID = A1.GRANT_HEADER_ID INNER JOIN PERSON_ROLE_RT PR ON A2.HOME_UNIT_NUMBER = PR.UNIT_NUMBER WHERE PR.RIGHT_NAME IN (\'VIEW_AWARD\') AND PR.PERSON_ID = <<PERSON_ID>> AND PR.ROLE_ID = 100))\"\n}\n' WHERE (TYPE_CODE = '11');
