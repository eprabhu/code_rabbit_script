	\"index\": \"null\",\n			\"queryType\": \"IN\",\n			\"summable\" : \"N\",\n			\"innerJoin\" : \"N\"\n		},\n		{\n			\"columnName\": \"CHILD.VALUE_TYPE\",\n			\"displayName\": \"Value Type\",\n			\"filterType\": \"null\",\n			\"valueField\": \"null\",\n			\"index\": \"null\",\n			\"queryType\": \"IN\",\n			\"summable\" : \"N\",\n			\"innerJoin\" : \"N\"\n		},\n		{\n			\"columnName\": \"CHILD.AMOUNT_TYPE\",\n			\"displayName\": \"Amount Type\",\n			\"filterType\": \"null\",\n			\"valueField\": \"null\",\n			\"index\": \"null\",\n			\"queryType\": \"IN\",\n			\"summable\" : \"N\",\n			\"innerJoin\" : \"N\"\n		},\n		{\n			\"columnName\": \"CHILD.TRANSACTION_NUMBER\",\n			\"displayName\": \"Transaction Number\",\n			\"filterType\": \"null\",\n			\"valueField\": \"null\",\n			\"index\": \"null\",\n			\"queryType\": \"null\",\n			\"summable\" : \"N\",\n			\"innerJoin\" : \"Y\"\n		},\n		{\n			\"columnName\": \"CHILD.REMARKS\",\n			\"displayName\": \"Description\",\n			\"filterType\": \"null\",\n			\"valueField\": \"null\",\n			\"index\": \"null\",\n			\"queryType\": \"null\",\n			\"summable\" : \"N\",\n			\"innerJoin\" : \"Y\"\n		},\n		{\n			\"columnName\": \"CHILD.REVENUE_AMOUNT\",\n			\"displayName\": \"Actual Revenue\",\n			\"filterType\": \"null\",\n			\"valueField\": \"null\",\n			\"index\": \"null\",\n			\"queryType\": \"null\",\n			\"summable\" : \"Y\",\n			\"innerJoin\" : \"Y\",\n			\"isCurrency\": \"true\"\n		},\n		{\n			\"columnName\": \"CHILD.PREDECESSOR_DOC_NUMBER\",\n			\"displayName\": \"Predecessor Document Number\",\n			\"filterType\": \"freetext\",\n			\"valueField\": \"null\",\n			\"index\": \"null\",\n			\"queryType\": \"LIKE\",\n			\"summable\" : \"N\",\n			\"innerJoin\" : \"N\"\n		},\n		{\n			\"columnName\": \"CHILD.BANK_CLEARING_DATE\",\n			\"displayName\": \"Bank Clearing Date\",\n			\"filterType\": \"date\",\n			\"valueField\": \"null\",\n			\"index\": \"null\",\n			\"queryType\": \"BETWEEN\",\n			\"summable\" : \"N\",\n			\"innerJoin\" : \"N\"\n		},\n		{\n			\"columnName\": \"CHILD.PO_DATE\",\n			\"displayName\": \"PO Date\",\n			\"filterType\": \"date\",\n			\"valueField\": \"null\",\n			\"index\": \"null\",\n			\"queryType\": \"BETWEEN\",\n			\"summable\" : \"N\",\n			\"innerJoin\" : \"N\"\n		}\n	],\n	\"extraCondition\" : \"(MASTER_DATA.LEAD_UNIT_NUMBER IN(SELECT DISTINCT UNIT_NUMBER FROM ACCESS_TMP) OR MASTER_DATA.AWARD_ID IN (SELECT AWARD_ID FROM AWARD_TEMP)) ORDER BY MASTER_DATA.AWARD_NUMBER,CHILD.IO_CODE,CHILD.FM_POSTING_DATE ASC,CHILD.DOCUMENT_NUMBER ASC\",\n	\"extraSelection\" : \"\",\n	\"innerJoinPlaceHolder\" : \"<FILTER_CONDITION>\",\n	\"tempTable\":\"WITH ACCESS_TMP AS (SELECT UNIT_NUMBER FROM PERSON_ROLES T1 INNER JOIN ROLE_RIGHTS T2 ON T1.ROLE_ID = T2.ROLE_ID INNER JOIN RIGHTS T3 ON T2.RIGHT_ID = T3.RIGHT_ID  WHERE T1.DESCEND_FLAG = \'N\' AND T1.PERSON_ID = <<PERSON_ID>> AND RIGHT_NAME IN (\'VIEW_EXPENSE_TRANSACTION\') UNION SELECT CHILD_UNIT_NUMBER FROM UNIT_WITH_CHILDREN  WHERE UNIT_NUMBER IN (SELECT UNIT_NUMBER FROM PERSON_ROLES T1 INNER JOIN ROLE_RIGHTS T2 ON T1.ROLE_ID = T2.ROLE_ID INNER JOIN RIGHTS T3 ON T2.RIGHT_ID = T3.RIGHT_ID  WHERE T1.DESCEND_FLAG = \'Y\' AND T1.PERSON_ID = <<PERSON_ID>> AND RIGHT_NAME IN (\'VIEW_EXPENSE_TRANSACTION\'))), AWARD_TEMP AS (SELECT T1.AWARD_ID FROM AWARD_PERSON_ROLES T1 INNER JOIN ROLE_RIGHTS T2 ON T1.ROLE_ID = T2.ROLE_ID INNER JOIN RIGHTS T3 ON T2.RIGHT_ID = T3.RIGHT_ID WHERE T1.PERSON_ID =<<PERSON_ID>> AND T3.RIGHT_NAME IN (\'VIEW_EXPENSE_TRANSACTION\') OR (AWARD_ID IN (SELECT AWARD_ID FROM AWARD A1 INNER JOIN grant_call_header A2 ON A2.GRANT_HEADER_ID = A1.GRANT_HEADER_ID INNER JOIN PERSON_ROLE_RT PR ON A2.HOME_UNIT_NUMBER = PR.UNIT_NUMBER WHERE PR.RIGHT_NAME IN (\'VIEW_AWARD\') AND PR.PERSON_ID = <<PERSON_ID>> AND PR.ROLE_ID = 100)))\"\n}\n' WHERE (TYPE_CODE = '8');
