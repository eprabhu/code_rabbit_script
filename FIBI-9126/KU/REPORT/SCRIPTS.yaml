},\n		{\n			\"columnName\": \"TOTAL_INDIRECT_COST\",\n			\"displayName\": \"Total Indirect Cost (AED)\",\n			\"filterType\": \"null\",\n			\"valueField\": \"null\",\n			\"index\": \"null\",\n			\"queryType\": \"IN\",\n			\"isCurrency\": \"true\",\n			\"width\": 5800\n		},\n		{\n			\"columnName\": \"TOTAL_SUBCONTRACT_COST\",\n			\"displayName\": \"Total Subcontract Cost (AED)\",\n			\"filterType\": \"null\",\n			\"valueField\": \"null\",\n			\"index\": \"null\",\n			\"queryType\": \"IN\",\n			\"isCurrency\": \"true\",\n			\"width\": 5800\n		},\n		{\n			\"columnName\": \"UNDERRECOVERY_AMOUNT\",\n			\"displayName\": \"Under Recovery Amount (AED)\",\n			\"filterType\": \"null\",\n			\"valueField\": \"null\",\n			\"index\": \"null\",\n			\"queryType\": \"IN\",\n			\"isCurrency\": \"true\",\n			\"width\": 5800\n		},\n		{\n			\"columnName\": \"SPONSOR_NAME\",\n			\"displayName\": \"Sponsor\",\n			\"filterType\": \"endpoint\",\n			\"valueField\": \"sponsorName\",\n			\"index\": \"sponsorName\",\n			\"queryType\": \"IN\",\n			\"width\": 7000\n		},\n		{\n			\"columnName\": \"LEAD_UNIT_NAME\",\n			\"displayName\": \"Lead Unit\",\n			\"filterType\": \"endpoint\",\n			\"valueField\": \"unitName\",\n			\"index\": \"unitName\",\n			\"queryType\": \"IN\",\n			\"width\": 7000\n		},\n		{\n			\"columnName\": \"ACTIVITY_TYPE\",\n			\"displayName\": \"Activity Type\",\n			\"filterType\": \"lookUp\",\n			\"valueField\": \"ACTIVITY_TYPE#ACTIVITY_TYPE_CODE#true#true\",\n			\"index\": \"null\",\n			\"queryType\": \"IN\",\n			\"width\": 7000\n		},\n		{\n			\"columnName\": \"SPECIAL_REVIEW\",\n			\"displayName\": \"Special Review Type\",\n			\"filterType\": \"lookUp\",\n			\"valueField\": \"SPECIAL_REVIEW#SPECIAL_REVIEW_CODE#true#true\",\n			\"index\": \"null\",\n			\"queryType\": \"IN\",\n			\"width\": 7000\n		},\n		{\n			\"columnName\": \"FUNDING_SCHEME\",\n			\"displayName\": \"Funding Scheme\",\n			\"filterType\": \"lookUp\",\n			\"valueField\": \"FUNDING_SCHEME#FUNDING_SCHEME_CODE#true#true\",\n			\"index\": \"null\",\n			\"queryType\": \"IN\",\n			\"width\": 7000\n		},\n		{\n			\"columnName\": \"TYPE_OF_FUNDING_AGENCY\",\n			\"displayName\": \"Funding Agency Type\",\n			\"filterType\": \"lookUp\",\n			\"valueField\": \"SPONSOR_TYPE#SPONSOR_TYPE_CODE#true#true\",\n			\"index\": \"null\",\n			\"queryType\": \"IN\",\n			\"width\": 7000\n		},\n		{\n			\"columnName\": \"DISCIPLINE_CLUSTER\",\n			\"displayName\": \"Discipline Cluster\",\n			\"filterType\": \"lookUp\",\n			\"valueField\": \"EPS_PROP_DISCIPLINE_CLUSTER#CLUSTER_CODE#true#true\",\n			\"index\": \"null\",\n			\"queryType\": \"IN\",\n			\"width\": 7000\n		},\n		{\n			\"columnName\": \"ORGANIZATION\",\n			\"displayName\": \"Organization\",\n			\"filterType\": \"freetext\",\n			\"valueField\": \"null\",\n			\"index\": \"null\",\n			\"queryType\": \"LIKE\",\n			\"width\": 7000\n		},\n		{\n			\"columnName\": \"PERSON_NAME\",\n			\"displayName\": \"Person Name\",\n			\"filterType\": \"elastic\",\n			\"valueField\": \"full_name\",\n			\"index\": \"fibiperson\",\n			\"queryType\": \"IN\",\n			\"width\": 11000\n		},\n		{\n			\"columnName\": \"PERSON_ID\",\n			\"displayName\": \"Person ID\",\n			\"filterType\": \"null\",\n			\"valueField\": \"null\",\n			\"index\": \"null\",\n			\"queryType\": \"IN\",\n			\"width\" : 4600\n		},\n		{\n			\"columnName\": \"PERSON_ROLE\",\n			\"displayName\": \"Person Role\",\n			\"filterType\": \"lookUp\",\n			\"valueField\": \"EPS_PROP_PERSON_ROLE#PROP_PERSON_ROLE_ID#true#true\",\n			\"index\": \"null\",\n			\"queryType\": \"IN\",\n			\"width\": 7000\n		},\n		{\n			\"columnName\": \"PERCENTAGE_OF_EFFORT\",\n			\"displayName\": \"% of Effort\",\n			\"filterType\": \"null\",\n			\"valueField\": \"null\",\n			\"index\": \"null\",\n			\"queryType\": \"IN\",\n			\"width\" : 4600\n		},\n		{\n			\"columnName\": \"SUBMIT_USER\",\n			\"displayName\": \"Proposal Submit User\",\n			\"filterType\": \"elastic\",\n			\"valueField\": \"full_name\",\n			\"index\": \"fibiperson\",\n			\"queryType\": \"IN\",\n			\"width\" : 11000\n		},\n		{\n			\"columnName\": \"RESEARCH_CENTER\",\n			\"displayName\": \"Research Center\",\n			\"filterType\": \"lookUp\",\n			\"valueField\": \"RESEARCH_CENTER#CENTER_ID#true#true\",\n			\"index\": \"null\",\n			\"queryType\": \"IN\",\n			\"width\": 7000\n		},\n		 {\n			\"columnName\": \"HORIZONTAL_AREA\",\n			\"displayName\": \"Horizontal Area\",\n			\"filterType\": \"freetext\",\n			\"valueField\": \"null\",\n			\"index\": \"null\",\n			\"queryType\": \"LIKE\",\n			\"summable\" : \"N\",\n			\"width\": 18000\n		},\n		{\n			\"columnName\": \"VERTICAL_AREA\",\n			\"displayName\": \"Vertical Area\",\n			\"filterType\": \"freetext\",\n			\"valueField\": \"null\",\n			\"index\": \"null\",\n			\"queryType\": \"LIKE\",\n			\"summable\" : \"N\",\n			\"width\": 18000\n		}\n	],\n	\"extraCondition\" : \"(PROPOSAL_ID IN (SELECT PROPOSAL_ID FROM EPS_PROPOSAL_TEMP) OR LEAD_UNIT_NUMBER IN(SELECT DISTINCT UNIT_NUMBER FROM ACCESS_TMP))\",\n	\"extraSelection\" : \",PROPOSAL_ID AS ID, LEAD_UNIT_NUMBER AS UNIT_NUMBER\",\n	\"selectDistinct\" :\"Y\",\n	\"tempTable\":\"WITH ACCESS_TMP AS (SELECT UNIT_NUMBER FROM PERSON_ROLES T1 INNER JOIN ROLE_RIGHTS T2 ON T1.ROLE_ID = T2.ROLE_ID INNER JOIN RIGHTS T3 ON T2.RIGHT_ID = T3.RIGHT_ID  WHERE T1.DESCEND_FLAG = \'N\' AND T1.PERSON_ID = <<PERSON_ID>> AND RIGHT_NAME IN (\'VIEW_PROPOSAL\' \'CREATE_PROPOSAL\', \'MODIFY_PROPOSAL\') UNION SELECT CHILD_UNIT_NUMBER FROM UNIT_WITH_CHILDREN  WHERE UNIT_NUMBER IN (SELECT UNIT_NUMBER FROM PERSON_ROLES T1 INNER JOIN ROLE_RIGHTS T2 ON T1.ROLE_ID = T2.ROLE_ID INNER JOIN RIGHTS T3 ON T2.RIGHT_ID = T3.RIGHT_ID  WHERE T1.DESCEND_FLAG = \'Y\' AND T1.PERSON_ID = <<PERSON_ID>> AND RIGHT_NAME IN (\'VIEW_PROPOSAL\' \'CREATE_PROPOSAL\', \'MODIFY_PROPOSAL\'))),EPS_PROPOSAL_TEMP AS (SELECT PROPOSAL_ID FROM EPS_PROPOSAL_PERSON_ROLES WHERE PERSON_ID = <<PERSON_ID>>)\"\n}\n' WHERE (TYPE_CODE = '1');
      rollback: empty

