astic\",\n			\"valueField\": \"full_name\",\n			\"index\": \"fibiperson\",\n			\"queryType\": \"IN\"\n		},\n		{\n			\"columnName\": \"CHILD.FI_GL_ACCOUNT\",\n			\"displayName\": \"FI GL Account\",\n			\"filterType\": \"freetext\",\n			\"valueField\": \"null\",\n			\"index\": \"null\",\n			\"queryType\": \"LIKE\"\n		},\n		{\n			\"columnName\": \"CHILD.FI_GL_DESCRIPTION\",\n			\"displayName\": \"FI GL Description\",\n			\"filterType\": \"freetext\",\n			\"valueField\": \"null\",\n			\"index\": \"null\",\n			\"queryType\": \"LIKE\"\n		},\n		{\n			\"columnName\": \"CHILD.FM_POSTING_DATE\",\n			\"displayName\": \"FM Posting Date\",\n			\"filterType\": \"date\",\n			\"valueField\": \"null\",\n			\"index\": \"null\",\n			\"queryType\": \"BETWEEN\"\n		},\n		{\n			\"columnName\": \"CHILD.REFERENCE_DOC_NUMBER\",\n			\"displayName\": \"Reference Doc Number\",\n			\"filterType\": \"freetext\",\n			\"valueField\": \"referenceDocNumber\",\n			\"index\": \"null\",\n			\"queryType\": \"LIKE\"\n		},\n		{\n			\"columnName\": \"CHILD.DOCUMENT_DATE\",\n			\"displayName\": \"Document Date\",\n			\"filterType\": \"date\",\n			\"valueField\": \"documentDate\",\n			\"index\": \"null\",\n			\"queryType\": \"BETWEEN\"\n		},\n		{\n			\"columnName\": \"CHILD.PREDECESSOR_DOC_NUMBER\",\n			\"displayName\": \"Predecessor Doc Number\",\n			\"filterType\": \"freetext\",\n			\"valueField\": \"predecessorDocNumber\",\n			\"index\": \"null\",\n			\"queryType\": \"LIKE\"\n		},\n		{\n			\"columnName\": \"CHILD.FI_POSTING_DATE\",\n			\"displayName\": \"FI Posting Date\",\n			\"filterType\": \"date\",\n			\"valueField\": \"null\",\n			\"index\": \"null\",\n			\"queryType\": \"BETWEEN\"\n		},\n		{\n			\"columnName\": \"CHILD.VENDOR_NAME\",\n			\"displayName\": \"Vendor Name\",\n			\"filterType\": \"freetext\",\n			\"valueField\": \"vendorName\",\n			\"index\": \"null\",\n			\"queryType\": \"LIKE\"\n		},\n		{\n			\"columnName\": \"CHILD.REMARKS\",\n			\"displayName\": \"Remarks\",\n			\"filterType\": \"free