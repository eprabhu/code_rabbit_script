            sql: |
              UPDATE `dyn_section_config` SET `DESCRIPTION` = 'Questionnaire', `UPDATE_TIMESTAMP` = utc_timestamp(), `UPDATE_USER` = 'admin' WHERE (`SECTION_CODE` = 'SR2005');
