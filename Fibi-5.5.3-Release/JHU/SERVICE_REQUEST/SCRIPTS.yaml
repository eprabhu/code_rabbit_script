              UPDATE `dyn_section_config` SET `IS_ACTIVE` = 'Y', `UPDATE_TIMESTAMP` = utc_timestamp(), `UPDATE_USER` = 'admin' WHERE (`SECTION_CODE` = 'SR2005');
              UPDATE `dyn_section_config` SET `IS_ACTIVE` = 'N', `UPDATE_TIMESTAMP` = utc_timestamp(), `UPDATE_USER` = 'admin' WHERE (`SECTION_CODE` = 'SR2014');

