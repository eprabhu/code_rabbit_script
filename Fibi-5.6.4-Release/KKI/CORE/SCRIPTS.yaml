databaseChangeLog:

    - changeSet:
      id: FIBI-11202
      author: Farsana Khadar
      labels: 'DML'
      comment: Missing Progress Report rights
      changes:
        - sql:
            sql: |
              INSERT INTO rights (`RIGHT_ID`,`RIGHT_NAME`,`DESCRIPTION`,`UPDATE_USER`,`UPDATE_TIMESTAMP`,`RIGHTS_TYPE_CODE`) SELECT (SELECT IFNULL(MAX(RIGHT_ID),0)+1 FROM rights),'VIEW_PROGRESS_REPORT','To view award progress report','admin', UTC_TIMESTAMP(),'2'
                WHERE NOT EXISTS (
                    SELECT 1 FROM rights 
                    WHERE RIGHT_NAME = 'VIEW_PROGRESS_REPORT'
                );
                INSERT INTO rights (`RIGHT_ID`,`RIGHT_NAME`,`DESCRIPTION`,`UPDATE_USER`,`UPDATE_TIMESTAMP`,`RIGHTS_TYPE_CODE`) SELECT (SELECT IFNULL(MAX(RIGHT_ID),0)+1 FROM rights),'MODIFY_PROGRESS_REPORT','To modify award progress report','admin', UTC_TIMESTAMP(),'2'
                WHERE NOT EXISTS (
                    SELECT 1 FROM rights 
                    WHERE RIGHT_NAME = 'MODIFY_PROGRESS_REPORT'
                );
                INSERT INTO rights (`RIGHT_ID`,`RIGHT_NAME`,`DESCRIPTION`,`UPDATE_USER`,`UPDATE_TIMESTAMP`,`RIGHTS_TYPE_CODE`) SELECT (SELECT IFNULL(MAX(RIGHT_ID),0)+1 FROM rights),'PROGRESS_REPORT_FLIP_STATUS','For flipping the progress report status to “HOLD FOR FUNDING AGENCY REVIEW“','admin', UTC_TIMESTAMP(),'2'
                WHERE NOT EXISTS (
                    SELECT 1 FROM rights 
                    WHERE RIGHT_NAME = 'PROGRESS_REPORT_FLIP_STATUS'
                );
      rollback: empty


    - changeSet:
      id: FIBI-11202-2
      author: Farsana Khadar
      labels: 'DML'
      comment: Missing progress_report_status
      changes:
        - sql:
            sql: |
                    INSERT INTO progress_report_status (`PROGRESS_REPORT_STATUS_CODE`, `DESCRIPTION`, `UPDATE_TIMESTAMP`, `UPDATE_USER`, `IS_ACTIVE`) VALUES ('1', 'In Progress', UTC_TIMESTAMP(), 'admin', 'Y');
                    INSERT INTO progress_report_status (`PROGRESS_REPORT_STATUS_CODE`, `DESCRIPTION`, `UPDATE_TIMESTAMP`, `UPDATE_USER`, `IS_ACTIVE`) VALUES ('2', 'Revision Requested', UTC_TIMESTAMP(), 'admin', 'Y');
                    INSERT INTO progress_report_status (`PROGRESS_REPORT_STATUS_CODE`, `DESCRIPTION`, `UPDATE_TIMESTAMP`, `UPDATE_USER`, `IS_ACTIVE`) VALUES ('3', 'Approval In Progress', UTC_TIMESTAMP(), 'admin', 'Y');
                    INSERT INTO progress_report_status (`PROGRESS_REPORT_STATUS_CODE`, `DESCRIPTION`, `UPDATE_TIMESTAMP`, `UPDATE_USER`, `IS_ACTIVE`) VALUES ('4', 'Approved', UTC_TIMESTAMP(), 'admin', 'Y');
                    INSERT INTO progress_report_status (`PROGRESS_REPORT_STATUS_CODE`, `DESCRIPTION`, `UPDATE_TIMESTAMP`, `UPDATE_USER`, `IS_ACTIVE`) VALUES ('5', 'Hold for Funding Agency Review', UTC_TIMESTAMP(), 'admin', 'Y');
                    INSERT INTO progress_report_status (`PROGRESS_REPORT_STATUS_CODE`, `DESCRIPTION`, `UPDATE_TIMESTAMP`, `UPDATE_USER`, `IS_ACTIVE`) VALUES ('6', 'Completed', UTC_TIMESTAMP(), 'admin', 'Y');

      rollback: empty

    - changeSet:
