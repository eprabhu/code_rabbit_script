        - sql:
            sql: |


                    INSERT INTO progress_report_achievement_type (`ACHIEVEMENT_TYPE_CODE`, `DESCRIPTION`, `UPDATE_TIMESTAMP`, `UPDATE_USER`, `SECTION_TYPE`, `IS_ACTIVE`, `TEMPLATE_DESCRIPTION`) VALUES ('1', 'Short Summary of the Project Achievement. This section should provide a succinct description of the project, outlining the core impact and the relevant insights or findings from this research', UTC_TIMESTAMP(), 'admin', 'S', 'Y', 'Short Summary of the Project Achievement.');
                    INSERT INTO progress_report_achievement_type (`ACHIEVEMENT_TYPE_CODE`, `DESCRIPTION`, `UPDATE_TIMESTAMP`, `UPDATE_USER`, `SECTION_TYPE`, `IS_ACTIVE`, `TEMPLATE_DESCRIPTION`) VALUES ('2', 'Please elaborate if there are any key information about the current research and the significance of it in relation to the impact.', UTC_TIMESTAMP(), 'admin', 'S', 'Y', 'Please elaborate if there are any key information about the current research and the significance of it in relation to the impact.');
                    INSERT INTO progress_report_achievement_type (`ACHIEVEMENT_TYPE_CODE`, `DESCRIPTION`, `UPDATE_TIMESTAMP`, `UPDATE_USER`, `SECTION_TYPE`, `IS_ACTIVE`, `TEMPLATE_DESCRIPTION`) VALUES ('3', 'What has been done to develop capabilities that would be relevant to the industry and society at large and/or push the frontier of science',UTC_TIMESTAMP(), 'admin', 'S', 'Y', 'What has been done to develop capabilities that would be relevant to the industry and society at large and/or push the frontier of science');
                    INSERT INTO progress_report_achievement_type (`ACHIEVEMENT_TYPE_CODE`, `DESCRIPTION`, `UPDATE_TIMESTAMP`, `UPDATE_USER`, `SECTION_TYPE`, `IS_ACTIVE`, `TEMPLATE_DESCRIPTION`) VALUES ('5', 'What are the capabilities that have been built up?', UTC_TIMESTAMP(), 'admin', 'F', 'Y', 'What are the capabilities that have been built up?');
                    INSERT INTO progress_report_achievement_type (`ACHIEVEMENT_TYPE_CODE`, `DESCRIPTION`, `UPDATE_TIMESTAMP`, `UPDATE_USER`, `SECTION_TYPE`, `IS_ACTIVE`, `TEMPLATE_DESCRIPTION`) VALUES ('6', 'What are your plans in Singapore beyond this award?', UTC_TIMESTAMP(), 'admin', 'F', 'Y', 'What are your plans in Singapore beyond this award?');
                    INSERT INTO progress_report_achievement_type (`ACHIEVEMENT_TYPE_CODE`, `DESCRIPTION`, `UPDATE_TIMESTAMP`, `UPDATE_USER`, `SECTION_TYPE`, `IS_ACTIVE`, `TEMPLATE_DESCRIPTION`) VALUES ('7', 'What are the capabilities that have been built up?', UTC_TIMESTAMP(), 'admin', 'F', 'Y', 'What are the capabilities that have been built up?');
                    INSERT INTO progress_report_achievement_type (`ACHIEVEMENT_TYPE_CODE`, `DESCRIPTION`, `UPDATE_TIMESTAMP`, `UPDATE_USER`, `SECTION_TYPE`, `IS_ACTIVE`, `TEMPLATE_DESCRIPTION`) VALUES ('8', 'Any plans for further development of this project into a larger external grant or industrial partnership?', UTC_TIMESTAMP(), 'admin', 'F', 'Y', 'What are the capabilities that have been built up?');

