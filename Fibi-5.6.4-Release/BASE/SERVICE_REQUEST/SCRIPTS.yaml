String","isEditable":true,"length":3,"canEmpty":false,"visible":false,"valueChanged":null,"index":null,"filterType":"lookUp","valueField":"SR_TYPE#TYPE_CODE","isTransient":null,"values":null,"refColumnName":null,"defaultValue":"DESCRIPTION_TYPE_CODE"},{"columnName":"DESCRIPTION_TYPE_CODE","displayName":"Type","dataType":"String","isEditable":false,"length":null,"canEmpty":false,"visible":true,"valueChanged":null,"index":null,"filterType":null,"valueField":null,"isTransient":"true","values":null,"refColumnName":null,"defaultValue":null},{"columnName":"IS_ACTIVE","displayName":"Is Active","dataType":"String","isEditable":true,"length":1,"canEmpty":false,"visible":true,"valueChanged":null,"index":null,"filterType":"switch","valueField":null,"isTransient":null,"values":null,"refColumnName":null,"defaultValue":null},{"columnName":"UPDATE_TIMESTAMP","displayName":"Update Timestamp","dataType":"Date","isEditable":false,"length":null,"canEmpty":true,"visible":true,"valueChanged":null,"index":null,"filterType":null,"valueField":null,"isTransient":null,"values":null,"refColumnName":null,"defaultValue":null},{"columnName":"UPDATE_USER","displayName":"Update User","dataType":"String","isEditable":false,"length":60,"canEmpty":true,"visible":true,"valueChanged":null,"index":null,"filterType":null,"valueField":null,"isTransient":null,"values":null,"refColumnName":"PERSON#PERSON_ID","defaultValue":null}],"primaryKey":["SR_MODULE_MAPPING_ID"],"dependency":[{"displayName":"Association Configuration","table_name":"ASSOC_CONFIG","columnName":"ASSOC_CONFIG_CODE","showTableName":"true"},{"displayName":"Service Request Category","table_name":"SR_CATEGORY","columnName":"CATEGORY_CODE","showTableName":"true"},{"displayName":"Service Request Types","table_name":"SR_TYPE","columnName":"TYPE_CODE","showTableName":"true"}],"actions":null}',
                'Service Request',
