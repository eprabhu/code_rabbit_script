databaseChangeLog:

  - changeSet:
      id: FIBI-10371-1
      author: Reshma  Antony
      labels: 'DML'
      comment: Introduce new Parameter CAN_CREATE_AGREEMENT_IN_ANY_UNIT to controls Lead Unit visibility
      changes:
        - sql:
            sql: |
              INSERT IGNORE INTO PARAMETER (`PARAMETER_NAME`, `VALUE`, `DESCRIPTION`, `UPDATE_TIMESTAMP`, `UPDATE_USER`) VALUES ('CAN_CREATE_AGREEMENT_IN_ANY_UNIT', 'Y', 'To enable Agreement creation in any of the unit', UTC_TIMESTAMP(), 'admin');
      rollback: empty

  - changeSet:
      id: FIBI-10792-1
      author: Reshma  Antony
      labels: 'DML'
      comment: Introduced a new right, MODIFY_SERVICE_REQUEST_PROJECT_ASSOCIATION, to authorize personnel to add or update project associations.
      changes:
        - sql:
            sql: |
              INSERT INTO rights (RIGHT_ID, RIGHT_NAME, DESCRIPTION, UPDATE_USER, UPDATE_TIMESTAMP, RIGHTS_TYPE_CODE)
              SELECT
                  (SELECT COALESCE(MAX(RIGHT_ID), 0) + 1 FROM rights),
                  'MODIFY_SERVICE_REQUEST_PROJECT_ASSOCIATION',
                  'Controls and manages project association modifications for service requests, ensuring that only authorized personnel can add or update project associations.',
                  'admin',
                  UTC_TIMESTAMP(),
                  '1'
              WHERE NOT EXISTS (
                  SELECT 1 FROM rights WHERE RIGHT_NAME = 'MODIFY_SERVICE_REQUEST_PROJECT_ASSOCIATION'
              );
      rollback:
        - sql:
            sql: |
              DELETE FROM rights WHERE RIGHT_NAME = 'MODIFY_SERVICE_REQUEST_PROJECT_ASSOCIATION';

