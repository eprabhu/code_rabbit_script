                        SELECT 1
                        FROM ARG_VALUE_LOOKUP
                        WHERE ARGUMENT_NAME = 'PLACEHOLDER_AWARD'
                              AND ARGUMENT_VALUE = 'ACTUAL_HEAD_COUNT'
                        );

                        INSERT INTO ARG_VALUE_LOOKUP (ARG_VALUE_LOOKUP_ID, ARGUMENT_NAME, ARGUMENT_VALUE, DESCRIPTION, UPDATE_TIMESTAMP, UPDATE_USER)
                        SELECT
                        (SELECT MAX(ARG_VALUE_LOOKUP_ID) + 1 FROM ARG_VALUE_LOOKUP),
                        'PLACEHOLDER_AWARD',
                        'APPROVED_HEAD_COUNT',
                        'For setting approved head count',
                        UTC_TIMESTAMP(),
                        'admin'
                        WHERE NOT EXISTS (
                        SELECT 1
                        FROM ARG_VALUE_LOOKUP
                        WHERE ARGUMENT_NAME = 'PLACEHOLDER_AWARD'
                              AND ARGUMENT_VALUE = 'APPROVED_HEAD_COUNT'
                        );

                        INSERT INTO ARG_VALUE_LOOKUP (ARG_VALUE_LOOKUP_ID, ARGUMENT_NAME, ARGUMENT_VALUE, DESCRIPTION, UPDATE_TIMESTAMP, UPDATE_USER)
                        SELECT
                        (SELECT MAX(ARG_VALUE_LOOKUP_ID) + 1 FROM ARG_VALUE_LOOKUP),
                        'PLACEHOLDER_AWARD',
                        'EXPENSE_AMOUNT',
                        'For setting expense amount',
                        UTC_TIMESTAMP(),
