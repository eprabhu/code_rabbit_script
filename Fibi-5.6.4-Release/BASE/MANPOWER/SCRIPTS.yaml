databaseChangeLog:

  - changeSet:
        id: FIBI-9683-1
        author: Hridya.E K
        labels: 'DML'
        comment:  Insert new placeholders in arg_value_lookup.
        changes:
          - sql:
              sql: |
                    INSERT INTO ARG_VALUE_LOOKUP (ARG_VALUE_LOOKUP_ID, ARGUMENT_NAME, ARGUMENT_VALUE, DESCRIPTION, UPDATE_TIMESTAMP, UPDATE_USER)
                        SELECT 
                    (SELECT MAX(ARG_VALUE_LOOKUP_ID) + 1 FROM ARG_VALUE_LOOKUP), 
                    'PLACEHOLDER_AWARD', 
                    'RECONCILIATION_TIMESTAMP', 
                    'For setting Reconciliation run timestamp', 
                    UTC_TIMESTAMP(), 
                    'admin'
                        WHERE NOT EXISTS (
                    SELECT 1
                    FROM arg_value_lookup
                    WHERE ARGUMENT_NAME = 'PLACEHOLDER_AWARD' 
                    AND ARGUMENT_VALUE = 'RECONCILIATION_TIMESTAMP'
                    );

                    INSERT INTO ARG_VALUE_LOOKUP (ARG_VALUE_LOOKUP_ID, ARGUMENT_NAME, ARGUMENT_VALUE, DESCRIPTION, UPDATE_TIMESTAMP, UPDATE_USER)
                        SELECT
                        (SELECT MAX(ARG_VALUE_LOOKUP_ID) + 1 FROM ARG_VALUE_LOOKUP),
                        'PLACEHOLDER_AWARD',
                        'WBS_NUMBER',
                        'For setting WBS number',
                        UTC_TIMESTAMP(),
                        'admin'
                        WHERE NOT EXISTS (
                        SELECT 1
                        FROM ARG_VALUE_LOOKUP
                        WHERE ARGUMENT_NAME = 'PLACEHOLDER_AWARD'
                              AND ARGUMENT_VALUE = 'WBS_NUMBER'
                        );

                        INSERT INTO ARG_VALUE_LOOKUP (ARG_VALUE_LOOKUP_ID, ARGUMENT_NAME, ARGUMENT_VALUE, DESCRIPTION, UPDATE_TIMESTAMP, UPDATE_USER)
                        SELECT
                        (SELECT MAX(ARG_VALUE_LOOKUP_ID) + 1 FROM ARG_VALUE_LOOKUP),
                        'PLACEHOLDER_AWARD',
                        'BUDGET_AMOUNT',
                        'For setting budget amount',
                        UTC_TIMESTAMP(),
                        'admin'
                        WHERE NOT EXISTS (
                        SELECT 1
                        FROM ARG_VALUE_LOOKUP
                        WHERE ARGUMENT_NAME = 'PLACEHOLDER_AWARD'
                              AND ARGUMENT_VALUE = 'BUDGET_AMOUNT'
                        );

                        INSERT INTO ARG_VALUE_LOOKUP (ARG_VALUE_LOOKUP_ID, ARGUMENT_NAME, ARGUMENT_VALUE, DESCRIPTION, UPDATE_TIMESTAMP, UPDATE_USER)
                        SELECT
                        (SELECT MAX(ARG_VALUE_LOOKUP_ID) + 1 FROM ARG_VALUE_LOOKUP),
                        'PLACEHOLDER_AWARD',
                        'COST_ELEMENT',
                        'For setting cost element',
                        UTC_TIMESTAMP(),
                        'admin'
                        WHERE NOT EXISTS (
                        SELECT 1
                        FROM ARG_VALUE_LOOKUP
                        WHERE ARGUMENT_NAME = 'PLACEHOLDER_AWARD'
                              AND ARGUMENT_VALUE = 'COST_ELEMENT'
                        );

                        INSERT INTO ARG_VALUE_LOOKUP (ARG_VALUE_LOOKUP_ID, ARGUMENT_NAME, ARGUMENT_VALUE, DESCRIPTION, UPDATE_TIMESTAMP, UPDATE_USER)
                        SELECT
                        (SELECT MAX(ARG_VALUE_LOOKUP_ID) + 1 FROM ARG_VALUE_LOOKUP),
