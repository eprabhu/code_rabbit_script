                        SELECT 1
                        FROM ARG_VALUE_LOOKUP
                        WHERE ARGUMENT_NAME = 'PLACEHOLDER_AWARD'
                              AND ARGUMENT_VALUE = 'L2_COMMITTED_AMOUNT'
