databaseChangeLog:

  - changeSet:
      id: FIBI-8344-1
      author: Adarsh
      labels: 'DML'
      comment: Add GC15 to GLOBAL_SEARCH_ENABLED_MODULES parameter
      changes:
        - sql:
            sql: |
              UPDATE PARAMETER
              SET VALUE = 'SR20, AG13, DP03, IP02, AW01,GC15',
                  UPDATE_TIMESTAMP = NOW(),
                  UPDATE_USER = 'admin'
              WHERE PARAMETER_NAME = 'GLOBAL_SEARCH_ENABLED_MODULES';
      rollback: empty

