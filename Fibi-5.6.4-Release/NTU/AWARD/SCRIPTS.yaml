
databaseChangeLog:

  - changeSet:
      id: FIBI-10725-1
      author: Shyla
      labels: 'DML'
      comment: Renamed CFDA Number to Classification and DFAFS Number to Internal Reference in award dashboard lookup tables.
      changes:
        - sql:
            sql: |
              SET SQL_SAFE_UPDATES = 0;
              UPDATE `dashboard_criteria_lookup` SET `DESCRIPTION` = 'Classification', `DISPLAY_NAME` = 'Classification', `UPDATE_TIMESTAMP` = UTC_TIMESTAMP(), `UPDATE_USER` = 'admin' WHERE `CRITERIA_KEY` = 'CRT_AWD_CFDA_NUMBER';
              UPDATE `dashboard_criteria_lookup` SET `DESCRIPTION` = 'Internal Reference', `DISPLAY_NAME` = 'Internal Reference', `UPDATE_TIMESTAMP` = UTC_TIMESTAMP(), `UPDATE_USER` = 'admin' WHERE `CRITERIA_KEY` = 'CRT_AWD_DFAFS_NUMBER';
              UPDATE `dashboard_column_lookup` SET `DESCRIPTION` = 'Classification', `DISPLAY_NAME` = 'Classification', `UPDATE_TIMESTAMP` = UTC_TIMESTAMP(), `UPDATE_USER` = 'admin' WHERE `COLUMN_KEY` = 'COL_AWD_CFDA_NUMBER';
              UPDATE `dashboard_column_lookup` SET `DESCRIPTION` = 'Internal Reference', `DISPLAY_NAME` = 'Internal Reference', `UPDATE_TIMESTAMP` = UTC_TIMESTAMP(), `UPDATE_USER` = 'admin' WHERE `COLUMN_KEY` = 'COL_AWD_DFAFS_NUMBER';
              SET SQL_SAFE_UPDATES = 1;
      rollback: empty

  - changeSet:
      id: FIBI-10730-1
      author: Nabeel Ahamed M
      labels: 'DDL'
      comment: Update AWARD table to increase DFAFS_NUMBER column size to 50
      changes:
        - sql:
            sql: |
              ANALYZE TABLE AWARD;

              SET @sql := IF(
                  EXISTS (
                      SELECT 1
                      FROM information_schema.COLUMNS
                      WHERE TABLE_SCHEMA = DATABASE()
                        AND TABLE_NAME = 'AWARD'
                        AND COLUMN_NAME = 'DFAFS_NUMBER'
                         AND (
                              CHARACTER_MAXIMUM_LENGTH < 50
                              OR COLUMN_COMMENT <> 'In UI only allows 25 chars'
                              )
                  ),
                  'ALTER TABLE AWARD
                      MODIFY COLUMN `DFAFS_NUMBER` VARCHAR(50) DEFAULT NULL
                      COMMENT ''UI currently restricts input to 25 characters'';',
                  'DO 1'
              );

              PREPARE stmt FROM @sql;
              EXECUTE stmt;
              DEALLOCATE PREPARE stmt;
      rollback:
        - sql:
            sql: |
              ALTER TABLE AWARD
              MODIFY COLUMN `DFAFS_NUMBER` VARCHAR(12) DEFAULT NULL;

