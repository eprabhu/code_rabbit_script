databaseChangeLog:

  - changeSet:
      id: FIBI-9964-1
      author: Shyla M
      labels: 'DML'
      comment: Updated the status description
      changes:
        - sql:
            sql: |
              UPDATE `sr_status`
              SET `DESCRIPTION` = 'Not Submitted',
                  `UPDATE_TIMESTAMP` = UTC_TIMESTAMP(),
                  `UPDATE_USER` = 'admin'
              WHERE `STATUS_CODE` = '1';
      rollback:
        - sql:
            sql: |
              UPDATE `sr_status`
              SET `DESCRIPTION` = 'In Progress',
                  `UPDATE_TIMESTAMP` = UTC_TIMESTAMP(),
                  `UPDATE_USER` = 'admin'
              WHERE `STATUS_CODE` = '1';

