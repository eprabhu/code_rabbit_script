  - changeSet:
      id: FIBI-10100-1
      author: Arun Ramesh
      labels: 'DML'
      comment: Set IS_ACTIVE to Y for dyn_section_config SR2015 (Additional Information) in MIT
      changes:
        - sql:
            sql: |
              UPDATE dyn_section_config
              SET IS_ACTIVE = 'Y',
                  UPDATE_TIMESTAMP = UTC_TIMESTAMP(),
                  UPDATE_USER = 'admin'
              WHERE SECTION_CODE = 'SR2015' AND MODULE_CODE = 'SR20';
      rollback:
        - sql:
            sql: |
              UPDATE dyn_section_config
              SET IS_ACTIVE = 'N',
                  UPDATE_TIMESTAMP = UTC_TIMESTAMP(),
                  UPDATE_USER = 'admin'
              WHERE SECTION_CODE = 'SR2015' AND MODULE_CODE = 'SR20';

  - changeSet:
      id: FIBI-10100-2
      author: Arun Ramesh
      labels: 'DML'
      comment: Insert DYN_ELEMENT_CONFIG for Service Request Description as separate section (SR2001)
      changes:
        - sql:
            sql: |
              INSERT INTO DYN_ELEMENT_CONFIG
              (UI_REFERENCE_ID, DESCRIPTION, SUB_SECTION_CODE, SECTION_CODE, HELP, INSTRUCTION, UPDATE_USER, UPDATE_TIMESTAMP)
              SELECT
                  'srvce-reqst-descrption-section',
                  'Service Request Description As Seperate Section',
                  '2001',
                  'SR2001',
                  'Optional field : provide description of the request which is not captured in the questionnaire',
                  'IMPORTANT: Do not enter request details in the Description field. Please provide all required information in the questionnaire. The questionnaire will appear once you save the request. Use the Description field only to include additional information that is not captured in the questionnaire.',
                  'admin',
                  UTC_TIMESTAMP()
              WHERE NOT EXISTS (
                  SELECT 1
                  FROM DYN_ELEMENT_CONFIG
                  WHERE UI_REFERENCE_ID = 'srvce-reqst-descrption-section'
                    AND SUB_SECTION_CODE = '2001'
                    AND SECTION_CODE = 'SR2001'
              );
      rollback:
        - sql:
            sql: |
              DELETE FROM DYN_ELEMENT_CONFIG
              WHERE UI_REFERENCE_ID = 'srvce-reqst-descrption-section'
                AND SUB_SECTION_CODE = '2001'
                AND SECTION_CODE = 'SR2001';

