name: DB Script Validation

on:
  pull_request:
    types: [opened, edited, synchronize, reopened]
    paths:
      - "**/*.sql"

permissions:
  contents: read
  pull-requests: write

jobs:
  validate:
    runs-on: ubuntu-latest
    steps:
      # ---------------------------------------------------------------
      # 0. Checkout the PR branch with enough history to diff against base
      # ---------------------------------------------------------------
      - name: Checkout code
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      # ---------------------------------------------------------------
      # 1. PR Quality Checks — description present, title long enough
      # ---------------------------------------------------------------
      - name: Check PR description and title
        id: pr_quality
        uses: actions/github-script@v7
        with:
          script: |
            const body = context.payload.pull_request.body || "";
            const title = context.payload.pull_request.title || "";
            const problems = [];

            if (body.trim().length === 0) {
              problems.push("❌ PR description is empty. Please explain **what** changed and **why**.");
            }
            if (title.trim().length < 10) {
              problems.push(`❌ PR title is too short (${title.trim().length} chars). Use at least 10 characters and make it descriptive.`);
            }

            core.setOutput("problems", JSON.stringify(problems));
            core.setOutput("has_problems", problems.length > 0 ? "true" : "false");

      # # ---------------------------------------------------------------
      # # 2. Find changed .sql files in this PR
      # # ---------------------------------------------------------------
      # - name: Get changed SQL files
      #   id: changed_files
      #   run: |
      #     git fetch origin ${{ github.base_ref }} --depth=1
      #     FILES=$(git diff --name-only origin/${{ github.base_ref }} ${{ github.sha }} -- '*.sql' | tr '\n' ' ')
      #     echo "files=$FILES" >> "$GITHUB_OUTPUT"
      #     echo "Changed SQL files: $FILES"

      # # ---------------------------------------------------------------
      # # 3. Run the SQL syntax / breaking-change validator
      # # ---------------------------------------------------------------
      # - name: Set up Python
      #   if: steps.changed_files.outputs.files != ''
      #   uses: actions/setup-python@v5
      #   with:
      #     python-version: "3.x"

      # - name: Run SQL validation script
      #   id: sql_check
      #   if: steps.changed_files.outputs.files != ''
      #   run: |
      #     set +e
      #     python3 scripts/validate_sql.py ${{ steps.changed_files.outputs.files }} > sql_report.md
      #     echo "exit_code=$?" >> "$GITHUB_OUTPUT"
      #     cat sql_report.md

      # ---------------------------------------------------------------
      # 4. Post / update a single PR comment with results + checklist
      # ---------------------------------------------------------------
      - name: Post PR comment
        uses: actions/github-script@v7
        with:
          script: |
            const fs = require('fs');
            const problems = JSON.parse('${{ steps.pr_quality.outputs.problems }}' || '[]');

            let sqlReport = "_No .sql files changed in this PR._";
            if (fs.existsSync('sql_report.md')) {
              sqlReport = fs.readFileSync('sql_report.md', 'utf8');
            }

            const prQualitySection = problems.length
              ? problems.map(p => `- ${p}`).join('\n')
              : "✅ PR description and title look good.";

            # const checklist = `
            # ### 📋 Reviewer Checklist (verify before merging)
            # - [ ] PR description clearly explains what changed and why
            # - [ ] SQL syntax errors above (if any) have been fixed
            # - [ ] Any \`DROP\` / \`ALTER\` statements have been reviewed for backward compatibility
            # - [ ] Migration has been tested against a non-production database
            # - [ ] Rollback plan exists for this change
            # `;

            const body = `## 🤖 Automated DB Script Validation

            ### PR Quality
            ${prQualitySection}

            ${sqlReport}

            # ${checklist}
            `;

            // Find an existing bot comment to update instead of spamming new ones
            const { data: comments } = await github.rest.issues.listComments({
              owner: context.repo.owner,
              repo: context.repo.repo,
              issue_number: context.issue.number,
            });
            const existing = comments.find(c => c.user.type === 'Bot' && c.body.includes('Automated DB Script Validation'));

            if (existing) {
              await github.rest.issues.updateComment({
                owner: context.repo.owner,
                repo: context.repo.repo,
                comment_id: existing.id,
                body,
              });
            } else {
              await github.rest.issues.createComment({
                owner: context.repo.owner,
                repo: context.repo.repo,
                issue_number: context.issue.number,
                body,
              });
            }

      # ---------------------------------------------------------------
      # 5. Fail the workflow if there were PR-quality or SQL errors
      # ---------------------------------------------------------------
      - name: Fail if problems were found
        if: steps.pr_quality.outputs.has_problems == 'true' || steps.sql_check.outputs.exit_code == '1'
        run: |
          echo "Validation failed — see PR comment for details."
          exit 1
