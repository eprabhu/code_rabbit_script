name: DB Script Validation

on:
  pull_request:
    types: [opened, edited, synchronize, reopened]

permissions:
  contents: read
  pull-requests: write
  issues: write

jobs:
  validate:
    if: startsWith(github.head_ref, 'feature/FIBI') || startsWith(github.head_ref, 'bugfix/FIBI')
    runs-on: ubuntu-latest
    steps:
      # ---------------------------------------------------------------
      # 0. Checkout the PR branch with enough history to diff against base
      # ---------------------------------------------------------------
      - name: Checkout code
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Check PR description and title
        id: pr_quality
        uses: actions/github-script@v7
        with:
          script: |
            const body = context.payload.pull_request.body || "";
            const title = context.payload.pull_request.title || "";
            const problems = [];

            if (title.trim().length < 10) {
              problems.push(
                `❌ PR title is too short (${title.trim().length} chars). Use at least 10 characters and make it descriptive.`
              );
            }

            // Reject titles containing file extensions like .sql, .txt, .pdf, etc.
            const fileExtensionRegex = /\.\w+\b/;

            if (fileExtensionRegex.test(title)) {
              problems.push(
                "❌ PR title is invalid. It must not contain file names or file extensions (e.g. .sql, .txt, .pdf)."
              );
            }

            if (body.trim().length === 0) {
              problems.push(
                "❌ PR description is empty. Please include a Jira ticket link (e.g. https://polussolutions.atlassian.net/browse/ABC-0000)"
              );
            } else {
              // Check for Jira ticket URL
              const jiraRegex = /https:\/\/polussolutions\.atlassian\.net\/browse\/[A-Z]+-\d+/;

              if (!jiraRegex.test(body)) {
                problems.push(
                  "❌ PR description must include a Jira ticket link (e.g. https://polussolutions.atlassian.net/browse/ABC-0000)."
                );
              }
            }

            core.setOutput("problems", JSON.stringify(problems));
            core.setOutput("has_problems", problems.length > 0 ? "true" : "false");

      # ---------------------------------------------------------------
      # 2. Find changed .sql / .yaml files in this PR
      # ---------------------------------------------------------------
      - name: Get changed DB script files
        id: changed_files
        run: |
          git fetch origin ${{ github.base_ref }} --depth=1
          # Only Added/Copied/Modified/Renamed/Type-changed — skip Deleted paths
          # so a rename away from a bad name does not keep flagging the old file.
          mapfile -t FILES < <(git diff --name-only --diff-filter=ACMRT "origin/${{ github.base_ref }}" "${{ github.sha }}" -- '*.sql' '*.yaml')

          if [ ${#FILES[@]} -eq 0 ]; then
            echo "has_files=false" >> "$GITHUB_OUTPUT"
            # Clear previous reports so the sticky comment drops stale findings
            : > level2_report.md
            : > level3_report.md
            echo "_No .sql or .yaml files changed in this PR._" > file_report.md
            echo "No .sql / .yaml files changed."
          else
            echo "has_files=true" >> "$GITHUB_OUTPUT"
            printf '%s\n' "${FILES[@]}" > changed_db_files.txt

            {
              echo "### Changed DB script files"
              echo ""
              for f in "${FILES[@]}"; do
                echo "- \`$f\`"
              done
            } > file_report.md

            echo "Changed files:"
            printf '%s\n' "${FILES[@]}"
          fi

      # ---------------------------------------------------------------
      # Level 2. File-level review (file naming) - suggestions only
      # ---------------------------------------------------------------
      - name: Set up Python
        if: steps.changed_files.outputs.has_files == 'true'
        uses: actions/setup-python@v5
        with:
          python-version: "3.x"

      - name: Level 2 - File naming suggestions
        if: steps.changed_files.outputs.has_files == 'true'
        run: |
          # Always rewrite so a previous sticky comment does not keep stale suggestions
          : > level2_report.md
          mapfile -t DB_FILES < changed_db_files.txt
          python3 scripts/validate_files.py "${DB_FILES[@]}" > level2_report.md
          cat level2_report.md
        # When has_files is false, leave no level2_report.md — comment omits File Naming.

      # ---------------------------------------------------------------
      # Level 3. YAML content review - suggestions only
      # ---------------------------------------------------------------
      - name: Level 3 - YAML content suggestions
        if: steps.changed_files.outputs.has_files == 'true'
        run: |
          : > level3_report.md
          mapfile -t YAML_FILES < <(grep -E '\.yaml$' changed_db_files.txt || true)
          if [ ${#YAML_FILES[@]} -gt 0 ]; then
            python3 -m pip install --quiet PyYAML
            python3 scripts/validate_yaml.py "${YAML_FILES[@]}" > level3_report.md
          fi
          cat level3_report.md

      # ---------------------------------------------------------------
      # Post / update a single PR comment with all review results
      # ---------------------------------------------------------------
      - name: Post PR comment
        uses: actions/github-script@v7
        with:
          script: |
            const fs = require('fs');
            const problems = JSON.parse('${{ steps.pr_quality.outputs.problems }}' || '[]');

            let fileReport = "_No .sql or .yaml files changed in this PR._";
            if (fs.existsSync("file_report.md")) {
              fileReport = fs.readFileSync("file_report.md", "utf8").trim();
            }

            let level2Report = "";
            if (fs.existsSync("level2_report.md")) {
              level2Report = fs.readFileSync("level2_report.md", "utf8").trim();
            }
            // Only keep File Naming when there is at least one suggestion bullet
            if (!level2Report.includes("\n- ") && !level2Report.startsWith("- ")) {
              level2Report = "";
            }

            let level3Report = "";
            if (fs.existsSync("level3_report.md")) {
              level3Report = fs.readFileSync("level3_report.md", "utf8").trim();
            }
            if (!level3Report.includes("\n- ") && !level3Report.startsWith("- ")) {
              level3Report = "";
            }

            const hasDbFiles = '${{ steps.changed_files.outputs.has_files }}' === 'true';

            const prQualitySection = problems.length
              ? problems.map(p => `- ${p}`).join('\n')
              : "✅ PR description and title look good.";

            const logoUrl = `https://raw.githubusercontent.com/${context.repo.owner}/${context.repo.repo}/${context.payload.repository.default_branch}/.github/images/polus-logo.png`;

            // Order: PR Quality -> Level 2 -> Level 3 -> Changed files last
            const sections = [
              `### PR Quality`,
              prQualitySection,
            ];
            if (hasDbFiles && level2Report) {
              sections.push("", level2Report);
            }
            if (hasDbFiles && level3Report) {
              sections.push("", level3Report);
            }
            if (hasDbFiles) {
              sections.push("", fileReport);
            }

            const body = [
              `<p align="left"><img src="${logoUrl}" alt="Polus Logo" width="100" /></p>`,
              ``,
              `## Automated PR Validation`,
              ``,
              ...sections,
            ].join("\n");

            // Keep a single sticky bot comment: update the first match, delete extras
            const { data: comments } = await github.rest.issues.listComments({
              owner: context.repo.owner,
              repo: context.repo.repo,
              issue_number: context.issue.number,
            });
            const botComments = comments.filter(
              c => c.user.type === 'Bot' && c.body.includes('Automated PR Validation')
            );

            if (botComments.length === 0) {
              await github.rest.issues.createComment({
                owner: context.repo.owner,
                repo: context.repo.repo,
                issue_number: context.issue.number,
                body,
              });
            } else {
              await github.rest.issues.updateComment({
                owner: context.repo.owner,
                repo: context.repo.repo,
                comment_id: botComments[0].id,
                body,
              });
              // Remove older duplicates left behind by previous marker mismatches
              for (const dup of botComments.slice(1)) {
                await github.rest.issues.deleteComment({
                  owner: context.repo.owner,
                  repo: context.repo.repo,
                  comment_id: dup.id,
                });
              }
            }

      # ---------------------------------------------------------------
      # Fail only for Level 1 PR-quality problems (Levels 2/3 are advisory)
      # ---------------------------------------------------------------
      - name: Fail if problems were found
        if: steps.pr_quality.outputs.has_problems == 'true'
        run: |
          echo "Validation failed — see PR comment for details."
          exit 1
 