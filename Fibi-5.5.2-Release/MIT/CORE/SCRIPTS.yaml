databaseChangeLog: 
  - changeSet:
      id: FIBI-8588-1
      author: Vishnu.BH
      labels: 'DDL'
      comment: MIT initial customs changes and configurations
      changes:
        - sql:
            sql: |
              CREATE TABLE IF NOT EXISTS SR_INT_STAGE_AGREEMENT (
                 `STAGE_AGREEMENT_ID` int NOT NULL AUTO_INCREMENT,
                 `AGREEMENT_ID` varchar(12) NOT NULL,
                 `CATEGORY_CODE` varchar(12) DEFAULT NULL,
                 `CATEGORY` varchar(100) DEFAULT NULL,
                 `AGREEMENT_TYPE_CODE` varchar(12) DEFAULT NULL,
                 `AGREEMENT_TYPE` varchar(100) DEFAULT NULL,
                 `AGREEMENT_STATUS_CODE` varchar(12) DEFAULT NULL,
                 `AGREEMENT_STATUS` varchar(100) DEFAULT NULL,
                 `UNIT_NUMBER` varchar(8) DEFAULT NULL,
                 `UNIT_NAME` varchar(200) DEFAULT NULL,
                 `TITLE` varchar(1000) DEFAULT NULL,
                 `REQUESTOR_PERSON_ID` varchar(40) DEFAULT NULL,
                 `REQUESTOR_FULL_NAME` varchar(90) DEFAULT NULL,
                 `PI_PERSON_ID` varchar(40) DEFAULT NULL,
                 `PRINCIPAL_PERSON_FULL_NAME` varchar(90) DEFAULT NULL,
                 `SPONSOR_CODE` varchar(20) DEFAULT NULL,
                 `SPONSOR_NAME` varchar(4000) DEFAULT NULL,
                 `AGREEMENT_START_DATE` date DEFAULT NULL,
                 `AGREEMENT_END_DATE` date DEFAULT NULL,
                 `FIRST_FED_TIMESTAMP` datetime DEFAULT NULL,
                 `LAST_FED_TIMESTAMP` datetime DEFAULT NULL,
                 `SRC_SYS_UPDATE_TIMESTAMP` datetime DEFAULT NULL,
                 `SRC_SYS_UPDATED_BY` varchar(40) DEFAULT NULL,
                 `ATTRIBUTE_1_LABEL` varchar(255) DEFAULT NULL,
                 `ATTRIBUTE_1_VALUE` varchar(255) DEFAULT NULL,
                 `ATTRIBUTE_2_LABEL` varchar(255) DEFAULT NULL,
                 `ATTRIBUTE_2_VALUE` varchar(255) DEFAULT NULL,
                 `ATTRIBUTE_3_LABEL` varchar(255) DEFAULT NULL,
                 `ATTRIBUTE_3_VALUE` varchar(255) DEFAULT NULL,
                 `ATTRIBUTE_4_LABEL` varchar(255) DEFAULT NULL,
                 `ATTRIBUTE_4_VALUE` varchar(255) DEFAULT NULL,
                 `ATTRIBUTE_5_LABEL` varchar(255) DEFAULT NULL,
                 `ATTRIBUTE_5_VALUE` varchar(255) DEFAULT NULL,
                 `AA_PERSON_ID` varchar(40) DEFAULT NULL,
                 `AA_PERSON_FULL_NAME` varchar(90) DEFAULT NULL,
                 PRIMARY KEY (`STAGE_AGREEMENT_ID`),
                 UNIQUE KEY `uq_agreement_id` (`AGREEMENT_ID`)
              );
              CREATE TABLE IF NOT EXISTS assoc_agreement (
                  ASSOC_AGREEMENT_ID int NOT NULL AUTO_INCREMENT,
                  AGREEMENT_ID int DEFAULT NULL,
                  ASSOC_RELATION_TYPE_CODE varchar(3) DEFAULT NULL,
                  ASSOC_CONFIG_CODE varchar(3) DEFAULT NULL,
                  MODULE_CODE int DEFAULT NULL,
                  MODULE_ITEM_KEY varchar(12) DEFAULT NULL,
                  MODULE_ITEM_ID int DEFAULT NULL,
                  ASSOC_TYPE varchar(10) DEFAULT NULL,
                  UPDATE_USER varchar(60) DEFAULT NULL,
                  UPDATE_TIMESTAMP datetime DEFAULT NULL,
                  IS_IMPORTED varchar(1) DEFAULT NULL,
                  PRIMARY KEY (ASSOC_AGREEMENT_ID),
                  KEY ASSOC_AGREEMENT_FK1_idx (ASSOC_RELATION_TYPE_CODE),
                  KEY ASSOC_AGREEMENT_FK2_idx (ASSOC_CONFIG_CODE),
                  CONSTRAINT ASSOC_AGREEMENT_FK1 FOREIGN KEY (ASSOC_RELATION_TYPE_CODE) REFERENCES assoc_relation_type (ASSOC_RELATION_TYPE_CODE),
                  CONSTRAINT ASSOC_AGREEMENT_FK2 FOREIGN KEY (ASSOC_CONFIG_CODE) REFERENCES assoc_config (ASSOC_CONFIG_CODE)
              );
              CREATE TABLE IF NOT EXISTS RESEARCHER_ADDITIONAL_DETAILS (   
                RESEARCHER_ADD_DTLS_ID INT NOT NULL AUTO_INCREMENT,   
                DESIGNATION VARCHAR (255),   
                ORGANIZATION_ID VARCHAR (20), 
                NATIONALITY VARCHAR (255),   
                PERSON_ID VARCHAR (40),   
                ACTION_COMMENT VARCHAR (2000),  
                UPDATE_TIMESTAMP DATETIME,   
                UPDATE_USER VARCHAR (60),   
                PRIMARY KEY (RESEARCHER_ADD_DTLS_ID),
                CONSTRAINT RESEARCHER_ADDITIONAL_DETAILS_FK1 FOREIGN KEY (PERSON_ID) REFERENCES PERSON(PERSON_ID),
                CONSTRAINT RESEARCHER_ADDITIONAL_DETAILS_FK2 FOREIGN KEY (ORGANIZATION_ID) REFERENCES ORGANIZATION(ORGANIZATION_ID)	
              );
              CREATE TABLE IF NOT EXISTS sr_int_stage_elastic_index (
                MODULE_CODE int DEFAULT NULL,
                MODULE_ITEM_KEY varchar(12) DEFAULT NULL,
                PI_NAME varchar(90) DEFAULT NULL,
                ACCOUNT_NUMBER varchar(7) DEFAULT NULL,
                LEAD_UNIT_NUMBER varchar(8) DEFAULT NULL,
                LEAD_UNIT_NAME varchar(60) DEFAULT NULL,
                TITLE varchar(200) DEFAULT NULL,
                FIRST_FED_TIMESTAMP datetime DEFAULT NULL,
                LAST_FED_TIMESTAMP datetime DEFAULT NULL,
                STATUS_CODE int DEFAULT NULL,
                STATUS varchar(200) DEFAULT NULL,
                START_DATE date DEFAULT NULL,
                END_DATE date DEFAULT NULL,
                ASSOCIATED_DOCUMENT varchar(25) DEFAULT NULL,
                SPONSOR_CODE varchar(6) DEFAULT NULL,
                SPONSOR_NAME varchar(200) DEFAULT NULL,
                SPONSOR_AWARD_ID varchar(70) DEFAULT NULL,
                MODULE_ITEM_ID int DEFAULT NULL,
                PERSON_ID varchar(40) DEFAULT NULL,
                DOCUMENT_NUMBER varchar(40) DEFAULT NULL,
                STAGE_MODULE_ID int NOT NULL AUTO_INCREMENT,
                PRIMARY KEY (STAGE_MODULE_ID)
              );

              ALTER TABLE currency MODIFY CURRENCY_SYMBOL VARCHAR(3) CHARACTER SET utf8mb4 DEFAULT NULL;
              ALTER TABLE currency MODIFY CURRENCY VARCHAR(40) CHARACTER SET utf8mb4 DEFAULT NULL;
              ALTER TABLE SR_INT_STAGE_AGREEMENT
              CHANGE COLUMN SPONSOR_NAME SPONSOR_NAME VARCHAR(4000) NULL DEFAULT NULL;
              SET FOREIGN_KEY_CHECKS = 0;
              truncate table SR_CATEGORY;
              truncate table SR_TYPE;
              truncate table unit;
              truncate table unit_with_children;
              SET FOREIGN_KEY_CHECKS = 1;

      rollback:
        - sql:
            sql: |
              DROP TABLE IF EXISTS SR_INT_STAGE_AGREEMENT;
              DROP TABLE IF EXISTS assoc_agreement;
              DROP TABLE IF EXISTS RESEARCHER_ADDITIONAL_DETAILS;
              DROP TABLE IF EXISTS sr_int_stage_elastic_index;
              ALTER TABLE currency MODIFY CURRENCY_SYMBOL VARCHAR(10) DEFAULT NULL;
              ALTER TABLE currency MODIFY CURRENCY VARCHAR(100) DEFAULT NULL;
              ALTER TABLE SR_INT_STAGE_AGREEMENT
              CHANGE COLUMN SPONSOR_NAME SPONSOR_NAME VARCHAR(200) NULL DEFAULT NULL;

