databaseChangeLog:

  - changeSet:
      id: FIBI-9943-1
      author: Arun Ramesh
      labels: 'DML'
      comment: Update DISPLAY_NAME of dashboard_tab_type to 'Proposal Search' for ALL_PROPOSALS tab (MODULE_CODE=3)
      changes:
        - sql:
            sql: |
              SET SQL_SAFE_UPDATES = 0;
              UPDATE DASHBOARD_TAB_TYPE SET DISPLAY_NAME = 'Proposal Search', UPDATE_TIMESTAMP = UTC_TIMESTAMP(), UPDATE_USER = 'admin' WHERE MODULE_CODE = 3 AND TAB_KEY = 'ALL_PROPOSALS';
              SET SQL_SAFE_UPDATES = 1;
      rollback: empty

