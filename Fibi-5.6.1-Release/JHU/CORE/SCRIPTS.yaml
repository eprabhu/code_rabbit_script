              UPDATE DASHBOARD_COLUMN_LOOKUP SET DISPLAY_NAME = 'Agency/Sponsor', UPDATE_TIMESTAMP = UTC_TIMESTAMP(), UPDATE_USER = 'admin' WHERE (MODULE_CODE = 13 AND COLUMN_KEY = 'COL_ASSOC_SR_SPONSOR');
              SET SQL_SAFE_UPDATES = 1;
      rollback: empty

