  - changeSet:
      id: FIBI-9943-7
      author: Arun Ramesh
      labels: 'DML'
      comment: Insert COL_AWD_SMU_VERSION_TYPE into DASHBOARD_COLUMN_LOOKUP for SMU Version Type
      changes:
        - sql:
            sql: |
              INSERT INTO DASHBOARD_COLUMN_LOOKUP (COLUMN_KEY, DESCRIPTION, DISPLAY_NAME, MODULE_CODE, COLUMN_CONF_ID, WIDTH, CUSTOM_DATA_ELEMENTS_ID, IS_ASSOC, IS_ACTIVE, DEFAULT_SORT_ORDER, UPDATE_TIMESTAMP, UPDATE_USER)
              SELECT 'COL_AWD_SMU_VERSION_TYPE', 'Version Type', 'Version Type', '1', '1', '20', NULL, NULL, 'Y', '30', UTC_TIMESTAMP(), 'admin'
              FROM DUAL WHERE NOT EXISTS (SELECT 1 FROM DASHBOARD_COLUMN_LOOKUP WHERE COLUMN_KEY = 'COL_AWD_SMU_VERSION_TYPE');
      rollback: empty

  - changeSet:
      id: FIBI-9943-8
      author: Arun Ramesh
