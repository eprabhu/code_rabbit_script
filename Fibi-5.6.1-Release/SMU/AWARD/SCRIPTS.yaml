  - changeSet:
      id: FIBI-9943-5
      author: Arun Ramesh
      labels: 'DML'
      comment: Update DISPLAY_NAME for Award dashboard tabs in DASHBOARD_TAB_TYPE (My Projects, All Project, etc.)
      changes:
        - sql:
            sql: |
              SET SQL_SAFE_UPDATES = 0;
              UPDATE DASHBOARD_TAB_TYPE SET DISPLAY_NAME = 'My Projects', UPDATE_TIMESTAMP = UTC_TIMESTAMP(), UPDATE_USER = 'admin' WHERE (MODULE_CODE = 1 AND TAB_KEY = 'MY_AWARDS');
              UPDATE DASHBOARD_TAB_TYPE SET DISPLAY_NAME = 'All Project', UPDATE_TIMESTAMP = UTC_TIMESTAMP(), UPDATE_USER = 'admin' WHERE (MODULE_CODE = 1 AND TAB_KEY = 'ALL_AWARDS');
              UPDATE DASHBOARD_TAB_TYPE SET DISPLAY_NAME = 'Projects & Variation Requests Pending My Review', UPDATE_TIMESTAMP = UTC_TIMESTAMP(), UPDATE_USER = 'admin' WHERE (MODULE_CODE = 1 AND TAB_KEY = 'PENDING_AWARDS');
              UPDATE DASHBOARD_TAB_TYPE SET DISPLAY_NAME = 'Draft Projects & Variation Requests', UPDATE_TIMESTAMP = UTC_TIMESTAMP(), UPDATE_USER = 'admin' WHERE (MODULE_CODE = 1 AND TAB_KEY = 'DRAFT_AWARDS');
              SET SQL_SAFE_UPDATES = 1;
      rollback: empty

