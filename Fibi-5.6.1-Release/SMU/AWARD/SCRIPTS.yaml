databaseChangeLog:

  - changeSet:
      id: FIBI-9943-1
      author: Arun Ramesh
      labels: 'DML'
      comment: Update DISPLAY_NAME to 'Project Fund Code' for CRT_AWD_ACCOUNT_NUMBER and COL_AWD_ACCOUNT_NUMBER in DASHBOARD_CRITERIA_LOOKUP and DASHBOARD_COLUMN_LOOKUP
      changes:
        - sql:
            sql: |
              SET SQL_SAFE_UPDATES = 0;
              UPDATE DASHBOARD_CRITERIA_LOOKUP SET DISPLAY_NAME = 'Project Fund Code', UPDATE_TIMESTAMP = UTC_TIMESTAMP(), UPDATE_USER = 'admin' WHERE (MODULE_CODE = 1 AND CRITERIA_KEY = 'CRT_AWD_ACCOUNT_NUMBER');
              UPDATE DASHBOARD_COLUMN_LOOKUP SET DISPLAY_NAME = 'Project Fund Code', UPDATE_TIMESTAMP = UTC_TIMESTAMP(), UPDATE_USER = 'admin' WHERE (MODULE_CODE = 1 AND COLUMN_KEY = 'COL_AWD_ACCOUNT_NUMBER');
              SET SQL_SAFE_UPDATES = 1;
      rollback: empty

