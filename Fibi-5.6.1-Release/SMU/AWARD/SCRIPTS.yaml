              UPDATE DASHBOARD_COLUMN_LOOKUP SET IS_ACTIVE = 'N', UPDATE_TIMESTAMP = UTC_TIMESTAMP(), UPDATE_USER = 'admin' WHERE (MODULE_CODE = 1 AND COLUMN_KEY = 'COL_AWD_VERSION_TYPE');
              SET SQL_SAFE_UPDATES = 1;
