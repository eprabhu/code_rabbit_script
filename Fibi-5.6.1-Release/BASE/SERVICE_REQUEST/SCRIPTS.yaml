databaseChangeLog:

  - changeSet:
      id: FIBI-9930-1
      author: Reshma Antony
      labels: 'DML'
      comment: Insert Service Request Task Description configuration
      changes:
        - sql:
            sql: |
              INSERT INTO DYN_ELEMENT_CONFIG
              (UI_REFERENCE_ID, DESCRIPTION, SUB_SECTION_CODE, SECTION_CODE, HELP, UPDATE_USER, UPDATE_TIMESTAMP)
              SELECT 'sr-task-description',
                    'Service Request Task Description',
                    '6009',
                    'SR2013',
                    'Provide detailed information about the task, including context, requirements, or special instructions.',
                    'admin',
                    UTC_TIMESTAMP()
              WHERE NOT EXISTS (
                  SELECT 1 FROM DYN_ELEMENT_CONFIG
                  WHERE UI_REFERENCE_ID = 'sr-task-description'
                    AND SUB_SECTION_CODE = '6009'
                    AND SECTION_CODE = 'SR2013'
              );
      rollback:
        - sql:
            sql: |
              DELETE FROM DYN_ELEMENT_CONFIG
              WHERE UI_REFERENCE_ID = 'sr-task-description'
                AND SUB_SECTION_CODE = '6009'
                AND SECTION_CODE = 'SR2013';

