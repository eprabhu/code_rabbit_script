  - changeSet:
      id: FIBI-10054-1
      author: Shyla
      labels: 'DML'
      comment: Update in DASHBOARD_CRITERIA_LOOKUP
      changes:
        - sql:
            sql: |
              SET SQL_SAFE_UPDATES = 0;
              UPDATE `dashboard_criteria_lookup`
              SET `CRITERIA_CONF_ID` = '14',
                  `UPDATE_TIMESTAMP` = UTC_TIMESTAMP(),
                  `UPDATE_USER` = 'admin'
              WHERE `CRITERIA_KEY` = 'CRT_DEV_PROPO_GRANT_CALL_TITLE';
              SET SQL_SAFE_UPDATES = 1;
      rollback:
        - sql:
            sql: |
              UPDATE `dashboard_criteria_lookup`
              SET `CRITERIA_CONF_ID` = '1',
                  `UPDATE_TIMESTAMP` = UTC_TIMESTAMP(),
                  `UPDATE_USER` = 'admin'
              WHERE `CRITERIA_KEY` = 'CRT_DEV_PROPO_GRANT_CALL_TITLE';

  - changeSet:
      id: FIBI-10053-2
