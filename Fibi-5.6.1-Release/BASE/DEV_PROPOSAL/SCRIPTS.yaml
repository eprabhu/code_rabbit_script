              SET SQL_SAFE_UPDATES = 1;
      rollback: empty

  - changeSet:
      id: FIBI-8512-1
      author: Hridya 
      labels: 'DDL'
      comment: Alter table EPS_PROPOSAL to update column size
      changes:
        - sql:
            sql: |
              ANALYZE TABLE EPS_PROPOSAL;
              SET @sql := IF(
              (SELECT COUNT(*) FROM information_schema.COLUMNS
              WHERE TABLE_SCHEMA = DATABASE()
              AND TABLE_NAME = 'EPS_PROPOSAL'
              AND COLUMN_NAME = 'PROGRAM_ANNOUNCEMENT_NUMBER') > 0,
              'ALTER TABLE EPS_PROPOSAL MODIFY PROGRAM_ANNOUNCEMENT_NUMBER VARCHAR(1000);',
              'DO 1'
              );
              PREPARE stmt FROM @sql; 
              EXECUTE stmt; 
              DEALLOCATE PREPARE stmt;
      rollback:
        - sql:
            sql: |
              ALTER TABLE EPS_PROPOSAL MODIFY PROGRAM_ANNOUNCEMENT_NUMBER VARCHAR(255);
