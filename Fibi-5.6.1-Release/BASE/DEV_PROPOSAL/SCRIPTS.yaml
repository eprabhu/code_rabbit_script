databaseChangeLog:

  - changeSet:
      id: FIBI-10053-1
      author: Reshma Antony
      labels: 'DML'
      comment: Insert Script to the DASHBOARD_CRITERIA_LOOKUP table for the Key Persons Role Filter
      changes:
        - sql:
            sql: |
              INSERT INTO DASHBOARD_CRITERIA_LOOKUP
              (CRITERIA_KEY, DESCRIPTION, DISPLAY_NAME, MODULE_CODE, CRITERIA_CONF_ID, IS_ACTIVE, DEFAULT_SORT_ORDER, UPDATE_TIMESTAMP, UPDATE_USER)
              SELECT
              'CRT_DEV_PROPOSAL_KEY_PERSON_ROLES',
              'Key Persons Role',
              'Key Persons Role',
              '3',
              '52',
              'Y',
              '31',
              UTC_TIMESTAMP(),
              'admin'
              FROM DUAL
              WHERE NOT EXISTS (
                  SELECT 1
                  FROM DASHBOARD_CRITERIA_LOOKUP
                  WHERE CRITERIA_KEY = 'CRT_DEV_PROPOSAL_KEY_PERSON_ROLES'
              );
      rollback:
        - sql:
            sql: |
              DELETE FROM DASHBOARD_CRITERIA_LOOKUP WHERE CRITERIA_KEY = 'CRT_DEV_PROPOSAL_KEY_PERSON_ROLES' AND MODULE_CODE = 3;

  - changeSet:
      id: FIBI-9679-1
      author: Shyla
      labels: 'DDL'
      comment: Add IS_DEFAULT column to ACTIVITY_TYPE.
      changes:
        - sql:
            sql: |
              ANALYZE TABLE ACTIVITY_TYPE;
              SET @sql := IF(
              (SELECT COUNT(*)
              FROM INFORMATION_SCHEMA.COLUMNS
              WHERE TABLE_SCHEMA = DATABASE()
                  AND TABLE_NAME = 'ACTIVITY_TYPE'
                  AND COLUMN_NAME = 'IS_DEFAULT') = 0,
              'ALTER TABLE ACTIVITY_TYPE ADD COLUMN IS_DEFAULT VARCHAR(1) DEFAULT ''N''',
              'DO 1'
              );
              PREPARE stmt FROM @sql;
              EXECUTE stmt;
              DEALLOCATE PREPARE stmt;

      rollback:
        - sql:
            sql: |
              ALTER TABLE ACTIVITY_TYPE
              DROP COLUMN IS_DEFAULT;

