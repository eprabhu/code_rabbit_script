  - changeSet:
      id: FIBI-10094-1
      author: Vishnu B H
      labels: 'DDL'
      comment: Add FILE_NAME column to envelope_document table
      changes:
        - sql:
            sql: |
              SET @sql := IF(
                  (SELECT COUNT(*)
                     FROM information_schema.COLUMNS
                    WHERE TABLE_SCHEMA = DATABASE()
                      AND TABLE_NAME = 'envelope_document'
                      AND COLUMN_NAME = 'FILE_NAME') = 0,
                  'ALTER TABLE envelope_document ADD COLUMN `FILE_NAME` VARCHAR(100) NULL DEFAULT NULL AFTER `ORIGINAL_FILE_NAME`;',
                  'DO 1'
              );
              PREPARE stmt FROM @sql;
              EXECUTE stmt;
              DEALLOCATE PREPARE stmt;
      rollback:
        - sql:
            sql: |
              ALTER TABLE envelope_document DROP COLUMN `FILE_NAME`;

