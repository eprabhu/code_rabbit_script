databaseChangeLog:

  - changeSet:
      id: FIBI-9576-3
      author: Reshma Antony
      labels: 'DML'
      comment: Insert scheduler_job_info
      changes:
        - sql:
            sql: |
              INSERT INTO scheduler_job_info (
                  CRON_EXPRESSION,
                  IS_CRON_JOB,
                  JOB_CLASS,
                  JOB_GROUP,
                  JOB_NAME,
                  REPEAT_TIME,
                  DESCRIPTION,
                  CRON_STATUS,
                  UPDATE_USER,
                  UPDATE_TIMESTAMP,
                  PREVIOUS_FIRE_TIME,
                  LAST_FIRE_END_TIME,
                  IS_ACTIVE
              )
              SELECT
                  '0 0 21 10 * ?',
                  'Y',
                  'com.polus.fibicomp.quartzscheduler.scheduler.claim.ExcelityScheduler',
                  'fibi-base',
                  'Excelity Scheduler - 10th Day',
                  NULL,
                  'This job retrieves the RISE EOM Payroll file from SFTP, processes it, and moves the file to OutboundArchive/Excelity (SFTP & Staff3). Runs on the 10th day of every month at 9:00 PM.',
                  'SCHEDULED',
                  'admin',
                  UTC_TIMESTAMP(),
                  NULL,
                  NULL,
                  'Y'
              WHERE NOT EXISTS (
                  SELECT 1
                  FROM scheduler_job_info
                  WHERE JOB_GROUP = 'fibi-base'
                    AND JOB_NAME = 'Excelity Scheduler - 10th Day'
                    AND JOB_CLASS = 'com.polus.fibicomp.quartzscheduler.scheduler.claim.ExcelityScheduler'
              );
      rollback:
        - sql:
            sql: |
              DELETE FROM scheduler_job_info
              WHERE JOB_GROUP = 'fibi-base'
                AND JOB_NAME = 'Excelity Scheduler - 10th Day'
                AND JOB_CLASS = 'com.polus.fibicomp.quartzscheduler.scheduler.claim.ExcelityScheduler';

