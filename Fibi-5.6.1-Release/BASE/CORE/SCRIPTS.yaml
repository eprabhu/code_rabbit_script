      comment: Modify DASHBOARD_TAB_TYPE.DISPLAY_NAME to VARCHAR(100)
      changes:
        - sql:
            sql: |
              SET @col_len = (SELECT CHARACTER_MAXIMUM_LENGTH FROM INFORMATION_SCHEMA.COLUMNS WHERE TABLE_SCHEMA = DATABASE() AND TABLE_NAME = 'DASHBOARD_TAB_TYPE' AND COLUMN_NAME = 'DISPLAY_NAME' LIMIT 1);
