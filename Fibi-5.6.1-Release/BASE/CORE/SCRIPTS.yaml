              PREPARE stmt FROM @sql;
              EXECUTE stmt;
              DEALLOCATE PREPARE stmt;
      rollback:
        - sql:
            sql: |
              ALTER TABLE DASHBOARD_TAB_TYPE MODIFY COLUMN DISPLAY_NAME VARCHAR(50);
