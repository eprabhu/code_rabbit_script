databaseChangeLog:

  - changeSet:
      id: FIBI-9576-1
      author: Reshma Antony
      labels: 'DML'
      comment: Insert scheduler_job_info
      changes:
        - sql:
            sql: |
              INSERT INTO scheduler_job_info (
                  CRON_EXPRESSION,
                  IS_CRON_JOB,
                  JOB_CLASS,
                  JOB_GROUP,
                  JOB_NAME,
                  REPEAT_TIME,
                  DESCRIPTION,
                  CRON_STATUS,
                  UPDATE_USER,
                  UPDATE_TIMESTAMP,
                  PREVIOUS_FIRE_TIME,
                  LAST_FIRE_END_TIME,
                  IS_ACTIVE
              )
              SELECT
                  '0 30 21 * * ?',
                  'Y',
                  'com.polus.fibicomp.quartzscheduler.scheduler.claim.SapConcurSftpScheduler',
                  'fibi-base',
                  'SAP Concur SFTP Scheduler',
                  NULL,
                  'This job retrieves the Grab Concur (ECS) file from SFTP, processes it, and moves the file to OutboundArchive/Concur (SFTP & Staff3).',
                  'SCHEDULED',
                  'admin',
                  UTC_TIMESTAMP(),
                  NULL,
                  NULL,
                  'Y'
              WHERE NOT EXISTS (
                  SELECT 1
                  FROM scheduler_job_info
                  WHERE JOB_GROUP = 'fibi-base'
                    AND JOB_NAME = 'SAP Concur SFTP Scheduler'
                    AND JOB_CLASS = 'com.polus.fibicomp.quartzscheduler.scheduler.claim.SapConcurSftpScheduler'
              );
      rollback:
        - sql:
            sql: |
              DELETE FROM scheduler_job_info
              WHERE JOB_GROUP = 'fibi-base'
                AND JOB_NAME = 'SAP Concur SFTP Scheduler'
                AND JOB_CLASS = 'com.polus.fibicomp.quartzscheduler.scheduler.claim.SapConcurSftpScheduler';

