  - changeSet:
      id: FIBI-9576-3
      author: Reshma Antony
      labels: 'DML'
      comment: Update scheduler_job_info FastIntegration Revenue Payments Scheduler
      changes:
        - sql:
            sql: |
              SET SQL_SAFE_UPDATES = 0;
              UPDATE scheduler_job_info
              SET
                  CRON_EXPRESSION = '0 0 3 * * ?',
                  JOB_CLASS = 'com.polus.fibicomp.quartzscheduler.scheduler.fastintegration.FastIntegrationRevenuePaymentsScheduler',
                  JOB_NAME  = 'FastIntegration Revenue Payments Scheduler'
              WHERE JOB_GROUP = 'fibi-base'
                AND JOB_NAME = 'FastIntegration Revenue Payments Sheduler'
                AND JOB_CLASS = 'com.polus.fibicomp.quartzscheduler.scheduler.fastintegration.FastIntegrationRevenuePaymentsSheduler';
                SET SQL_SAFE_UPDATES = 1;
      rollback:
        - sql:
            sql: |
              UPDATE scheduler_job_info
              SET
                  CRON_EXPRESSION = '0 15 7 * * ?',
                  JOB_CLASS = 'com.polus.fibicomp.quartzscheduler.scheduler.fastintegration.FastIntegrationRevenuePaymentsSheduler',
                  JOB_NAME  = 'FastIntegration Revenue Payments Sheduler'
