databaseChangeLog:

  - changeSet:
      id: FIBI-8343-1
      author: Shyla
      labels: 'DML'
      comment: Update in DASHBOARD_CRITERIA_LOOKUP
      changes:
        - sql:
            sql: |
                UPDATE DASHBOARD_CRITERIA_LOOKUP 
                SET IS_ACTIVE = 'N', UPDATE_TIMESTAMP = UTC_TIMESTAMP(), UPDATE_USER = 'admin' 
                WHERE CRITERIA_KEY = 'CRT_AWD_GRANT_TYPE';
      rollback: 
        - sql:
            sql: |    
                UPDATE DASHBOARD_CRITERIA_LOOKUP 
                SET IS_ACTIVE = 'Y', UPDATE_TIMESTAMP = UTC_TIMESTAMP(), UPDATE_USER = 'admin' 
                WHERE CRITERIA_KEY = 'CRT_AWD_GRANT_TYPE';
