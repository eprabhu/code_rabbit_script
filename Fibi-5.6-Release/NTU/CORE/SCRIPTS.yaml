databaseChangeLog:
    - changeSet:
        id: FIBI-8180
        author: Arun Ramesh
        labels: 'DML'
        comment: Dynamic config for elastic sync for NTU instance.
        changes:
            - sql:
                sql: |
                    SET SQL_SAFE_UPDATES = 0;
                    UPDATE integration_sync_config
                    SET 
                        IS_ACTIVE = CASE 
                                        WHEN CONFIG_KEY IN ('awardfibi','fibiproposal','grantcall','fibiperson','fibirolodex','agreementfibi','instituteproposal') THEN 'Y'
                                        ELSE 'N'
                                    END,
                        UPDATE_TIMESTAMP = utc_timestamp(),
                        UPDATE_USER = 'admin'
                    WHERE CONFIG_CATEGORY = 'elastic_sync';
                    SET SQL_SAFE_UPDATES = 1;
        rollback: empty

    - changeSet:
        id: FIBI-8181
        author: Arun Ramesh
        labels: 'DML'
        comment: Dynamic config for integration sync for NTU instance.
        changes:
            - sql:
                sql: |
                    SET SQL_SAFE_UPDATES = 0;
                    UPDATE integration_sync_config
                    SET 
                        IS_ACTIVE = CASE 
                                        WHEN CONFIG_KEY IN ('attachment_data_migration', 'fi_expense_transaction_rt_processing', 'sync_orcid', 'workday_manpower','workday_citizenship','workday_cost_allocation','workday_termination','workday_long_leave','workday_cost_reconciliation','workday_close_position','workday_job_profile', 'designation_change', 'update_claim_duration', 'profit_center','fund_center','cost_center','grant_code','job_requisition','cost_allocation', 'update_feed_status') THEN 'Y'
                                        ELSE 'N'
                                    END,
                        UPDATE_TIMESTAMP = utc_timestamp(),
                        UPDATE_USER = 'admin'
                    WHERE CONFIG_CATEGORY = 'integration_sync';
                    SET SQL_SAFE_UPDATES = 1;
        rollback: empty

    - changeSet:
      id: FIBI-8178-1
      author: Solih N
      labels: 'DML'
      comment: Update IS_ACTIVE and IS_MANDATORY for specified dynamic config rows
      changes:
        - sql:
            sql: |
              UPDATE dyn_element_config SET IS_ACTIVE = 'N', IS_MANDATORY = 'N', UPDATE_TIMESTAMP = utc_timestamp(), UPDATE_USER = 'admin'
              WHERE UI_REFERENCE_ID = 'ip-master-proposal' AND SUB_SECTION_CODE = '201' AND SECTION_CODE = 'IP201';

              UPDATE dyn_element_config SET IS_ACTIVE = 'N', IS_MANDATORY = 'N', UPDATE_TIMESTAMP = utc_timestamp(), UPDATE_USER = 'admin'
              WHERE UI_REFERENCE_ID = 'proposal-gnrl-master-proposal' AND SUB_SECTION_CODE = '301' AND SECTION_CODE = 'DP301';
      rollback: empty

    - changeSet:
      id: FIBI-8183-1
      author: Mohamed Fazil
      labels: 'DML'
      comment: Deactivate subsection for NTU instance
      changes:
        - sql:
            sql: |
              UPDATE DYN_SUBSECTION_CONFIG 
              SET IS_ACTIVE = 'N', UPDATE_TIMESTAMP = UTC_TIMESTAMP(), UPDATE_USER = 'admin'
              WHERE SUB_SECTION_CODE = '4003';
      rollback:
        - sql:
            sql: |
              UPDATE DYN_SUBSECTION_CONFIG 
              SET IS_ACTIVE = 'Y', UPDATE_TIMESTAMP = UTC_TIMESTAMP(), UPDATE_USER = 'admin'
              WHERE SUB_SECTION_CODE = '4003';

    - changeSet:
      id: FIBI-8179
      author: Sreejith T
      labels: 'DML'
      comment: Elastic configurations for NTU instance.
      changes:
        - sql:
            sql: |
              UPDATE `elasticsearch_index_config` SET `FORMAT_TEMPLATE` = 'full_name (prncpl_nm)', `UPDATE_USER` = 'admin', `UPDATE_TIMESTAMP` = UTC_TIMESTAMP() WHERE `ES_CONFIG_ID` = 'person';
              UPDATE `elasticsearch_index_config` SET `FORMAT_TEMPLATE` = 'award_number | account_number | title | sponsor_display_name | unit_display_name | pi_name | grant_call_name | sp_awd_number', `CARD_FORMAT` = '["title", "pi_name", "sp_awd_number", "account_number", "grant_call_name", "unit_display_name", "sponsor_display_name"]', `SEARCH_FIELDS` = '{"title": {}, "pi_name": {}, "award_number": {}, "sp_awd_number": {}, "account_number": {}, "grant_call_name": {}, "unit_display_name": {}, "sponsor_display_name": {}}', `EXCLUDE_HTML` = '[]', `UPDATE_USER` = 'admin', `UPDATE_TIMESTAMP` = UTC_TIMESTAMP() WHERE `ES_CONFIG_ID` = 'award';
              UPDATE `elasticsearch_index_config` SET `FORMAT_TEMPLATE` = 'rolodex_id | full_name | organization | email_address', `UPDATE_USER` = 'admin', `UPDATE_TIMESTAMP` = UTC_TIMESTAMP() WHERE `ES_CONFIG_ID` = 'rolodex';
              UPDATE `elasticsearch_index_config` SET `EXCLUDE_HTML` = '[]', `UPDATE_USER` = 'admin', `UPDATE_TIMESTAMP` = UTC_TIMESTAMP() WHERE `ES_CONFIG_ID` = 'proposal';
              UPDATE `elasticsearch_index_config` SET `FORMAT_TEMPLATE` = 'rolodex_id | full_name | organization | email_address | address', `UPDATE_USER` = 'admin', `UPDATE_TIMESTAMP` = UTC_TIMESTAMP() WHERE `ES_CONFIG_ID` = 'organization';
              UPDATE `elasticsearch_index_config` SET `FORMAT_TEMPLATE` = 'rolodex_id | full_name | organization | email_address', `UPDATE_USER` = 'admin', `UPDATE_TIMESTAMP` = UTC_TIMESTAMP() WHERE `ES_CONFIG_ID` = 'rolodex_organization';
              UPDATE `elasticsearch_index_config` SET `INDEX_SETTINGS` = '{\"index\": {\"mappings\": {\"properties\": {\"sr_type\": {\"type\": \"text\", \"analyzer\": \"standard\", \"search_analyzer\": \"standard\"}, \"subject\": {\"type\": \"text\", \"analyzer\": \"subject_analyzer\", \"term_vector\": \"with_positions_offsets\", \"search_analyzer\": \"subject_search\"}, \"sr_status\": {\"type\": \"text\", \"index\": true, \"analyzer\": \"ngram_analyzer\", \"term_vector\": \"yes\", \"search_analyzer\": \"whitespace\"}, \"unit_name\": {\"type\": \"text\", \"index\": \"false\"}, \"sr_priority\": {\"type\": \"text\", \"index\": true, \"analyzer\": \"ngram_analyzer\", \"term_vector\": \"yes\", \"search_analyzer\": \"whitespace\"}, \"sr_header_id\": {\"type\": \"text\", \"index\": true}, \"sr_priority_id\": {\"type\": \"text\", \"index\": true, \"analyzer\": \"ngram_analyzer\", \"term_vector\": \"yes\", \"search_analyzer\": \"whitespace\"}, \"sr_status_code\": {\"type\": \"text\", \"index\": true, \"analyzer\": \"ngram_analyzer\", \"term_vector\": \"yes\", \"search_analyzer\": \"whitespace\"}, \"unit_display_name\": {\"type\": \"text\", \"index\": true, \"analyzer\": \"ngram_analyzer\", \"term_vector\": \"yes\", \"search_analyzer\": \"whitespace\"}, \"assignee_full_name\": {\"type\": \"text\", \"index\": true, \"fields\": {\"sort\": {\"type\": \"keyword\", \"index\": true}}, \"analyzer\": \"ngram_analyzer\", \"term_vector\": \"yes\", \"search_analyzer\": \"standard\"}, \"reporter_full_name\": {\"type\": \"text\", \"index\": true, \"analyzer\": \"ngram_analyzer\", \"term_vector\": \"yes\", \"search_analyzer\": \"keyword\"}}}, \"settings\": {\"analysis\": {\"filter\": {\"ngram_filter\": {\"type\": \"edge_ngram\", \"max_gram\": 60, \"min_gram\": 2}}, \"analyzer\": {\"ngram_analyzer\": {\"type\": \"custom\", \"filter\": [\"lowercase\", \"ngram_filter\"], \"tokenizer\": \"whitespace\"}, \"subject_search\": {\"tokenizer\": \"standard\", \"char_filter\": [\"my_mapping\"]}, \"subject_analyzer\": {\"type\": \"custom\", \"filter\": [\"lowercase\", \"ngram_filter\"], \"tokenizer\": \"whitespace\", \"char_filter\": [\"my_mapping\"]}}, \"char_filter\": {\"my_mapping\": {\"type\": \"pattern_replace\", \"pattern\": \"[-/\\\\\\\\_.+&\':#@,*()\\\\\\\"]\", \"replacement\": \" \"}}}, \"number_of_shards\": 5}}, \"documentId\": \"%{sr_header_id}\", \"queryString\": \"SELECT t1.sr_header_id as sr_header_id,t1.subject as subject,t2.unit_name as unit_name,t2.display_name as unit_display_name,t3.full_name as assignee_full_name,t4.full_name as reporter_full_name,t5.description as sr_type,t6.description as sr_priority,t6.PRIORITY_ID as sr_priority_id,t7.STATUS_CODE as sr_status_code,t7.description as sr_status FROM sr_header t1 LEFT OUTER JOIN unit t2 ON t1.unit_number = t2.unit_number LEFT OUTER JOIN person t3 ON t1.assignee_person_id = t3.person_id LEFT OUTER JOIN person t4 ON t1.reporter_person_id = t4.person_id LEFT OUTER JOIN sr_type t5 ON t1.type_code = t5.type_code LEFT OUTER JOIN sr_priority t6 ON t1.priority_id = t6.priority_id LEFT OUTER JOIN sr_status t7 ON t1.status_code = t7.status_code\", \"extraCondition\": \" and t1.sr_header_id = ?\"}', `UPDATE_USER` = 'admin', `UPDATE_TIMESTAMP` = UTC_TIMESTAMP() WHERE `ES_CONFIG_ID` = 'service_request';
      rollback:
        - sql:
            sql: |
              DELETE FROM `elasticsearch_index_config` WHERE `ES_CONFIG_ID` IN ('person', 'award', 'rolodex', 'proposal', 'organization', 'rolodex_organization', 'service_request');
              INSERT IGNORE INTO `elasticsearch_index_config` (`ES_CONFIG_ID`,`INDEX_NAME`,`CONTEXT_FIELD`,`DESCRIPTION`,`FORMAT_TEMPLATE`,`CARD_FORMAT`,`PLACEHOLDERS`,`SEARCH_FIELDS`,`FORMAT_FIELDS`,`FIELD_BOOSTS`,`ICONS`,`EXCLUDE_HTML`,`EXTRA_CONDITIONS`,`RESULT_SIZE`,`INDEX_SETTINGS`,`UPDATE_USER`,`UPDATE_TIMESTAMP`) VALUES ('award','awardfibi','award_number','Configuration for searching awards','award_number | account_number | title | sponsor_display_name | unit_display_name | pi_name | grant_call_name | funding_scheme | sp_awd_number','[\"title\", \"pi_name\", \"sp_awd_number\", \"account_number\", \"funding_scheme\", \"grant_call_name\", \"unit_display_name\", \"sponsor_display_name\"]','Search: Award #, Account No, Title, Lead Unit, Sponsor, Principal Investigator, Title of Grant Call, Funding Scheme, Sponsor Award Number','{\"title\": {}, \"pi_name\": {}, \"award_number\": {}, \"sp_awd_number\": {}, \"account_number\": {}, \"funding_scheme\": {}, \"grant_call_name\": {}, \"unit_display_name\": {}, \"sponsor_display_name\": {}}',NULL,'{}','{}','[\"title\"]','{}',20,'{\"index\": {\"mappings\": {\"properties\": {\"title\": {\"type\": \"text\", \"analyzer\": \"title_analyzer\", \"term_vector\": \"with_positions_offsets\", \"search_analyzer\": \"title_search\"}, \"status\": {\"type\": \"text\", \"analyzer\": \"ngram_analyzer\", \"search_analyzer\": \"standard\"}, \"pi_name\": {\"type\": \"text\", \"analyzer\": \"ngram_analyzer\", \"term_vector\": \"yes\", \"search_analyzer\": \"standard\"}, \"sponsor\": {\"type\": \"text\", \"index\": \"false\"}, \"@version\": {\"type\": \"integer\"}, \"award_id\": {\"type\": \"text\", \"fields\": {\"sort\": {\"type\": \"keyword\", \"index\": true}}, \"analyzer\": \"ngram_analyzer\", \"search_analyzer\": \"whitespace\"}, \"@timestamp\": {\"type\": \"date\"}, \"status_code\": {\"type\": \"integer\", \"index\": \"false\"}, \"award_number\": {\"type\": \"text\", \"fields\": {\"sort\": {\"type\": \"keyword\", \"index\": true}}, \"analyzer\": \"ngram_analyzer\", \"term_vector\": \"with_positions_offsets\", \"search_analyzer\": \"whitespace\"}, \"account_number\": {\"type\": \"text\", \"analyzer\": \"ngram_analyzer\", \"search_analyzer\": \"whitespace\"}, \"funding_scheme\": {\"type\": \"text\", \"analyzer\": \"ngram_analyzer\", \"term_vector\": \"yes\", \"search_analyzer\": \"standard\"}, \"lead_unit_name\": {\"type\": \"text\", \"index\": \"false\"}, \"lead_unit_number\": {\"type\": \"text\", \"index\": \"false\"}, \"unit_display_name\": {\"type\": \"text\", \"analyzer\": \"ngram_analyzer\", \"term_vector\": \"yes\", \"search_analyzer\": \"standard\"}, \"sponsor_display_name\": {\"type\": \"text\", \"analyzer\": \"ngram_analyzer\", \"term_vector\": \"yes\", \"search_analyzer\": \"standard\"}, \"obligation_expiration_date\": {\"type\": \"text\", \"analyzer\": \"standard\", \"search_analyzer\": \"standard\"}}}, \"settings\": {\"analysis\": {\"filter\": {\"ngram_filter\": {\"type\": \"edge_ngram\", \"max_gram\": 20, \"min_gram\": 2}}, \"analyzer\": {\"title_search\": {\"tokenizer\": \"standard\", \"char_filter\": [\"my_mapping\"]}, \"ngram_analyzer\": {\"type\": \"custom\", \"filter\": [\"lowercase\", \"ngram_filter\"], \"tokenizer\": \"whitespace\"}, \"title_analyzer\": {\"type\": \"custom\", \"filter\": [\"lowercase\", \"ngram_filter\"], \"tokenizer\": \"whitespace\", \"char_filter\": [\"my_mapping\"]}}, \"char_filter\": {\"my_mapping\": {\"type\": \"pattern_replace\", \"pattern\": \"[-/\\\\\\\\_.+&\':#@,*()\\\\\\\"]\", \"replacement\": \" \"}}}, \"number_of_shards\": 1}}, \"documentId\": \"%{award_id}\", \"queryString\": \"SELECT t1.award_id, t1.award_number, t1.status, t1.pi_name, t1.sponsor,t1.sponsor_display_name, t1.account_number, t1.lead_unit_number, t1.lead_unit_name, t1.title,t1.status_code,t1.obligation_expiration_date,t1.grant_call_title as grant_call_name,t1.sp_awd_number,t1.funding_scheme, t1.unit_display_name FROM ELASTIC_AWARD_V t1\", \"extraCondition\": \" where t1.award_id = ?\"}','admin',utc_timestamp());
              INSERT IGNORE INTO `elasticsearch_index_config` (`ES_CONFIG_ID`,`INDEX_NAME`,`CONTEXT_FIELD`,`DESCRIPTION`,`FORMAT_TEMPLATE`,`CARD_FORMAT`,`PLACEHOLDERS`,`SEARCH_FIELDS`,`FORMAT_FIELDS`,`FIELD_BOOSTS`,`ICONS`,`EXCLUDE_HTML`,`EXTRA_CONDITIONS`,`RESULT_SIZE`,`INDEX_SETTINGS`,`UPDATE_USER`,`UPDATE_TIMESTAMP`) VALUES ('organization','fibirolodex','organization','Configuration for searching organizations','rolodex_id - full_name | organization | email_address | address',NULL,NULL,'{\"address\": {}, \"rolodex_id\": {}, \"create_user\": {}, \"organization\": {}, \"email_address\": {}}','{\"address\": {}, \"full_name\": {}, \"rolodex_id\": {}, \"create_user\": {}, \"organization\": {}, \"email_address\": {}}','{}','{\"full_name\": \"<i aria-hidden=\\\"true\\\" class=\\\"fa fa-user-circle text-danger mr-2\\\"></i>\", \"organization\": \"<span><img src=\\\"DEPLOY_MAPassets/images/org-icon-6.svg\\\" class=\\\"mr-2\\\"></span>\"}','[]','{}',50,'{\"index\": {\"mappings\": {\"properties\": {\"full_name\": {\"type\": \"text\", \"analyzer\": \"name_analyzer\", \"term_vector\": \"with_positions_offsets\", \"search_analyzer\": \"name_search\"}, \"last_name\": {\"type\": \"text\", \"analyzer\": \"ngram_analyzer\", \"term_vector\": \"yes\", \"search_analyzer\": \"standard\"}, \"first_name\": {\"type\": \"text\", \"analyzer\": \"ngram_analyzer\", \"term_vector\": \"yes\", \"search_analyzer\": \"standard\"}, \"rolodex_id\": {\"type\": \"text\", \"fields\": {\"sort\": {\"type\": \"keyword\", \"index\": true}}, \"analyzer\": \"ngram_analyzer\", \"term_vector\": \"with_positions_offsets\", \"search_analyzer\": \"standard\"}, \"designation\": {\"type\": \"text\", \"analyzer\": \"ngram_analyzer\", \"term_vector\": \"yes\", \"search_analyzer\": \"standard\"}, \"middle_name\": {\"type\": \"text\", \"analyzer\": \"ngram_analyzer\", \"term_vector\": \"yes\", \"search_analyzer\": \"standard\"}, \"organization\": {\"type\": \"text\", \"analyzer\": \"ngram_analyzer\", \"term_vector\": \"yes\", \"search_analyzer\": \"standard\"}, \"phone_number\": {\"type\": \"text\", \"analyzer\": \"ngram_analyzer\", \"term_vector\": \"yes\", \"search_analyzer\": \"standard\"}, \"email_address\": {\"type\": \"text\", \"analyzer\": \"ngram_analyzer\", \"term_vector\": \"yes\", \"search_analyzer\": \"standard\"}}}, \"settings\": {\"analysis\": {\"filter\": {\"ngram_filter\": {\"type\": \"edge_ngram\", \"max_gram\": 20, \"min_gram\": 2}}, \"analyzer\": {\"name_search\": {\"tokenizer\": \"standard\", \"char_filter\": [\"my_mapping\"]}, \"name_analyzer\": {\"type\": \"custom\", \"filter\": [\"lowercase\", \"ngram_filter\"], \"tokenizer\": \"whitespace\", \"char_filter\": [\"my_mapping\"]}, \"ngram_analyzer\": {\"type\": \"custom\", \"filter\": [\"lowercase\", \"ngram_filter\"], \"tokenizer\": \"whitespace\"}}, \"char_filter\": {\"my_mapping\": {\"type\": \"pattern_replace\", \"pattern\": \"[-/\\\\\\\\_.+&\':#@,*()\\\\\\\"]\", \"replacement\": \" \"}}}, \"number_of_shards\": 5}}, \"documentId\": \"%{rolodex_id}\", \"queryString\": \"SELECT cast(T1.rolodex_id as char(10)) as rolodex_id,IFNULL(T2.organization_name,T1.organization_name) AS organization,T1.last_name,T1.first_name,T1.middle_name,T1.email_address,T1.phone_number,T1.FULL_NAME,T1.designation,T3.full_name AS create_user, concat(coalesce(T1.ADDRESS_LINE_1,\'\') , if (T1.ADDRESS_LINE_1 IS NULL OR T1.ADDRESS_LINE_2 IS NULL ,\'\',\', \'), (coalesce(T1.ADDRESS_LINE_2,\'\')),if (T1.ADDRESS_LINE_3 IS NULL OR T1.ADDRESS_LINE_2 IS NULL,\'\',\', \'),coalesce(T1.ADDRESS_LINE_3,\'\')) as address,T1.city,T4.country_name as country FROM ROLODEX T1 LEFT OUTER JOIN ORGANIZATION T2 ON T1.ORGANIZATION = T2.ORGANIZATION_ID LEFT OUTER JOIN PERSON T3 ON T1.create_user = T3.user_name LEFT OUTER JOIN COUNTRY T4 ON T1.COUNTRY_CODE=T4.COUNTRY_CODE WHERE T1.IS_ACTIVE = \'Y\'\", \"extraCondition\": \" and t1.rolodex_id = ?\"}','admin',utc_timestamp());
              INSERT IGNORE INTO `elasticsearch_index_config` (`ES_CONFIG_ID`,`INDEX_NAME`,`CONTEXT_FIELD`,`DESCRIPTION`,`FORMAT_TEMPLATE`,`CARD_FORMAT`,`PLACEHOLDERS`,`SEARCH_FIELDS`,`FORMAT_FIELDS`,`FIELD_BOOSTS`,`ICONS`,`EXCLUDE_HTML`,`EXTRA_CONDITIONS`,`RESULT_SIZE`,`INDEX_SETTINGS`,`UPDATE_USER`,`UPDATE_TIMESTAMP`) VALUES ('person','fibiperson','full_name','Configuration for searching persons','prncpl_id - full_name | prncpl_nm | unit_display_name | email_addr',NULL,NULL,'{\"full_name\": {}, \"phone_nbr\": {}, \"prncpl_id\": {}, \"prncpl_nm\": {}, \"email_addr\": {}, \"is_faculty\": {}, \"addr_line_1\": {}, \"is_research_staff\": {}, \"unit_display_name\": {}}',NULL,'{\"full_name\": 5}','{}','[]','{}',50,'{\"index\": {\"mappings\": {\"properties\": {\"full_name\": {\"type\": \"text\", \"fields\": {\"sort\": {\"type\": \"keyword\", \"index\": true}}, \"analyzer\": \"name_analyzer\", \"term_vector\": \"with_positions_offsets\", \"search_analyzer\": \"name_search\"}, \"phone_nbr\": {\"type\": \"text\", \"analyzer\": \"standard\", \"term_vector\": \"yes\", \"search_analyzer\": \"standard\"}, \"prncpl_id\": {\"type\": \"text\", \"analyzer\": \"ngram_analyzer\", \"term_vector\": \"yes\", \"search_analyzer\": \"standard\"}, \"prncpl_nm\": {\"type\": \"text\", \"analyzer\": \"name_analyzer\", \"term_vector\": \"yes\", \"search_analyzer\": \"name_search\"}, \"unit_name\": {\"type\": \"text\", \"index\": \"false\"}, \"email_addr\": {\"type\": \"text\", \"analyzer\": \"ngram_analyzer\", \"term_vector\": \"yes\", \"search_analyzer\": \"standard\"}, \"addr_line_1\": {\"type\": \"text\", \"analyzer\": \"standard\", \"term_vector\": \"yes\", \"search_analyzer\": \"standard\"}, \"unit_number\": {\"type\": \"text\", \"index\": \"false\"}, \"primary_title\": {\"type\": \"text\", \"analyzer\": \"standard\", \"term_vector\": \"yes\", \"search_analyzer\": \"standard\"}, \"unit_display_name\": {\"type\": \"text\", \"analyzer\": \"ngram_analyzer\", \"term_vector\": \"yes\", \"search_analyzer\": \"standard\"}}}, \"settings\": {\"analysis\": {\"filter\": {\"ngram_filter\": {\"type\": \"edge_ngram\", \"max_gram\": 20, \"min_gram\": 2}}, \"analyzer\": {\"name_search\": {\"tokenizer\": \"standard\", \"char_filter\": [\"my_mapping\"]}, \"name_analyzer\": {\"type\": \"custom\", \"filter\": [\"lowercase\", \"ngram_filter\"], \"tokenizer\": \"whitespace\", \"char_filter\": [\"my_mapping\"]}, \"ngram_analyzer\": {\"type\": \"custom\", \"filter\": [\"lowercase\", \"ngram_filter\"], \"tokenizer\": \"whitespace\"}}, \"char_filter\": {\"my_mapping\": {\"type\": \"pattern_replace\", \"pattern\": \"[-/\\\\\\\\_.+&\':#@,*()\\\\\\\"]\", \"replacement\": \" \"}}}, \"number_of_shards\": 5}}, \"documentId\": \"%{prncpl_id}\", \"queryString\": \"SELECT t1.person_id as prncpl_id,t1.full_name,t1.user_name as prncpl_nm,t1.email_address as email_addr,t1.home_unit as unit_number,t2.unit_name,t1.address_line_1 as addr_line_1 ,t1.mobile_phone_number as phone_nbr,t1.directory_title,t1.primary_title, t1.IS_EXTERNAL_USER as external, t2.DISPLAY_NAME as unit_display_name FROM PERSON t1 LEFT OUTER JOIN UNIT t2 ON t1.HOME_UNIT = t2.UNIT_NUMBER WHERE t1.STATUS =\'A\'\", \"extraCondition\": \" and t1.person_id = ?\"}','admin',utc_timestamp());
