              INSERT INTO BUSINESS_RULE_VARIABLE (VARIABLE_NAME, MODULE_CODE, SUB_MODULE_CODE, DESCRIPTION, TABLE_NAME, COLUMN_NAME, SHOW_LOOKUP, UPDATE_TIMESTAMP, UPDATE_USER, LOOKUP_WINDOW_NAME)
