  - changeSet:
      id: FIBI-9375-1
      author: Reshma Antony
      labels: 'DML'
      comment: Insert script to introduce a new notification type for award closure.
      changes:
        - sql:
            sql: |
             INSERT IGNORE INTO `NOTIFICATION_TYPE` (`NOTIFICATION_TYPE_ID`, `MODULE_CODE`, `SUB_MODULE_CODE`, `DESCRIPTION`, `SUBJECT`, `MESSAGE`, `PROMPT_USER`, `IS_ACTIVE`, `CREATE_USER`, `CREATE_TIMESTAMP`, `UPDATE_USER`, `UPDATE_TIMESTAMP`, `IS_SYSTEM_SPECIFIC`, `SHOW_TEMPLATE_IN_MODULE`, `SENT_TO_INITIATOR`) 
             VALUES ('2403', '1', '0', 'Notification for Award Closure', 'Award Closure Notification – Award {AWARD_NUMBER}', '<p>Dear Recipient,</p><p>This is to notify you that the following <b>award has reached its end date and is now officially closed in the system.</b></p><p>The details are as follows:</p><p>Principal Investigator: {PRINCIPAL_INVESTIGATOR}</p><p>Award Title : {AWARD_TITLE}</p><p>Award Number : {AWARD_NUMBER}</p><p>Funder : {AWARD_FUNDING_AGENCY}</p><p>Funder Reference Number : {SPONSOR_AWARD_NUMBER}</p><p>Award End Date : {AWARD_END_DATE}</p><p>Please ensure that all outstanding financial, reporting, and administrative activities associated with this award are completed in accordance with institutional and sponsor requirements.</p><p>Please go to {APPLICATION_URL} to view the details.</p><p>Thank you.</p><p>Note: This is a system-generated email. Please do not reply to this email.</p>', 'N', 'Y', 'admin', UTC_TIMESTAMP(), 'admin', UTC_TIMESTAMP(), 'N', 'N', 'Y');
      rollback:
        - sql:
            sql: |
              DELETE FROM NOTIFICATION_TYPE WHERE NOTIFICATION_TYPE_ID = '2403';

  - changeSet:
      id: FIBI-9375-2
      author: Reshma Antony
      labels: 'DML'
      comment: Insert script to introduce a new Reminder notification for award closure.
      changes:
        - sql:
            sql: |
             INSERT INTO REMINDER_NOTIFICATION
              (
                  `REMINDER_NOTIFICATION_ID`, 
                  `REMINDER_NAME`, 
                  `NOTIFICATION_TYPE_ID`, 
                  `DAYS_TO_DUE_DATE`, 
                  `PROCEDURE_NAME`, 
                  `IS_ACTVE`, 
                  `UPDATE_USER`,
                  `UPDATE_TIMESTAMP`
              ) 
              SELECT 
                  (SELECT COALESCE(MAX(REMINDER_NOTIFICATION_ID), 0) + 1 FROM reminder_notification), 
                  'Notification for Award Closure', 
                  '2403',
                  '-1', 
                  'AWARD_CLOSURE_REMAINDER',
                  'Y',
                  'admin',
                  UTC_TIMESTAMP()
                  FROM DUAL 
                  WHERE NOT EXISTS (
                      SELECT 1 
                      FROM REMINDER_NOTIFICATION 
                      WHERE PROCEDURE_NAME = 'AWARD_CLOSURE_REMAINDER' 
                      AND NOTIFICATION_TYPE_ID = '2403'
              );
      rollback:
        - sql:
            sql: |
              DELETE FROM REMINDER_NOTIFICATION WHERE PROCEDURE_NAME = 'AWARD_CLOSURE_REMAINDER' AND NOTIFICATION_TYPE_ID = '2403'

  - changeSet:
