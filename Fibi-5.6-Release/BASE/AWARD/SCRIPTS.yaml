  - changeSet:
      id: FIBI-7562-11
      author: Mohamed Fazil
      labels: 'DML'
      comment: Insert business_rule_function and args for FN_AWARD_SPONSOR_TYPE (module 1)
      changes:
        - sql:
            sql: |
              INSERT INTO business_rule_function (FUNCTION_NAME, MODULE_CODE, SUB_MODULE_CODE, DESCRIPTION, DB_FUNCTION_NAME, UPDATE_TIMESTAMP, UPDATE_USER)
              SELECT 'For checking Specific Sponsor type', '1', '0', 'For checking Specific Sponsor type', 'FN_AWARD_SPONSOR_TYPE', UTC_TIMESTAMP(), 'admin'
              FROM dual
              WHERE NOT EXISTS (
                SELECT 1 FROM business_rule_function
                WHERE FUNCTION_NAME = 'For checking Specific Sponsor type' AND DB_FUNCTION_NAME = 'FN_AWARD_SPONSOR_TYPE'
              );

              INSERT INTO business_rule_function_arg (FUNCTION_NAME, ARGUMENT_SEQUENCE_NUMBER, ARGUMENT_NAME, UPDATE_TIMESTAMP, UPDATE_USER)
              SELECT 'For checking Specific Sponsor type', '1', 'AWARD_ID', UTC_TIMESTAMP(), 'admin'
              FROM dual
              WHERE NOT EXISTS (
                SELECT 1 FROM business_rule_function_arg
                WHERE FUNCTION_NAME = 'For checking Specific Sponsor type' AND ARGUMENT_SEQUENCE_NUMBER = 1
              );

              INSERT INTO business_rule_function_arg (FUNCTION_NAME, ARGUMENT_SEQUENCE_NUMBER, ARGUMENT_NAME, DESCRIPTION, UPDATE_TIMESTAMP, UPDATE_USER, LOOKUP_WINDOW_NAME, LOOKUP_TYPE, ARGUMENT_TYPE, ARGUMENT_LABEL)
              SELECT 'For checking Specific Sponsor type', '2', 'SPONSOR_TYPE_CODE', 'Sponsor Type', UTC_TIMESTAMP(), 'admin', 'sponsor_type#SPONSOR_TYPE_CODE', 'System', 'U', 'SponsorType'
              FROM dual
              WHERE NOT EXISTS (
                SELECT 1 FROM business_rule_function_arg
                WHERE FUNCTION_NAME = 'For checking Specific Sponsor type' AND ARGUMENT_SEQUENCE_NUMBER = 2
              );
      rollback:
        - sql:
            sql: |
              DELETE FROM business_rule_function_arg
              WHERE FUNCTION_NAME = 'For checking Specific Sponsor type'
                AND ARGUMENT_SEQUENCE_NUMBER IN (1, 2);

              DELETE FROM business_rule_function
              WHERE FUNCTION_NAME = 'For checking Specific Sponsor type'
                AND DB_FUNCTION_NAME = 'FN_AWARD_SPONSOR_TYPE';

