                  'DO 1'
              );
              PREPARE stmt FROM @sql;
              EXECUTE stmt;
              DEALLOCATE PREPARE stmt; 
      rollback:
        - sql:
            sql: |
              ALTER TABLE SR_CATEGORY DROP COLUMN IS_DEFAULT;

