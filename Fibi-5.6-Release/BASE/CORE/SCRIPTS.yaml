        - sql:
            sql: |
              UPDATE `code_table_configuration` SET `DESCRIPTION` = ' List of all report classes in Award module.\n\nNotes-\n1) Mode of report:\n  • A- Attachment only (Report uploaded as an attachment in award reporting requirement tab).\n  • R- Report only (Create report via progress report module).\n  • E- Either Attachment or Report (User can chose either one of the above options).\n \n2) Copy Report from Previous:\n  • Enabling this flag permits users to generate a new report in a sequential manner by duplicating a report from the latest approved version of the same report class and report type.\n  • This option is applicable only for reports created via progress report module.\n \n3) Copy From:\n  • Designate a report class in the \"Copy From\" field to indicate the specific report class that should be duplicated when generating a new report.\n  • This flag is considered only when \"Copy Report from Previous\" is OFF ', `CONTENT` = '{\n  \"group\": \"Award\",\n  \"codeTableName\": \"ReportClass\",\n  \"description\": \"ListofallreportclassesinAwardmodule\",\n  \"databaseTableName\": \"REPORT_CLASS\",\n  \"fields\": [\n    {\n      \"columnName\": \"REPORT_CLASS_CODE\",\n      \"displayName\": \"Report Class Code\",\n      \"dataType\": \"String\",\n      \"isEditable\": true,\n      \"length\": 3,\n      \"canEmpty\": false,\n      \"visible\": true,\n      \"valueChanged\": null,\n      \"index\": null,\n      \"filterType\": null,\n      \"valueField\": null,\n      \"isTransient\": null,\n      \"values\": null,\n      \"refColumnName\": null,\n      \"defaultValue\": null\n    },\n    {\n      \"columnName\": \"DESCRIPTION\",\n      \"displayName\": \"Description\",\n      \"dataType\": \"String\",\n      \"isEditable\": true,\n      \"length\": 200,\n      \"canEmpty\": false,\n      \"visible\": true,\n      \"valueChanged\": null,\n      \"index\": null,\n      \"filterType\": null,\n      \"valueField\": null,\n      \"isTransient\": null,\n      \"values\": null,\n      \"refColumnName\": null,\n      \"defaultValue\": null\n    },\n    {\n      \"columnName\": \"IS_ATTACHMENT_OR_REPORT\",\n      \"displayName\": \"Mode of Report\",\n      \"dataType\": \"String\",\n      \"isEditable\": true,\n      \"length\": 1,\n      \"canEmpty\": false,\n      \"visible\": true,\n      \"valueChanged\": null,\n      \"index\": null,\n      \"filterType\": \"systemDropdown\",\n      \"valueField\": null,\n      \"isTransient\": null,\n      \"values\": [\n        {\n          \"code\": \"A\",\n          \"description\": \"Attachment Only\"\n        },\n        {\n          \"code\": \"R\",\n          \"description\": \"Report Only\"\n        },\n        {\n          \"code\": \"E\",\n          \"description\": \"Either Attachment Or Report\"\n        }\n      ],\n      \"refColumnName\": null,\n      \"defaultValue\": null\n    },\n    {\n      \"columnName\": \"COPY_REPORT\",\n      \"displayName\": \"Copy Report from Previous\",\n      \"dataType\": \"String\",\n      \"isEditable\": true,\n      \"length\": 1,\n      \"canEmpty\": false,\n      \"visible\": true,\n      \"valueChanged\": null,\n      \"index\": null,\n      \"filterType\": \"switch\",\n      \"valueField\": null,\n      \"isTransient\": null,\n      \"values\": null,\n      \"refColumnName\": null,\n      \"defaultValue\": null\n    },\n    {\n      \"columnName\": \"COPY_FROM\",\n      \"displayName\": \"Copy From\",\n      \"dataType\": \"String\",\n      \"isEditable\": true,\n      \"length\": 3,\n      \"canEmpty\": true,\n      \"visible\": true,\n      \"valueChanged\": null,\n      \"index\": null,\n      \"filterType\": \"lookUp\",\n      \"valueField\": \"REPORT_CLASS#REPORT_CLASS_CODE\",\n      \"isTransient\": null,\n      \"values\": null,\n      \"refColumnName\": null,\n      \"defaultValue\": null\n    },\n    {\n      \"columnName\": \"UPDATE_TIMESTAMP\",\n      \"displayName\": \"Update Timestamp\",\n      \"dataType\": \"Date\",\n      \"isEditable\": false,\n      \"length\": null,\n      \"canEmpty\": false,\n      \"visible\": true,\n      \"valueChanged\": null,\n      \"index\": null,\n      \"filterType\": null,\n      \"valueField\": null,\n      \"isTransient\": null,\n      \"values\": null,\n      \"refColumnName\": null,\n      \"defaultValue\": null\n    },\n    {\n      \"columnName\": \"UPDATE_USER\",\n      \"displayName\": \"Update User\",\n      \"dataType\": \"String\",\n      \"isEditable\": false,\n      \"length\": 60,\n      \"canEmpty\": false,\n      \"visible\": true,\n      \"valueChanged\": null,\n      \"index\": null,\n      \"filterType\": null,\n      \"valueField\": null,\n      \"isTransient\": null,\n      \"values\": null,\n      \"refColumnName\": \"PERSON#USER_NAME\",\n      \"defaultValue\": null\n    },\n    {\n      \"columnName\": \"IS_ACTIVE\",\n      \"displayName\": \"Is Active\",\n      \"dataType\": \"String\",\n      \"isEditable\": true,\n      \"length\": 1,\n      \"canEmpty\": false,\n      \"visible\": true,\n      \"valueChanged\": null,\n      \"index\": null,\n      \"filterType\": \"switch\",\n      \"valueField\": null,\n      \"isTransient\": null,\n      \"values\": null,\n      \"refColumnName\": null,\n      \"defaultValue\": null\n    }\n  ],\n  \"primaryKey\": [\n    \"REPORT_CLASS_CODE\"\n  ],\n  \"dependency\": [\n    {\n      \"displayName\": \"SponsorReport\",\n      \"table_name\": \"sponsor_report\",\n      \"columnName\": \"REPORT_CLASS_CODE\"\n    },\n    {\n      \"displayName\": \"VaildReportClass\",\n      \"table_name\": \"valid_report_class\",\n      \"columnName\": \"REPORT_CLASS_CODE\"\n    },\n    {\n      \"displayName\": \"AwardReportTerms\",\n      \"table_name\": \"award_report_terms\",\n      \"columnName\": \"REPORT_CLASS_CODE\"\n    },\n    {\n      \"displayName\": \"AwardReportReminder\",\n      \"table_name\": \"award_report_reminder\",\n      \"columnName\": \"REPORT_CLASS_CODE\"\n    },\n    {\n      \"displayName\": \"ValidReportClass\",\n      \"table_name\": \"valid_report_class\",\n      \"columnName\": \"REPORT_CLASS_CODE\"\n    }\n  ],\n  \"actions\": null\n}', `UPDATE_TIMESTAMP` = utc_timestamp(), `UPDATE_USER` = 'admin' WHERE (`TABLE_NAME` = 'REPORT_CLASS');

