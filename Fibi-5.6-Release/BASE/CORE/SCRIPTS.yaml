  - changeSet:
      id: FIBI-9312-1
      author: Sreejith T
      labels: 'DDL'
      comment: New column, MANDATORY_SECTION, in the report_class table to determine whether the fields in the "Summary of Progress" and "Future Plans" sections are mandatory, based on the specific report class.
      changes:
        - sql:
            sql: |
             ANALYZE TABLE report_class;
              SET @sql := IF(
                  (SELECT COUNT(*) FROM information_schema.COLUMNS 
                  WHERE TABLE_SCHEMA = DATABASE() 
                    AND TABLE_NAME = 'report_class' 
                    AND COLUMN_NAME = 'MANDATORY_SECTION') = 0,
                  
                  'ALTER TABLE report_class ADD COLUMN MANDATORY_SECTION VARCHAR(1) DEFAULT NULL COMMENT ''Controls whether Summary of Progress (S), Future Plans (F), or both (B) sections are mandatory in the Progress Report Detail page'';',
                  'DO 1'
              );

              PREPARE stmt FROM @sql;
              EXECUTE stmt;
              DEALLOCATE PREPARE stmt;
      rollback:
        - sql:
            sql: |
             ANALYZE TABLE report_class;
              SET @sql := IF(
                  (SELECT COUNT(*) FROM information_schema.COLUMNS 
                  WHERE TABLE_SCHEMA = DATABASE() 
                    AND TABLE_NAME = 'report_class' 
                    AND COLUMN_NAME = 'MANDATORY_SECTION') > 0,
                  
                  'ALTER TABLE report_class DROP COLUMN MANDATORY_SECTION;',
                  'DO 1'
              );

              PREPARE stmt FROM @sql;
              EXECUTE stmt;
              DEALLOCATE PREPARE stmt;

