_code LEFT OUTER JOIN country t3 ON t1.country_code = t3.country_code LEFT OUTER JOIN external_reviewer_rights t4 ON t1.external_reviewer_id = t4.external_reviewer_id LEFT OUTER JOIN ext_reviewer_academic_rank t5 ON t1.academic_rank_code = t5.academic_rank_code LEFT OUTER JOIN external_reviewer_ext t6 ON t6.external_reviewer_id = t1.external_reviewer_id WHERE t4.reviewer_rights_id = \'1\'\", \"extraCondition\": \" and t1.external_reviewer_id = ?\"}','admin',utc_timestamp());
