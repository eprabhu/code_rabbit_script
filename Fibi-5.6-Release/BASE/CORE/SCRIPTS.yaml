  - changeSet:              
      id: FIBI-8179-1
      author: Sreejith T
      labels: 'DDL'
      comment: New table ‘ELASTICSEARCH_INDEX_CONFIG’ to store elastic configurations
      changes:
        - sql:
            sql: |
              CREATE TABLE IF NOT EXISTS ELASTICSEARCH_INDEX_CONFIG (
                ES_CONFIG_ID varchar(100) NOT NULL COMMENT 'Field to identify different configurations',
                INDEX_NAME varchar(100) NOT NULL COMMENT 'Name of the index',
                CONTEXT_FIELD varchar(100) DEFAULT NULL COMMENT 'Field specifies the key to which the value will be bound',
                DESCRIPTION varchar(1000) DEFAULT NULL COMMENT 'Description of the elasticsearch index configuration',
                FORMAT_TEMPLATE varchar(1000) DEFAULT NULL COMMENT 'Format string for displaying results',
                CARD_FORMAT json DEFAULT NULL COMMENT 'Fields displayed in the selected item card layout.',
                PLACEHOLDERS varchar(500) DEFAULT NULL COMMENT 'Placeholder text for input field',
                SEARCH_FIELDS json DEFAULT NULL COMMENT 'Fields that will be used for search functionality and for display purposes',
                FORMAT_FIELDS json DEFAULT NULL COMMENT 'Fields that will be used for display purposes',
                FIELD_BOOSTS json DEFAULT NULL COMMENT 'Boost settings for prioritized fields',
                ICONS json DEFAULT NULL COMMENT 'HTML/Icon mappings for fields',
                EXCLUDE_HTML json DEFAULT NULL COMMENT 'Fields excluded from rendering as HTML in the search result',
                EXTRA_CONDITIONS json DEFAULT NULL COMMENT 'Additional query conditions',
                RESULT_SIZE int DEFAULT NULL COMMENT 'Number of results to return',
                INDEX_SETTINGS json DEFAULT NULL COMMENT 'Elasticsearch index settings for live and bulk document sync',
                UPDATE_USER varchar(60) DEFAULT NULL,
                UPDATE_TIMESTAMP datetime DEFAULT NULL,
                PRIMARY KEY (ES_CONFIG_ID)
              );
      rollback:
        - sql:
            sql: |
              DROP TABLE IF EXISTS ELASTICSEARCH_INDEX_CONFIG;

  - changeSet:
      id: FIBI-8179-2
      author: Sreejith T
      labels: 'DML'
      comment: Elastic configurations for base instance.
      changes:
        - sql:
            sql: |
              INSERT IGNORE INTO `elasticsearch_index_config` (`ES_CONFIG_ID`,`INDEX_NAME`,`CONTEXT_FIELD`,`DESCRIPTION`,`FORMAT_TEMPLATE`,`CARD_FORMAT`,`PLACEHOLDERS`,`SEARCH_FIELDS`,`FORMAT_FIELDS`,`FIELD_BOOSTS`,`ICONS`,`EXCLUDE_HTML`,`EXTRA_CONDITIONS`,`RESULT_SIZE`,`INDEX_SETTINGS`,`UPDATE_USER`,`UPDATE_TIMESTAMP`) VALUES ('agreement','agreementfibi','agreement_request_id','Configuration for searching agreements','agreement_request_id | title | agreement_type | unit_display_name | agreement_status | principal_person_full_name | aa_person_full_name | sponsor_display_name | requestor_full_name',NULL,'Search: Agreement #, Research Title, Type, Lead Unit, Status, PI, Administrator, Sponsor/Organization, Requestor','{\"title\": {}, \"agreement_type\": {}, \"agreement_status\": {}, \"unit_display_name\": {}, \"aa_person_full_name\": {}, \"requestor_full_name\": {}, \"agreement_request_id\": {}, \"sponsor_display_name\": {}, \"principal_person_full_name\": {}}',NULL,'{}','{}','[]','{}',20,'{\"index\": {\"mappings\": {\"properties\": {\"title\": {\"type\": \"text\", \"analyzer\": \"title_analyzer\", \"term_vector\": \"with_positions_offsets\", \"search_analyzer\": \"title_search\"}, \"@version\": {\"type\": \"integer\"}, \"category\": {\"type\": \"text\", \"analyzer\": \"ngram_analyzer\", \"term_vector\": \"yes\", \"search_analyzer\": \"standard\"}, \"unit_name\": {\"type\": \"text\", \"index\": \"false\"}, \"@timestamp\": {\"type\": \"date\"}, \"status_code\": {\"type\": \"integer\", \"index\": \"false\"}, \"unit_number\": {\"type\": \"text\", \"index\": \"false\"}, \"sponsor_name\": {\"type\": \"text\", \"index\": \"false\"}, \"agreement_type\": {\"type\": \"text\", \"analyzer\": \"ngram_analyzer\", \"term_vector\": \"yes\", \"search_analyzer\": \"standard\"}, \"agreement_status\": {\"type\": \"text\", \"analyzer\": \"ngram_analyzer\", \"term_vector\": \"yes\", \"search_analyzer\": \"standard\"}, \"unit_display_name\": {\"type\": \"text\", \"analyzer\": \"ngram_analyzer\", \"term_vector\": \"yes\", \"search_analyzer\": \"standard\"}, \"agreement_end_date\": {\"type\": \"text\", \"analyzer\": \"ngram_analyzer\", \"term_vector\": \"yes\", \"search_analyzer\": \"standard\"}, \"aa_person_full_name\": {\"type\": \"text\", \"analyzer\": \"ngram_analyzer\", \"term_vector\": \"yes\", \"search_analyzer\": \"standard\"}, \"requestor_full_name\": {\"type\": \"text\", \"analyzer\": \"ngram_analyzer\", \"term_vector\": \"yes\", \"search_analyzer\": \"standard\"}, \"agreement_request_id\": {\"type\": \"text\", \"fields\": {\"sort\": {\"type\": \"keyword\", \"index\": true}}, \"analyzer\": \"ngram_analyzer\", \"term_vector\": \"with_positions_offsets\", \"search_analyzer\": \"standard\"}, \"agreement_start_date\": {\"type\": \"text\", \"analyzer\": \"ngram_analyzer\", \"term_vector\": \"yes\", \"search_analyzer\": \"standard\"}, \"sponsor_display_name\": {\"type\": \"text\", \"analyzer\": \"ngram_analyzer\", \"term_vector\": \"yes\", \"search_analyzer\": \"standard\"}, \"principal_person_full_name\": {\"type\": \"text\", \"analyzer\": \"ngram_analyzer\", \"term_vector\": \"yes\", \"search_analyzer\": \"standard\"}}}, \"settings\": {\"analysis\": {\"filter\": {\"ngram_filter\": {\"type\": \"edge_ngram\", \"max_gram\": 20, \"min_gram\": 2}}, \"analyzer\": {\"title_search\": {\"tokenizer\": \"standard\", \"char_filter\": [\"my_mapping\"]}, \"ngram_analyzer\": {\"type\": \"custom\", \"filter\": [\"lowercase\", \"ngram_filter\"], \"tokenizer\": \"whitespace\"}, \"title_analyzer\": {\"type\": \"custom\", \"filter\": [\"lowercase\", \"ngram_filter\"], \"tokenizer\": \"whitespace\", \"char_filter\": [\"my_mapping\"]}}, \"char_filter\": {\"my_mapping\": {\"type\": \"pattern_replace\", \"pattern\": \"[-/\\\\\\\\_.+&\':#@,*()\\\\\\\"]\", \"replacement\": \" \"}}}, \"number_of_shards\": 5}}, \"documentId\": \"%{agreement_request_id}\", \"queryString\": \"select t1.agreement_request_id, t1.agreement_type, t1.title, t1.unit_number, t1.unit_name, t1.unit_display_name, t1.aa_person_full_name, t1.principal_person_full_name, t1.requestor_full_name,t1.agreement_status,t1.agreement_start_date,t1.agreement_end_date,t1.sponsor_display_name from agreement_v t1 where AGREEMENT_SEQUENCE_STATUS = \'ACTIVE\'\", \"extraCondition\": \" and t1.agreement_request_id = ?\"}','admin',utc_timestamp());
              INSERT IGNORE INTO `elasticsearch_index_config` (`ES_CONFIG_ID`,`INDEX_NAME`,`CONTEXT_FIELD`,`DESCRIPTION`,`FORMAT_TEMPLATE`,`CARD_FORMAT`,`PLACEHOLDERS`,`SEARCH_FIELDS`,`FORMAT_FIELDS`,`FIELD_BOOSTS`,`ICONS`,`EXCLUDE_HTML`,`EXTRA_CONDITIONS`,`RESULT_SIZE`,`INDEX_SETTINGS`,`UPDATE_USER`,`UPDATE_TIMESTAMP`) VALUES ('award','awardfibi','award_number','Configuration for searching awards','award_number | account_number | title | sponsor_display_name | unit_display_name | pi_name | grant_call_name | funding_scheme | sp_awd_number','[\"title\", \"pi_name\", \"sp_awd_number\", \"account_number\", \"funding_scheme\", \"grant_call_name\", \"unit_display_name\", \"sponsor_display_name\"]','Search: Award #, Account No, Title, Lead Unit, Sponsor, Principal Investigator, Title of Grant Call, Funding Scheme, Sponsor Award Number','{\"title\": {}, \"pi_name\": {}, \"award_number\": {}, \"sp_awd_number\": {}, \"account_number\": {}, \"funding_scheme\": {}, \"grant_call_name\": {}, \"unit_display_name\": {}, \"sponsor_display_name\": {}}',NULL,'{}','{}','[\"title\"]','{}',20,'{\"index\": {\"mappings\": {\"properties\": {\"title\": {\"type\": \"text\", \"analyzer\": \"title_analyzer\", \"term_vector\": \"with_positions_offsets\", \"search_analyzer\": \"title_search\"}, \"status\": {\"type\": \"text\", \"analyzer\": \"ngram_analyzer\", \"search_analyzer\": \"standard\"}, \"pi_name\": {\"type\": \"text\", \"analyzer\": \"ngram_analyzer\", \"term_vector\": \"yes\", \"search_analyzer\": \"standard\"}, \"sponsor\": {\"type\": \"text\", \"index\": \"false\"}, \"@version\": {\"type\": \"integer\"}, \"award_id\": {\"type\": \"text\", \"fields\": {\"sort\": {\"type\": \"keyword\", \"index\": true}}, \"analyzer\": \"ngram_analyzer\", \"search_analyzer\": \"whitespace\"}, \"@timestamp\": {\"type\": \"date\"}, \"status_code\": {\"type\": \"integer\", \"index\": \"false\"}, \"award_number\": {\"type\": \"text\", \"fields\": {\"sort\": {\"type\": \"keyword\", \"index\": true}}, \"analyzer\": \"ngram_analyzer\", \"term_vector\": \"with_positions_offsets\", \"search_analyzer\": \"whitespace\"}, \"account_number\": {\"type\": \"text\", \"analyzer\": \"ngram_analyzer\", \"search_analyzer\": \"whitespace\"}, \"funding_scheme\": {\"type\": \"text\", \"analyzer\": \"ngram_analyzer\", \"term_vector\": \"yes\", \"search_analyzer\": \"standard\"}, \"lead_unit_name\": {\"type\": \"text\", \"index\": \"false\"}, \"lead_unit_number\": {\"type\": \"text\", \"index\": \"false\"}, \"unit_display_name\": {\"type\": \"text\", \"analyzer\": \"ngram_analyzer\", \"term_vector\": \"yes\", \"search_analyzer\": \"standard\"}, \"sponsor_display_name\": {\"type\": \"text\", \"analyzer\": \"ngram_analyzer\", \"term_vector\": \"yes\", \"search_analyzer\": \"standard\"}, \"obligation_expiration_date\": {\"type\": \"text\", \"analyzer\": \"standard\", \"search_analyzer\": \"standard\"}}}, \"settings\": {\"analysis\": {\"filter\": {\"ngram_filter\": {\"type\": \"edge_ngram\", \"max_gram\": 20, \"min_gram\": 2}}, \"analyzer\": {\"title_search\": {\"tokenizer\": \"standard\", \"char_filter\": [\"my_mapping\"]}, \"ngram_analyzer\": {\"type\": \"custom\", \"filter\": [\"lowercase\", \"ngram_filter\"], \"tokenizer\": \"whitespace\"}, \"title_analyzer\": {\"type\": \"custom\", \"filter\": [\"lowercase\", \"ngram_filter\"], \"tokenizer\": \"whitespace\", \"char_filter\": [\"my_mapping\"]}}, \"char_filter\": {\"my_mapping\": {\"type\": \"pattern_replace\", \"pattern\": \"[-/\\\\\\\\_.+&\':#@,*()\\\\\\\"]\", \"replacement\": \" \"}}}, \"number_of_shards\": 1}}, \"documentId\": \"%{award_id}\", \"queryString\": \"SELECT t1.award_id, t1.award_number, t1.status, t1.pi_name, t1.sponsor,t1.sponsor_display_name, t1.account_number, t1.lead_unit_number, t1.lead_unit_name, t1.title,t1.status_code,t1.obligation_expiration_date,t1.grant_call_title as grant_call_name,t1.sp_awd_number,t1.funding_scheme, t1.unit_display_name FROM ELASTIC_AWARD_V t1\", \"extraCondition\": \" where t1.award_id = ?\"}','admin',utc_timestamp());
