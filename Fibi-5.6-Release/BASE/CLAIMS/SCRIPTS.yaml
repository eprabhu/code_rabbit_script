databaseChangeLog:

  - changeSet:
      id: FIBI-7562-2
      author: Mohamed Fazil
      labels: 'DML'
      comment: Insert lookup_window Claim Type (idempotent)
      changes:
        - sql:
            sql: |
              INSERT INTO lookup_window (LOOKUP_WINDOW_NAME, DESCRIPTION, TABLE_NAME, COLUMN_NAME, OTHERS_DISPLAY_COLUMNS, DATA_TYPE_CODE)
              SELECT 'Claim Type', 'User Dropdown', 'CLAIM_TYPE', 'CLAIM_TYPE_V', 'DESCRIPTION', '8'
              FROM dual
              WHERE NOT EXISTS (
                SELECT 1 FROM lookup_window
                WHERE LOOKUP_WINDOW_NAME = 'Claim Type' AND TABLE_NAME = 'CLAIM_TYPE_V' AND COLUMN_NAME = 'CLAIM_TYPE'
              );
      rollback:
        - sql:
            sql: |
              DELETE FROM lookup_window
              WHERE LOOKUP_WINDOW_NAME = 'Claim Type' AND TABLE_NAME = 'CLAIM_TYPE' AND COLUMN_NAME = 'CLAIM_TYPE';

  - changeSet:
      id: FIBI-7562-7
      author: Mohamed Fazil
      labels: 'DML'
      comment: Update lookup_window Claim Type TABLE_NAME to CLAIM_TYPE_V (idempotent)
      changes:
        - sql:
            sql: |
              UPDATE lookup_window
              SET TABLE_NAME = 'CLAIM_TYPE_V'
              WHERE LOOKUP_WINDOW_NAME = 'Claim Type'
                AND (TABLE_NAME IS NULL OR TABLE_NAME <> 'CLAIM_TYPE_V');
      rollback:
        - sql:
            sql: |
              UPDATE lookup_window
              SET TABLE_NAME = 'CLAIM_TYPE'
              WHERE LOOKUP_WINDOW_NAME = 'Claim Type' AND TABLE_NAME = 'CLAIM_TYPE_V';

