      id: FIBI-8341-2
      author: Reshma Antony
      labels: 'DML'
      comment: Insert ALL_PROPOSALS to DASHBOARD_TAB_TYPE and Filter
      changes:
        - sql:
            sql: |
              SET @NEW_TAB_ID = (SELECT IFNULL(MAX(CAST(TAB_TYPE_ID AS UNSIGNED)), 0) + 1 FROM DASHBOARD_TAB_TYPE);

              INSERT INTO DASHBOARD_TAB_TYPE (TAB_TYPE_ID, TAB_KEY, DESCRIPTION, DISPLAY_NAME, MODULE_CODE, SOURCE_TAB_ID, PERSON_ID, DEFAULT_SORT_ORDER, DEFAULT_IS_PRIMARY_TAB, IS_PRIMARY_TAB, IS_AUTO_SEARCH, IS_ACTIVE, UPDATE_TIMESTAMP, UPDATE_USER)
              SELECT @NEW_TAB_ID, 'ALL_PROPOSALS', 'All Proposals', 'All Proposals', '3', NULL, NULL, '2', 'N', NULL, 'N', 'Y', UTC_TIMESTAMP(), 'admin'
              FROM DUAL
              WHERE NOT EXISTS (
                  SELECT 1 FROM DASHBOARD_TAB_TYPE
                  WHERE TAB_KEY = 'ALL_PROPOSALS'
                  AND MODULE_CODE = '3'
              );
              SET @NEW_FILTER_ID = (SELECT IFNULL(MAX(CAST(FILTER_ID AS UNSIGNED)), 0) + 1 FROM DASHBOARD_FILTER_PREFERENCE);
              SET @TAB_ID = (SELECT TAB_TYPE_ID FROM DASHBOARD_TAB_TYPE WHERE TAB_KEY = 'ALL_PROPOSALS' AND MODULE_CODE = '3');

              INSERT INTO DASHBOARD_FILTER_PREFERENCE (FILTER_ID, FILTER_NAME, MODULE_CODE, TAB_TYPE_ID, PERSON_ID, SORT_ORDER, IS_CURRENT, UPDATE_TIMESTAMP, UPDATE_USER)
              SELECT @NEW_FILTER_ID, 'Default', '3', @TAB_ID, NULL, '2', 'Y', UTC_TIMESTAMP(), 'admin'
              FROM DUAL
              WHERE NOT EXISTS (
