            sql: |
              SET @NEW_TAB_ID = (SELECT IFNULL(MAX(CAST(TAB_TYPE_ID AS UNSIGNED)), 0) + 1 FROM DASHBOARD_TAB_TYPE);
              INSERT INTO DASHBOARD_TAB_TYPE (TAB_TYPE_ID, TAB_KEY, DESCRIPTION, DISPLAY_NAME, MODULE_CODE, SOURCE_TAB_ID, PERSON_ID, DEFAULT_SORT_ORDER, DEFAULT_IS_PRIMARY_TAB, IS_PRIMARY_TAB, IS_AUTO_SEARCH, IS_ACTIVE, UPDATE_TIMESTAMP, UPDATE_USER)
              SELECT @NEW_TAB_ID, 'REVIEW_INPROGRESS', 'Review In Progress', 'Review In Progress', '3', NULL, NULL, '3', 'N', NULL, 'Y', 'Y', UTC_TIMESTAMP(), 'admin'
