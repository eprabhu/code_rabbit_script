databaseChangeLog:

  - changeSet:
      id: FIBI-8342-1
      author: Adarsh S M
      labels: 'DML'
      comment: Update in DASHBOARD_CRITERIA_LOOKUP
      changes:
        - sql:
            sql: |
                UPDATE DASHBOARD_CRITERIA_LOOKUP 
                SET IS_ACTIVE = 'N' 
                WHERE CRITERIA_KEY = 'CRT_IP_FUNDING_SCHEME';
      rollback: 
        - sql:
            sql: |    
                UPDATE DASHBOARD_CRITERIA_LOOKUP 
                SET IS_ACTIVE = 'Y' 
                WHERE CRITERIA_KEY = 'CRT_IP_FUNDING_SCHEME';

  - changeSet:
      id: FIBI-8342-2
