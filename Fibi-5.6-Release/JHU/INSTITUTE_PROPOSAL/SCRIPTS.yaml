      changes:
        - sql:
            sql: |
                UPDATE DASHBOARD_COLUMN_LOOKUP 
                SET IS_ACTIVE = 'N' 
                WHERE COLUMN_KEY = 'COL_IP_FUNDING_SCHEME';
      rollback: 
        - sql:
            sql: |    
                UPDATE DASHBOARD_COLUMN_LOOKUP 
                SET IS_ACTIVE = 'Y' 
                WHERE COLUMN_KEY = 'COL_IP_FUNDING_SCHEME';
