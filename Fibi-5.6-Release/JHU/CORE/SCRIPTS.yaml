    - changeSet:
      id: FIBI-8179
      author: Sreejith T
      labels: 'DML'
      comment: Elastic configurations for JHU instance.
      changes:
        - sql:
            sql: |
              UPDATE `elasticsearch_index_config` SET `FORMAT_TEMPLATE` = 'prncpl_id - last_name, first_name | prncpl_nm | unit_display_name | email_addr', `SEARCH_FIELDS` = '{"full_name": {}, "phone_nbr": {}, "prncpl_id": {}, "prncpl_nm": {}, "email_addr": {}, "is_faculty": {}, "addr_line_1": {}, "is_research_staff": {}, "unit_display_name": {}, "first_name": {}, "last_name": {}}', `FIELD_BOOSTS` = '{"last_name": 6, "first_name": 3}', `INDEX_SETTINGS` = '{"queryString":"SELECT t1.person_id as prncpl_id,t1.last_name,t1.first_name,t1.full_name,t1.user_name as prncpl_nm,t1.email_address as email_addr,t1.home_unit as unit_number,t2.unit_name,t1.address_line_1 as addr_line_1 ,t1.mobile_phone_number as phone_nbr,t1.directory_title,t1.primary_title, t1.IS_EXTERNAL_USER as external, t2.DISPLAY_NAME as unit_display_name FROM PERSON t1 LEFT OUTER JOIN UNIT t2 ON t1.HOME_UNIT = t2.UNIT_NUMBER WHERE t1.STATUS =\'A\'","extraCondition":" and t1.person_id = ?","documentId":"%{prncpl_id}","index":{"settings":{"number_of_shards":5,"analysis":{"filter":{"ngram_filter":{"type":"edge_ngram","min_gram":2,"max_gram":20}},"char_filter":{"my_mapping":{"type":"pattern_replace","pattern":"[-/\\\\\\\\_.+&\':#@,*()\\\\\\\"]","replacement":" "}},"analyzer":{"ngram_analyzer":{"type":"custom","tokenizer":"whitespace","filter":["lowercase","ngram_filter"]},"name_analyzer":{"type":"custom","tokenizer":"whitespace","filter":["lowercase","ngram_filter"],"char_filter":["my_mapping"]},"name_search":{"tokenizer":"standard","char_filter":["my_mapping"]}}}},"mappings":{"properties":{"prncpl_id":{"type":"text","term_vector":"yes","analyzer":"ngram_analyzer","search_analyzer":"standard"},"last_name":{"type":"text","term_vector":"with_positions_offsets","analyzer":"name_analyzer","search_analyzer":"name_search","fields":{"sort":{"type":"keyword","index":true}}},"first_name":{"type":"text","term_vector":"with_positions_offsets","analyzer":"name_analyzer","search_analyzer":"name_search","fields":{"sort":{"type":"keyword","index":true}}},"full_name":{"type":"text","term_vector":"yes","analyzer":"name_analyzer","search_analyzer":"name_search","fields":{"sort":{"type":"keyword","index":true}}},"prncpl_nm":{"type":"text","term_vector":"yes","analyzer":"name_analyzer","search_analyzer":"name_search"},"email_addr":{"type":"text","term_vector":"yes","analyzer":"ngram_analyzer","search_analyzer":"standard"},"unit_number":{"type":"text","index":"false"},"unit_name":{"type":"text","index":"false"},"primary_title":{"type":"text","term_vector":"yes","analyzer":"standard","search_analyzer":"standard"},"addr_line_1":{"type":"text","term_vector":"yes","analyzer":"standard","search_analyzer":"standard"},"phone_nbr":{"type":"text","term_vector":"yes","analyzer":"standard","search_analyzer":"standard"},"unit_display_name":{"type":"text","term_vector":"yes","analyzer":"ngram_analyzer","search_analyzer":"standard"}}}}}', `UPDATE_USER` = 'admin', `UPDATE_TIMESTAMP` = UTC_TIMESTAMP() WHERE `ES_CONFIG_ID` = 'person';
              UPDATE `elasticsearch_index_config` SET `FORMAT_TEMPLATE` = 'rolodex_id - last_name, first_name | organization | email_address', `SEARCH_FIELDS` = '{"full_name": {}, "last_name": {}, "first_name": {}, "rolodex_id": {}, "create_user": {}, "middle_name": {}, "email_address": {}, "address": {}}', `FORMAT_FIELDS` = '{"full_name": {}, "last_name": {}, "first_name": {}, "rolodex_id": {}, "create_user": {}, "middle_name": {}, "organization": {}, "email_address": {}, "address": {}}', `UPDATE_USER` = 'admin', `UPDATE_TIMESTAMP` = UTC_TIMESTAMP() WHERE `ES_CONFIG_ID` = 'rolodex';
              UPDATE `elasticsearch_index_config` SET `FORMAT_TEMPLATE` = 'rolodex_id - last_name, first_name | organization | email_address | address', `FORMAT_FIELDS` = '{"address": {}, "full_name": {}, "rolodex_id": {}, "create_user": {}, "organization": {}, "email_address": {}, "first_name": {}, "last_name": {}}', `UPDATE_USER` = 'admin', `UPDATE_TIMESTAMP` = UTC_TIMESTAMP() WHERE `ES_CONFIG_ID` = 'organization';
              UPDATE `elasticsearch_index_config` SET `FORMAT_TEMPLATE` = 'rolodex_id - last_name, first_name | organization | email_address | address | Created By : create_user', `SEARCH_FIELDS` = '{"organization": {}, "first_name": {}, "middle_name": {}, "full_name": {}, "rolodex_id": {}, "email_address": {}, "create_user": {}, "address": {}, "last_name": {}}', `FORMAT_FIELDS` = '{"full_name": {}, "organization": {}, "rolodex_id": {}, "email_address": {}, "create_user": {}, "address": {}, "first_name": {}, "last_name": {}}', `UPDATE_USER` = 'admin', `UPDATE_TIMESTAMP` = UTC_TIMESTAMP() WHERE `ES_CONFIG_ID` = 'rolodex_organization';
      rollback:
        - sql:
            sql: |
              DELETE FROM `elasticsearch_index_config` WHERE `ES_CONFIG_ID` IN ('person', 'rolodex', 'organization', 'rolodex_organization');
              INSERT IGNORE INTO `elasticsearch_index_config` (`ES_CONFIG_ID`,`INDEX_NAME`,`CONTEXT_FIELD`,`DESCRIPTION`,`FORMAT_TEMPLATE`,`CARD_FORMAT`,`PLACEHOLDERS`,`SEARCH_FIELDS`,`FORMAT_FIELDS`,`FIELD_BOOSTS`,`ICONS`,`EXCLUDE_HTML`,`EXTRA_CONDITIONS`,`RESULT_SIZE`,`INDEX_SETTINGS`,`UPDATE_USER`,`UPDATE_TIMESTAMP`) VALUES ('organization','fibirolodex','organization','Configuration for searching organizations','rolodex_id - full_name | organization | email_address | address',NULL,NULL,'{\"address\": {}, \"rolodex_id\": {}, \"create_user\": {}, \"organization\": {}, \"email_address\": {}}','{\"address\": {}, \"full_name\": {}, \"rolodex_id\": {}, \"create_user\": {}, \"organization\": {}, \"email_address\": {}}','{}','{\"full_name\": \"<i aria-hidden=\\\"true\\\" class=\\\"fa fa-user-circle text-danger mr-2\\\"></i>\", \"organization\": \"<span><img src=\\\"DEPLOY_MAPassets/images/org-icon-6.svg\\\" class=\\\"mr-2\\\"></span>\"}','[]','{}',50,'{\"index\": {\"mappings\": {\"properties\": {\"full_name\": {\"type\": \"text\", \"analyzer\": \"name_analyzer\", \"term_vector\": \"with_positions_offsets\", \"search_analyzer\": \"name_search\"}, \"last_name\": {\"type\": \"text\", \"analyzer\": \"ngram_analyzer\", \"term_vector\": \"yes\", \"search_analyzer\": \"standard\"}, \"first_name\": {\"type\": \"text\", \"analyzer\": \"ngram_analyzer\", \"term_vector\": \"yes\", \"search_analyzer\": \"standard\"}, \"rolodex_id\": {\"type\": \"text\", \"fields\": {\"sort\": {\"type\": \"keyword\", \"index\": true}}, \"analyzer\": \"ngram_analyzer\", \"term_vector\": \"with_positions_offsets\", \"search_analyzer\": \"standard\"}, \"designation\": {\"type\": \"text\", \"analyzer\": \"ngram_analyzer\", \"term_vector\": \"yes\", \"search_analyzer\": \"standard\"}, \"middle_name\": {\"type\": \"text\", \"analyzer\": \"ngram_analyzer\", \"term_vector\": \"yes\", \"search_analyzer\": \"standard\"}, \"organization\": {\"type\": \"text\", \"analyzer\": \"ngram_analyzer\", \"term_vector\": \"yes\", \"search_analyzer\": \"standard\"}, \"phone_number\": {\"type\": \"text\", \"analyzer\": \"ngram_analyzer\", \"term_vector\": \"yes\", \"search_analyzer\": \"standard\"}, \"email_address\": {\"type\": \"text\", \"analyzer\": \"ngram_analyzer\", \"term_vector\": \"yes\", \"search_analyzer\": \"standard\"}}}, \"settings\": {\"analysis\": {\"filter\": {\"ngram_filter\": {\"type\": \"edge_ngram\", \"max_gram\": 20, \"min_gram\": 2}}, \"analyzer\": {\"name_search\": {\"tokenizer\": \"standard\", \"char_filter\": [\"my_mapping\"]}, \"name_analyzer\": {\"type\": \"custom\", \"filter\": [\"lowercase\", \"ngram_filter\"], \"tokenizer\": \"whitespace\", \"char_filter\": [\"my_mapping\"]}, \"ngram_analyzer\": {\"type\": \"custom\", \"filter\": [\"lowercase\", \"ngram_filter\"], \"tokenizer\": \"whitespace\"}}, \"char_filter\": {\"my_mapping\": {\"type\": \"pattern_replace\", \"pattern\": \"[-/\\\\\\\\_.+&\':#@,*()\\\\\\\"]\", \"replacement\": \" \"}}}, \"number_of_shards\": 5}}, \"documentId\": \"%{rolodex_id}\", \"queryString\": \"SELECT cast(T1.rolodex_id as char(10)) as rolodex_id,IFNULL(T2.organization_name,T1.organization_name) AS organization,T1.last_name,T1.first_name,T1.middle_name,T1.email_address,T1.phone_number,T1.FULL_NAME,T1.designation,T3.full_name AS create_user, concat(coalesce(T1.ADDRESS_LINE_1,\'\') , if (T1.ADDRESS_LINE_1 IS NULL OR T1.ADDRESS_LINE_2 IS NULL ,\'\',\', \'), (coalesce(T1.ADDRESS_LINE_2,\'\')),if (T1.ADDRESS_LINE_3 IS NULL OR T1.ADDRESS_LINE_2 IS NULL,\'\',\', \'),coalesce(T1.ADDRESS_LINE_3,\'\')) as address,T1.city,T4.country_name as country FROM ROLODEX T1 LEFT OUTER JOIN ORGANIZATION T2 ON T1.ORGANIZATION = T2.ORGANIZATION_ID LEFT OUTER JOIN PERSON T3 ON T1.create_user = T3.user_name LEFT OUTER JOIN COUNTRY T4 ON T1.COUNTRY_CODE=T4.COUNTRY_CODE WHERE T1.IS_ACTIVE = \'Y\'\", \"extraCondition\": \" and t1.rolodex_id = ?\"}','admin',utc_timestamp());
              INSERT IGNORE INTO `elasticsearch_index_config` (`ES_CONFIG_ID`,`INDEX_NAME`,`CONTEXT_FIELD`,`DESCRIPTION`,`FORMAT_TEMPLATE`,`CARD_FORMAT`,`PLACEHOLDERS`,`SEARCH_FIELDS`,`FORMAT_FIELDS`,`FIELD_BOOSTS`,`ICONS`,`EXCLUDE_HTML`,`EXTRA_CONDITIONS`,`RESULT_SIZE`,`INDEX_SETTINGS`,`UPDATE_USER`,`UPDATE_TIMESTAMP`) VALUES ('person','fibiperson','full_name','Configuration for searching persons','prncpl_id - full_name | prncpl_nm | unit_display_name | email_addr',NULL,NULL,'{\"full_name\": {}, \"phone_nbr\": {}, \"prncpl_id\": {}, \"prncpl_nm\": {}, \"email_addr\": {}, \"is_faculty\": {}, \"addr_line_1\": {}, \"is_research_staff\": {}, \"unit_display_name\": {}}',NULL,'{\"full_name\": 5}','{}','[]','{}',50,'{\"index\": {\"mappings\": {\"properties\": {\"full_name\": {\"type\": \"text\", \"fields\": {\"sort\": {\"type\": \"keyword\", \"index\": true}}, \"analyzer\": \"name_analyzer\", \"term_vector\": \"with_positions_offsets\", \"search_analyzer\": \"name_search\"}, \"phone_nbr\": {\"type\": \"text\", \"analyzer\": \"standard\", \"term_vector\": \"yes\", \"search_analyzer\": \"standard\"}, \"prncpl_id\": {\"type\": \"text\", \"analyzer\": \"ngram_analyzer\", \"term_vector\": \"yes\", \"search_analyzer\": \"standard\"}, \"prncpl_nm\": {\"type\": \"text\", \"analyzer\": \"name_analyzer\", \"term_vector\": \"yes\", \"search_analyzer\": \"name_search\"}, \"unit_name\": {\"type\": \"text\", \"index\": \"false\"}, \"email_addr\": {\"type\": \"text\", \"analyzer\": \"ngram_analyzer\", \"term_vector\": \"yes\", \"search_analyzer\": \"standard\"}, \"addr_line_1\": {\"type\": \"text\", \"analyzer\": \"standard\", \"term_vector\": \"yes\", \"search_analyzer\": \"standard\"}, \"unit_number\": {\"type\": \"text\", \"index\": \"false\"}, \"primary_title\": {\"type\": \"text\", \"analyzer\": \"standard\", \"term_vector\": \"yes\", \"search_analyzer\": \"standard\"}, \"unit_display_name\": {\"type\": \"text\", \"analyzer\": \"ngram_analyzer\", \"term_vector\": \"yes\", \"search_analyzer\": \"standard\"}}}, \"settings\": {\"analysis\": {\"filter\": {\"ngram_filter\": {\"type\": \"edge_ngram\", \"max_gram\": 20, \"min_gram\": 2}}, \"analyzer\": {\"name_search\": {\"tokenizer\": \"standard\", \"char_filter\": [\"my_mapping\"]}, \"name_analyzer\": {\"type\": \"custom\", \"filter\": [\"lowercase\", \"ngram_filter\"], \"tokenizer\": \"whitespace\", \"char_filter\": [\"my_mapping\"]}, \"ngram_analyzer\": {\"type\": \"custom\", \"filter\": [\"lowercase\", \"ngram_filter\"], \"tokenizer\": \"whitespace\"}}, \"char_filter\": {\"my_mapping\": {\"type\": \"pattern_replace\", \"pattern\": \"[-/\\\\\\\\_.+&\':#@,*()\\\\\\\"]\", \"replacement\": \" \"}}}, \"number_of_shards\": 5}}, \"documentId\": \"%{prncpl_id}\", \"queryString\": \"SELECT t1.person_id as prncpl_id,t1.full_name,t1.user_name as prncpl_nm,t1.email_address as email_addr,t1.home_unit as unit_number,t2.unit_name,t1.address_line_1 as addr_line_1 ,t1.mobile_phone_number as phone_nbr,t1.directory_title,t1.primary_title, t1.IS_EXTERNAL_USER as external, t2.DISPLAY_NAME as unit_display_name FROM PERSON t1 LEFT OUTER JOIN UNIT t2 ON t1.HOME_UNIT = t2.UNIT_NUMBER WHERE t1.STATUS =\'A\'\", \"extraCondition\": \" and t1.person_id = ?\"}','admin',utc_timestamp());
