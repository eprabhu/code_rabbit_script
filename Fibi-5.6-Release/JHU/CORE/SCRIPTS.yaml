                                        WHEN CONFIG_KEY IN ('sync_medusa_relationship', 'sync_person_training', 'sync_irb') THEN 'Y'
                                        ELSE 'N'
                                    END,
                        UPDATE_TIMESTAMP = utc_timestamp(),
                        UPDATE_USER = 'admin'
                    WHERE CONFIG_CATEGORY = 'integration_sync';
                    SET SQL_SAFE_UPDATES = 1;
        rollback: empty

    - changeSet:
        id: FIBI-9095-1
        author: Adarsh
        labels: 'DML'
        comment: Update the letter template type code in JHU instance
        changes:
            - sql:
                sql: |
                    SET SQL_SAFE_UPDATES=0;
                    UPDATE LETTER_TEMPLATE_TYPE 
                    SET LETTER_TEMPLATE_TYPE_CODE = (
                        SELECT TEMP FROM (
                            SELECT MAX(CAST(LETTER_TEMPLATE_TYPE_CODE AS UNSIGNED)) + 1 AS TEMP
                            FROM LETTER_TEMPLATE_TYPE
                        ) AS t
                    )
                    WHERE LETTER_TEMPLATE_TYPE_CODE = 106;
                    SET SQL_SAFE_UPDATES=1;
        rollback: empty

