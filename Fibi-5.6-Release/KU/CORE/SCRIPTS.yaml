databaseChangeLog:
  - changeSet:
        id: FIBI-8180
        author: Arun Ramesh
        labels: 'DML'
        comment: Dynamic config for elastic sync for KU instance.
        changes:
            - sql:
                sql: |
                    SET SQL_SAFE_UPDATES = 0;
                    UPDATE integration_sync_config
                    SET 
                        IS_ACTIVE = CASE 
                                        WHEN CONFIG_KEY IN ('awardfibi', 'fibiproposal', 'grantcall', 'fibiperson', 'fibirolodex', 'agreementfibi', 'instituteproposal', 'externalreview', 'fibireviewer') THEN 'Y'
                                        ELSE 'N'
                                    END,
                        UPDATE_TIMESTAMP = utc_timestamp(),
                        UPDATE_USER = 'admin'
                    WHERE CONFIG_CATEGORY = 'elastic_sync';
                    SET SQL_SAFE_UPDATES = 1;
        rollback: empty

  - changeSet:
        id: FIBI-8181
        author: Arun Ramesh
        labels: 'DML'
        comment: Dynamic config for integration sync for KU instance.
        changes:
            - sql:
                sql: |
                    SET SQL_SAFE_UPDATES = 0;
                    UPDATE integration_sync_config
                    SET 
                        IS_ACTIVE = CASE 
                                        WHEN CONFIG_KEY IN ('sync_aderp_annual_budget', 'scopus_integration', 'cost_allocation_with_manual_date', 'update_feed_status') THEN 'Y'
                                        ELSE 'N'
                                    END,
                        UPDATE_TIMESTAMP = utc_timestamp(),
                        UPDATE_USER = 'admin'
                    WHERE CONFIG_CATEGORY = 'integration_sync';
                    SET SQL_SAFE_UPDATES = 1;
        rollback: empty

  - changeSet:
      id: FIBI-8178-1
      author: Solih N
      labels: 'DML'
      comment: Update IS_ACTIVE and IS_MANDATORY for specified dynamic config rows
      changes:
        - sql:
            sql: |
              UPDATE dyn_element_config SET IS_ACTIVE = 'N', IS_MANDATORY = 'N', UPDATE_TIMESTAMP = utc_timestamp(), UPDATE_USER = 'admin'
              WHERE SUB_SECTION_CODE = '301' AND SECTION_CODE = 'DP301' AND UI_REFERENCE_ID IN ('proposal-gnrl-master-proposal', 'prop-cfda-number');

              UPDATE dyn_element_config SET IS_ACTIVE = 'N', IS_MANDATORY = 'N', UPDATE_TIMESTAMP = utc_timestamp(), UPDATE_USER = 'admin'
              WHERE SUB_SECTION_CODE = '101' AND SECTION_CODE = 'AW101' AND UI_REFERENCE_ID IN ( 'cfda-number', 'dfafs-number');

              UPDATE dyn_element_config SET IS_ACTIVE = 'N', IS_MANDATORY = 'N', UPDATE_TIMESTAMP = utc_timestamp(), UPDATE_USER = 'admin'
              WHERE UI_REFERENCE_ID = 'prop-cfda-number' AND SUB_SECTION_CODE = '201' AND SECTION_CODE = 'IP201';
      rollback: empty

  - changeSet:
      id: FIBI-9312
      author: Sreejith T
      labels: 'DML'
      comment: Update query for KU configuration 
      changes:
        - sql:
            sql: |
              UPDATE `report_class` SET `MANDATORY_SECTION` = NULL, `UPDATE_TIMESTAMP` = utc_timestamp(), `UPDATE_USER` = 'admin' WHERE (`REPORT_CLASS_CODE` = '2'); 
              UPDATE `report_class` SET `MANDATORY_SECTION` = NULL, `UPDATE_TIMESTAMP` = utc_timestamp(), `UPDATE_USER` = 'admin' WHERE (`REPORT_CLASS_CODE` = '1'); 
      rollback:
        - sql:
            sql: |
              UPDATE `report_class` SET `MANDATORY_SECTION` = 'B', `UPDATE_TIMESTAMP` = utc_timestamp(), `UPDATE_USER` = 'admin' WHERE (`REPORT_CLASS_CODE` = '2'); 
              UPDATE `report_class` SET `MANDATORY_SECTION` = 'S', `UPDATE_TIMESTAMP` = utc_timestamp(), `UPDATE_USER` = 'admin' WHERE (`REPORT_CLASS_CODE` = '1');

  - changeSet:
      id: FIBI-8179
      author: Sreejith T
      labels: 'DML'
      comment: Elastic configurations for KU instance.
      changes:
        - sql:
            sql: |
              UPDATE `elasticsearch_index_config` SET `FORMAT_TEMPLATE` = 'award_number | account_number | title | sponsor_display_name | unit_display_name | pi_name | grant_call_name | sp_awd_number', `CARD_FORMAT` = '[\"title\", \"pi_name\", \"sp_awd_number\", \"account_number\", \"grant_call_name\", \"unit_display_name\", \"sponsor_display_name\"]', `PLACEHOLDERS` = 'Search: Award #, Account No, Title, Lead Unit, Sponsor, Principal Investigator, Title of Grant Call, Sponsor Award Number', `SEARCH_FIELDS` = '{\"title\": {}, \"pi_name\": {}, \"award_number\": {}, \"sp_awd_number\": {}, \"account_number\": {}, \"grant_call_name\": {}, \"unit_display_name\": {}, \"sponsor_display_name\": {}}', `EXCLUDE_HTML` = '[]', `INDEX_SETTINGS` = '{\n  \"queryString\": \"SELECT t1.award_id, t1.award_number, t1.status, t1.pi_name, t1.sponsor,t1.sponsor_display_name, t1.account_number, t1.lead_unit_number, t1.lead_unit_name, t1.title,t1.status_code,t1.obligation_expiration_date,t1.grant_call_title as grant_call_name,t1.sp_awd_number, t1.unit_display_name FROM ELASTIC_AWARD_V t1\",\n  \"extraCondition\": \" where t1.award_id = ?\",\n  \"documentId\": \"%{award_id}\",\n  \"index\": {\n    \"settings\": {\n      \"number_of_shards\": 1,\n      \"analysis\": {\n        \"filter\": {\n          \"ngram_filter\": {\n            \"type\": \"edge_ngram\",\n            \"min_gram\": 2,\n            \"max_gram\": 20\n          }\n        },\n        \"char_filter\": {\n          \"my_mapping\": {\n            \"type\": \"pattern_replace\",\n            \"pattern\": \"[-/\\\\\\\\_.+&\':#@,*()\\\\\\\"]\",\n            \"replacement\": \" \"\n          }\n        },\n        \"analyzer\": {\n          \"ngram_analyzer\": {\n            \"type\": \"custom\",\n            \"tokenizer\": \"whitespace\",\n            \"filter\": [\n              \"lowercase\",\n              \"ngram_filter\"\n            ]\n          },\n          \"title_analyzer\": {\n            \"type\": \"custom\",\n            \"tokenizer\": \"whitespace\",\n            \"filter\": [\n              \"lowercase\",\n              \"ngram_filter\"\n            ],\n            \"char_filter\": [\n              \"my_mapping\"\n            ]\n          },\n          \"title_search\": {\n            \"tokenizer\": \"standard\",\n            \"char_filter\": [\n              \"my_mapping\"\n            ]\n          }\n        }\n      }\n    },\n    \"mappings\": {\n      \"properties\": {\n        \"award_id\": {\n          \"type\": \"text\",\n          \"analyzer\": \"ngram_analyzer\",\n          \"search_analyzer\": \"whitespace\",\n          \"fields\": {\n            \"sort\": {\n              \"type\": \"keyword\",\n              \"index\": true\n            }\n          }\n        },\n        \"award_number\": {\n          \"type\": \"text\",\n          \"term_vector\": \"with_positions_offsets\",\n          \"analyzer\": \"ngram_analyzer\",\n          \"search_analyzer\": \"whitespace\",\n          \"fields\": {\n            \"sort\": {\n              \"type\": \"keyword\",\n              \"index\": true\n            }\n          }\n        },\n        \"pi_name\": {\n          \"type\": \"text\",\n          \"term_vector\": \"yes\",\n          \"analyzer\": \"ngram_analyzer\",\n          \"search_analyzer\": \"standard\"\n        },\n        \"status\": {\n          \"type\": \"text\",\n          \"analyzer\": \"ngram_analyzer\",\n          \"search_analyzer\": \"standard\"\n        },\n        \"sponsor\": {\n          \"type\": \"text\",\n          \"index\": \"false\"\n        },\n        \"account_number\": {\n          \"type\": \"text\",\n          \"analyzer\": \"ngram_analyzer\",\n          \"search_analyzer\": \"whitespace\"\n        },\n        \"lead_unit_number\": {\n          \"type\": \"text\",\n          \"index\": \"false\"\n        },\n        \"lead_unit_name\": {\n          \"type\": \"text\",\n          \"index\": \"false\"\n        },\n        \"title\": {\n          \"type\": \"text\",\n          \"term_vector\": \"with_positions_offsets\",\n          \"analyzer\": \"title_analyzer\",\n          \"search_analyzer\": \"title_search\"\n        },\n        \"obligation_expiration_date\": {\n          \"type\": \"text\",\n          \"analyzer\": \"standard\",\n          \"search_analyzer\": \"standard\"\n        },\n        \"status_code\": {\n          \"type\": \"integer\",\n          \"index\": \"false\"\n        },\n        \"unit_display_name\": {\n          \"type\": \"text\",\n          \"term_vector\": \"yes\",\n          \"analyzer\": \"ngram_analyzer\",\n          \"search_analyzer\": \"standard\"\n        },\n        \"sponsor_display_name\": {\n          \"type\": \"text\",\n          \"term_vector\": \"yes\",\n          \"analyzer\": \"ngram_analyzer\",\n          \"search_analyzer\": \"standard\"\n        },\n        \"@version\": {\n          \"type\": \"integer\"\n        },\n        \"@timestamp\": {\n          \"type\": \"date\"\n        }\n      }\n    }\n  }\n}' WHERE (`ES_CONFIG_ID` = 'award');
              UPDATE `elasticsearch_index_config` SET `FORMAT_TEMPLATE` = 'proposal_id | title | full_name | category | type | status | sponsor_display_name | unit_display_name | external_funding_agency_id', `CARD_FORMAT` = '[\n    \"type\",\n    \"title\",\n    \"status\",\n    \"category\",\n    \"full_name\",\n    \"external_funding_agency_id\",\n    \"unit_display_name\",\n    \"sponsor_display_name\"\n]', `PLACEHOLDERS` = 'Search: Proposal #, Title, Principal Investigator, Category, Proposal Type, Status, Sponsor, Proposal Lead Unit, Sponsor Proposal ID', `SEARCH_FIELDS` = '{\"type\": {}, \"title\": {}, \"status\": {}, \"category\": {}, \"full_name\": {}, \"proposal_id\": {}, \"external_funding_agency_id\": {}, \"unit_display_name\": {}, \"sponsor_display_name\": {}}', `EXCLUDE_HTML` = '[]', `INDEX_SETTINGS` = '{\n  \"queryString\": \"SELECT cast(t1.proposal_id as char(10)) as proposal_id,t1.title,t1.full_name,t1.category,t1.type,t1.status,t1.sponsor,t1.sponsor_display_name,t1.lead_unit_name ,t1.lead_unit_number,t1.funding_scheme, t1.unit_display_name,t1.external_funding_agency_id FROM ELASTIC_FIBI_PROPOSAL_V t1\",\n  \"extraCondition\": \" where proposal_id = ?\",\n  \"documentId\": \"%{proposal_id}\",\n  \"index\": {\n    \"settings\": {\n      \"number_of_shards\": 1,\n      \"analysis\": {\n        \"filter\": {\n          \"ngram_filter\": {\n            \"type\": \"edge_ngram\",\n            \"min_gram\": 1,\n            \"max_gram\": 20\n          }\n        },\n        \"char_filter\": {\n          \"my_mapping\": {\n            \"type\": \"pattern_replace\",\n            \"pattern\": \"[-/\\\\\\\\_.+&\':#@,*()\\\\\\\"]\",\n            \"replacement\": \" \"\n          }\n        },\n        \"analyzer\": {\n          \"ngram_analyzer\": {\n            \"type\": \"custom\",\n            \"tokenizer\": \"whitespace\",\n            \"filter\": [\n              \"lowercase\",\n              \"ngram_filter\"\n            ]\n          },\n          \"title_analyzer\": {\n            \"type\": \"custom\",\n            \"tokenizer\": \"whitespace\",\n            \"filter\": [\n              \"lowercase\",\n              \"ngram_filter\"\n            ],\n            \"char_filter\": [\n              \"my_mapping\"\n            ]\n          },\n          \"title_search\": {\n            \"tokenizer\": \"standard\",\n            \"char_filter\": [\n              \"my_mapping\"\n            ]\n          }\n        }\n      }\n    },\n    \"mappings\": {\n      \"properties\": {\n        \"proposal_id\": {\n          \"type\": \"text\",\n          \"term_vector\": \"with_positions_offsets\",\n          \"analyzer\": \"ngram_analyzer\",\n          \"search_analyzer\": \"standard\",\n          \"fields\": {\n            \"sort\": {\n              \"type\": \"keyword\",\n              \"index\": true\n            }\n          }\n        },\n        \"title\": {\n          \"type\": \"text\",\n          \"term_vector\": \"with_positions_offsets\",\n          \"analyzer\": \"title_analyzer\",\n          \"search_analyzer\": \"title_search\"\n        },\n        \"full_name\": {\n          \"type\": \"text\",\n          \"term_vector\": \"yes\",\n          \"analyzer\": \"ngram_analyzer\",\n          \"search_analyzer\": \"standard\"\n        },\n        \"category\": {\n          \"type\": \"text\",\n          \"analyzer\": \"standard\",\n          \"search_analyzer\": \"standard\"\n        },\n        \"type\": {\n          \"type\": \"text\",\n          \"analyzer\": \"standard\",\n          \"search_analyzer\": \"standard\"\n        },\n        \"status\": {\n          \"type\": \"text\",\n          \"term_vector\": \"yes\",\n          \"analyzer\": \"standard\",\n          \"search_analyzer\": \"standard\"\n        },\n        \"sponsor\": {\n          \"type\": \"text\",\n          \"index\": \"false\"\n        },\n        \"lead_unit_number\": {\n          \"type\": \"text\",\n          \"index\": \"false\"\n        },\n        \"lead_unit_name\": {\n          \"type\": \"text\",\n          \"index\": \"false\"\n        },\n        \"funding_scheme\": {\n          \"type\": \"text\",\n          \"term_vector\": \"yes\",\n          \"analyzer\": \"ngram_analyzer\",\n          \"search_analyzer\": \"standard\"\n        },\n        \"sponsor_display_name\": {\n          \"type\": \"text\",\n          \"term_vector\": \"yes\",\n          \"analyzer\": \"ngram_analyzer\",\n          \"search_analyzer\": \"standard\"\n        },\n        \"unit_display_name\": {\n          \"type\": \"text\",\n          \"term_vector\": \"yes\",\n          \"analyzer\": \"ngram_analyzer\",\n          \"search_analyzer\": \"standard\"\n        },\n        \"external_funding_agency_id\": {\n          \"type\": \"text\",\n          \"term_vector\": \"yes\",\n          \"analyzer\": \"ngram_analyzer\",\n          \"search_analyzer\": \"whitespace\"\n        }\n      }\n    }\n  }\n}' WHERE (`ES_CONFIG_ID` = 'proposal');
              UPDATE `elasticsearch_index_config` SET `FORMAT_TEMPLATE` = 'proposal_number | title | sponsor_display_name | unit_display_name | activity_type | proposal_type | pi_full_name | status', `CARD_FORMAT` = '[\"title\", \"status\", \"pi_full_name\", \"activity_type\", \"proposal_type\", \"sponsor_display_name\"]', `PLACEHOLDERS` = 'Search: Institute Proposal #, Proposal ID, Title, Lead Unit, Principal Investigator, Category, Type, Status, Sponsor', `SEARCH_FIELDS` = '{\"title\": {}, \"status\": {}, \"proposal_id\": {}, \"pi_full_name\": {}, \"activity_type\": {}, \"proposal_type\": {}, \"proposal_number\": {}, \"unit_display_name\": {}, \"sponsor_display_name\": {}}', `EXTRA_CONDITIONS` = '{\n    \"must_not\": {\n        \"match_phrase\": {\n            \"proposal_sequence_status\": \"ARCHIVE\"\n        }\n    }\n}', `INDEX_SETTINGS` = '{\n  \"queryString\": \"SELECT convert(t1.PROPOSAL_ID, char(20)) as proposal_id,t1.PROPOSAL_NUMBER,t1.TITLE,t1.HOME_UNIT_NUMBER as lead_unit_number,t1.STATUS,t1.LEAD_UNIT as lead_unit_name,t1.SPONSOR,t1.SPONSOR_DISPLAY_NAME,t1.STATUS_CODE,t1.ACTIVITY_TYPE_CODE,t1.ACTIVITY_TYPE,t1.PROPOSAL_TYPE,t1.PROPOSAL_TYPE_CODE,t1.PI_FULL_NAME, t1.UNIT_DISPLAY_NAME FROM ELASTIC_INSTITUTE_PROPOSAL_V t1\",\n  \"extraCondition\": \" where t1.proposal_id = ?\",\n  \"documentId\": \"%{proposal_id}\",\n  \"index\": {\n    \"settings\": {\n      \"number_of_shards\": 5,\n      \"analysis\": {\n        \"filter\": {\n          \"ngram_filter\": {\n            \"type\": \"edge_ngram\",\n            \"min_gram\": 2,\n            \"max_gram\": 20\n          }\n        },\n        \"char_filter\": {\n          \"my_mapping\": {\n            \"type\": \"pattern_replace\",\n            \"pattern\": \"[-/\\\\\\\\_.+&\':#@,*()\\\\\\\"]\",\n            \"replacement\": \" \"\n          }\n        },\n        \"analyzer\": {\n          \"ngram_analyzer\": {\n            \"type\": \"custom\",\n            \"tokenizer\": \"whitespace\",\n            \"filter\": [\n              \"lowercase\",\n              \"ngram_filter\"\n            ]\n          },\n          \"title_analyzer\": {\n            \"type\": \"custom\",\n            \"tokenizer\": \"whitespace\",\n            \"filter\": [\n              \"lowercase\",\n              \"ngram_filter\"\n            ],\n            \"char_filter\": [\n              \"my_mapping\"\n            ]\n          },\n          \"title_search\": {\n            \"tokenizer\": \"standard\",\n            \"char_filter\": [\n              \"my_mapping\"\n            ]\n          }\n        }\n      }\n    },\n    \"mappings\": {\n      \"properties\": {\n        \"proposal_number\": {\n          \"type\": \"text\",\n          \"term_vector\": \"with_positions_offsets\",\n          \"analyzer\": \"ngram_analyzer\",\n          \"search_analyzer\": \"standard\",\n          \"fields\": {\n            \"sort\": {\n              \"type\": \"keyword\",\n              \"index\": true\n            }\n          }\n        },\n        \"protocol_type\": {\n          \"type\": \"text\",\n          \"index\": \"false\"\n        },\n        \"lead_unit_number\": {\n          \"type\": \"text\",\n          \"index\": \"false\"\n        },\n        \"status\": {\n          \"type\": \"text\",\n          \"term_vector\": \"yes\",\n          \"analyzer\": \"standard\",\n          \"search_analyzer\": \"standard\"\n        },\n        \"lead_unit_name\": {\n          \"type\": \"text\",\n          \"index\": \"false\"\n        },\n        \"sponsor\": {\n          \"type\": \"text\",\n          \"index\": \"false\"\n        },\n        \"title\": {\n          \"type\": \"text\",\n          \"term_vector\": \"with_positions_offsets\",\n          \"analyzer\": \"title_analyzer\",\n          \"search_analyzer\": \"title_search\"\n        },\n        \"status_code\": {\n          \"type\": \"integer\"\n        },\n        \"unit_display_name\": {\n          \"type\": \"text\",\n          \"term_vector\": \"yes\",\n          \"analyzer\": \"ngram_analyzer\",\n          \"search_analyzer\": \"standard\"\n        },\n        \"sponsor_display_name\": {\n          \"type\": \"text\",\n          \"term_vector\": \"yes\",\n          \"analyzer\": \"ngram_analyzer\",\n          \"search_analyzer\": \"standard\"\n        },\n        \"@version\": {\n          \"type\": \"integer\"\n        },\n        \"@timestamp\": {\n          \"type\": \"date\"\n        }\n      }\n    }\n  }\n}' WHERE (`ES_CONFIG_ID` = 'institute_proposal');
              UPDATE `elasticsearch_index_config` SET `INDEX_SETTINGS` = '{\n    \"index\": {\n        \"mappings\": {\n            \"properties\": {\n                \"hindex\": {\n                    \"type\": \"text\",\n                    \"index\": true,\n                    \"analyzer\": \"ngram_analyzer\",\n                    \"term_vector\": \"yes\",\n                    \"search_analyzer\": \"keyword\"\n                },\n                \"aff_code\": {\n                    \"type\": \"text\",\n                    \"index\": true,\n                    \"analyzer\": \"ngram_analyzer\",\n                    \"term_vector\": \"yes\",\n                    \"search_analyzer\": \"keyword\"\n                },\n                \"full_name\": {\n                    \"type\": \"text\",\n                    \"index\": true,\n                    \"fields\": {\n                        \"sort\": {\n                            \"type\": \"keyword\",\n                            \"index\": true\n                        }\n                    },\n                    \"analyzer\": \"name_analyzer\",\n                    \"term_vector\": \"yes\",\n                    \"search_analyzer\": \"name_search\"\n                },\n                \"last_name\": {\n                    \"type\": \"text\",\n                    \"index\": true,\n                    \"analyzer\": \"ngram_analyzer\",\n                    \"term_vector\": \"yes\",\n                    \"search_analyzer\": \"keyword\"\n                },\n                \"prncpl_id\": {\n                    \"type\": \"text\",\n                    \"index\": true,\n                    \"analyzer\": \"ngram_analyzer\",\n                    \"search_analyzer\": \"keyword\"\n                },\n                \"prncpl_nm\": {\n                    \"type\": \"text\",\n                    \"index\": true,\n                    \"analyzer\": \"ngram_analyzer\",\n                    \"term_vector\": \"yes\",\n                    \"search_analyzer\": \"keyword\"\n                },\n                \"email_addr\": {\n                    \"type\": \"text\",\n                    \"index\": true,\n                    \"analyzer\": \"ngram_analyzer\",\n                    \"term_vector\": \"yes\",\n                    \"search_analyzer\": \"whitespace\"\n                },\n                \"country_code\": {\n                    \"type\": \"text\",\n                    \"index\": true,\n                    \"analyzer\": \"ngram_analyzer\",\n                    \"term_vector\": \"yes\",\n                    \"search_analyzer\": \"keyword\"\n                },\n                \"country_name\": {\n                    \"type\": \"text\",\n                    \"index\": true,\n                    \"analyzer\": \"ngram_analyzer\",\n                    \"term_vector\": \"yes\",\n                    \"search_analyzer\": \"keyword\"\n                },\n                \"academic_rank\": {\n                    \"type\": \"text\",\n                    \"index\": true,\n                    \"analyzer\": \"ngram_analyzer\",\n                    \"term_vector\": \"yes\",\n                    \"search_analyzer\": \"standard\"\n                },\n                \"sk_description\": {\n                    \"type\": \"text\",\n                    \"index\": true,\n                    \"analyzer\": \"whitespace\",\n                    \"search_analyzer\": \"standard\"\n                },\n                \"aff_description\": {\n                    \"type\": \"text\",\n                    \"index\": true,\n                    \"analyzer\": \"ngram_analyzer\",\n                    \"term_vector\": \"yes\",\n                    \"search_analyzer\": \"keyword\"\n                }\n            }\n        },\n        \"settings\": {\n            \"analysis\": {\n                \"filter\": {\n                    \"ngram_filter\": {\n                        \"type\": \"edge_ngram\",\n                        \"max_gram\": 60,\n                        \"min_gram\": 2\n                    }\n                },\n                \"analyzer\": {\n                    \"name_search\": {\n                        \"tokenizer\": \"standard\",\n                        \"char_filter\": [\n                            \"my_mapping\"\n                        ]\n                    },\n                    \"name_analyzer\": {\n                        \"type\": \"custom\",\n                        \"filter\": [\n                            \"lowercase\",\n                            \"ngram_filter\"\n                        ],\n                        \"tokenizer\": \"whitespace\",\n                        \"char_filter\": [\n                            \"my_mapping\"\n                        ]\n                    },\n                    \"ngram_analyzer\": {\n                        \"type\": \"custom\",\n                        \"filter\": [\n                            \"lowercase\",\n                            \"ngram_filter\"\n                        ],\n                        \"tokenizer\": \"whitespace\"\n                    }\n                },\n                \"char_filter\": {\n                    \"my_mapping\": {\n                        \"type\": \"pattern_replace\",\n                        \"pattern\": \"[-/\\\\\\\\_.+&\':#@,*()\\\\\\\"]\",\n                        \"replacement\": \" \"\n                    }\n                }\n            },\n            \"number_of_shards\": 5\n        }\n    },\n    \"documentId\": \"%{prncpl_id}\",\n    \"queryString\": \"SELECT t1.external_reviewer_id AS prncpl_id, t1.full_name, t1.user_name AS prncpl_nm, t1.email_address_primary AS email_addr, t1.affilation_instituition_code AS aff_code, t1.country_code AS country_code, t2.description AS aff_description, t3.country_name AS country_name, t5.description AS academic_rank, t6.hi_index AS hindex FROM external_reviewer t1 LEFT OUTER JOIN ext_reviewer_affiliation t2 ON t1.affilation_instituition_code = t2.affilation_instituition_code LEFT OUTER JOIN country t3 ON t1.country_code = t3.country_code LEFT OUTER JOIN external_reviewer_rights t4 ON t1.external_reviewer_id = t4.external_reviewer_id LEFT OUTER JOIN ext_reviewer_academic_rank t5 ON t1.academic_rank_code = t5.academic_rank_code LEFT OUTER JOIN external_reviewer_ext t6 ON t6.external_reviewer_id = t1.external_reviewer_id WHERE t4.reviewer_rights_id = \'1\' and t1.STATUS=\'A\'\",\n    \"extraCondition\": \" and t1.external_reviewer_id = ?\"\n}' WHERE (`ES_CONFIG_ID` = 'reviewer');
              UPDATE `elasticsearch_index_config` SET `FORMAT_TEMPLATE` = 'full_name | prncpl_nm', `FIELD_BOOSTS` = '{}' WHERE (`ES_CONFIG_ID` = 'person');
              UPDATE `elasticsearch_index_config` SET `FORMAT_TEMPLATE` = 'rolodex_id | full_name | organization | email_address | address' WHERE (`ES_CONFIG_ID` = 'organization');
              UPDATE `elasticsearch_index_config` SET `FORMAT_TEMPLATE` = 'rolodex_id | full_name | organization | email_address', `FIELD_BOOSTS` = '{}' WHERE (`ES_CONFIG_ID` = 'rolodex');
              UPDATE `elasticsearch_index_config` SET `FORMAT_TEMPLATE` = 'rolodex_id | full_name | organization | email_address', `FIELD_BOOSTS` = '{}' WHERE (`ES_CONFIG_ID` = 'rolodex_organization');
              UPDATE `elasticsearch_index_config` SET `PLACEHOLDERS` = 'Search: Grant Call #, Title, Type, Status, Sponsor, Name of Funding Scheme' WHERE (`ES_CONFIG_ID` = 'grant_call');
      rollback:
        - sql:
            sql: |
