              UPDATE `letter_template_type` SET `IS_ACTIVE` = 'Y', UPDATE_TIMESTAMP = UTC_TIMESTAMP(),UPDATE_USER = 'admin' WHERE (`LETTER_TEMPLATE_TYPE_CODE` = '3001');

  - changeSet:
      id: FIBI-11007
      author: Vishnu BH
      labels: 'DML'
      comment: Enable Medusa relationship sync in integration_sync_config for KU.
      changes:
        - sql:
            sql: |
              SET SQL_SAFE_UPDATES = 0;
              UPDATE `integration_sync_config`
              SET `IS_ACTIVE` = 'Y',
                  `UPDATE_TIMESTAMP` = UTC_TIMESTAMP(),
                  `UPDATE_USER` = 'admin'
              WHERE (`CONFIG_KEY` = 'sync_medusa_relationship');
              SET SQL_SAFE_UPDATES = 1;
      rollback:
        - sql:
            sql: |
              SET SQL_SAFE_UPDATES = 0;
              UPDATE `integration_sync_config`
              SET `IS_ACTIVE` = 'N',
                  `UPDATE_TIMESTAMP` = UTC_TIMESTAMP(),
                  `UPDATE_USER` = 'admin'
              WHERE (`CONFIG_KEY` = 'sync_medusa_relationship');
              SET SQL_SAFE_UPDATES = 1;
