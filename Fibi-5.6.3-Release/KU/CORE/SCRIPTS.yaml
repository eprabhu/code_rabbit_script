             UPDATE `letter_template_type` SET `IS_ACTIVE` = 'N', UPDATE_TIMESTAMP = UTC_TIMESTAMP(),UPDATE_USER = 'admin' WHERE (`LETTER_TEMPLATE_TYPE_CODE` = '3001');
      rollback:
