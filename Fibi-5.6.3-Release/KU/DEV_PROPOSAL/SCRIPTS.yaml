  - changeSet:
      id: FIBI-10881-1
      author: Shyla
      labels: 'DML'
      comment: FIBI-10881 — Add KU Investigator (Non-PI) proposal person role.
      changes:
        - sql:
            sql: |
              INSERT IGNORE INTO `EPS_PROP_PERSON_ROLE` (`UNIT_DETAILS_REQUIRED`, `PROP_PERSON_ROLE_ID`, `DESCRIPTION`, `UPDATE_TIMESTAMP`, `UPDATE_USER`, `CERTIFICATION_REQUIRED`, `PROP_PERSON_ROLE_CODE`, `SPONSOR_HIERARCHY_NAME`, `READ_ONLY_ROLE`, `IS_MULTI_PI`, `SORT_ID`, `IS_ACTIVE`, `SHOW_PROJECT_ROLE`, `INCLUDE_IN_CURRENT_AND_PENDING`)
              VALUES ('Y', '14', 'KU - Investigator (Non-PI)', UTC_TIMESTAMP(), 'admin', 'N', 'NPI', 'DEFAULT', 'N', 'N', '3', 'Y', 'N', 'Y');
      rollback:
        - sql:
            sql: |
              DELETE FROM `EPS_PROP_PERSON_ROLE`
              WHERE `PROP_PERSON_ROLE_ID` = '14';

  - changeSet:
      id: FIBI-10912-1
      author: VIshnu BH
      labels: 'DML'
      comment: Enable Dev Proposal config elements/subsections and enable admin check parameter.
      changes:
        - sql:
            sql: |
              SET SQL_SAFE_UPDATES = 0;
              UPDATE `dyn_element_config`
              SET `IS_ACTIVE` = 'Y',
                  `UPDATE_TIMESTAMP` = UTC_TIMESTAMP(),
                  `UPDATE_USER` = 'admin'
              WHERE (`UI_REFERENCE_ID` = 'proposal-gnrl-master-proposal');
              
              UPDATE `dyn_subsection_config`
              SET `IS_ACTIVE` = 'Y',
                  `UPDATE_TIMESTAMP` = UTC_TIMESTAMP(),
                  `UPDATE_USER` = 'admin'
              WHERE (`SUB_SECTION_CODE` = '309');
              
              UPDATE `dyn_subsection_config`
              SET `IS_ACTIVE` = 'Y',
                  `UPDATE_TIMESTAMP` = UTC_TIMESTAMP(),
                  `UPDATE_USER` = 'admin'
              WHERE (`SUB_SECTION_CODE` = '326');
              
              UPDATE `parameter`
              SET `VALUE` = 'Y',
                  `UPDATE_TIMESTAMP` = UTC_TIMESTAMP(),
                  `UPDATE_USER` = 'admin'
              WHERE (`PARAMETER_NAME` = 'IS_ENABLED_ADMIN_CHK');
              SET SQL_SAFE_UPDATES = 1;
      rollback: empty
