lueField\": \"null\",\n            \"displayName\": \"Horizontal Area\"\n        },\n        {\n            \"index\": \"null\",\n            \"width\": 18000,\n            \"summable\": \"N\",\n            \"queryType\": \"LIKE\",\n            \"columnName\": \"MASTER_DATA.VERTICAL_AREA\",\n            \"filterType\": \"freetext\",\n            \"valueField\": \"null\",\n            \"displayName\": \"Vertical Area\"\n        }\n    ],\n    \"tempTable\": \"WITH ACCESS_TMP AS (SELECT UNIT_NUMBER FROM PERSON_ROLES T1 INNER JOIN ROLE_RIGHTS T2 ON T1.ROLE_ID = T2.ROLE_ID INNER JOIN RIGHTS T3 ON T2.RIGHT_ID = T3.RIGHT_ID WHERE T1.DESCEND_FLAG = \'N\' AND T1.PERSON_ID = <<PERSON_ID>> AND T3.RIGHT_NAME IN (\'VIEW_AWARD\') UNION SELECT CHILD_UNIT_NUMBER FROM UNIT_WITH_CHILDREN WHERE UNIT_NUMBER IN (SELECT UNIT_NUMBER FROM PERSON_ROLES T1 INNER JOIN ROLE_RIGHTS T2 ON T1.ROLE_ID = T2.ROLE_ID INNER JOIN RIGHTS T3 ON T2.RIGHT_ID = T3.RIGHT_ID WHERE T1.DESCEND_FLAG = \'Y\' AND T1.PERSON_ID = <<PERSON_ID>> AND T3.RIGHT_NAME IN (\'VIEW_AWARD\'))), ACCESS_TMP_NEW AS (SELECT UNIT_NUMBER FROM PERSON_ROLES T1 INNER JOIN ROLE_RIGHTS T2 ON T1.ROLE_ID = T2.ROLE_ID INNER JOIN RIGHTS T3 ON T2.RIGHT_ID = T3.RIGHT_ID WHERE T1.DESCEND_FLAG = \'N\' AND T1.PERSON_ID = <<PERSON_ID>> AND T3.RIGHT_NAME IN (\'VIEW_AWARD\') AND T1.ROLE_ID = \'100\' UNION SELECT CHILD_UNIT_NUMBER FROM UNIT_WITH_CHILDREN WHERE UNIT_NUMBER IN (SELECT UNIT_NUMBER FROM PERSON_ROLES T1 INNER JOIN ROLE_RIGHTS T2 ON T1.ROLE_ID = T2.ROLE_ID INNER JOIN RIGHTS T3 ON T2.RIGHT_ID = T3.RIGHT_ID WHERE T1.DESCEND_FLAG = \'Y\' AND T1.PERSON_ID = <<PERSON_ID>> AND T3.RIGHT_NAME IN (\'VIEW_AWARD\') AND T1.ROLE_ID = \'100\')), AWARD_TEMP AS (SELECT T1.AWARD_ID FROM AWARD_PERSON_ROLES T1 INNER JOIN ROLE_RIGHTS T2 ON T1.ROLE_ID = T2.ROLE_ID INNER JOIN RIGHTS T3 ON T2.RIGHT_ID = T3.RIGHT_ID WHERE (T1.PERSON_ID = <<PERSON_ID>> AND T3.RIGHT_NAME IN (\'VIEW_AWARD\')) OR (T1.AWARD_ID IN (SELECT A1.AWARD_ID FROM AWARD A1 INNER JOIN grant_call_header A2 ON A2.GRANT_HEADER_ID = A1.GRANT_HEADER_ID WHERE A2.HOME_UNIT_NUMBER IN (SELECT DISTINCT UNIT_NUMBER FROM ACCESS_TMP_NEW))))\",\n    \"extraCondition\": \"(LEAD_UNIT_NUMBER IN(SELECT DISTINCT UNIT_NUMBER FROM ACCESS_TMP) OR AWARD_ID IN (SELECT AWARD_ID FROM AWARD_TEMP)) ORDER BY AWARD_NUMBER\",\n    \"extraSelection\": \"\",\n    \"selectDistinct\": \"Y\"\n}',`VIEW_NAME` = 'AWARD_MASTER_DATASET_RT', `UPDATE_USER` = 'admin', `UPDATE_TIMESTAMP` = UTC_TIMESTAMP() WHERE (`TYPE_CODE` = '9');
