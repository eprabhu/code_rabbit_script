VER\",\n			\"displayName\": \"Primary Approver\",\n			\"filterType\": \"null\",\n			\"valueField\": \"null\",\n			\"index\": \"null\",\n			\"queryType\": \"IN\",\n			\"summable\" : \"N\",\n			\"width\": 4600\n		},\n		{\n			\"columnName\": \"WORKFLOW.ACTION_TAKEN_BY\",\n			\"displayName\": \"Stop Approver Name\",\n			\"filterType\": \"elastic\",\n			\"valueField\": \"full_name\",\n			\"index\": \"fibiperson\",\n			\"queryType\": \"IN\",\n			\"summable\" : \"N\",\n			\"width\": 4600\n		},\n		{\n			\"columnName\": \"WORKFLOW.APPROVER_STATUSES\",\n			\"displayName\": \"Approver Statuses\",\n			\"filterType\": \"null\",\n			\"valueField\": \"null\",\n			\"index\": \"null\",\n			\"queryType\": \"IN\",\n			\"summable\": \"N\",\n			\"width\": 4600\n		},\n		{\n			\"columnName\": \"WORKFLOW.APPROVER_COMMENTS\",\n			\"displayName\": \"Approver Comments\",\n			\"filterType\": \"null\",\n			\"valueField\": \"null\",\n			\"index\": \"null\",\n			\"queryType\": \"LIKE\",\n			\"summable\": \"N\",\n			\"width\": 4600\n		},\n		{\n			\"columnName\": \"WORKFLOW.FIRST_WORKFLOW_START_DATE\",\n			\"displayName\": \"First Workflow Start Date\",\n			\"filterType\": \"null\",\n			\"valueField\": \"null\",\n			\"index\": \"null\",\n			\"queryType\": \"BETWEEN\",\n			\"summable\": \"N\",\n			\"width\": 5800\n		},\n		{\n			\"columnName\": \"WORKFLOW.SUBMITTED_BY\",\n			\"displayName\": \"Submitted By\",\n			\"filterType\": \"null\",\n			\"valueField\": \"null\",\n			\"index\": \"null\",\n			\"queryType\": \"IN\",\n			\"summable\" : \"N\",\n			\"width\": 4600\n		},\n		{\n			\"columnName\": \"WORKFLOW.MAP_NAME\",\n			\"displayName\": \"Map Name\",\n			\"filterType\": \"freetext\",\n			\"valueField\": \"null\",\n			\"index\": \"null\",\n			\"queryType\": \"LIKE\",\n			\"summable\": \"N\",\n			\"width\": 4600\n		}\n	],\n	\"extraCondition\" : \"((WORKFLOW.AWARD_LEAD_UNIT_NUMBER  IN(SELECT DISTINCT UNIT_NUMBER FROM ACCESS_TMP_AWARD)) OR (WORKFLOW.PROPOSAL_LEAD_UNIT_NUMBER  IN(SELECT DISTINCT UNIT_NUMBER FROM ACCESS_TMP_PROP_UNIT)) OR (WORKFLOW.PR_LEAD_UNIT_NUMBER  IN(SELECT DISTINCT UNIT_NUMBER FROM ACCESS_TMP_PR_UNIT)))\",\n	\"extraSelection\" : \"\",\n	\"selectDistinct\" : \"Y\",\n	\"tempTable\" : \"WITH ACCESS_TMP_AWARD AS (SELECT UNIT_NUMBER FROM PERSON_ROLES T1 INNER JOIN ROLE_RIGHTS T2 ON T1.ROLE_ID = T2.ROLE_ID INNER JOIN RIGHTS T3 ON T2.RIGHT_ID = T3.RIGHT_ID  WHERE T1.DESCEND_FLAG = \'N\' AND T1.PERSON_ID = <<PERSON_ID>> AND RIGHT_NAME IN (\'VIEW_AWARD\') UNION SELECT CHILD_UNIT_NUMBER FROM UNIT_WITH_CHILDREN  WHERE UNIT_NUMBER IN (SELECT UNIT_NUMBER FROM PERSON_ROLES T1 INNER JOIN ROLE_RIGHTS T2 ON T1.ROLE_ID = T2.ROLE_ID INNER JOIN RIGHTS T3 ON T2.RIGHT_ID = T3.RIGHT_ID  WHERE T1.DESCEND_FLAG = \'Y\' AND T1.PERSON_ID = <<PERSON_ID>> AND RIGHT_NAME IN (\'VIEW_AWARD\'))), ACCESS_TMP_PROP_UNIT AS (SELECT UNIT_NUMBER FROM PERSON_ROLES T1 INNER JOIN ROLE_RIGHTS T2 ON T1.ROLE_ID = T2.ROLE_ID INNER JOIN RIGHTS T3 ON T2.RIGHT_ID = T3.RIGHT_ID  WHERE T1.DESCEND_FLAG = \'N\' AND T1.PERSON_ID = <<PERSON_ID>> AND RIGHT_NAME IN (\'VIEW_PROPOSAL\') UNION SELECT CHILD_UNIT_NUMBER FROM UNIT_WITH_CHILDREN  WHERE UNIT_NUMBER IN (SELECT UNIT_NUMBER FROM PERSON_ROLES T1 INNER JOIN ROLE_RIGHTS T2 ON T1.ROLE_ID = T2.ROLE_ID INNER JOIN RIGHTS T3 ON T2.RIGHT_ID = T3.RIGHT_ID  WHERE T1.DESCEND_FLAG = \'Y\' AND T1.PERSON_ID = <<PERSON_ID>> AND RIGHT_NAME IN (\'VIEW_PROPOSAL\'))), ACCESS_TMP_PR_UNIT AS (SELECT UNIT_NUMBER FROM PERSON_ROLES T1 INNER JOIN ROLE_RIGHTS T2 ON T1.ROLE_ID = T2.ROLE_ID INNER JOIN RIGHTS T3 ON T2.RIGHT_ID = T3.RIGHT_ID  WHERE T1.DESCEND_FLAG = \'N\' AND T1.PERSON_ID = <<PERSON_ID>> AND RIGHT_NAME IN (\'VIEW_PROGRESS_REPORT\', \'VIEW_REVIEW_IN_PROGRESS_TAB\') UNION SELECT CHILD_UNIT_NUMBER FROM UNIT_WITH_CHILDREN  WHERE UNIT_NUMBER IN (SELECT UNIT_NUMBER FROM PERSON_ROLES T1 INNER JOIN ROLE_RIGHTS T2 ON T1.ROLE_ID = T2.ROLE_ID INNER JOIN RIGHTS T3 ON T2.RIGHT_ID = T3.RIGHT_ID  WHERE T1.DESCEND_FLAG = \'Y\' AND T1.PERSON_ID = <<PERSON_ID>> AND RIGHT_NAME