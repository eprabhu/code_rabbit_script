  - changeSet:
      id: FIBI-9250-8
      author: Prabhu.E
      labels: 'DML'
      comment:   
      changes:
        - sql:
            sql: |
                  SET SQL_SAFE_UPDATES = 0;
                  UPDATE `REPORT_TYPE_JOIN` 
                  SET `JOIN_QUERY` = ' \n     LEFT JOIN (\n     SELECT DISTINCT BH.PROPOSAL_ID,\n         BH.BUDGET_HEADER_ID,\n         BH.TOTAL_DIRECT_COST \n           - COALESCE(SUM(BD.SPONSOR_REQUESTED_AMOUNT), 0) AS MODIFIED_DIRECT_COST\n     FROM BUDGET_HEADER BH\n     INNER JOIN BUDGET_PERIOD BP ON BP.BUDGET_HEADER_ID = BH.BUDGET_HEADER_ID\n     LEFT JOIN BUDGET_DETAIL BD \n             ON  BD.BUDGET_PERIOD_ID = BP.BUDGET_PERIOD_ID\n     INNER JOIN BUDGET_CATEGORY BC \n         ON BC.BUDGET_CATEGORY_CODE = BD.BUDGET_CATEGORY_CODE\n         AND BC.BUDGET_CATEGORY_TYPE_CODE IN (\'E\',\'S\')\n     GROUP BY \n         BH.BUDGET_HEADER_ID,\n       BH.PROPOSAL_ID,\n         BH.TOTAL_DIRECT_COST\n     ) CHILD ON CHILD.PROPOSAL_ID = MASTER.PROPOSAL_ID\n     LEFT JOIN EPS_PROPOSAL_PERSONNEL_V VIEWS ON VIEWS.BUDGET_HEADER_ID = MASTER.BUDGET_HEADER_ID \n     INNER JOIN (SELECT \n     EPS.PROPOSAL_ID,\n     BC.DESCRIPTION AS BUDGET_CATEGORY,\n     BD.BUDGET_CATEGORY_CODE,\n\n     SUM(CASE \n           WHEN BP.budget_period = \'1\' \n           THEN IFNULL(BD.SPONSOR_REQUESTED_AMOUNT,0)  \n           ELSE 0 \n         END) AS PERIOD_1,\n\n     SUM(CASE WHEN BP.budget_period = \'2\' THEN IFNULL(BD.SPONSOR_REQUESTED_AMOUNT,0) ELSE 0 END) AS PERIOD_2,\n     SUM(CASE WHEN BP.budget_period = \'3\' THEN IFNULL(BD.SPONSOR_REQUESTED_AMOUNT,0) ELSE 0 END) AS PERIOD_3,\n     SUM(CASE WHEN BP.budget_period = \'4\' THEN IFNULL(BD.SPONSOR_REQUESTED_AMOUNT,0) ELSE 0 END) AS PERIOD_4,\n     SUM(CASE WHEN BP.budget_period = \'5\' THEN IFNULL(BD.SPONSOR_REQUESTED_AMOUNT,0) ELSE 0 END) AS PERIOD_5,\n     SUM(CASE WHEN BP.budget_period = \'6\' THEN IFNULL(BD.SPONSOR_REQUESTED_AMOUNT,0) ELSE 0 END) AS PERIOD_6,\n     SUM(CASE WHEN BP.budget_period = \'7\' THEN IFNULL(BD.SPONSOR_REQUESTED_AMOUNT,0) ELSE 0 END) AS PERIOD_7,\n     SUM(CASE WHEN BP.budget_period = \'8\' THEN IFNULL(BD.SPONSOR_REQUESTED_AMOUNT,0) ELSE 0 END) AS PERIOD_8,\n     SUM(CASE WHEN BP.budget_period = \'9\' THEN IFNULL(BD.SPONSOR_REQUESTED_AMOUNT,0) ELSE 0 END) AS PERIOD_9,\n     SUM(CASE WHEN BP.budget_period = \'10\' THEN IFNULL(BD.SPONSOR_REQUESTED_AMOUNT,0) ELSE 0 END) AS PERIOD_10,\n\n     SUM(\n         CASE \n           WHEN BP.budget_period = \'1\' \n           THEN IFNULL(BD.SPONSOR_REQUESTED_AMOUNT,0)  \n           ELSE IFNULL(BD.SPONSOR_REQUESTED_AMOUNT,0)\n         END\n     ) AS TOTAL,\n     SUM(IFNULL(BD.COST_SHARING_AMOUNT, 0)+ IFNULL(bd.UNDERRECOVERY_AMOUNT,0)) AS TOTAL_IN_KIND_COST, \n     SUM(IFNULL(BD.LINE_ITEM_COST, 0)) AS TOTAL_COST\n     FROM EPS_PROPOSAL EPS \n     INNER JOIN BUDGET_HEADER BH ON BH.PROPOSAL_ID = EPS.PROPOSAL_ID\n     INNER JOIN BUDGET_PERIOD BP ON BP.BUDGET_HEADER_ID = BH.BUDGET_HEADER_ID\n     LEFT JOIN BUDGET_DETAIL BD \n             ON  BD.BUDGET_PERIOD_ID = BP.BUDGET_PERIOD_ID\n     INNER JOIN BUDGET_CATEGORY BC \n             ON BC.BUDGET_CATEGORY_CODE = BD.BUDGET_CATEGORY_CODE\n\n     WHERE  (\n         BH.IS_FINAL_BUDGET = \'Y\'\n         OR (\n             BH.IS_LATEST_VERSION = \'Y\' \n             AND NOT EXISTS (\n                 SELECT 1 \n                 FROM BUDGET_HEADER \n                 WHERE PROPOSAL_ID = BH.PROPOSAL_ID \n                 AND IS_FINAL_BUDGET = \'Y\'\n             )\n         )\n     )\n\n     GROUP BY EPS.PROPOSAL_ID, BC.DESCRIPTION, BD.BUDGET_CATEGORY_CODE) SUB_CHILD ON SUB_CHILD.PROPOSAL_ID = MASTER.PROPOSAL_ID\n       LEFT JOIN(\n       SELECT PROPOSAL_ID,ACCOUNT_NUMBER FROM AWARD_FUNDING_PROPOSALS AFP\n       LEFT JOIN AWARD A ON A.AWARD_ID = AFP.AWARD_ID) AWD ON MASTER.IP_PROPOSAL_ID = AWD.PROPOSAL_ID'
                  ,UPDATE_TIMESTAMP = UTC_TIMESTAMP()
                  ,UPDATE_USER = 'admin'
                  WHERE (`TYPE_CODE` = '156');
                  SET SQL_SAFE_UPDATES = 1;				 
    rollback: empty

