  - changeSet:
      id: FIBI-10841-25
      author: Prabhu.E
      labels: 'DML'
      comment:  'Inserting new records for Proposal/Award Key Personnel Report & Project Team Report and Proposal Keywords and Research Area Report'
      changes:
        - sql:
            sql: |
                  INSERT INTO REPORT_TYPE_JOIN  (`TYPE_JOIN_ID`,`JOIN_QUERY`,`TYPE_CODE`,`UPDATE_TIMESTAMP`,`UPDATE_USER`) VALUES ((SELECT ID FROM (SELECT IFNULL(MAX(TYPE_JOIN_ID),0)+1 AS ID FROM REPORT_TYPE_JOIN)T),'  LEFT JOIN (SELECT EPK.PROPOSAL_ID,GROUP_CONCAT(DISTINCT SK.DESCRIPTION SEPARATOR \', \') AS PROPOSAL_KEYWORD\n		FROM EPS_PROPOSAL_KEYWORDS EPK\n		INNER JOIN SCIENCE_KEYWORD SK ON SK.SCIENCE_KEYWORD_CODE = EPK.SCIENCE_KEYWORD_CODE\n		GROUP BY EPK.PROPOSAL_ID) CHILD ON CHILD.PROPOSAL_ID = MASTER_DATA.PROPOSAL_ID  ','160','2026-05-04 10:43:06.000000','admin');
                  INSERT INTO REPORT_TYPE_JOIN  (`TYPE_JOIN_ID`,`JOIN_QUERY`,`TYPE_CODE`,`UPDATE_TIMESTAMP`,`UPDATE_USER`) VALUES ((SELECT ID FROM (SELECT IFNULL(MAX(TYPE_JOIN_ID),0)+1 AS ID FROM REPORT_TYPE_JOIN)T),' LEFT JOIN (\n SELECT DISTINCT\n	 BH.PROPOSAL_ID,\n     BH.BUDGET_HEADER_ID,\n     BH.TOTAL_DIRECT_COST \n       - COALESCE(SUM(BD.SPONSOR_REQUESTED_AMOUNT), 0) AS MODIFIED_DIRECT_COST\n FROM BUDGET_HEADER BH\n INNER JOIN BUDGET_PERIOD BP ON BP.BUDGET_HEADER_ID = BH.BUDGET_HEADER_ID\n LEFT JOIN BUDGET_DETAIL BD \n        ON  BD.BUDGET_PERIOD_ID = BP.BUDGET_PERIOD_ID\n LEFT JOIN BUDGET_CATEGORY BC \n     ON BC.BUDGET_CATEGORY_CODE = BD.BUDGET_CATEGORY_CODE\n    AND BC.BUDGET_CATEGORY_TYPE_CODE IN (\'E\',\'S\')\n GROUP BY \n     BH.BUDGET_HEADER_ID,\n     BH.TOTAL_DIRECT_COST\n ) CHILD ON CHILD.PROPOSAL_ID = MASTER.PROPOSAL_ID\n LEFT JOIN EPS_PROPOSAL_PERSONNEL_V VIEWS ON VIEWS.BUDGET_HEADER_ID = MASTER.BUDGET_HEADER_ID \n INNER JOIN (SELECT \n EPS.PROPOSAL_ID,\n BC.DESCRIPTION AS BUDGET_CATEGORY,\n BD.BUDGET_CATEGORY_CODE,\n \n SUM(CASE \n       WHEN BP.budget_period = \'1\' \n       THEN IFNULL(BD.SPONSOR_REQUESTED_AMOUNT,0)  \n       ELSE 0 \n     END) AS PERIOD_1,\n \n SUM(CASE WHEN BP.budget_period = \'2\' THEN IFNULL(BD.SPONSOR_REQUESTED_AMOUNT,0) ELSE 0 END) AS PERIOD_2,\n SUM(CASE WHEN BP.budget_period = \'3\' THEN IFNULL(BD.SPONSOR_REQUESTED_AMOUNT,0) ELSE 0 END) AS PERIOD_3,\n SUM(CASE WHEN BP.budget_period = \'4\' THEN IFNULL(BD.SPONSOR_REQUESTED_AMOUNT,0) ELSE 0 END) AS PERIOD_4,\n SUM(CASE WHEN BP.budget_period = \'5\' THEN IFNULL(BD.SPONSOR_REQUESTED_AMOUNT,0) ELSE 0 END) AS PERIOD_5,\n SUM(CASE WHEN BP.budget_period = \'6\' THEN IFNULL(BD.SPONSOR_REQUESTED_AMOUNT,0) ELSE 0 END) AS PERIOD_6,\n SUM(CASE WHEN BP.budget_period = \'7\' THEN IFNULL(BD.SPONSOR_REQUESTED_AMOUNT,0) ELSE 0 END) AS PERIOD_7,\n SUM(CASE WHEN BP.budget_period = \'8\' THEN IFNULL(BD.SPONSOR_REQUESTED_AMOUNT,0) ELSE 0 END) AS PERIOD_8,\n SUM(CASE WHEN BP.budget_period = \'9\' THEN IFNULL(BD.SPONSOR_REQUESTED_AMOUNT,0) ELSE 0 END) AS PERIOD_9,\n SUM(CASE WHEN BP.budget_period = \'10\' THEN IFNULL(BD.SPONSOR_REQUESTED_AMOUNT,0) ELSE 0 END) AS PERIOD_10,\n \n SUM(\n     CASE \n       WHEN BP.budget_period = \'1\' \n       THEN IFNULL(BD.SPONSOR_REQUESTED_AMOUNT,0)  \n       ELSE IFNULL(BD.SPONSOR_REQUESTED_AMOUNT,0)\n     END\n ) AS TOTAL,\n SUM(IFNULL(BD.COST_SHARING_AMOUNT, 0)+ IFNULL(bd.UNDERRECOVERY_AMOUNT,0)) AS TOTAL_IN_KIND_COST, \n SUM(IFNULL(BD.LINE_ITEM_COST, 0)) AS BUDGET_CATEGORY_TOTAL_COST\n FROM EPS_PROPOSAL EPS \n INNER JOIN BUDGET_HEADER BH ON BH.PROPOSAL_ID = EPS.PROPOSAL_ID\n INNER JOIN BUDGET_PERIOD BP ON BP.BUDGET_HEADER_ID = BH.BUDGET_HEADER_ID\n LEFT JOIN BUDGET_DETAIL BD \n        ON  BD.BUDGET_PERIOD_ID = BP.BUDGET_PERIOD_ID\n INNER JOIN BUDGET_CATEGORY BC \n        ON BC.BUDGET_CATEGORY_CODE = BD.BUDGET_CATEGORY_CODE\n \n WHERE  (\n     BH.IS_FINAL_BUDGET = \'Y\'\n     OR (\n         BH.IS_LATEST_VERSION = \'Y\' \n         AND NOT EXISTS (\n             SELECT 1 \n             FROM BUDGET_HEADER \n             WHERE PROPOSAL_ID = BH.PROPOSAL_ID \n             AND IS_FINAL_BUDGET = \'Y\'\n         )\n     )\n )\n \n GROUP BY EPS.PROPOSAL_ID, BC.DESCRIPTION, BD.BUDGET_CATEGORY_CODE) SUB_CHILD ON SUB_CHILD.PROPOSAL_ID = MASTER.PROPOSAL_ID\n  LEFT JOIN(\n  SELECT PROPOSAL_ID,ACCOUNT_NUMBER, \n  A.AWARD_ID,A.TITLE AS AWARD_TITLE ,\n  AAS.DESCRIPTION AS AWARD_STATUS,\n  ATT.DESCRIPTION AS AWARD_ACCOUNT_TYPE,\n  A.BEGIN_DATE AS AWARD_EFFECTIVE_DATE,\n  A.FINAL_EXPIRATION_DATE\n  FROM AWARD_FUNDING_PROPOSALS AFP\n  LEFT JOIN AWARD A ON A.AWARD_ID = AFP.AWARD_ID\n  LEFT JOIN AWARD_STATUS AAS ON AAS.STATUS_CODE = A.STATUS_CODE\n  LEFT JOIN ACCOUNT_TYPE ATT ON ATT.ACCOUNT_TYPE_CODE = A.ACCOUNT_TYPE_CODE\n  WHERE ((A.AWARD_SEQUENCE_STATUS IN(\'PENDING\') AND A.SEQUENCE_NUMBER = 1)\nOR A.AWARD_SEQUENCE_STATUS IN(\'ACTIVE\'))\n  ) AWD ON MASTER.IP_PROPOSAL_ID = AWD.PROPOSAL_ID  ','156','2026-05-04 10:43:08.000000','admin');
                  INSERT INTO REPORT_TYPE_JOIN  (`TYPE_JOIN_ID`,`JOIN_QUERY`,`TYPE_CODE`,`UPDATE_TIMESTAMP`,`UPDATE_USER`) VALUES ((SELECT ID FROM (SELECT IFNULL(MAX(TYPE_JOIN_ID),0)+1 AS ID FROM REPORT_TYPE_JOIN)T),' LEFT JOIN PROP_AWD_DETAILS_TAB CHILD ON MASTER_DATA.IP_PROPOSAL_ID = CHILD.IP_PROPOSAL_ID\n					LEFT JOIN `award_project_team` `TEAM` ON `CHILD`.`AWARD_ID` = `TEAM`.`AWARD_ID` ','159','2026-05-04 10:43:07.000000','admin');
                  INSERT INTO REPORT_TYPE_JOIN  (`TYPE_JOIN_ID`,`JOIN_QUERY`,`TYPE_CODE`,`UPDATE_TIMESTAMP`,`UPDATE_USER`) VALUES ((SELECT ID FROM (SELECT IFNULL(MAX(TYPE_JOIN_ID),0)+1 AS ID FROM REPORT_TYPE_JOIN)T),'  INNER JOIN (SELECT DISTINCT\n 					ER.MODULE_ITEM_KEY AS PROPOSAL_ID,\n 					ER.EXT_REVIEW_ID AS ERM_ID,\n 					ER.DESCRIPTION AS ERM_REVIEW_TITLE,\n 					ERR.DEADLINE_DATE AS REVIEW_DEADLINE_DATE,\n 					ET.DESCRIPTION AS ERM_REVIEW_TYPE,\n 					ER_STATUS.DESCRIPTION AS ERM_REVIEW_STATUS,\n 					ERV.FULL_NAME AS REVIEWER_NAME,\n 					ERFS.DESCRIPTION AS REVIEWER_REVIEW_STATUS,\n 					ERRS.DESCRIPTION AS REVIEWER_ASSIGNMENT_STATUS,\n					CONCAT(ER.MODULE_ITEM_KEY,\'-\',LPAD(ER.VERSION_NUMBER, 3, 0)) AS EXT_REVIEW_NUMBER\n 					FROM EXT_REVIEW ER\n 					LEFT JOIN EXT_REVIEW_SERVICE_TYPE ET ON ER.EXT_REVIEW_SERVICE_TYPE_CODE = ET.EXT_REVIEW_SERVICE_TYPE_CODE\n 					LEFT JOIN EXT_REVIEW_REVIEWERS ERR ON ER.EXT_REVIEW_ID = ERR.EXT_REVIEW_ID\n 					LEFT JOIN EXT_REVIEW_STATUS ER_STATUS ON ER_STATUS.EXT_REVIEW_STATUS_CODE = ER.EXT_REVIEW_STATUS_CODE\n 					LEFT JOIN EXTERNAL_REVIEWER ERV ON ERR.EXTERNAL_REVIEWER_ID = ERV.EXTERNAL_REVIEWER_ID\n 					LEFT JOIN EXT_REVIEWERS_STATUS ERV_STATUS ON ERR.EXT_REVIEWERS_STATUS_CODE = ERV_STATUS.EXT_REVIEWERS_STATUS_CODE\n 					LEFT JOIN EXT_REVIEW_REVIEWERS_STATUS ERRS ON ERR.EXT_REVIEW_REVIEWERS_STATUS_CODE = ERRS.EXT_REVIEW_REVIEWERS_STATUS_CODE\n                    LEFT JOIN EXT_REV_REVIEWER_FLOW_STATUS ERFS ON ERFS.EXT_REV_REVIEWER_FLOW_STATUS_CODE = ERR.EXT_REV_REVIEWER_FLOW_STATUS_CODE\n 					WHERE ER.MODULE_ITEM_CODE = 3 \n 					AND ER.MODULE_SUB_ITEM_CODE = 0\n 					)CHILD ON CHILD.PROPOSAL_ID = MASTER_DATA.PROPOSAL_ID ','157','2026-05-04 10:43:07.000000','admin');

      rollback: empty

