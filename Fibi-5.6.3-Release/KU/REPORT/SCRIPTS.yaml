te","valueField":"null","index":"null","queryType":"BETWEEN","width":5800},{"columnName":"CHILD.RESEARCH_CENTER","displayName":"Research Center","filterType":"lookUp","valueField":"RESEARCH_CENTER#CENTER_ID#true#true","index":"null","queryType":"IN","width":7000},{"columnName":"MASTER_DATA.HORIZONTAL_AREA","displayName":"Horizontal Area","filterType":"freetext","valueField":"null","index":"null","queryType":"LIKE","summable":"N","width":18000},{"columnName":"MASTER_DATA.VERTICAL_AREA","displayName":"Vertical Area","filterType":"freetext","valueField":"null","index":"null","queryType":"LIKE","summable":"N","width":18000}],"extraCondition":"(LEAD_UNIT_NUMBER IN(SELECT DISTINCT UNIT_NUMBER FROM ACCESS_TMP) OR AWARD_ID IN (SELECT DISTINCT AWARD_ID FROM AWARD_TEMP)) ORDER BY AWARD_NUMBER","extraSelection":"","selectDistinct":"Y","tempTable":"WITH ACCESS_TMP  AS (SELECT UNIT_NUMBER FROM PERSON_ROLES T1 INNER JOIN ROLE_RIGHTS T2 ON T1.ROLE_ID = T2.ROLE_ID INNER JOIN RIGHTS T3 ON T2.RIGHT_ID = T3.RIGHT_ID  WHERE T1.DESCEND_FLAG = ''N'' AND T1.PERSON_ID = <<PERSON_ID>> AND RIGHT_NAME IN (''VIEW_AWARD'') UNION SELECT CHILD_UNIT_NUMBER FROM UNIT_WITH_CHILDREN  WHERE UNIT_NUMBER IN (SELECT UNIT_NUMBER FROM PERSON_ROLES T1 INNER JOIN ROLE_RIGHTS T2 ON T1.ROLE_ID = T2.ROLE_ID INNER JOIN RIGHTS T3 ON T2.RIGHT_ID = T3.RIGHT_ID  WHERE T1.DESCEND_FLAG = ''Y'' AND T1.PERSON_ID = <<PERSON_ID>> AND RIGHT_NAME IN (''VIEW_AWARD''))), AWARD_TEMP AS (SELECT T1.AWARD_ID FROM AWARD_PERSON_ROLES T1 INNER JOIN ROLE_RIGHTS T2 ON T1.ROLE_ID = T2.ROLE_ID INNER JOIN RIGHTS T3 ON T2.RIGHT_ID = T3.RIGHT_ID WHERE T1.PERSON_ID =<<PERSON_ID>> AND T3.RIGHT_NAME IN (''VIEW_AWARD'')  OR (AWARD_ID IN (SELECT AWARD_ID FROM AWARD A1 INNER JOIN grant_call_header A2 ON A2.GRANT_HEADER_ID = A1.GRANT_HEADER_ID INNER JOIN PERSON_ROLE_RT PR ON A2.HOME_UNIT_NUMBER = PR.UNIT_NUMBER WHERE PR.RIGHT_NAME IN (''VIEW_AWARD'') AND PR.PERSON_ID = <<PERSON_ID>> AND PR.ROLE_ID = 100)))"}' WHERE (TYPE_CODE = '10');
