TUS\",\n            \"filterType\": \"freetext\",\n            \"valueField\": \"null\",\n            \"displayName\": \"Routing Status\"\n        },\n        {\n            \"index\": \"null\",\n            \"width\": 4600,\n            \"summable\": \"N\",\n            \"queryType\": \"LIKE\",\n            \"columnName\": \"WORKFLOW.STOP_NAME\",\n            \"filterType\": \"null\",\n            \"valueField\": \"null\",\n            \"displayName\": \"Stop Name\"\n        },\n        {\n            \"index\": \"null\",\n            \"width\": 4600,\n            \"summable\": \"N\",\n            \"queryType\": \"IN\",\n            \"columnName\": \"WORKFLOW.PRIMARY_APPROVER\",\n            \"filterType\": \"null\",\n            \"valueField\": \"null\",\n            \"displayName\": \"Primary Approver\"\n        },\n        {\n            \"index\": \"fibiperson\",\n            \"width\": 4600,\n            \"summable\": \"N\",\n            \"queryType\": \"IN\",\n            \"columnName\": \"WORKFLOW.ACTION_TAKEN_BY\",\n            \"filterType\": \"elastic\",\n            \"valueField\": \"full_name\",\n            \"displayName\": \"Stop Approver Name\"\n        },\n        {\n            \"index\": \"null\",\n            \"width\": 4600,\n            \"summable\": \"N\",\n            \"queryType\": \"IN\",\n            \"columnName\": \"WORKFLOW.APPROVER_STATUSES\",\n            \"filterType\": \"null\",\n            \"valueField\": \"null\",\n            \"displayName\": \"Approver Statuses\"\n        },\n        {\n            \"index\": \"null\",\n            \"width\": 4600,\n            \"summable\": \"N\",\n            \"queryType\": \"LIKE\",\n            \"columnName\": \"WORKFLOW.APPROVER_COMMENTS\",\n            \"filterType\": \"null\",\n            \"valueField\": \"null\",\n            \"displayName\": \"Approver Comments\"\n        },\n        {\n            \"index\": \"null\",\n            \"width\": 5800,\n            \"summable\": \"N\",\n            \"queryType\": \"BETWEEN\",\n            \"columnName\": \"WORKFLOW.FIRST_WORKFLOW_START_DATE\",\n            \"filterType\": \"null\",\n            \"valueField\": \"null\",\n            \"displayName\": \"First Workflow Start Date\"\n        },\n        {\n            \"index\": \"null\",\n            \"width\": 4600,\n            \"summable\": \"N\",\n            \"queryType\": \"IN\",\n            \"columnName\": \"WORKFLOW.SUBMITTED_BY\",\n            \"filterType\": \"null\",\n            \"valueField\": \"null\",\n            \"displayName\": \"Submitted By\"\n        },\n        {\n            \"index\": \"null\",\n            \"width\": 4600,\n            \"summable\": \"N\",\n            \"queryType\": \"LIKE\",\n            \"columnName\": \"WORKFLOW.MAP_NAME\",\n            \"filterType\": \"freetext\",\n            \"valueField\": \"null\",\n            \"displayName\": \"Map Name\"\n        }\n    ],\n    \"tempTable\": \"WITH ACCESS_TMP_AWARD AS ( SELECT UNIT_NUMBER FROM PERSON_ROLES T1 INNER JOIN ROLE_RIGHTS T2 ON T1.ROLE_ID = T2.ROLE_ID INNER JOIN RIGHTS T3 ON T2.RIGHT_ID = T3.RIGHT_ID WHERE T1.DESCEND_FLAG = \'N\' AND T1.PERSON_ID = <<PERSON_ID>> AND RIGHT_NAME IN (\'VIEW_AWARD\') UNION SELECT CHILD_UNIT_NUMBER FROM UNIT_WITH_CHILDREN WHERE UNIT_NUMBER IN ( SELECT UNIT_NUMBER FROM PERSON_ROLES T1 INNER JOIN ROLE_RIGHTS T2 ON T1.ROLE_ID = T2.ROLE_ID INNER JOIN RIGHTS T3 ON T2.RIGHT_ID = T3.RIGHT_ID WHERE T1.DESCEND_FLAG = \'Y\' AND T1.PERSON_ID = <<PERSON_ID>> AND RIGHT_NAME IN (\'VIEW_AWARD\') ) ), ACCESS_TMP_PROP_UNIT AS (SELECT UNIT_NUMBER FROM PERSON_ROLES T1 INNER JOIN ROLE_RIGHTS T2 ON T1.ROLE_ID = T2.ROLE_ID INNER JOIN RIGHTS T3 ON T2.RIGHT_ID = T3.RIGHT_ID WHERE T1.DESCEND_FLAG = \'N\' AND T1.PERSON_ID = <<PERSON_ID>> AND RIGHT_NAME IN (\'VIEW_PROPOSAL\') UNION SELECT CHILD_UNIT_NUMBER FROM UNIT_WITH_CHILDREN WHERE UNIT_NUMBER IN ( SELECT UNIT_NUMBER FROM PERSON_ROLES T1 INNER JOIN ROLE_RIGHTS T2 ON T1.ROLE_ID = T2.ROLE_ID INNER JOIN RIGHTS T3 ON T2.RIGHT_ID = T3.RIGHT_ID WHERE T1.DESCEND_FLAG = \'Y\' AND T1.PERSON_ID = <<PERSON_ID>> AND RIGHT_NAME IN (\'VIEW_PROPOSAL\') ) ), ACCESS_TMP_PR_UNIT AS ( SELECT UNIT_NUMBER FROM PERSON_ROLES T1 INNER JOIN ROLE_RIGHTS T2 ON T1.ROLE_ID = T2.ROLE_ID INNER JOIN RIGHTS T3 ON T2.RIGHT_ID = T3.RIGHT_ID WHERE T1.DESCEND_FLAG = \'N\' AND T1.PERSON_ID = <<PERSON_ID>> AND RIGHT_NAME IN (\'VIEW_PROGRESS_REPORT\') UNION SELECT CHILD_UNIT_NUMBER FROM UNIT_WITH_CHILDREN WHERE UNIT_NUMBER IN ( SELECT UNIT_NUMBER FROM PERSON_ROLES T1 INNER JOIN ROLE_RIGHTS T2 ON T1.ROLE_ID = T2.ROLE_ID INNER JOIN RIGHTS T3 ON T2.RIGHT_ID = T3.RIGHT_ID WHERE T1.DESCEND_FLAG = \'Y\' AND T1.PERSON_ID = <<PERSON_ID>> AND RIGHT_NAME IN (\'VIEW_PROGRESS_REPORT\') )  )\",\n    \"extraCondition\": \"((WORKFLOW.AWARD_LEAD_UNIT_NUMBER IN (SELECT DISTINCT UNIT_NUMBER FROM ACCESS_TMP_AWARD)) OR (WORKFLOW.PROPOSAL_LEAD_UNIT_NUMBER IN (SELECT DISTINCT UNIT_NUMBER FROM ACCESS_TMP_PROP_UNIT)) OR (WORKFLOW.PR_LEAD_UNIT_NUMBER IN (SELECT DISTINCT UNIT_NUMBER FROM ACCESS_TMP_PR_UNIT))) ORDER BY  WORKFLOW.RECORD_ID, WORKFLOW.MAP_NUMBER , WORKFLOW.APPROVAL_STOP_NUMBER  \",\n    \"extraSelection\": \" ,WORKFLOW.MAP_NUMBER , WORKFLOW.APPROVAL_STOP_NUMBER \",\n    \"selectDistinct\": \"Y\"\n}',
