databaseChangeLog:

  - changeSet:
      id: FIBI-10875-1
      author: Prabhu.E
      labels: 'PROCEDURES'
      comment: added custom changes for custom data sync procedure
      runOnChange: true
      changes:
        - sql:
            sql: |
                DROP PROCEDURE IF EXISTS CUSTOM_DATA_SYNC;
        - sqlFile:
            path: ROUTINES/KU/REPORT/PROCEDURES/CUSTOM_DATA_SYNC.sql
            relativeToChangelogFile: false
            splitStatements: false
      rollback: empty

