databaseChangeLog:

  - changeSet:
      id: FIBI-10809-1
      author: Shyla
      labels: 'DML'
      comment: Set IS_ATTACHMENT_REQUIRED to NONE for Submit action (ACTION_TYPE_CODE = 2).
      changes:
        - sql:
            sql: |
              UPDATE SR_ACTION_TYPE
              SET
                IS_ATTACHMENT_REQUIRED = 'NONE',
                UPDATE_TIMESTAMP = UTC_TIMESTAMP(),
                UPDATE_USER = 'admin'
              WHERE ACTION_TYPE_CODE = 2;
      rollback: empty

  - changeSet:
      id: FIBI-10682-1
      author: Nabeel Ahamed M
      labels: 'DML'
      comment: Update SR Subject
      changes:
        - sql:
            sql: |
              SET SQL_SAFE_UPDATES = 0;
              UPDATE SR_HEADER SET SUBJECT = TRIM(SUBJECT) WHERE SUBJECT IS NOT NULL AND SUBJECT <> TRIM(SUBJECT);
              SET SQL_SAFE_UPDATES = 1;
      rollback: empty
