  - changeSet:
      id: FIBI-9687-2
      author: Shiva
      labels: 'DML'
      comment: Update in ExternalReviewReviewer table
      changes:
        - sql:
            sql: |
              SET @sql := IF(
              (SELECT COUNT(*) FROM information_schema.COLUMNS
              WHERE TABLE_SCHEMA = DATABASE()
                AND TABLE_NAME = 'EXT_REVIEW_REVIEWERS'
                AND COLUMN_NAME = 'IS_DELETED') = 0,
              'ALTER TABLE EXT_REVIEW_REVIEWERS ADD COLUMN IS_DELETED VARCHAR(1) NOT NULL DEFAULT ''N'';',
              'SELECT 1'
              );
              PREPARE stmt FROM @sql;
              EXECUTE stmt;
              DEALLOCATE PREPARE stmt;
      rollback:
        - sql:
            sql: |
              ALTER TABLE EXT_REVIEW_REVIEWERS
              DROP COLUMN IS_DELETED;

  - changeSet:
      id: FIBI-9406-1
      author: Sasikumar Chandran
      labels: 'DDL'
      comment: Add SORT_ORDER column to EXT_REVIEW_ATTACHMENTS if not exists
      changes:
        - sql:
            sql: |
              ANALYZE TABLE EXT_REVIEW_ATTACHMENTS;
              SET @sql := IF(
              (SELECT COUNT(*) FROM information_schema.COLUMNS
              WHERE TABLE_SCHEMA = DATABASE()
              AND TABLE_NAME = 'EXT_REVIEW_ATTACHMENTS'
              AND COLUMN_NAME = 'SORT_ORDER') = 0,
              'ALTER TABLE EXT_REVIEW_ATTACHMENTS ADD COLUMN SORT_ORDER INT NULL DEFAULT NULL AFTER IS_ATTACHMENT_MANDATORY;',
              'DO 1'
              );
              PREPARE stmt FROM @sql; 
              EXECUTE stmt;
              DEALLOCATE PREPARE stmt;
      rollback:
        - sql:
            sql: |
              ALTER TABLE EXT_REVIEW_ATTACHMENTS DROP COLUMN SORT_ORDER;

  - changeSet:
