rue\"\n        },\n        {\n            \"columnName\": \"UPDATE_USER\",\n            \"displayName\": \"Update User\",\n            \"refColumnName\": \"PERSON#USER_NAME\",\n            \"dataType\": \"String\",\n            \"isEditable\": \"false\",\n            \"length\": \"60\",\n            \"canEmpty\": \"false\",\n            \"visible\": \"true\"\n        },\n        {\n            \"columnName\": \"IS_ATTACHMENT_REQUIRED\",\n            \"displayName\": \"Attachment Required\",\n            \"dataType\": \"String\",\n            \"isEditable\": true,\n            \"length\": 100,\n            \"canEmpty\": true,\n            \"visible\": true,\n            \"valueChanged\": null,\n            \"index\": null,\n            \"filterType\": \"systemDropdown\",\n            \"valueField\": null,\n            \"isTransient\": null,\n            \"values\": [\n                {\n                    \"code\": \"NONE \",\n                    \"description\": \"None\"\n                },\n                {\n                    \"code\": \"OPTIONAL\",\n                    \"description\": \"Optional\"\n                },\n                {\n                    \"code\": \"MANDATORY\",\n                    \"description\": \"Mandatory\"\n                },\n                {\n                    \"code\": \"FINAL_REQUIRED\",\n                    \"description\": \"Final Required\"\n                }\n            ],\n            \"refColumnName\": null,\n            \"defaultValue\": null\n        },\n        {\n            \"columnName\": \"IS_ACTIVE\",\n            \"displayName\": \"Is Active\",\n            \"dataType\": \"String\",\n            \"isEditable\": \"true\",\n            \"length\": \"1\",\n            \"canEmpty\": \"false\",\n            \"visible\": \"true\",\n            \"filterType\": \"switch\"\n        }\n    ],\n    \"primaryKey\": [\n        \"AGREEMENT_WORKFLOW_ACTION_ID\"\n    ],\n    \"dependency\": [\n        {\n            \"displayName\": \"Agreement Review Status\",\n            \"table_name\": \"AGREEMENT_REVIEW_STATUS\",\n            \"columnName\": \"REVIEW_STATUS_CODE\",\n            \"showTableName\": \"true\"\n        },\n        {\n            \"displayName\": \"Negotiation Location Type\",\n            \"table_name\": \"NEGOTIATION_LOCATION_TYPE\",\n            \"columnName\": \"LOCATION_TYPE_CODE\",\n            \"showTableName\": \"true\"\n        },\n        {\n            \"displayName\": \"Agreement Status\",\n            \"table_name\": \"AGREEMENT_STATUS\",\n            \"columnName\": \"AGREEMENT_STATUS_CODE\",\n            \"showTableName\": \"true\"\n        }\n    ]\n}',
